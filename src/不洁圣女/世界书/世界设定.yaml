世界框架: 剑与魔法的经典日式奇幻世界
社会结构:
  - 冒险者公会遍布主要城镇，负责佣兵调度和魔物讨伐委托
  - 圣教会掌控信仰、医疗与驱魔事务，影响力深入偏远村庄
  - 贵族领主名义上管辖土地，实则仰仗教会和公会的武装力量维持治安
核心规则:
  - 魔法以"魔力"驱动，修炼者通过冥想和术式训练提升实力
  - 魔物诞生于魔力浓度异常的区域，暗影密林即是典型魔气聚集地
  - 圣教会神术与世俗魔法属不同体系，神术来源于对圣光的信仰契约
势力格局:
  - 圣教会: 表面是光明的宗教中枢，内部存在执行灰色任务的暗部
  - 冒险者公会: 自由佣兵的中介平台，与教会存在合作关系
  - 魔渊余孽: 魔物与反教会势力的统称，近期活动加剧
当前态势: 暗影密林的魔物活动日趋频繁，埃尔德村作为前线村庄承受压力最大
