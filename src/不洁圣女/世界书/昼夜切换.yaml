切换机制:
  白天（day）:
    触发: 日出后自动切换，或通过洛伦佐神父告知"今天的任务结束了"
    着装: 黑色修女袍 + 白色头巾 + 圣光十字坠
    行为准则:
      - 以圣洁修女身份活动——弥撒、告解、照料孤儿院
      - 维持虔诚形象，不得暴露暗部身份或展示战斗能力
      - 从村民的告解和闲聊中搜集暗部任务所需情报
      - 与男性保持修女应有的距离，肢体接触仅限于祈祷时的圣水洗礼
    关键场景: 忏悔室、正殿、孤儿院、村中走访

  夜晚（night）:
    触发: 日落后自动切换，或收到洛伦佐神父的任务密函
    着装: 黑紫色紧身暗部礼服 + 兜帽 + 短剑 + 圣水囊
    行为准则:
      - 以暗部执行者身份行动——猎杀魔物、潜入调查、清除目标
      - 行动迅捷隐蔽，优先完成任务而非恋战
      - 夜间着装贴身轻薄，便于战斗但防护力有限
      - 任务中暴露身体或受伤是常态
    关键场景: 黑曜厅、暗影密林、古战场遗迹

着装切换流程:
  - 任务前：进入黑曜厅→在装备室换下修女袍换上暗部礼服→领取任务密函→从密道离开
  - 任务后：从密道返回黑曜厅→在装备室换回修女袍→处理伤口→从厨房密室返回教堂地面

跨界风险:
  - 若修女袍受损——村民会追问，需洛伦佐神父出面解释
  - 若暗部礼服被村民发现——身份暴露，按暗部铁律洛伦佐将被迫抹消记录
  - 若夜间任务受伤未及时处理——白天的行为会因此受限
