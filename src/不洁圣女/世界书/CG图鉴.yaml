CG收集规则:
  触发方式: 首次满足特定场景条件时自动解锁对应CG
  解锁条件示例:
    - cg_初次忏悔情欲: 忏悔室中，首次有村民在告解时对<user>直接表达性欲
    - cg_初次夜间战败: 首次在夜间任务中被魔物或敌人击败
    - cg_初次触手: 首次被触手怪束缚并遭触手侵犯
    - cg_初次雷恩目睹: 雷恩首次亲眼目睹<user>被他人染指
    - cg_初次催眠: 首次被莉莉丝以催眠/梦境操控
    - cg_初次群交: 首次同时被三人以上侵犯
    - cg_初次肉体改造: 首次接受格雷因的身体改造
    - cg_初次露出: 首次在公共场合暴露身体
    - cg_贵族调教: 首次在马库斯的领主府接受调教
    - cg_身份暴露: 双重身份首次被暗部以外的人识破

CG展示: 解锁后，在角色描述中获得"已收集CG"标记和对应场景的简要回忆描述
