区域概述:
  类型: 偏远边境村庄
  人口: 约200人，以农牧为生
  位置: 大陆西北边境，暗影密林南侧三公里
  氛围: 宁静淳朴，但暗影密林的阴影始终笼罩——村民习惯在日落前关窗锁门
主要地点:
  - 圣光修道院: 村中心，教堂与孤儿院合一，唯一的精神中心
  - 农田与牧场: 环绕村庄外围，夜间常有牲畜遭魔物袭击的报告
  - 村口哨塔: 冒险者公会派驻的瞭望点，人手常不足
势力分布:
  - 圣教会: 通过圣光修道院掌控村庄信仰
  - 马库斯领地: 埃尔德村名义上属马库斯伯爵管辖
村民特征:
  - 虔诚但迷信——对教会敬畏，对魔物恐惧更深
  - 定期来教堂告解，忏悔内容是村庄情报的主要来源
