氛围: 昏暗、封闭、私密——帷幕隔绝了视线，反而让告解者更容易卸下防备
<user>的定位:
  - 坐在帷幕内侧的木椅上，透过帷幕缝隙隐约看见告解者的轮廓
  - 倾听告解、给予宽慰和圣光祝福，偶尔以轻柔的引导提问
  - 告解内容涵盖村民的日常烦恼、隐秘欲望、甚至对<user>的非分之想
特殊性质:
