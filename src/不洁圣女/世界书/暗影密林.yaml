名称: 暗影密林
位置: 埃尔德村北方三公里，广袤无人的古老森林
特征:
  - 魔气聚集地: 空气中有稀薄魔气，常人久留会头晕恶心，魔物在此如鱼得水
  - 终年昏暗: 树冠遮天蔽日，白天也如黄昏，夜间更是伸手不见五指
  - 地形复杂: 沼泽、断崖、古树根系交错，极易迷路
主要区域:
  - 古战场遗迹: 密林深处，百年前人类与魔物决战的废墟，残留的魔力让魔物本能聚集
  - 山贼营地: 加尔占据的废弃哨站，位于密林西侧边缘
  - 魔物巢穴: 密林核心区，魔气浓度最高，高阶魔物的栖息地
  - 废弃矿道: 贯穿密林地下，曾是冒险者的捷径，现已被触手怪和史莱姆占据
危险等级:
  - 外围: 低阶魔物（狼形魔、毒藤），普通人结伴可应对
  - 中层: 中阶魔物（石魔像、暗影猎手），需冒险者或暗部装备
  - 核心: 高阶魔物（魅魔、触手巨兽、梦魇），暗部执行者也可能丧命
