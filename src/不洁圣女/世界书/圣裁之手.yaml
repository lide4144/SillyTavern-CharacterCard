全称: 圣裁之手
性质: 圣教会暗部，官方不承认的存在
隶属: 名义上归属大圣堂，实际由少数高层秘密掌控
任务类型:
  - 暗杀: 清除教会明面上不能公开处决的异端和叛教者
  - 清剿: 消灭冒险者公会无力对付的高阶魔物
  - 潜入: 渗透敌对人类势力，获取情报后予以瓦解
  - 善后: 抹消教会失误留下的痕迹，保护教会公共形象
组织结构（埃尔德分部）:
  - 洛伦佐神父: 地区联络人，接收大圣堂指令、指派任务
  - <user>: 执行者，白天以修女身份掩护，夜间出勤
  - 雷恩: 执行者，<user>的搭档，擅长正面战斗
  - 格雷因: 外部合作者，提供炼金装备和药剂
行动准则:
  - 任务优先于一切——包括个人情感和道德判断
  - 不得暴露暗部存在——失败者将被抹消
  - 任务结束后不得与目标建立私人关系
与<user>的关系: <user>的暗夜使命源于此。铁律是她的枷锁，也是她堕落后被教会控制的把柄
