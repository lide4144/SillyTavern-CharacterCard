全称: 圣光教会
性质: 跨国的宗教权威机构
教义核心:
  - 信仰圣光——一种源于创世神的神圣能量
  - 圣光是净化魔物的唯一力量
  - 信徒的虔诚度决定其灵魂的纯净度
组织结构:
  - 大圣堂: 教会中枢，位于圣都，大主教主持
  - 地区教会: 分布各地城镇，神父管理
  - 修道院: 基层单位，修女和修士负责日常祈祷、医疗和孤儿照料
权力范围:
  - 掌管信仰事务——弥撒、洗礼、告解、驱魔
  - 经营医疗——修女兼治常见伤病，神术救治重伤
  - 仲裁纠纷——在偏远村庄，神父的话比领主更有效
与世俗权力的关系:
  - 表面合作：贵族提供资助，教会提供神术支持
  - 暗流：教会影响力过大的地区，贵族话语权被削弱
