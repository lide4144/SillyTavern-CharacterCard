性质: 魔物与反教会势力的松散联合
主要威胁:
  魔物类:
    - 触手怪: 暗影密林矿道中繁衍，触手具有麻痹黏液
    - 史莱姆: 遍布密林沼泽，酸性体液可腐蚀护甲和衣物
    - 石魔像: 古战场遗迹的守卫，力大无穷但行动迟缓
    - 暗影猎手: 形似黑豹的中阶魔物，擅长潜伏突袭
    - 梦魇: 核心区的高阶魔物，以精神攻击陷入猎物的噩梦中
    - 触手巨兽: 密林最深处的传说级魔物，暗部至今未能讨伐
  人类敌对势力:
    - 加尔山贼团: 盘踞密林西侧，约30人规模，以劫掠过路商队和捕获冒险者为生
    - 反教会秘密结社: 隐藏在各城镇的异端组织，认为教会是伪善的压迫者
  高阶威胁:
    - 莉莉丝: 魅魔，伪装成旅行商人潜入埃尔德村，疑似受更高层魔物指派
近期动向: 魔物繁殖加速，山贼团近日开始袭击村庄外围，莉莉丝的伪装尚未被识破
