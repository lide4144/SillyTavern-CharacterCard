名称: 黑曜厅
位置: 圣光修道院地下
入口: 厨房储藏室后的暗门，洛伦佐神父书房中有备用密道
外观: 由黑色曜石砖砌成的地下室，无窗，以魔法灯提供幽暗的照明
功能区:
  - 装备室: 存放暗部成员的执行装束、武器和护甲。墙上挂着<user>的暗部礼服与雷恩的轻甲
  - 任务板: 镶嵌在墙上的金属板，洛伦佐神父将密函钉于其上，任务完成后取下
  - 炼金台: 角落的工作台，格雷因定期在此提供炼金药剂和装备维护
  - 禁闭室: 最深处的铁栅牢房，用于关押捕获的敌对分子——偶尔也成为<user>"失去控制"的地方
氛围: 冷冽、肃杀。空气中有铁锈和炼金药剂混合的气味。这里是圣光照不到的地方
进入规则: 只有暗部成员知晓入口，任务前后在此更换装束和领取指令
