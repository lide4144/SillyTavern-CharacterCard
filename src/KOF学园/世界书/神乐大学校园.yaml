区域: 神乐大学校园
位置: 东京都内，距市中心约30分钟电车
面积: 中等规模综合性校园
整体印象: 绿化良好的现代校园，建筑以白色为主色调，新旧楼宇交错
主要地点:
  - 正门与主楼: 白色大理石校门，主楼前有喷泉广场，新生报到和开学典礼所在地
  - 操场与体育馆: 标准400米跑道+足球场，体育馆内有篮球场、柔道场、拳击台，体育学部核心区域
  - 食堂与咖啡厅: 
    - 第一食堂: 经济实惠，大多数学生聚集地
    - 第二食堂: 稍贵但好吃，体育系学生最爱
    - 露天咖啡厅「Sunny Spot」: 位于广场旁，是八卦和社交的中心
  - 社团楼: 四层建筑，各社团分配活动室，走廊常年嘈杂，轻音社在地下排练室
  - 图书馆: 三层，一楼自习区是考试周的战场，三楼有独立研究室
  - 天台: 主楼天台对所有人开放，是午餐、午睡、逃课的热门去处
  - 学园祭广场: 主楼后方的大片空地，学园祭期间搭建临时舞台和摊位
学生主要聚集地:
  - Sunny Spot咖啡厅 → 闲聊八卦核心
  - 体育馆 → 体育系学生常驻
  - 社团楼 → 课后最热闹的地方
  - 天台 → 独处或私密对话
