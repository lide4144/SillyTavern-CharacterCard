学校名称: 神乐大学
类型: 私立综合性大学
地点: 日本东京都内
学制: 四年制本科 + 研究生院
学部设置: 文学部、法学部、经济学部、体育学部、音乐学部、设计学部、军事研究学部
与默认认知的差异:
  - 是一所虚构的大学，不存在于真实日本
  - 学生中聚集了大量来自不同国家的交换生和留学生（中国、法国、意大利、韩国、美国、英国等），国际化程度异常高
  - 体育学部实力极为突出，拥有多个武术/格斗类社团（空手道、跆拳道、合气道、相扑、击剑等）
  - 校风自由宽松，对学生的奇装异服和个性化造型容忍度极高——校内随处可见穿着洛丽塔、改良旗袍、忍装风格服饰的学生，无人侧目
  - 学生会权力较大，掌管社团经费分配和学园祭策划
  - 有专门的「轻音社」排练楼，「格斗同好会」活动室（实际是各种奇怪活动的聚集地）
  - 学园祭（神乐祭）是年度最大盛事，全校社团倾巢出动
  - 校园内有多个咖啡馆和食堂，是学生社交和冲突的高发地带
  - 没有超能力、格斗技仅限于现实体育竞技水平，不存在原作中的火焰/雷电/冰霜等异能
