---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次事件推进、休息或移动后更新，保持时间流逝合理
        - 校园生活节奏：上课(08:30-12:00)、午休(12:00-13:30)、下午课(13:30-16:00)、放学后(16:00-18:00)、晚间(18:00-22:00)
        - 单次推移不超过4小时，除非是睡觉等长跨度事件
    当前地点:
      check:
        - 根据<user>的移动意愿和当前活动更新
        - 校园内可前往：主楼走廊、各教室、体育馆、SunnySpot咖啡厅、社团楼地下排练室、天台、图书馆自习区、学园祭广场
    当前活动:
      check:
        - 根据时间、地点和<user>的行为更新
        - 可能的类型：自由活动、上课中、社团活动、午休、放学后、学园祭准备、课外补习、兼职等
    近期事务:
      type: |-
        {
          [事务名: string]: string; // 事务描述
        }
      check:
        - 记录需要完成的事项、约定、重要事件
        - 完成后移除，新增事务时添加
        - 最多保持5-8项
  主角:
    体力:
      type: number
      range: 0~100
      check:
        - 活动消耗体力，休息恢复体力 ±(5~15)
        - 社团训练消耗更多，上课消耗较少
        - 低于20进入疲劳状态
    学业.社交评价:
      type: number
      range: 0~100
      check:
        - 根据<user>在校园中的行为和选择调整 ±(1~5)
        - 积极参与社团活动、帮助他人可提升
        - 得罪角色、惹麻烦会降低
    所属社团:
      check:
        - 加入或退出社团时更新
        - 可选社团：空手道社、跆拳道社、合气道部、击剑社、轻音社、中华料理部、学生会
  不知火舞:
    好感度:
      type: number
      range: 0~100
      check:
        - 根据<user>对小舞的态度、言行调整 ±(3~8)
        - 小舞性格开朗奔放，对大胆直接的人更有好感
        - 好感度较高时会主动挑逗和制造亲密机会
    关系阶段:
      check:
        - 根据好感度区间自动更新：0~20(厌恶)、20~40(冷淡)、40~60(初识/友好)、60~80(亲近)、80~100(热恋)
    印象:
      check:
        - 每次重要互动后更新对<user>的当前印象和评价
        - 语言应符合小舞奔放自信的口吻
