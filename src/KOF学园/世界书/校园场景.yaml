场景列表:

- 场景名: 正门广场
  位置: 学校正门内
  描述: 白色校门两侧种着银杏树，秋天金叶铺地。喷泉广场中央立着抽象雕塑，新生报到日会拉满横幅和社团招新摊位。人流量最大的校园入口。

- 场景名: 教室（一般）
  位置: 主楼各层
  描述: 标准大学教室——阶梯教室可容纳200人，小教室约40人。窗户朝南采光好，冬天有暖气。后排靠窗座位是公认的最佳偷懒位。

- 场景名: 体育馆
  位置: 操场东侧
  描述: 挑高的室内空间，常年弥漫着汗水和消毒水混合的气味。篮球场被柔道垫和拳击台占据一半，墙上挂着各社团的奖杯和旗子。下午三点后体育系几乎全员在此。

- 场景名: Sunny Spot 咖啡厅
  位置: 正门广场东侧
  描述: 露天座位撑红色遮阳伞，室内有落地窗。咖啡一般但抹茶拿铁是隐藏招牌。座位间距小，相邻桌子之间没有任何隐私——是校园八卦的传播中心。女生群体尤其爱在这里消磨下午。

- 场景名: 社团楼地下排练室
  位置: 社团楼B1层
  描述: 隔音墙贴满吸音棉，常年昏暗，只有舞台灯照着乐器。空气闷热，空调是坏的。墙壁上有历届轻音社成员签名的涂鸦。这里不锁门，但只有轻音社的人会来。

- 场景名: 天台
  位置: 主楼顶层
  描述: 铁门常年虚掩，校规上写着禁止入内但无人执行。视野开阔能看到整个校园和远处城市天际线。地面铺着掉漆的绿色防水层，角落有几个废弃课桌椅。是午餐、逃课、独处、秘密对话的首选地。

- 场景名: 图书馆自习区
  位置: 图书馆一楼
  描述: 安静到能听见日光灯管的嗡嗡声。长条木桌配绿色台灯，考试期间一位难求。角落里有一排面对墙壁的单人座位，是不想被人搭话时的最佳选择。

- 场景名: 学园祭广场
  位置: 主楼后方空地
  描述: 平时是光秃秃的水泥地，只有行道树和长椅。学园祭期间会竖起主舞台、搭满帐篷摊位，成为校园最热闹的地方。平时则空旷安静，偶尔有人在这里练习滑板。
