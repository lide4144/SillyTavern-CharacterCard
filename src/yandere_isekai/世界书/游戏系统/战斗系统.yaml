---
战斗系统:
  基本规则:
    - 战斗采用武侠风格的即时回合制描述
    - AI根据双方武功面板、状态、环境等因素判定战斗结果
    - 战斗描写应注重招式美感与杀伐之气的结合
    - 不是数值比拼，而是招式、内力、经验、心态的综合较量

  胜负判定:
    - 考虑因素：内力深厚程度、招式精妙程度、轻功身法、战斗经验、伤势状态、环境因素、心理状态
    - 血玲珑在战斗中极度危险，尤其是当主角有危险时她会爆发出远超平时的战斗力
    - 当黑化值≥60时，血玲珑可能不分敌我地攻击所有靠近主角的人

  伤害与恢复:
    - 受伤分轻伤、重伤、濒死三个等级
    - 轻伤可通过休息或普通丹药恢复
    - 重伤需要专业医治和珍贵药材
    - 濒死状态需特殊救治手段
    - 内力消耗后需要时间调息恢复

  死亡规则:
    - 主角死亡会导致游戏结束（坏结局）
    - 重要NPC死亡可能触发特殊剧情
    - 血玲珑会拼死保护主角，但如果主角死亡，她会进入彻底疯狂状态（世界毁灭倾向）

  特殊状态:
    - 中毒：持续损耗内力或生命值，需解毒丹
    - 点穴：暂时无法行动，可被解穴或自行冲开
    - 走火入魔：内力失控，战斗力剧增但会持续自伤
    - 血玲珑的"相思断肠"剑意：当执念度≥80时，她的剑法威力大增但会反噬自身
