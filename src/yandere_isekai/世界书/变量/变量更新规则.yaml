---
变量更新规则:
  世界:
    当前时间:
      check:
        - 每次行动、移动、休息后推进，保持合理的时间流逝
        - 一天分为：子时、丑时、寅时、卯时、辰时、巳时、午时、未时、申时、酉时、戌时、亥时
    当前地点:
      check:
        - <user>主动移动时更新
        - 被血玲珑或其他NPC转移位置时更新
    天气:
      check:
        - 每过一段时间自然变化
        - 血玲珑使用"焚心诀"时周围天气可能变暗或起血雾
    江湖局势:
      check:
        - 重大事件发生后更新
        - 血玲珑黑化值≥70时局势趋向混乱
    近期事务:
      type: |-
        {
          [事务名: string]: string; // 事务描述
        }
      check:
        - 完成任务后移除，新增事务时添加
        - 最多保持5-8项活跃事务

  血玲珑:
    执念度:
      type: number
      range: 0~100
      check:
        - 根据主角与血玲珑的互动调整 ±(3~8)
        - 主角遭遇危险时可能大幅上升
        - 主角与其他女性亲密互动时大幅上升
        - 主角明确拒绝或伤害她时可能下降或转为黑化值上升
    黑化值:
      type: number
      range: 0~100
      check:
        - 血玲珑感到"被抛弃""被背叛"时上升 ±(5~10)
        - 主角的温柔和接纳可使其下降 ±(3~6)
        - 发现情敌时急剧上升
        - 黑化值≥60时可能触发无差别攻击行为
    伪装值:
      type: number
      range: 0~100
      check:
        - 执念度越高，伪装值越低
        - 主动现身或暴露身份时下降
        - 潜伏或伪装成功时上升
    当前位置:
      check:
        - 血玲珑独立移动时更新
        - 跟踪主角时位置与主角相近
    当前状态:
      check:
        - 根据当前情境更新，如"潜伏""战斗""受伤""调息"等
    着装.${外衣|内衫|下装|鞋履|饰品|武器}:
      check:
        - 换装、战斗损坏、特殊场合时更新
        - 描述需包含颜色、材质、款式、状态等细节
    称号:
      type: |-
        {
          [称号名: string]: {
            效果: string;
            自我评价?: string;  // 默认为 '待评价'
          }
        }
      check:
        - 基于血玲珑的重要行为、心理变化获得
        - 如果自我评价为'待评价'，则应立即更新自我评价
        - 称号应反映血玲珑当前的执念状态和心理发展
    对主角行为记录:
      type: |-
        {
          [行为: string]: string; // 血玲珑的反应
        }
      check:
        - 记录血玲珑对主角重要行为的反应
        - 可作为后续行为的参考依据

  主角:
    武功面板.${内力|剑法|轻功|医术|暗器|根骨}:
      type: number
      range: 0~100
      check:
        - 修炼、战斗、获得传承等显著事件才调整
        - 单次变化不超过 ±8，除非有特殊机缘
        - 重伤或中毒可能导致下降
    当前状态:
      check:
        - 受伤、中毒、调息、走火入魔等状态时更新
    当前位置:
      check:
        - <user>主动移动时更新
    声望:
      type: |-
        {
          [势力名: string]: number; // -100~100
        }
      check:
        - 帮助或损害某势力时调整
        - 与血玲珑的关系会影响正道和血衣楼声望
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量?: number;  // 默认为 1
            类型?: '武器' | '防具' | '丹药' | '材料' | '秘籍' | '杂物';  // 默认为 '杂物'
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目不再显示

  江湖人物:
    type: |-
      {
        [人物名: string]: {
          身份: string;
          立场?: '正道' | '邪道' | '中立' | '未知';  // 默认为 '未知'
          与主角关系?: string;  // 默认为 '素未谋面'
          当前位置?: string;  // 默认为 '未知'
          状态?: string;  // 默认为 '正常'
        }
      }
    check:
      - 遇到新人物时添加
      - 人物死亡、离开、关系变化时更新
      - 定期清理不再相关的人物

  任务列表:
    type: |-
      {
        [任务名: string]: {
          类型?: '主线' | '支线' | '每日' | '临危受命' | '隐藏';  // 默认为 '支线'
          说明: string;
          目标: string;
          奖励?: string;  // 默认为 '无'
          惩罚?: string;  // 默认为 '无'
          状态?: '进行中' | '已完成' | '失败' | '已放弃';  // 默认为 '进行中'
        }
      }
    check:
      - 接受任务时添加，完成或失败时更新状态
      - 避免同时存在过多主线任务
