---
大周江湖地理:
  概述: 大周朝治下，江湖势力盘踞九州。这是一个表面正邪对立、实则处处双修、人人谈性的情欲江湖。

  正道势力:
    东海剑阁:
      位置: 东海之滨，月牙岛
      表面特色: 天下第一剑派，弟子皆白衣佩剑，以「浩然剑气」闻名
      真实内核: 剑阁禁地「心障窟」中，历代首徒都在此「破心障」。破障的方式不是闭关打坐，而是与心爱之人双修至情至性。柳寒烟已在此窟前徘徊三年，因为「她眼光太高，寻常人入不了眼」
      代表人物: 柳寒烟（首徒，大师姐，未破心障的处子剑仙）
    铁胆山庄:
      位置: 中原腹地
      表面特色: 以刚猛外功著称
      真实内核: 庄主一脉的「铁布衫」练到极致会封锁全身感官——包括情欲感官。唯有阴阳调和能重新唤醒。沈家历代庄主都有秘密的「调理者」，而沈夫人守寡十年，实则在暗中寻找能帮她「重启感官」的人
      代表人物: 沈夫人（庄主遗孀，感官沉睡十年的寂寞贵妇）
    药王谷:
      位置: 南疆云雾山脉
      表面特色: 医毒双绝，谷中四季如春
      真实内核: 江湖上最大的「阴阳调理中心」。谷中弟子精通各种「媚药炼制」「情欲针灸」「双修穴位」。白素心是谷中最年轻的「调理师」，理论上什么都懂，却 virgin 至今——因为谷规禁止调理师与病人发生关系
      代表人物: 白素心（最懂阴阳调理的 virgin 医仙）
    太虚观:
      位置: 北岳恒山之巅
      表面特色: 道门正宗，清心寡欲
      真实内核: 「斩红尘」的真意是「先深入红尘，再一剑斩断」。每位弟子必须下山历百日情劫，在沉沦与超脱间寻找大道。清虚子已历劫九十九日，只差最后一日就能功德圆满——却在这时遇见了花怜月。观中密室里藏着历代弟子历劫时的「修行笔记」，内容不堪入目
      代表人物: 清虚子（历劫九十九日的道姑，最后一日最难熬）

  邪道势力:
    玄阴教:
      位置: 西域魔窟，终年笼罩血色迷雾
      表面特色: 行事诡秘，擅魅惑之术
      真实内核: 玄阴教是江湖上唯一「公开承认情欲即力量」的门派。教中不以为耻，反以为荣。圣女慕容绯的「天魔舞」是定期的双修仪式——她在祭坛上舞蹈，引出信徒阳气，再在体内炼化。每次天魔舞后，她都需要「消化」这些阳气，否则会被反噬
      代表人物: 慕容绯（以天魔舞汲取阳气的圣女，消化不完就会暴走）
    血鸦楼:
      位置: 洛京地下，无固定据点
      表面特色: 天下第一杀手组织
      真实内核: 血鸦楼最大的业务不是杀人，而是「消除记忆」和「制造把柄」。凌霜的专长是「床榻暗杀」——在目标最极乐的瞬间取走性命。但她有个原则：从不杀在那一刻还想着她的人。楼中还有「调教部」，专门把敌对势力的女侠调教为炉鼎
      代表人物: 凌霜（床榻暗杀成功率100%的杀手，但最近不想杀人了）

  中立势力:
    百花谷:
      位置: 西南深山，外人不得其门而入
      表面特色: 只收女弟子，以花入药、以花入武
      真实内核: 全谷弟子修炼的都是采补类功法，需要定期汲取男子阳气。谷中没有男子，弟子们便以「花间凝露」互相慰藉，效率低下。主角是谷中千百年来唯一以男子之身修成花间游的人——他的阳气对师姐们来说，是「千年一遇的极品花蜜」。师姐们若知道真相，恐怕会把他榨干
      代表人物: 花怜月（全谷唯一的「雄性花蜜源」，自己还不知道处境多危险）
    天下第一楼:
      位置: 洛京烟花巷
      表面特色: 天下第一青楼
      真实内核: 江湖最大的「双修中介所」和「炉鼎交易中心」。红袖是幕后之主，她手上有各派弟子的「双修需求清单」，为合适的阴阳配对牵线搭桥。楼中三楼以下是普通青楼，四楼以上是「修炼专区」，只有持门派腰牌者能进入
      代表人物: 红袖（双修中介女王，掌握着整个江湖的欲望账本）
    六扇门:
      位置: 洛京皇城根
      表面特色: 朝廷鹰犬，监管江湖
      真实内核: 六扇门审讯犯人从不用刑，而是用「极乐刑」——不打不杀，以药物和手法让犯人在极乐中吐露真言。铁无情是「极乐刑」首席执行者，执行过上百次从未失手。她的手法能让硬汉在十息之内求饶，也能让女犯在云端中坦白
      代表人物: 铁无情（首席极乐刑执行者，从未对花怜月用过——因为舍不得）
    西域商盟:
      位置: 丝绸之路各节点
      表面特色: 富可敌国，垄断贸易
      真实内核: 西域商盟最大的贸易品不是丝绸香料，而是「西域秘药」和「异族炉鼎」。阿依娜本人就是最完美的「样品」——她的体质特殊，与她双修可获得西域秘法加持。商队中常有一批「货物」是运往各大门派的炉鼎
      代表人物: 阿依娜（西域商盟首领，最完美的异族炉鼎样品）

  特殊地点:
    落霞镇:
      位置: 百花谷出山后的第一个城镇
      表面特色: 三教九流汇聚之地
      真实内核: 镇中「醉仙楼」的二楼以上是「双修驿站」——专为过路修士提供临时双修伴侣。镇后山的「落霞洞」是野合圣地，据说在洞中双修可借落日余晖增益功力
    洛京:
      位置: 大周首都
      表面特色: 天子脚下，龙蛇混杂
      真实内核: 洛京地下有「媚毒黑市」，交易各种禁药。皇城中的「阴阳司」表面管理人口，实则统计各派双修数据，为三年一度的「阴阳大会」做准备。洛京最大的秘密是：当朝皇帝本身就需要定期阴阳调和以续命
    云州:
      位置: 北方边境
      表面特色: 战乱之地
      真实内核: 云州最大的「产业」是战俘炉鼎。交战双方常以交换战俘炉鼎为停战条件。流民中不乏自愿为炉鼎以求温饱者
    烟雨楼:
      位置: 江南水乡镇江
      表面特色: 风月场所
      真实内核: 烟雨楼是文人雅士与江湖豪客共聚的「双修雅集」场所。这里的姑娘不只是卖笑，很多是各派弟子兼职——以文会友、以诗传情、以双修论道
    合欢秘境:
      位置: 传说位于昆仑山深处，入口每十年开启一次
      特色: 上古遗留的阴阳调和圣地。在秘境中双修，效果是外界的十倍。但秘境中有「情欲幻境」，意志不坚者会永远沉溺在幻觉中，与现实中的幻影不断双修直至精尽人亡
    阴阳大会会场:
      位置: 每届轮换，下届在洛京「皇家别院」
      特色: 三年一度的江湖双修盛会。表面是论道切磋，实则是大型双修交流、炉鼎拍卖、媚毒品鉴。参与者需持门派推荐信，但主角若伪装成「花仙子」前往，恐怕会被各派弟子争相「请教"
