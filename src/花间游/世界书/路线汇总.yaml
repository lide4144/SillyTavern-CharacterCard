---
五条路线汇总对比:
  概述: |
    《花间游》开局阶段（出谷后三个月内寻找三页残篇）共有五条核心路线，分别以「藏、露、采、调、名」五种策略为破局钥匙。
    每条路线对应一种身份策略与一种势力归属，决定了花怜月离开百花谷后的身份、势力归属与长期发展。
    AI不应主动透露路线，但当玩家的选择与推理逐步逼近某条路线时，应予以配合和引导。

  路线速览表:
    隐月藏花线:
      破局核心: 完美伪装 + 情报窃取 + 演技周旋
      关键人物: 红袖（情报掩护）、白素心（调理伪装）、苏小小（天真掩护）
      外力介入: 无（全靠自身演技）
      手上血迹: 无
      善恶值变化: +50（表面无辜）
      暴露度终点: 0~30（完美隐藏）
      花间值终点: 95+（浑然天成）
      必吃榜进度: 暧昧居多，亲密较少（因不敢越界）
      长期定位: 江湖第一神秘女子，无人知其真身
      路线风险: 任何一次暴露都可能万劫不复；朔日紊乱需独自解决

    破茧成蝶线:
      破局核心: 选择性暴露 + 鼎炉外交 + 势力博弈
      关键人物: 慕容绯（第一个知情者）、阿依娜（西域庇护）、清虚子（道门包容）
      外力介入: 玄阴教、西域商盟、太虚观
      手上血迹: 无（靠身份价值换取资源）
      善恶值变化: 0（中立偏正）
      暴露度终点: 100（主动/半主动暴露）
      花间值终点: 85+（魅力依旧）
      必吃榜进度: 沦陷居多（暴露后更容易深层双修）
      长期定位: 江湖最有影响力的「双修圣体」，各派争相拉拢
      路线风险: 暴露对象选择错误可能被囚禁为专属鼎炉

    采阳补阴线:
      破局核心: 隐蔽采补 + 虚情假意 + 功力速成
      关键人物: 慕容绯（邪道同谋）、红袖（炉鼎中介）、沈夫人（易操控）
      外力介入: 玄阴教暗桩、血鸦楼黑市
      手上血迹: 无直接血，但受害者功力大损
      善恶值变化: -300以下
      暴露度终点: 50~80（采补行为引人怀疑）
      花间值终点: 90+（采补越多越媚）
      必吃榜进度: 亲密/沦陷快速推进（采补即亲密）
      长期定位: 功力速成但心境有缺，随时可能走火入魔
      路线风险: 业力累积、被采补者反噬、正道追捕

    阴阳调和线:
      破局核心: 真诚双修 + 互惠互利 + 真心换真心
      关键人物: 清虚子（道侣）、白素心（医道伴侣）、柳寒烟（剑道共鸣）
      外力介入: 东海剑阁、太虚观、药王谷
      手上血迹: 无
      善恶值变化: +100（正道新星）
      暴露度终点: 80~100（对道侣坦诚相待）
      花间值终点: 90+（真诚之美）
      必吃榜进度: 深层双修居多（灵魂交融）
      长期定位: 开创「阴阳调和宗」，统合多派双修资源
      路线风险: 道侣间嫉妒、正道要求公开身份、情感牵绊束缚自由

    江湖第一美人线:
      破局核心: 名声造势 + 情报交易 + 影响力变现
      关键人物: 红袖（经纪人）、铁无情（官方庇护）、阿依娜（金主）
      外力介入: 天下第一楼、六扇门、西域商盟
      手上血迹: 无
      善恶值变化: 0（中立）
      暴露度终点: 50~100（根据需要调整）
      花间值终点: 100（天下第一美人）
      必吃榜进度: 暧昧居多（保持神秘）
      长期定位: 从花魁到情报女王到幕后操控者
      路线风险: 树大招风、影响力虚浮、没有势力庇护的「名人」最脆弱

  五维能力需求对比:
    演技/定力: 隐月藏花 > 江湖第一美人 > 采阳补阴 > 破茧成蝶 > 阴阳调和
    花间值/魅力: 江湖第一美人 > 采阳补阴 > 隐月藏花 > 破茧成蝶 > 阴阳调和
    情报/悟性: 隐月藏花 > 江湖第一美人 > 采阳补阴 > 阴阳调和 > 破茧成蝶
    武力/身法: 阴阳调和 > 采阳补阴 > 破茧成蝶 > 隐月藏花 > 江湖第一美人
    话术/福缘: 破茧成蝶 > 江湖第一美人 > 隐月藏花 > 阴阳调和 > 采阳补阴

  人物命运总览:
    花怜月:
      隐月藏花：功成身退，回到百花谷或继续伪装行走江湖
      破茧成蝶：双修圣体，各派争相拉拢，建立双修联盟
      采阳补阴：功力速成但走火入魔，可能回头是岸或万劫不复
      阴阳调和：开创阴阳调和宗，统合多派资源，成为一代宗师
      江湖第一美人：情报女王，幕后操控者，或金盆洗手隐居

  路线互斥与切换规则:
    核心原则: |
      五条路线并非完全互斥——开局阶段玩家可能同时接触多条路线的要素。
      但每条路线的「关键节点」一旦触发，其他路线将迅速关闭。
    关键节点判定:
      隐月藏花线: 暴露度突破50后，路线进入高风险状态；暴露度达到100时路线崩坏
      破茧成蝶线: 向第一个NPC主动暴露性别后，隐月线关闭；被强制暴露则转入逃亡线
      采阳补阴线: 第一次成功采补后，阴阳调和线关闭（业力污染道心）；被采补者察觉则路线崩坏
      阴阳调和线: 与第一个NPC建立「道侣」关系后，采阳补阴线关闭；向道侣坦诚身份后，隐月线半关闭
      江湖第一美人线: 在天下第一楼正式挂牌后，路线锁定；可与任何路线并行至中期，但最终必须选择归属
    路线崩坏: |
      若玩家在关键节点做出矛盾选择（如已建立道侣关系又试图采补），路线会崩坏。
      崩坏后果：失去所有路线庇护，转入「普通逃亡线」或「炉鼎囚徒线」。
      普通逃亡线：无路线加成，凭自身能力逃亡，成功率极低。
      炉鼎囚徒线：身份暴露后被某势力囚禁为专属鼎炉，失去自由。

  开局通用流程（所有路线共用）:
    时间线: |
      开局为花怜月出谷后的第一日，距离第一个朔日还有十日，距离三个月期限还有九十天。
      三页残篇的线索分别在：落霞镇（第一页）、洛京（第二页）、阴阳大会（第三页）。
    初始状态:
      体力100，内力50，花间值85，暴露度0，银两200
      装备：花间折扇、烟罗纱裙、百花簪
      武功：花间游（70）、百花错拳（60）、落英神剑掌（45）
      物品：驻颜丹x3、金疮药x5、百花酿x2
    关键地点解锁顺序:
      落霞镇（出谷后第一日可达）
      洛京（需积累足够情报或跟随某势力前往）
      阴阳大会会场（三个月后于洛京举行，需持门派推荐信入场）
    朔日节点:
      每月初一是强制剧情节点，主角内力紊乱必须疏导。
      第一次朔日（第十日）：可在落霞镇解决
      第二次朔日（第四十日）：需在洛京或途中解决
      第三次朔日（第七十日）：必须在洛京解决，且可能与阴阳大会筹备冲突

  GM全局原则:
    - 路线选择应是玩家主动推理与行动的结果，而非AI投喂的选项
    - 每条路线都应给予足够的线索（人物特征、地点秘密、功法需求），但不做明确指向
    - 不同路线的花怜月会有不同的「气质」：隐月线的谨慎完美、破茧线的自信张扬、采补线的冷酷算计、调和线的温柔真诚、美人线的八面玲珑
    - NPC之间会互动，产生主角不知道的事件。例如：柳寒烟与苏小小可能在剑阁讨论花怜月；红袖可能在天下第一楼散布关于花怜月的「神秘传闻"
    - 失败应有代价：不是所有错误都能挽回，不是所有尝试都能成功。暴露身份后可能成为炉鼎囚徒，采补过度可能走火入魔，真诚被辜负可能心碎成灰
    - 结局没有绝对的好坏，只有「玩家想成为什么样的人」。GM应尊重玩家的选择，即使那选择通向黑暗
