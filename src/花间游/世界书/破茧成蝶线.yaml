---
破茧成蝶线·鼎炉外交局:
  概述: |
    这是花怜月以「主动暴露男子身份」为筹码的极限路线：不靠伪装，靠博弈。他选择性地向「正确的人」暴露真相，将「极品阳鼎」的身份转化为谈判筹码，让各大势力争相拉拢。
    此路线对「判断力」「话术」「胆识」的要求极高。暴露对象选错，可能沦为囚徒；暴露时机选错，可能被多方争夺撕碎。
    AI不应主动透露此路线，但当玩家的选择展现出「自信」「交易」「利用身份价值」的倾向时，应予以配合。

  核心逻辑:
    暴露的代价与收益: |
      在这个人人双修的世界里，一个修炼花间游的男子=千年一遇的极品阳鼎。
      但「被争夺」不等于「被囚禁」——关键在于让各方势力互相制衡，谁也不敢轻举妄动。
    选择暴露对象的原则: |
      第一个暴露对象必须是「有实力庇护他」且「有动机独占他」的人。
      最佳选择：慕容绯（玄阴教圣女，有实力、有胆量、对正道规则不屑一顾）。
      次佳选择：阿依娜（西域商盟首领，有钱、有势力、对中原规矩不在乎）。
      危险选择：柳寒烟（正道剑仙，可能将他交给师门）、铁无情（六扇门，可能将他当作案件处理）。
    残篇获取方式: |
      不再靠偷或骗，而是靠「交易」——用一次双修服务换取一页残篇。
      第一页：慕容绯手中就有（玄阴教与百花谷有渊源），条件是与他进行一次「深层双修」。
      第二页：西域商盟从黑市购得，阿依娜愿意赠送，条件是跟他回西域。
      第三页：阴阳大会的压轴拍品，花怜月以「自身一晚」为筹码，让某势力替他拍下。

  路线阶段:
    第一阶段·落霞镇破茧（出谷后1-10日）:
      核心操作: |
        在落霞镇某次「意外」中，主动向慕容绯暴露身份。慕容绯是第一个知情者，也是最关键的庇护者。
      关键节点:
        - 慕容绯的试探：在醉仙楼，慕容绯以「检查体质」为由对花怜月上下其手。花怜月不再躲避，而是握住她的手，轻声说「圣女...摸够了吗？」
        - 暴露时刻：慕容绯愣住，然后意味深长地笑。花怜月坦白：「我是男子。但我也是百花谷唯一的「花仙子」。我可以帮你，但你要帮我。」
        - 交易达成：慕容绯庇护花怜月，条件是「每月朔日，你来玄阴教帮我消化天魔舞后的反噬」。花怜月获得玄阴教暗桩保护，以及第一页残篇。
        - 第一次朔日（第十日）：花怜月在慕容绯的密室中度过。这是第一次「深层双修」——双方功力大幅提升，但慕容绯的占有欲也大幅提升。她说「你是我的了。至少朔日是我的。」
        - 白素心的疑惑：白素心为花怜月把脉时发现「阴气异常」——花怜月以「百花谷秘法」搪塞过去。白素心好感+10，但开始「特别关注」他。
      残篇获取: |
        慕容绯从玄阴教秘库取出第一页残篇，说「这是我教与百花谷百年前的约定——玄阴教保管一页，等待「花间圣体」出现。你就是那个人。」

    第二阶段·洛京博弈（第11-40日）:
      核心操作: |
        以「已知男子身份」进入洛京，但不公开。只在关键时刻向「正确的人」暴露，换取资源与庇护。
      关键节点:
        - 向阿依娜暴露：西域商盟首领阿依娜在洛京夜市偶遇花怜月。花怜月主动说「阿依娜姐姐...其实我是男子。但我的阳气，是中原最纯的。」
        - 阿依娜的反应：先是愣住，然后大笑，然后当场提出「跟我回西域，我让你做王后」。花怜月拒绝，但提出交易：「我可以每月为你提供一次双修服务，换取西域商盟的庇护和情报。」
        - 铁无情的怀疑：六扇门铁无情注意到花怜月的「异常」——他太美了，美得不真实。铁无情以「调查」为名接近，花怜月必须在某个时刻决定是否向她坦白。
        - 清虚子的包容：太虚观清虚子历劫最后阶段，花怜月向她坦白。清虚子的反应出人意料：「皮囊男女，皆是虚妄。我爱的是你的魂。」她不仅不说破，反而主动帮他掩护。
        - 第二次朔日（第四十日）：花怜月需要同时在慕容绯和阿依娜之间分配时间——这引发了第一次「鼎炉外交危机」。慕容绯说「今晚你是我的」，阿依娜说「他答应了我」。花怜月必须谈判、妥协、或找到一个「两全其美」的方案。
      残篇获取: |
        阿依娜从西域商盟黑市购得第二页残篇，说「这是送给你的礼物。不过...礼物是要回礼的。」

    第三阶段·势力平衡与裂痕（第41-70日）:
      核心操作: |
        管理多方势力的关系，维持平衡，防止任何一方独占。同时获取第三页残篇的线索。
      关键节点:
        - 柳寒烟的破心障：东海剑阁柳寒烟卡在瓶颈三年，她找到花怜月说「我需要破心障...但我只信任你。」花怜月若帮她破障（深层双修），将获得东海剑阁的庇护；但若拒绝，柳寒烟可能因绝望而说出真相。
        - 沈夫人的解锁：铁胆山庄沈夫人邀请花怜月「解锁铁布衫封锁」。这是一个危险的诱惑——沈夫人太有经验，一旦解锁成功，她会成为最忠诚的盟友；但若失败，花怜月可能被当作「江湖骗子」追杀。
        - 红袖的掌控：天下第一楼红袖早已知道真相，她提出「让我做你的经纪人——我帮你管理各方势力的预约，抽取三成佣金」。花怜月若同意，获得最专业的「鼎炉外交」支持；若拒绝，红袖可能「不小心」泄露真相。
        - 第三次朔日（第七十日）：多方势力齐聚洛京争夺花怜月的「朔日归属权」。慕容绯、阿依娜、柳寒烟、清虚子、沈夫人...甚至可能还有隐藏的势力。花怜月必须召开一次「鼎炉外交峰会」，制定「轮流服务时间表」。
      残篇线索: |
        第三页残篇在阴阳大会上作为压轴拍品出现。各方势力都知道花怜月需要它——他们开始竞价，不是用银子，是用「对花怜月的庇护承诺」。

    第四阶段·阴阳大会与终局（第71-90日）:
      核心操作: |
        在阴阳大会上公开（或半公开）男子身份，以「极品阳鼎」的身份成为大会焦点，获取第三页残篇。
      关键节点:
        - 大会登场：花怜月不再以「花仙子」身份登场，而是以「花间圣体——百花谷千年一遇的男子修行者」身份亮相。全场轰动。
        - 竞价环节：第三页残篇的竞价变成了「谁能获得花怜月一年的专属服务权」。慕容绯出「玄阴教圣女之位」，阿依娜出「西域商盟一半家产」，柳寒烟出「东海剑阁镇阁之宝霜华剑」...花怜月必须做出选择，或找到一个「大家都能接受」的方案。
        - 最终方案：花怜月提出「不归属于任何一方——我属于我自己。但我愿意与各方建立「长期双修伙伴关系」，按季度轮换。作为交换，第三页残篇归我所有，各方共享我修炼完整花间游后的「研究成果」。
        - 各方妥协：这是一个史无前例的方案。最终慕容绯、阿依娜、柳寒烟、清虚子、沈夫人、白素心、铁无情、红袖、凌霜、苏小小——十位必吃榜角色，共同签署「花间盟约」，承认花怜月的独立地位。
      结局分支: |
        完美结局：花怜月获得自由与尊重，集齐三页残篇，建立「花间盟」——江湖上第一个以「双修伙伴关系」为基础的跨势力联盟。
        bittersweet 结局：集齐残篇，但某方势力暗中不满（如慕容绯的独占欲、柳寒烟的嫉妒），埋下未来冲突的种子。
        崩坏结局：大会上的竞价失控，某势力强行掳走花怜月。失去自由，成为专属鼎炉。

  GM引导原则:
    - 慕容绯是第一个暴露对象，必须给她足够的「独占感」——她是「第一个知道的人」，这个身份本身就是最大的情感筹码
    - 每次朔日都是多方势力争夺的焦点，GM应创造「谈判桌」场景，让玩家体验「鼎炉外交」的紧张感
    - 清虚子是破茧线的「安全阀」——如果其他路线都走不通，清虚子会说「来太虚观吧，我们不在乎男女，只在乎道心」
    - 若玩家在某一步选择「向铁无情坦白」或「向柳寒烟坦白但拒绝双修」，破茧线可能转入囚徒线或正道审判线
    - 红袖的「经纪人」提议是一个转折点——接受她，破茧线进入「专业化」阶段；拒绝她，玩家必须自己处理所有外交事务
