---
江湖第一美人线·名利双收局:
  概述: |
    这是花怜月以「名声"为武器的路线：不参与任何势力的斗争，而是成为「江湖焦点"——天下第一楼花魁、阴阳大会焦点、各派争相邀请的贵宾。用影响力而非武力获取残篇，用暧昧而非承诺维持关系。
    此路线对「魅力""话术""八面玲珑"的要求极高。树大招风，可能成为众矢之的；影响力是虚的，一旦失去神秘光环就会坠落。
    AI不应主动透露此路线，但当玩家的选择展现出「张扬""享受关注""善于交际"的倾向时，应予以配合。

  核心逻辑:
    名声即权力: |
      在这个人人谈双修的世界里，「得不到的"永远最诱人。
      花怜月不需要加入任何势力——他只需要让所有人都「想得到"他。
      当各大势力都想要他时，他就会成为「各方平衡"的筹码。
    残篇获取方式: |
      第一页：以「花魁献艺"收入购买。
      第二页：以「情报交换"从红袖处获取。
      第三页：以「阴阳大会压轴嘉宾"的身份，让主办方主动奉上。

  路线阶段:
    第一阶段·落霞镇成名（出谷后1-10日）:
      核心操作: |
        在落霞镇桃花节上惊艳亮相，以「百花谷花仙子"身份一夜成名。
      关键节点:
        - 桃花节诗会：花怜月以一首自创「花间词"技惊四座，被当地文人墨客争相传颂。花间值+10，名望「落霞镇第一美人"。
        - 醉仙楼献艺：花怜月在醉仙楼二楼献琴一曲，听者无不落泪。当夜收入银两+300，有人出价千两求见一面——花怜月拒绝，说「见我有缘，不见有份"。越是拒绝，越有人追捧。
        - 红袖的签约：天下第一楼红袖亲自来落霞镇「考察"，当场提出签约：「来天下第一楼，我捧你做「天下第一花魁"。分成你七我三。"花怜月若同意，进入「专业艺人"阶段；若拒绝，红袖说「没关系，我会等你主动来找我"。
        - 第一次朔日（第十日）：花怜月以高价租用红袖的密室独自运功（银两-200）。他在密室中写下第二首「花间词"——日后成为传世之作。
      残篇获取: |
        桃花节某位富商出价五百两购买花怜月的「题词扇面"，花怜月以「扇面换情报"为名，得知第一页残篇在陶翁手中。再以「为陶翁题诗"为名，换取了拓本。

    第二阶段·洛京登顶（第11-40日）:
      核心操作: |
        进入天下第一楼，正式挂牌，成为「天下第一花魁"。
      关键节点:
        - 挂牌仪式：花怜月在天下第一楼三楼正式挂牌，取名「花间居"。挂牌当晚，洛京权贵、江湖豪客、各派弟子挤破门槛。花怜月只卖艺不卖身，每晚只接待一位「有缘人"——通过「琴棋书画诗酒花"七关考验者方能入席。
        - 铁无情的庇护：六扇门以「维护治安"为名，派铁无情常驻天下第一楼。花怜月说「铁姐姐，有你在，我安心多了"。铁无情脸红——她成了花间居的「免费保镖"。
        - 阿依娜的投资：西域商盟阿依娜出价万两，要求成为「花间居的独家赞助商"——即花怜月只穿西域丝绸、只饮西域美酒、只点西域香料。花怜月接受，获得巨额资金支持。
        - 柳寒烟的「七关第一": 东海剑阁柳寒烟连续七晚挑战「七关"，终于在第七晚以剑气弹奏古琴，通关入席。她没有要求任何服务，只说「我想...和你说说话。"那一夜，柳寒烟说了三年没说过的话。
        - 第二次朔日（第四十日）：花怜月在「花间居"中举办「朔日诗会"——以诗会友，以词换情。所有参与者都必须留下一首「花间词"作为「入场券"。花怜月收集了百首词作，名望再涨。
      残篇获取: |
        红袖以「情报交换"为名，提供第二页残篇线索——在皇家藏书阁。花怜月以「为藏书阁题匾"为名进入，用「题词换阅览"的方式，在禁书区找到了残篇。

    第三阶段·危机与转型（第41-70日）:
      核心操作: |
        名声达到顶峰，但危机也随之而来——嫉妒、阴谋、各方势力的拉拢与威胁。
      关键节点:
        - 嫉妒的暗箭：某位被冷落的权贵夫人散布谣言——「花间居的花仙子其实是个男子！"花怜月没有否认，也没有承认，只是在花间居中举办了一场「性别之谜"主题诗会，让所有人猜。越猜越神秘，越神秘越有人气。
        - 各方拉拢：正道邀请他「为东海剑阁题字"，邪道邀请他「为玄阴教天魔舞伴舞"，朝廷邀请他「为皇帝祝寿献艺"，西域邀请他「为商盟代言"。花怜月全部接受——但条件都是「自由身，不接任何势力的独家合约"。
        - 凌霜的「暗杀预告": 血鸦楼接到暗杀花怜月的委托——因为有人「得不到就要毁掉"。凌霜作为执行者，提前通知了花怜月。花怜月说「凌霜，你能帮我...演一出戏吗？"暗杀之夜，花怜月「中剑假死"，三日后「奇迹复活"——名望达到传奇级别。
        - 第三次朔日（第七十日）：花怜月在「复活"后的首场演出中，宣布「朔日不再独自度过——我要与所有爱我的人共度"。他在天下第一楼举办「百人诗会"，百人同写「花间词"，创下江湖纪录。
      残篇线索: |
        阴阳大会主办方主动邀请花怜月作为「压轴嘉宾"——条件是花怜月在大会上表演「花间舞"。作为报酬，主办方承诺赠送「大会秘藏"——第三页残篇。

    第四阶段·阴阳大会与终局（第71-90日）:
      核心操作: |
        以「天下第一花魁"的身份参加阴阳大会，用影响力获取第三页残篇，并决定未来的路。
      关键节点:
        - 大会开幕：花怜月以「花间居主人"身份入场，不是作为参与者，而是作为「特邀表演嘉宾"。他的入场引起了全场骚动——正道、邪道、朝廷、西域...所有人都想与他同席。
        - 花间舞表演：花怜月在大会上表演「花间舞"——不是玄阴教那种采补之舞，而是纯粹的「美学之舞"。观者无不落泪，无人采补，只有感动。这是「艺术的力量"——它超越了双修，超越了欲望，直达人心。
        - 影响力变现：大会主办方依约赠送第三页残篇。但花怜月说「我不要了。"全场震惊。他说「第三页残篇...应该属于「最懂它的人"。我提议——以「花间词"为考题，大会中最能写出「花间真意"的人，获得残篇。"
        - 最终归属：清虚子以一首「花间悟道词"赢得了残篇。她说「花间非花，游者非游。阴阳调和，大道至简。"花怜月鼓掌：「道长说得对。"
        - 选择未来：花怜月在大会结束时宣布——「我要金盆洗手了。"他解散花间居，退还所有赞助，将积蓄捐给药王谷和太虚观。他说「名声是虚的，影响力是借的。我想...做一个真实的人。"
      结局分支: |
        完美结局：花怜月金盆洗手，与某位道侣隐居（玩家可选择）。江湖上留下「花间居"的传说，但再也无人见过他。
        bittersweet 结局：花怜月退隐，但江湖上有人不愿他退——某位权贵或势力试图强迫他复出。花怜月说「名声我还了，但我的人...不还。"
        崩坏结局：退隐消息传出后，各方势力争相传言「花间居主人手中有「完整花间游"秘籍"。花怜月被追杀，退隐不成反成逃亡。

  GM引导原则:
    - 名望必须「可视化"——每次活动后GM应提示「名望+XX，当前名望等级XX"。名望等级从「无名"到「镇级"到「州级"到「天下级"
    - 「拒绝"比「接受"更有价值——花怜月越是拒绝权贵，人气越高。GM应设计「被拒绝者"的反应，从愤怒到敬佩到更疯狂的追捧
    - 红袖是美人线的「幕后推手"——她帮花怜月策划一切，但也在暗中「留一手"（比如掌握花怜月的某些秘密）。她的帮助是真诚的，但也是「有代价的"
    - 铁无情的「免费保镖"身份是一个「隐患"——六扇门不会永远容忍「民间势力"拥有如此影响力。铁无情必须在「职责"和「感情"之间做出选择
    - 若玩家在某一步选择「接受某势力的独家合约"或「出卖某位追求者"，美人线会立即崩坏，转入隐月线或囚徒线
