---
变量更新规则:
  世界:
    当前时间:
      format: 大周历-年-季节-月日-时辰
      check:
        - 每次事件推进、休息或旅行后更新，保持时间流逝合理
        - 朔日（初一）需触发花间游特殊事件
    当前地点:
      check:
        - 主角移动后更新
        - 进入新区域时同步更新区域信息
    天气:
      check:
        - 每次时间推进后视季节与地区更新
    近期事务:
      type: |-
        {
          [事务名: string]: string; // 事务描述
        }
      check:
        - 记录需要完成的任务、约定、重要事件等
        - 完成后从列表中移除，新增事务时及时添加
        - 最多保持5-8项活跃事务

  主角:
    体力:
      type: number
      range: 0~100
      check:
        - 战斗、运动、H场景后视强度减少
        - 休息、进食、服药后恢复
        - 归零时主角昏迷，暴露度+20
    内力:
      type: number
      range: 0~100
      check:
        - 使用武功后减少
        - 调息、修炼、双修后恢复
        - 朔日若未疏导，内力-50
    花间值:
      type: number
      range: 0~100
      check:
        - 修炼花间游、完成特殊事件、获得新装扮后提升
        - 暴露身份、被羞辱、蓬头垢面时下降
        - 决定魅惑成功率与NPC初始好感加成
    暴露度:
      type: number
      range: 0~100
      check:
        - 做出男性化举动、身体接触检查、意外走光时增加
        - 成功伪装、购买道具、花间值提升时降低
        - 达到50/80/100时分别触发不同级别危机
    银两:
      type: number
      range: 0~999999
      check:
        - 获得报酬、卖出物品、被包养时增加
        - 消费、贿赂、购买装备时减少
    装备.${武器|防具|饰品}:
      check:
        - 获得、损毁、替换装备时更新
    武功:
      type: |-
        {
          [武功名: string]: {
            熟练度: number; // 0~100
            描述: string;
          }
        }
      check:
        - 修炼、实战使用后提升熟练度
        - 熟练度归零时移除该条目
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后移除该条目

  必吃榜.${角色名}:
    好感度:
      type: number
      range: -100~100
      check:
        - 根据主角言行与事件进展调整 ±(5~15)
        - 不同角色对同一行为的反应不同
    亲密值:
      type: number
      range: 0~100
      check:
        - 肢体接触、暧昧对话、H场景后提升
        - 争吵、被冷落、主角失态时下降
        - 决定H场景的开放程度
    攻略阶段:
      type: '未相识' | '初识' | '熟识' | '暧昧' | '亲密' | '沦陷'
      check:
        - 好感度与亲密值达到阈值时自动进阶
        - 特殊事件可跳阶或降阶
    关系:
      check:
        - 随攻略阶段与剧情动态更新
    已攻略:
      type: boolean
      check:
        - 进入「沦陷」阶段后设为true
    特殊事件:
      check:
        - 记录该角色专属的剧情事件状态

  任务:
    主线:
      type: |-
        {
          [任务名: string]: {
            阶段: string;
            描述: string;
          }
        }
      check:
        - 剧情推进时更新阶段
        - 主线任务不超过3个并行
    支线:
      type: |-
        {
          [任务名: string]: {
            描述: string;
            目标: string;
          }
        }
      check:
        - 完成后移除或标记完成
        - 支线任务同时保持5-8个
