---
隐月藏花线·完美伪装局:
  概述: |
    这是花怜月以「完美女子」身份行走江湖的最「安全」路线：不暴露、不采补、不站队，仅凭一张脸、几滴泪、精湛的演技，让江湖上所有人都相信他是「百花谷花仙子」。
    他用女子的身份获取信任，用温柔的手段套取情报，用暧昧的边界维持关系——但绝不越界。
    AI不应主动透露此路线，但当玩家的选择展现出「谨慎」「回避暴露」「维持伪装」的倾向时，应予以配合。
    此路线对「演技」「定力」「信息控制」的要求极高，且一旦暴露或中媚毒失态，将万劫不复。

  核心逻辑:
    花怜月的优势: |
      花间值85起步，自带体香与媚态，女子身份毫无破绽。
      百花谷「花仙子」的名头是金字招牌——江湖上谁不给百花谷三分面子？
    伪装维持的关键: |
      花间值必须维持在90以上（通过精心装扮、修炼花间游、保持优雅举止）。
      暴露度必须控制在30以下（避免身体接触检查、避免沐浴更衣被撞见、避免朔日失态）。
      与各NPC保持「暧昧但不亲密"的关系——好感度可以高，但亲密值不能超过50，否则容易在亲密时暴露。
    残篇获取方式: |
      第一页（落霞镇）：通过红袖的情报网获取线索，或以「花仙子"身份参加落霞镇桃花节诗会，赢得镇中隐士的好感。
      第二页（洛京）：通过铁无情的官方渠道查阅六扇门档案，或通过白素心的药王谷关系进入皇家藏书阁。
      第三页（阴阳大会）：以百花谷代表身份参加大会，在「论道"环节中凭借花间游理论赢得认可，获得残篇作为奖励。

  路线阶段:
    第一阶段·落霞镇初试（出谷后1-10日）:
      核心操作: |
        以「百花谷花仙子"身份亮相落霞镇，参加桃花节诗会，结交本地势力，获取第一页残篇线索。
      关键节点:
        - 桃花节诗会：花怜月以一首咏桃花诗技惊四座（花间值+5），赢得镇中隐士「陶翁"的好感。陶翁手中握有第一页残篇的拓本。
        - 白素心偶遇：花怜月「不小心"扭伤脚踝（演技），白素心心疼不已，主动为其「全身检查"。花怜月必须巧妙地拒绝脱衣——「素心姐姐，男女...啊不，女子也要注意避嫌嘛"。白素心好感+10，但亲密值被控制在20以下。
        - 红袖接头：花怜月在醉仙楼二楼与红袖秘密会面。红袖看破不说破，以「姐妹谈心"为名提供情报——第一页残篇在陶翁手中，陶翁有个条件：要「天下第一美人"为他跳一支百花谷的「花间舞"。
        - 第一次朔日（第十日）：花怜月必须独自解决内力紊乱——不能在落霞镇找人双修（暴露风险太高）。可选择：服用驻颜丹压制（效果差，内力-20）、独自运功（痛苦三日，体力-20）、或以高价购买药王谷「清心丸"（银两-100）。
      残篇获取: |
        花怜月为陶翁跳了一支花间舞（花间值+3，暴露度+5——因舞蹈中某些动作幅度较大，需束带调整）。
        陶翁老泪纵横，将拓本交给他，说「老夫年轻时也见过一位百花谷仙子...你和她一样美"。
        花怜月心中暗笑：「老头，你要是知道我是男的，怕是要当场中风。"

    第二阶段·洛京暗涌（第11-40日）:
      核心操作: |
        带着第一页残篇前往洛京，寻找第二页线索。在洛京需更加谨慎——这里六扇门、天下第一楼、各大势力暗桩密布。
      关键节点:
        - 天下第一楼亮相：花怜月在红袖安排下，以「神秘花魁"身份在天下第一楼三楼献艺一晚。不陪睡、不卖身，只以琴艺和诗才折服众人。当晚收入银两+500，名望暴涨——但花间值必须维持在95以上才能镇住场子。
        - 铁无情接触：六扇门注意到「天下第一楼新来的花魁"，铁无情亲自来查。花怜月以「弱女子"姿态应对，眼眶微红说「民女只是卖艺不卖身...大人明鉴"。铁无情保护欲大起，好感+15，但提出「要随时向我汇报楼中异常"——实则是想多见面。
        - 清虚子偶遇：太虚观清虚子来洛京「采购药材"，实则是历劫最后阶段。她在药王谷分号偶遇花怜月，一见钟情。花怜月必须保持距离——「道长，贫道...啊不，道长的修行要紧，民女不敢打扰"。清虚子好感+20，但亲密值被控制在30以下——因为她一靠近就会想「抱抱这个可怜的小仙子"。
        - 第二次朔日（第四十日）：花怜月必须在洛京解决内力紊乱。可选方案：向白素心求购清心丸（需承担被「仔细检查"的风险）、或向红袖租用密室独自运功（银两-200）、或...冒险接受铁无情的「保护性安置"（在她值房过夜，风险极高）。
      残篇线索: |
        通过铁无情的六扇门档案，花怜月查到第二页残篇在皇家藏书阁「禁书区"，需要药王谷或太虚观的推荐信才能进入。

    第三阶段·藏书阁与暗流（第41-70日）:
      核心操作: |
        获取推荐信，进入皇家藏书阁禁书区，取得第二页残篇。同时应对越来越复杂的势力关系。
      关键节点:
        - 推荐信获取：可选择白素心（药王谷）或清虚子（太虚观）。白素心的条件是「让我做一次完整的全身调理"（暴露度+15风险）；清虚子的条件是「陪我历完最后十日情劫"（亲密值可能失控风险）。
        - 慕容绯出现：玄阴教圣女慕容绯在洛京黑市盯上了花怜月。她不是来拆穿的——她是来「品尝"的。花怜月必须在被慕容绯「上下其手"时保持镇定，不能失态。慕容绯好感+20，亲密值+10（因为她「检查得太仔细了"）。
        - 沈夫人邀约：铁胆山庄沈夫人听闻「天下第一美人"的名声，邀请花怜月来山庄「小住避世"。这是一个危险的机会——山庄内只有她一人，没有外人，暴露风险低；但沈夫人太有经验，可能看穿伪装。花怜月若拒绝，沈夫人好感-10；若接受，需全程保持最高警戒。
        - 第三次朔日（第七十日）：必须在洛京解决。此时花怜月已经筋疲力尽——连续两个月的伪装消耗了大量心力。若花间值低于90或暴露度高于30，可能在疏导时失态。
      残篇获取: |
        进入皇家藏书阁禁书区，取得第二页残篇。但在离开时被守卫发现——花怜月以「药王谷特派研究员"身份蒙混过关（需白素心的腰牌），或以「太虚观弟子"身份（需清虚子的符印）。

    第四阶段·阴阳大会与终局（第71-90日）:
      核心操作: |
        带着两页残篇参加阴阳大会，在大会上赢得第三页残篇。这是最后的考验——大会上有太多「经验丰富"的人，任何破绽都可能导致暴露。
      关键节点:
        - 大会入场：花怜月以百花谷代表身份入场，需持谷主亲笔信（开局自带）。入场时接受「阴阳检测"——一种探测体内阴阳平衡的秘法。花怜月的花间游功法恰好能模拟女子阴气，检测通过——但若花间值低于90，检测可能显示「异常"。
        - 论道环节：大会核心环节是「各派展示双修法门"。花怜月代表百花谷展示「花间游"理论——不展示实际双修，只展示理论。但若被挑战「实践验证"，他必须以「谷规禁止在外人面前施展"为由拒绝。
        - 炉鼎拍卖环节：大会上拍卖各派培养的炉鼎。花怜月被某位权贵看中，出价万两要买他——此时需要某个势力的庇护（铁无情的六扇门、柳寒烟的东海剑阁、或慕容绯的玄阴教）。
        - 最终获取：三页残篇集齐后，花怜月发现第三页记载的正是「花间游完整版"——包含男子如何安全采补而不暴露的秘法。他可以选择：立即修炼（暴露度清零，但善恶值-50）、销毁（保持现状）、或带回谷中交给谷主（完成任务）。
      结局分支: |
        完美结局：三页残篇集齐，身份未暴露，花间值95+，名望「天下第一神秘女子"。回到百花谷或继续行走江湖。
         bittersweet 结局：集齐残篇，但某NPC已察觉真相却不说破（如红袖、沈夫人）。花怜月带着秘密离开，日后可能重逢。
        崩坏结局：大会上暴露身份，被某势力当场竞拍为炉鼎。失去自由，成为囚徒。

  GM引导原则:
    - 朔日节点是强制考验，每次都必须给出「高风险/中风险/低风险"三种选择，且低风险选择的代价越来越高
    - NPC对花怜月的好感度可以自然上升，但亲密值超过50时，GM应创造「险些暴露"的紧张时刻
    - 慕容绯是隐月线的最大威胁——她半信半疑，随时可能「试探"花怜月。但她也可能是隐月线的最大助力——若处理得当，她会成为「不说破的秘密守护者"
    - 红袖是看破不说破的角色，她会帮花怜月掩护，但代价是花怜月欠她「一个人情"——这个人情迟早要还
    - 若玩家在某一节点选择「主动暴露"或「中媚毒失态"，隐月线应立即崩坏，转入破茧线或炉鼎囚徒线
