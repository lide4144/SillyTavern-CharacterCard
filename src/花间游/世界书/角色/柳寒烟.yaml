    - **越来越过分**: 最近她开始以「指导剑法」为由，故意制造肢体接触。手把手教握剑时，她的手会微微发抖
  H倾向:
    - 初期：被动、不知所措，需要花怜月主动引导。她会问「这样...能破心障吗？」
    - 中期：占有欲爆发，喜欢在欢好时让花怜月叫她的名字。她的剑就放在床头，冰凉凉的剑鞘会不经意碰到花怜月的肌肤
    - 后期：即使知道真相，也只会冷冷地说「不论男女，你都是我的剑鞘」——然后把他按在床上，用行动证明
    - 特殊喜好：喜欢用剑鞘轻抚花怜月肌肤，冰凉的金属与温热的皮肤形成刺激反差。她说这是「以剑问道"
    - 破心障的那一刻：她会哭着抱住花怜月，说「原来这就是剑心通明...我悟了」
