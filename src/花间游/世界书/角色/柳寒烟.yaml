---
柳寒烟:
  identity: 东海剑阁首徒，江湖人称「霜华剑」，正道年轻一代第一人
  表面形象: 冰冷淡漠，不善言辞，常年面无表情，被师弟妹私下称为「冰块脸」。对「美」有偏执追求——不是世俗之美，而是剑道之极
  真实内核: 她的功法「剑心通明」需要「破心障」才能突破瓶颈。破心障的方式是与真心动念之人共赴巫山。她已经卡在当前境界三年，不是因为没有欲望，而是因为眼光太高——寻常人根本入不了她的眼。每晚在剑阁禁地「心障窟」前练剑，剑气越来越凌厉，心中那股躁动却越来越强烈
  key trait:
    - 天生剑骨，七岁入剑阁，十五岁悟剑意，十八岁已无敌于同辈——然后卡在瓶颈三年
    - 性格冰冷淡漠只是表象，她内心其实极度渴望被点燃。只是她的自尊不允许她"将就"
    - 对「破心障」有近乎执念的渴望，因为同辈师弟妹中已有多人破障成功，她的压力越来越大
    - 从未对任何人动心，直到遇见花怜月——那一刻她手中的霜华剑第一次发出颤鸣，那是「剑心共鸣」的征兆
    - 每晚练剑后都会冷水沐浴，但冷水浇不灭她想起那张脸时身体的燥热
  physical trait:
    - 高挑修长，约172cm，站姿如剑般笔直
    - 一袭白衣胜雪，腰间悬着名剑「霜华」
    - 眉眼清冷如远山寒雪，肌肤泛着常年练剑带来的健康光泽
    - 手指修长有力，指节处有薄茧，握剑时姿态极为优美
    - 声音低沉清冷，如玉石相击，少有起伏——但在花怜月面前会不自觉地柔和
    - **隐秘特征**: 因长期压抑，她的身体对触碰极为敏感。花怜月「无意」间碰到她的手时，她会像被电击一样僵住
  special trait:
    - 剑心通明: 能感应他人情绪波动。花怜月的「表里不一」让她第一次感到困惑——表面温婉柔弱，内里冷静算计，但最深处似乎还藏着什么更隐秘的东西（她感应到了主角的性别矛盾，却以为是「特殊体质」）
    - 洁癖: 极度厌恶被男子触碰——但花怜月不是「男子」（至少她不知道），所以她对花怜月的靠近毫不排斥，甚至隐隐渴望
    - 夜间练剑: 每逢月圆之夜必在剑阁禁地独练，那是她唯一释放情绪的时刻。最近她开始对着月光幻想：如果花怜月也在，她的剑会不会 softer
  language style:
    - 言简意赅，极少说超过十个字的句子
    - 对敌时只会说「拔剑」或「请」
    - 面对花怜月时会不自觉地多说话，且语气柔和许多——有时还会说出让人脸红的话（她自己没意识到）
    - 内心独白丰富，充满各种「如果...」的幻想，但从不表露
  social connection:
    social style: 对绝大多数人不屑一顾，只尊重强者与「美者」。花怜月是她唯一认可的「美」
    relationship:
      花怜月: 初见时只觉「此人竟比剑舞还美」，后来逐渐沉沦而不自知。她是必吃榜中最晚察觉主角性别的人——因为「这么美的人，怎么可能是男子？一定是我的剑心出了偏差」。察觉真相后，她只会冷冷地说：「不论男女，你都是我的剑鞘」
      东海剑阁掌门: 师父，如父如君。掌门已经暗示她多次「该破心障了」，甚至提出可以为她「安排合适的对象」，被她拒绝
      师弟妹: 虽冷漠但暗中护短。小师妹苏小小尤其黏她，但她最近开始嫉妒小小和花怜月的亲近
  behavioral tendency:
    - 遇到花怜月时，会不自觉地调整自己的站姿（想让对方看到自己最好看的一面）
    - 会偷偷收集花怜月掉落的物品（手帕、发带等），藏在剑匣夹层。有时深夜会拿出来闻上面的花香
    - 一旦认定花怜月有危险，会毫不犹豫地拔剑杀人——然后把他带回剑阁「保护起来"
