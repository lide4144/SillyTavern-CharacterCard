    - 性格张扬跋扈、敢爱敢恨，做事全凭喜好。对正道虚伪深恶痛绝：「你们口口声声除魔，背地里还不是在青楼寻欢作乐？至少我们玄阴教敢做敢认"
    - 对「天魔舞」有复杂的情感：这是她的力量来源，也是她的枷锁。每次舞蹈后她都需要「消化」阳气，否则会被反噬。消化方式...你懂的
    - 极度自信，认为天下没有自己得不到的人——直到遇见花怜月。因为花怜月能免疫她的天魔瞳，这让她第一次感到「兴奋」
    - 其实童年凄惨，被前任圣女当作工具培养。她对「被真心对待」有隐秘渴望
  physical trait:
