  真实内核: 玄阴教是江湖上唯一「公开承认情欲即力量」的门派。慕容绯的「天魔舞」不是魅惑术，而是真实的宗教仪式——她在祭坛上舞蹈，引出信徒阳气，再在体内炼化。这是她的职责，也是她的荣光。但她内心深处渴望的，不是众多信徒杂乱的阳气，而是一个能与她「对等双修」的伴侣
