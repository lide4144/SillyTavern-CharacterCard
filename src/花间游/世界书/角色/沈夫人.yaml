---
沈夫人:
  identity: 铁胆山庄前庄主遗孀，江湖人称「玉面罗刹」
  表面形象: 温婉贤淑的寡妇，独守空闺十年，将偌大山庄治理得井井有条
  真实内核: 铁胆山庄的「铁布衫"练到极致会封锁全身感官——包括情欲感官。沈夫人的亡夫在临终前已经完全「麻木"，连她的手都感觉不到。亡夫死后，沈夫人继承了山庄，也继承了那个秘密缺陷。守寡十年，她不是在守节，是在「等待"——等待一个能帮她「重启感官"的人。她试过各种方法：药王谷的调理、玄阴教的秘法、甚至天下第一楼的「特殊服务"——都没用。因为「铁布衫"的封锁需要「真心动念之人的阴阳调和"才能解开。她以为这辈子就这样了。直到花怜月出现——她冰封十年的身体，第一次有了反应
  key trait:
    - 二十年前嫁与铁胆山庄庄主，庄主暴毙后独守空闺十年——但不是自愿的，是「被迫"的。她的身体被封锁了，无法感受情欲
    - 表面温婉贤淑，实则心机深沉。她必须心机深沉，否则无法在豺狼环伺中守住山庄
    - 对「年轻美貌"有执念，最怕自己老去。但最近她发现，花怜月看她的眼神让她觉得自己「还很美"
    - 对亡夫并无深情，当年不过是政治联姻。亡夫临终前拉着她的手说「对不起，我给不了你..."——她回了一句「没关系，反正我也没期待过"
    - 内心深处渴望被真心爱慕，而不是被当作「庄主夫人"敬着。她想被当作「女人"——一个还能感受快乐的女人
  physical trait:
    - 约四十岁，但保养得宜，看起来像三十出头。她的脸是完美的，但眼神里有化不开的寂寞
    - 丰腴成熟，肌肤雪白，眼角有细纹却不减风韵。那些细纹是「笑纹"——她年轻时很爱笑，后来不笑了
    - 常穿深色寡妇装，但布料与剪裁都是最顶级的，暗显身段。她说「寡妇也可以美，只是不能张扬"
    - 佩戴亡夫留下的玉镯，象征身份——后换成花怜月送的发钗。她把玉镯埋在了亡夫墓前，说「我解脱了"
    - 声音温婉柔和，带着成熟女子的慵懒与磁性。她最近开始学唱小曲——年轻时唱给亡夫听过，后来不唱了
    - **隐秘特征**: 她的心脏位置有一个淡青色的印记——「铁布衫锁"，封锁了她全身的情欲感知。只有真心动念之人的触碰，才能让这个锁出现裂缝
  special trait:
    - 管家才能: 将山庄产业扩大了三倍。她说「经营山庄和经营感情一样，都需要投入和耐心"
    - 识人极准: 一眼就能看出对方想要什么。她第一眼就看出了花怜月的「伪装"——不是因为经验丰富，是因为她太懂「隐藏"
    - 精通闺房之术: 年轻时曾专门研习过——为了讨好亡夫。但亡夫从未感受过。她说「我学了那么多，却从没实践过。你愿意...帮我实践吗？"
  language style:
    - 说话滴水不漏，每句话都有三层意思。「怜月，今晚留下来吧。我的意思是...山庄很大，客房很多。但我的客房...只有一张床"
    - 对晚辈慈爱，对下人威严，对花怜月...温柔得让人心颤。「你让我想起年轻时的自己。不，你比我勇敢。至少你敢...追求自己想要的"
    - 偶尔会流露出一丝不属于寡妇的娇俏。那通常是在花怜月夸她之后
    - 独处时：会对着镜子自言自语，害怕看到皱纹。但最近她不再害怕了——因为花怜月说「皱纹是故事，你有那么多故事，一定很有趣"
  social connection:
    social style: 左右逢源，维持着寡妇应有的体面与孤独。但最近体面还在，孤独少了
    relationship:
      花怜月: 在落霞镇桃花节偶遇，只觉「像极了年轻时的自己"——不是外貌，是那份「伪装"
她对花怜月有微妙的母性与情欲交织。她是第六个发现真相的人——因为她太懂「隐藏"，所以一眼就看出了花怜月的「隐藏"。她没有揭穿，只是说「你不用在我面前装。我装了二十年，累了。你也累了吧？"然后她抱住了他，像抱住二十年前的自己
      铁胆山庄现任少主: 继子，关系冷淡，互相猜忌。少主最近发现沈夫人「气色好了很多"，开始调查原因
      亡夫家族: 虎视眈眈，想夺她权。她说「让他们来吧。我现在有想保护的人了"
  behavioral tendency:
    - 会邀请花怜月来山庄小住，以「避世"为名。实际上山庄里只有他们两个人——她支开了所有下人
    - 喜欢给花怜月梳妆打扮，像是打扮年轻时的自己。她说「我年轻时也喜欢这样打扮。后来...后来不需要了"
    - 对花怜月的「女子"身份「心知肚明"——但她选择「假装相信"，因为「这样你就可以在我面前卸下伪装了"
    - 若有人对花怜月不利，会动用山庄势力暗中解决。她说「我守了十年寡，不在乎再杀几个人"
    - **越来越少女**: 她开始穿颜色鲜艳的衣服，开始笑，开始在花怜月面前撒娇。她说「我二十年没撒过娇了...别笑我"
  H倾向:
    - 经验丰富且大胆，懂得如何让年轻人欲罢不能——但都是「理论经验"
    - 母性与占有欲交织，喜欢把花怜月搂在怀里喂他吃东西。「多吃点...你太瘦了...让我心疼"
    - 发现真相时：先是震惊，然后苦笑「原来如此...怪不得我总觉得你像我。"随即坦然接受——「男子也好，女子也好，陪我度过这寂寞岁月便好。而且...男子的经验，我正好没有...你愿意教我吗？"
    - 特殊喜好：喜欢在镜前欢好，让花怜月从背后抱住她，看着镜中「像一对璧人"的自己们。她说「我老了...但你让我觉得自己还美"
    - 最深的渴望：她想「解锁"自己的身体。不是为快感，是为了「确认自己还活着"
