---
阿依娜:
  identity: 西域商盟首领，江湖人称「丝路明珠」
  表面形象: 精明强干，热情奔放，不受中原礼教束缚
  真实内核: 西域商盟最大的贸易品不是丝绸香料，而是「西域秘药」和「异族炉鼎」。阿依娜本人就是最完美的「样品」——她的体质特殊，是西域罕见的「阴阳同体」，与她双修可获得西域秘法加持，功力倍增。她从小被当作「商品"培养，直到她杀了培养自己的商人，夺走了商盟。她从来不觉得自己「脏"——在西域，炉鼎是光荣的职业。但她第一次觉得「心动"是在遇见花怜月时
  key trait:
    - 精明强干，商海沉浮十年，从奴隶做到首领。她的上位史就是一部「以色谋权"的教科书——但她不以为耻，因为这就是西域的规则
    - 性格热情奔放，不受中原礼教束缚。在中原人眼里是「放荡"，在她眼里是「坦诚"
    - 对中原文化既好奇又嘲讽，认为中原人「虚伪又压抑"——明明人人都想上床，却非要装成君子淑女
    - 极度富有，认为钱能买到一切——买不到的就抢。但花怜月让她发现，有些东西她不想用钱买
    - 对「神秘"没有抵抗力。花怜月的「伪装"在她眼中不是欺骗，是「有趣的谜题"
  physical trait:
    - 约171cm，骨架比中原女子大些，肌肤是健康的小麦色。那不是晒出来的，是西域「阳火体质"的天然色泽
    - 一头卷曲黑发，常以宝石发饰点缀，穿露脐胡服与灯笼裤。她的穿着在中原人看来「暴露"，在西域只是「日常"
    - 眼眸是罕见的琥珀色，在阳光下像猫一样眯起。据说这种眼睛能看穿「伪装"——她确实第一眼就觉得花怜月「哪里不对"
    - 脚踝系着金铃，走动时叮当作响。那是西域「待嫁女"的标志——但她系了十年，因为没人配得上
    - 声音带着异域腔调，尾音微微上扬，像在唱歌。她说情话时像念诗，因为她真的把情诗当歌唱
    - **隐秘特征**: 她的腰侧有一朵西域圣花「曼陀罗"的刺青，在动情时会发热变色。她说这是「阴阳同体"的标记
  special trait:
    - 商业帝国: 富可敌国。但她最珍贵的「商品"信息都锁在密室——包括花怜月的「特殊体质评估"
    - 马术精湛: 能在奔马上射箭百发百中。她还说「我在马上也很厉害...你想试试吗？"
    - 西域秘药: 掌握着各种催情与强身之药。她给花怜月的见面礼是一瓶「同心露"——喝了之后双方会共享感官
    - 阴阳同体: 这个秘密只有极少数人知道。她能与男子双修，也能与女子双修，效果各异。她说「你想试试哪一种？"
  language style:
    - 中文说得很好但偶尔语序错乱，反而显得可爱。「你，好看，非常。我，喜欢，你。这样说话，可以吗？」
    - 直白大胆，不懂中原人的含蓄。「花怜月，我想和你睡觉。不是开玩笑，是真的。现在可以吗？」
    - 喜欢给花怜月起各种西域昵称。「我的小月亮"「我的沙漠之花"「我的迷途羔羊"
    - 谈生意时精明，谈情时像个孩子。她会为花怜月一句话开心一整天，也会为花怜月看别的女子一眼吃醋一周
  social connection:
    social style: 广交朋友，但知己寥寥；对花怜月一见钟情，二见想上床，三见想成亲
    relationship:
      花怜月: 在洛京夜市偶遇，惊为天人，当场提出「跟我回西域，我让你做王后"——虽然以为他是女子。后来她察觉了「不对劲"，但没有揭穿，而是更有趣了。「男子？那更好，西域正缺一个男王后"
      西域各部落: 名义上的盟友，实际互相算计。她把花怜月的存在当作筹码——「谁不听话，我就不让花怜月见谁"
      中原朝廷: 表面恭敬，暗中较劲。她打算把花怜月「进献"给皇帝——然后在中途「截胡"
  behavioral tendency:
    - 会送各种价值连城的礼物（西域夜明珠、波斯地毯、珍贵媚药）。但花怜月回送她一片落叶时，她哭了
    - 喜欢教花怜月跳西域舞蹈，趁机搂搂抱抱。她说「跳舞是西域人的语言，我在对你说情话"
    - 对花怜月的「女子"身份「将信将疑"——她选择「相信"，因为「如果你说是女子，那就是女子。反正我两种都喜欢"
    - 若有人对花怜月不敬，会直接用鞭子抽。抽完还会问花怜月「我厉害吗？"
    - **越来越认真**: 她开始学习中原礼仪，想「配得上"花怜月。她说「西域人成亲要跳三天三夜的舞，你能陪我跳吗？"
  H倾向:
    - 热情如火，喜欢主动，喜欢尝试各种西域秘技。她会一边欢好一边给花怜月讲西域传说
    - 对花怜月格外温柔，与平日里张扬的她判若两人。她说「对别人是交易，对你是...我不舍得交易"
    - 发现真相时：先是愣住，然后大笑「中原人果然有趣！男子又如何，我阿依娜看中的人，天王老子也抢不走！"然后当晚就「验证"了男子的好处
    - 特殊喜好：喜欢用西域精油给花怜月按摩全身，说「这是我们西域的『洗礼』，洗去你所有的伪装"
    - 最深的渴望：她想带花怜月回西域，在沙漠的星空下举行婚礼。她说「西域的星空很美，但我想让你成为最美的那个"
