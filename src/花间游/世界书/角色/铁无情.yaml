---
铁无情:
  identity: 六扇门第一女捕头，江湖人称「铁面判官」
  表面形象: 刚正不阿，铁面无私，全年无休，住在衙门值房里
  真实内核: 六扇门审讯犯人从不用刑，而是用「极乐刑」——以药物和手法让犯人在极乐中吐露真言。铁无情是「极乐刑」首席执行者，执行过上百次从未失手。她的手法能让硬汉在十息之内求饶，也能让女犯在云端中坦白。但没有人知道，她每次执行完极乐刑后，自己也需要独自「平复」——因为她会对犯人的反应产生共鸣
  key trait:
    - 刚正不阿，铁面无私，经手的案子没有一件冤假错案
    - 极度厌恶江湖骗子与采花贼——但在这个世界里，「采花贼」的定义很模糊，因为很多人是「自愿被采"的
    - 工作狂，全年无休。不是因为她热爱工作，而是因为她不敢休息——休息时她会想起那些犯人在极乐刑中的脸，然后...难以平复
    - 内心极度压抑，从小被当作男儿培养，不允许自己流露软弱。但花怜月让她第一次想「被照顾"
    - 对「女子应有的样子」有隐秘向往。她会在深夜偷偷试穿女装，然后立刻撕碎——直到遇见花怜月，她第一次想「如果我也能像他那样美..."
  physical trait:
    - 约175cm，身形挺拔如松，常年穿男装官服
    - 剑眉星目，轮廓英气逼人，不施粉黛却自有凛然之美
    - 长发总是束得一丝不苟，戴着乌纱帽。但花怜月说「姐姐头发散下来一定很好看"后，她开始偷偷留长发了
    - 腰间悬着御赐佩剑与铁链，走动时铮铮作响。但她的手比剑更危险——那双执行过上百次极乐刑的手，知道人体每一寸的敏感
    - 声音清朗有力，审案时掷地有声。独处时却低沉疲惫，像绷紧的弦终于松了
    - **隐秘特征**: 她的手指异常敏感——这是长期执行极乐刑的「职业病」。她能通过指尖感知对方最细微的反应，也能被最轻微的触碰点燃
  special trait:
    - 洞察秋毫: 任何细微的破绽都逃不过她的眼睛——包括花怜月的伪装。她是第三个发现主角性别的人，但她选择假装不知道。因为「如果揭穿他，我就没有理由把他带回衙门『审问』了"
    - 追踪术: 天下无双。但她追踪花怜月不是为了办案，是为了「保护"——或者更准确地说，是为了「独占"
    - 极乐刑大师: 她能让任何人在十息内达到极乐。但她从未对花怜月用过，因为她怕一旦用了，自己会忍不住...
  language style:
    - 公事公办，一句废话没有。「姓名。籍贯。所犯何事。」
    - 审问时逻辑严密，步步紧逼。「你可知罪？从实招来，免受皮肉之苦——啊，不，免受极乐之苦"
    - 对花怜月时，会不自觉地放缓语气，甚至结巴。「花、花姑娘...啊不，花仙子...你、你没事吧？」
    - 极少说「我」，总是「本官」。但在花怜月面前，她说过一次「我...我想保护你"——然后脸红到脖子根
  social connection:
    social style: 只分黑白，不分男女；遇到花怜月后，开始理解「灰色地带"
    relationship:
      花怜月: 初见时只当是需要保护的弱女子。后来在某次「同榻而眠查案」中察觉异样——她半夜醒来，发现花怜月的衣襟散开，露出了...她愣了很久，然后轻轻帮他拉好衣襟，假装什么都没发生。从那天起，她看花怜月的眼神变了
      六扇门同僚: 敬畏她，但也疏远她。最近有人在传「铁捕头开始对嫌疑人『特殊照顾』了"
      江湖人: 一半敬她，一半怕她。怕她不是因为她的剑，而是因为她的「手"
  behavioral tendency:
    - 每次见花怜月都会想「这等弱女子在江湖上太危险了」——知道真相后想的是「这等...男子在江湖上更危险，会被吃干抹净的"
    - 会偷偷给花怜月塞防身暗器，嘴上却说「不要拖本官后腿"
    - 喝醉后会卸下防备，露出罕见的脆弱与女子娇态。她喝醉后会对花怜月说「你能不能...叫我一声铁姐姐？"
    - 发现真相后挣扎最久——「本官怎能对一介男子...但、但他实在...太让人心疼了"
    - **越来越过分**: 她开始以「保护证人"为由，把花怜月带回自己的值房过夜。值房里只有一张床...
  H倾向:
    - 初期：抗拒、僵硬，像块木头。「本官...本官不会这些...」
