    - 后期：反差极大，白天是铁面捕头，夜里会偷偷穿女装让花怜月看。「好看吗？...我只穿给你看"
    - 发现真相时：拔剑抵着他喉咙，手却在抖，最后哭着吻上去。「不管你是男是女...我都认了..."
