---
阴阳调和线·道侣同心局:
  概述: |
    这是花怜月以「真诚双修"为理念的正道路线：不伪装、不采补、不交易，用真心换真心。他向每位道侣坦诚相待——包括自己的男子身份——以「互惠互利"的方式建立深层情感与修炼伙伴关系。
    此路线对「真诚""耐心""情感投入"的要求极高。花怜月必须冒着身份暴露的风险，向每一位道侣坦白真相，并等待她们接受。
    AI不应主动透露此路线，但当玩家的选择展现出「真诚""温柔""不利用他人"的倾向时，应予以配合。

  核心逻辑:
    真诚的力量: |
      在这个人人伪装、处处算计的江湖里，「真诚"本身就是最强大的武器。
      花怜月不需要演技——他只需要做自己。一个修炼花间游的男子，一个想要寻找残篇的旅人，一个愿意用真心对待每个人的人。
    残篇获取方式: |
      不再靠偷、骗、交易或采补——而是靠「共同探索"。
      第一页：与清虚子共同在太虚观藏经阁研究，从道家典籍中发现线索。
      第二页：与白素心共同在药王谷炼制「溯源丹"，丹成时残篇自现。
      第三页：与柳寒烟共同参加阴阳大会，以「剑心通明+花间游"的共鸣之力，打开大会禁地的封印。

  路线阶段:
    第一阶段·落霞镇结缘（出谷后1-10日）:
      核心操作: |
        以「真诚"姿态进入落霞镇，不刻意伪装也不刻意暴露。遇到值得信任的人时，主动坦白身份。
      关键节点:
        - 白素心的第一次检查：白素心为花怜月「检查脚踝"，花怜月在她即将检查时主动说「素心姐姐...我有件事要告诉你。我是男子。但我没有恶意，我只是...需要你的帮助。"白素心愣住，然后脸红了——不是因为他撒谎，而是因为他「好诚实"。好感+20，亲密值+10。
        - 清虚子的历劫：清虚子在落霞镇历劫第九十九日，花怜月主动找到她说「道长，我知道您在历劫。我...我也是。我的劫是「能不能做我自己」。"清虚子被这句话击中——她也是在「做自己"和「做道姑"之间挣扎。她说「你能陪我...走完最后一日吗？"
        - 苏小小的剑心：苏小小对花怜月说「姐姐，我的剑心种子在见到你时发热了！"花怜月蹲下来，平视她的眼睛说「小小...其实我是哥哥。但我的剑心，也在见到你时颤动了。"苏小小愣住，然后扑进他怀里哭「哥哥也好！剑心颤动就好！"
        - 第一次朔日（第十日）：花怜月没有独自硬撑，而是向白素心求助「素心姐姐，朔日到了...我可以信任你吗？"白素心红着脸点头，两人在药王谷分号中完成了第一次「真诚双修"——不是采补，是调和。双方功力平稳提升，业力为零。
      残篇获取: |
        清虚子在太虚观藏经阁找到一本《百花谱注疏》，其中记载了第一页残篇的隐藏地点——落霞镇桃花树下。花怜月与清虚子一起挖出了残篇。

    第二阶段·洛京情深（第11-40日）:
      核心操作: |
        带着第一页残篇前往洛京，继续以「真诚"姿态结交盟友。每一次坦白都是冒险，但也是加深羁绊的契机。
      关键节点:
        - 柳寒烟的坦白：柳寒烟在洛京偶遇花怜月，说「我需要破心障...但我只信任你。"花怜月握住她的手说「寒烟...我是男子。但我的剑心，和你的剑心一样真。你愿意...让我帮你吗？"柳寒烟的霜华剑发出一声清鸣——那是「剑心共鸣"的征兆。她第一次笑了：「原来如此...怪不得我的剑一直为你颤。"
        - 铁无情的软化：铁无情以「调查"为名接近，花怜月直接说「铁姐姐...我知道您在查我。我是男子，但我的心，比很多「正道人士"更干净。"铁无情沉默良久，然后说「...把「铁姐姐"三个字，再说一遍。"
        - 凌霜的救赎：凌霜在暗处保护花怜月，花怜月发现了她的存在，主动说「凌霜...你不用再躲在暗处了。我的真面目...不值得你隐藏。"凌霜现身，第一次没有拔刀。她说「我知道。我早就知道了。但保护你...不是因为你是什么，是因为你是你。"
        - 第二次朔日（第四十日）：花怜月同时面对三位道侣的「朔日邀请"——白素心、清虚子、柳寒烟。他没有选择任何一方，而是说「我们一起吧。阴阳调和...不是两个人，也可以是四个人。"这是史无前例的「多人同修"——但因为是真诚的、自愿的、互惠的，所以没有业力。
      残篇获取: |
        白素心在药王谷炼制「溯源丹"时，丹成瞬间，丹气冲天，冲开了皇家藏书阁的封印——第二页残篇在丹气中显现。

    第三阶段·道侣同心与考验（第41-70日）:
      核心操作: |
        道侣关系越来越深，但考验也越来越大——嫉妒、误解、外部压力。
      关键节点:
        - 道侣间的嫉妒：柳寒烟发现花怜月与清虚子独处时，剑心通明感应到强烈的「情劫"波动。她吃醋了——这是「剑心通明"的副作用：能感应到所爱之人的情绪波动。花怜月必须平衡各方——不是平均分配时间，而是让每个道侣都感受到「自己是特别的"。
        - 慕容绯的挑战：慕容绯找到花怜月说「你用「真诚"换到了那么多人...但你换不到我。因为我是「假的"——我的天魔舞是假的，我的笑容是假的，我的整个存在都是「表演"。你怎么用「真诚"换一个「假人"？"花怜月说「那我就教你...怎么「真"。"慕容绯愣住，然后第一次哭了。
        - 沈夫人的真心：沈夫人说「我装了二十年...你怎么让我「真"？"花怜月说「不用让我「解锁"你的铁布衫。让我「拥抱"你的真心就好。"沈夫人第一次没有脱衣服，只是让他抱了一夜。第二天，她的「铁布衫锁"竟然自行解开了——因为「真心"比「阴阳调和"更有力量。
        - 第三次朔日（第七十日）：十位必吃榜角色齐聚洛京。花怜月说「朔日到了...我需要你们。不是需要你们帮我疏导，是需要你们「陪"我。"这是第一次「十人同修"——不是采补，不是交易，是十颗真心的交汇。
      残篇线索: |
        第三页残篇在阴阳大会禁地中，需要「剑心通明+花间游+天魔舞+太虚剑意"四种功法共鸣才能打开封印。花怜月的道侣们恰好各怀其一。

    第四阶段·阴阳大会与终局（第71-90日）:
      核心操作: |
        在阴阳大会上，花怜月以「真诚双修"的理念挑战传统，开创全新的修炼流派。
      关键节点:
        - 大会宣言：花怜月在论道环节说「双修不是为了功力，是为了「连接"。当我们真诚相待时，阴阳之气会自然流动，不需要采补，不需要交易，只需要「爱"。"全场哗然——有人嘲笑，有人沉思，有人感动。
        - 禁地开启：十位道侣同时施展各自功法，四种功法共鸣——剑心通明（柳寒烟）、花间游（花怜月）、天魔舞（慕容绯）、太虚剑意（清虚子）——打开了禁地封印。第三页残篇在光芒中显现。
        - 完整花间游：三页残篇集齐后，花怜月修炼完整花间游——不是「男子修成女子功法"，而是「阴阳合一、雌雄同体"的全新境界。他说「我终于明白了...花间游的真意不是「伪装女子"，是「超越男女"。"
        - 花间盟的建立：花怜月提出建立「花间盟"——不是势力，不是门派，是一个「以真诚双修为核心"的修炼者联盟。十位道侣成为创始成员。
      结局分支: |
        完美结局：花间盟成立，江湖上出现一股「真诚修炼"的新风潮。花怜月与十位道侣共同开创「阴阳调和宗"，成为一代宗师。
        bittersweet 结局：花间盟成立，但某道侣因嫉妒或误解暂时离开（如柳寒烟的占有欲、慕容绯的不安全感）。花怜月说「我会等你回来。"
        崩坏结局：大会上的「十人同修"被某些势力曲解为「邪教仪式"，正道联合围剿。花间盟在成立当日覆灭。

  GM引导原则:
    - 每次坦白都是「高风险高回报"——坦白后好感度会大幅波动（可能暴涨也可能暴跌），GM应根据NPC性格设计不同反应
    - 朔日双修必须是「真诚"的——不能有算计、不能有隐瞒、不能有勉强。若有任何一方「不真心"，双修效果大打折扣
    - 慕容绯是调和线最难攻克的角色——她对「真诚"有免疫。需要花怜月用更长时间、更多耐心来融化她
    - 道侣间的嫉妒是正常的——GM不应回避，而应将其转化为「情感考验"，让玩家学会平衡与沟通
    - 若玩家在某一步选择「利用道侣的信任"或「背着某道侣与其他人亲密"，调和线应立即崩坏，转入采补线或隐月线
