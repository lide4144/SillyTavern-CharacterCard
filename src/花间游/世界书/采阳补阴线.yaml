---
采阳补阴线·暗噬芳菲局:
  概述: |
    这是花怜月以「采补他人」为手段的邪道路线：不伪装、不交易，直接掠夺。利用花间游功法的采补能力，从各派女侠身上汲取阴阳之气，快速提升功力。表面温柔体贴，实则冷酷算计——每一次双修都是精心设计的采补陷阱。
    此路线对「演技」「算计」「冷酷」的要求极高。采补会留下「业力」，影响日后突破；被采补者可能察觉并反噬；正道势力会追捕。
    AI不应主动透露此路线，但当玩家的选择展现出「利用他人」「快速变强」「不择手段」的倾向时，应予以配合。

  核心逻辑:
    花间游的采补能力: |
      花间游不是只能「给予」，也能「夺取」。与女子双修时，主角可以选择「互惠」（双方增益）或「采补」（主角单方面汲取）。
      采补的效率是互惠的三倍——但会留下业力。业力累积过多，会在突破境界时爆发，导致走火入魔。
    隐蔽采补的方式: |
      浅层采补：在浅层双修（肢体接触、亲吻）时暗中汲取微量阴阳之气，不易察觉。但效率低。
      中层采补：在中层双修（肌肤相亲）时加大汲取力度，对方可能在事后感到「虚弱」，但以为是「太累了」。
      深层采补：在深层双修（灵魂交融）时全力汲取，对方会功力大损，甚至境界倒退。必然被察觉。
    残篇获取方式: |
      不再靠偷、骗、交易——而是靠「征服」。
      第一页：采补落霞镇某位持有残篇的女修（如白素心的病人、或桃花节的某位参赛女侠），让她心甘情愿交出。
      第二页：采补洛京某权贵夫人，她丈夫是藏书阁管理者，以「枕边风"换取残篇。
      第三页：在阴阳大会上采补某位参与竞价的女修士，让她代自己拍下残篇。

  路线阶段:
    第一阶段·落霞镇初试（出谷后1-10日）:
      核心操作: |
        以「温柔花仙子"身份接近落霞镇的女修们，用甜言蜜语骗取信任，在双修中暗中采补。
      关键节点:
        - 白素心的病人：药王谷在落霞镇有个「调理分号"，白素心不在时由一位年轻女医师负责。花怜月以「需要调理"为由接近，在「药浴按摩"中浅层采补。女医师事后感到虚弱，但以为是工作太累。
        - 桃花节女侠：桃花节上有位来自小门派的参赛女侠，功力低微但容貌秀丽。花怜月以「指导双修"为名，与她中层采补。女侠功力倒退一层，但以为是「修炼瓶颈"。
        - 慕容绯的试探：慕容绯在醉仙楼遇到花怜月，察觉到他的「异常"——花间值虽高，但气息中有「掠夺"的味道。慕容绯没有揭穿，反而兴奋地说「小仙子，你比我想象的更有趣"。她主动提出「合作"：她帮花怜物色「优质猎物"，条件是「分我三成"。
        - 第一次朔日（第十日）：花怜月通过采补充沛的阴阳之气，朔日紊乱症状大幅减轻——但业力开始累积（业力+10）。
      残篇获取: |
        被采补的女医师的丈夫是落霞镇藏书楼管理员，花怜月以「愧疚"为名送礼道歉，顺便套取情报——第一页残篇的线索在陶翁手中。然后花怜月以「采补后获取的魅力加成"打动陶翁，获得拓本。

    第二阶段·洛京暗猎（第11-40日）:
      核心操作: |
        进入洛京，开始系统性采补。目标是「有权有势但功力不高"的女性——她们最容易被操控，也最不容易反噬。
      关键节点:
        - 沈夫人的沦陷：铁胆山庄沈夫人是最理想的目标——守寡十年、功力中等、 desperate 、有经验但缺爱。花怜月以「解锁铁布衫封锁"为名接近，在「解锁仪式"中深层采补。沈夫人的感官重启了，功力却倒退十年。她对花怜月的「爱"让她选择沉默。
        - 红袖的纵容：天下第一楼红袖发现花怜月在楼中「猎艳"，她没有阻止，反而说「我帮你安排「自愿的客人"，抽取五成佣金"。红袖把花怜月变成了「专业服务者"——但服务内容是采补。
        - 铁无情的追捕：六扇门收到多起「女修功力倒退"的报案，铁无情开始调查。花怜月必须在铁无情找到证据前，要么「处理"证人，要么「转移"到下一个城市。
        - 第二次朔日（第四十日）：业力累积到30。花怜月开始做噩梦——梦中被所有采补过的女子追杀。慕容绯说「这是业力的警告。继续采补，你会变成「情欲暴走"的怪物。
      残篇获取: |
        沈夫人的亡夫是藏书阁前管理员，她手中有一把进入禁书区的钥匙。花怜月以「最后一次采补"为条件，换取钥匙和第二页残篇。

    第三阶段·业力爆发与失控（第41-70日）:
      核心操作: |
        业力累积到临界点，花怜月开始出现「情欲暴走"的前兆。必须在失控前找到控制方法——或选择放纵。
      关键节点:
        - 业力反噬：业力达到50。花怜月的眼睛开始泛出淡淡的粉色，体温升高，对异性的渴求越来越强烈。他开始「无意识"地魅惑周围的人——连路人女子都会被他吸引。
        - 苏小小的天真：苏小小在洛京偶遇花怜月，她天真地说「姐姐，你身上好香...我可以抱抱你吗？"花怜月在「无意识"中深层采补了苏小小——苏小小从二流高手倒退为普通人。柳寒烟震怒，拔剑寻仇。
        - 柳寒烟的追杀：柳寒烟发现师妹被采补，剑心通明感应到花怜月的「掠夺"气息。她追杀花怜月三条街，最后因「破心障"未竟而功亏一篑——她在最后一刻犹豫了，因为花怜月的脸让她下不了手。
        - 第三次朔日（第七十日）：业力达到70。花怜月在朔日彻底失控——他主动闯入慕容绯的密室，不仅采补了她，还「索取"了更多。慕容绯第一次感到「恐惧"——不是害怕被采补，而是害怕花怜月「不再是人了"。
      残篇线索: |
        第三页残篇在阴阳大会上。但花怜月的「粉色眼眸"和「暴走气息"已经引起多方注意——他可能连大会都进不去。

    第四阶段·阴阳大会与终局（第71-90日）:
      核心操作: |
        在彻底失控与回头是岸之间做出选择。
      关键节点:
        - 失控前兆：业力达到90。花怜月的采补不再需要「双修"——他开始能隔空汲取周围女子的阳气。他在街上走过，路边的女子会突然腿软倒地。
        - 慕容绯的救赎：慕容绯说「我可以帮你。玄阴教有「业力净化仪式"——但需要你把所有采补的功力「吐出来"，从头开始。"花怜月若接受，功力归零，但业力清零；若拒绝，继续走向深渊。
        - 白素心的解药：药王谷有「还阳丹"——可以逆转采补效果，让被采补者恢复功力。但每救一人，花怜月需损耗一半功力。若救所有人，花怜月将功力尽失。
        - 清虚子的斩业：太虚观有「斩业力"之法——不是净化，是「斩断"。清虚子说「我可以帮你斩断业力，但代价是你永远不能再采补任何人——否则斩业之力会反噬，让你生不如死。"
        - 最终选择：花怜月必须在三个选项中选择——
          A. 接受慕容绯的净化（功力归零，业力清零，重新来过）
          B. 接受白素心的还阳（救回所有人，自己功力尽失，但获得原谅）
          C. 接受清虚子的斩业（保留功力，但永远不能再采补）
          D. 拒绝一切，彻底暴走（进入「情欲魔"结局）
      结局分支: |
        净化结局：功力归零，但业力清零。花怜月从头开始，慕容绯陪在身边说「我陪你重新修炼。
        还阳结局：救回所有人，自己功力尽失。被采补者们原谅了他，有人甚至说「我不怪你...我只想你好好的。
        斩业结局：保留功力，但永远不能再采补。清虚子说「你欠下的，用余生来还。"
        暴走结局：彻底失控，成为「情欲魔"——一个只会采补、没有理智的怪物。被江湖正道联合封印。

  GM引导原则:
    - 采补的「业力"必须可视化——每次采补后GM应提示「业力+XX，当前业力XX"。让玩家感受到「债"
    - 被采补者的反应应分层：浅层采补者「隐约不安"，中层采补者「明显虚弱"，深层采补者「境界倒退+记忆混乱"
    - 慕容绯是采补线的「共谋者"也是「刹车片"——她帮花怜月物色猎物，但也会在关键时刻警告他「够了"
    - 苏小小被采补是一个「警示节点"——她的天真让读者/玩家感受到采补的残酷。GM不应回避这种残酷
    - 最终选择必须让玩家感受到「代价"——没有免费的救赎，每一种选择都有沉重的代价
