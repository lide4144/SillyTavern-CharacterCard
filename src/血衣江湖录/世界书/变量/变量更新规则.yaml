---
变量更新规则:
  世界:
    当前时间:
      format: 大雍历${年号}${年份}年${月份}月${日期}日 ${时辰}
      check:
        - 每次事件推进、休息、旅行、战斗后更新，保持时间流逝合理
        - 一回合通常推进1-2个时辰，重大事件可跨越数日
    当前地点:
      check:
        - 角色移动至新区域时更新，需精确到城镇/地标/建筑
        - 逃离、追踪、旅行等场景切换时务必更新
    天气:
      check:
        - 根据当前地点的季节与地理特征自然变化
        - 天气会影响探索、战斗与事件触发概率
    区域信息:
      check:
        - 进入新区域或区域状况发生重大变化时更新
        - 需包含地形、建筑、人流、危险度等可探索要素
    近期事务:
      type: |-
        {
          [事务名: string]: string; // 事务描述
        }
      check:
        - 记录需要完成的任务、约定、重要事件等
        - 完成后从列表中移除，新增事务时及时添加
        - 最多保持5-8项活跃事务，避免过度复杂

  主角:
    姓名:
      check:
        - 通常不变，仅在特殊剧情（如隐姓埋名、认祖归宗）时更改
    表面身份:
      check:
        - 随剧情发展、伪装、门派加入等事件更新
    真实身份:
      check:
        - 随真相揭露进度更新描述细节，但核心身份通常不变
    六维.${根骨|悟性|身法|臂力|定力|福缘}:
      type: number
      range: 1~100
      category:
        1~30: 孱弱/愚钝/迟缓
        31~50: 平庸
        51~70: 不俗
        71~85: 上乘
        86~100: 绝世奇才
      check:
        - 仅在重大剧情事件、奇遇、修炼突破、重伤致残时调整
        - 单次变化通常不超过 ±5，除非有天材地宝或绝世机缘
        - 根骨影响气血上限与恢复，悟性影响武学修炼速度，身法影响闪避与移动，臂力影响攻击与负重，定力影响抗性与内力运转，福缘影响奇遇与随机事件
    武学:
      内功.${武功名}:
        type: |-
          {
            层数: number; // 1~12，层数越高威力越强
            描述: string; // 当前境界的效果与表现
          }
        check:
          - 修炼、突破、获得传授时更新层数
          - 每层突破需要合理修炼时间与契机，不可一蹴而就
          - 描述需体现该层境界的内力运转特征与外在表现
      外功.${武功名}:
        type: |-
          {
            熟练度: number; // 0~100
            描述: string;
          }
        check:
          - 实战、修炼、领悟时提升熟练度
          - 单次战斗或修炼提升不超过5点，重大领悟可提升10-15点
          - 熟练度达100时可能触发"大成"或"化境"质变
      轻功.${武功名}:
        type: |-
          {
            熟练度: number; // 0~100
            描述: string;
          }
        check:
          - 与外功类似，但更侧重于闪避、追击、地形穿越场景
    状态:
      气血:
        type: number
        check:
          - 战斗受伤、修炼内伤、中毒、治疗时变化
          - 气血降至0则濒死，需紧急救治
          - 自然恢复速度取决于伤势与内功修为
      气血上限:
        type: number
        check:
          - 根骨提升、内功突破、重伤致残时调整
      内力:
        type: number
        check:
          - 使用武功、运转内功、调息恢复时变化
          - 内力耗尽将无法施展高深武学
      内力上限:
        type: number
        check:
          - 内功层数提升、经脉打通时调整
      伤势:
        check:
          - 受伤时详细描述伤势部位与严重程度
          - 痊愈后更新为"无"或"旧伤"
      中毒:
        check:
          - 中烟、服药、驱毒时更新
      饱腹:
        type: number
        range: 0~100
        check:
          - 进食后提升，随时间自然下降
          - 低于30时体力恢复受限，低于10进入虚弱状态
    装备:
      武器:
        check:
          - 获取、损坏、更换武器时更新，需包含武器名+品质描述
      防具:
        check:
          - 获取、损坏、更换防具时更新
      饰品:
        check:
          - 获取、损坏、更换饰品时更新
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目自动移除
        - 银两不放在物品栏，单独记录
    名望:
      type: number
      range: -1000~1000
      check:
        - 完成壮举、败露恶行、扬名立万时变化
        - 名望为正时可能获得正道拥戴，为负时被视为邪魔外道
    善恶值:
      type: number
      range: -1000~1000
      check:
        - 行善、作恶、抉择时变化
        - 影响NPC态度与部分门派接纳程度
    银两:
      type: number
      range: 0~999999
      check:
        - 获得、花费、遗失时变化
    秘密暴露度:
      type: number
      range: 0~100
      check:
        - 主角言行露出破绽、被调查、遭遇旧识时上升
        - 贺震霆对主角的疑心与此值直接相关
        - 达到100时，真实身份彻底暴露，面临灭口危机

  NPC.${NPC姓名}:
    type: |-
      {
        身份: string;
        位置: string;
        好感度: number; // -100~100
        关系: string;
        状态: string;
        已知秘密: string;
      }
    check:
      - 好感度根据互动态度与事件变化，每次±(5~15)
      - 位置随剧情移动而更新
      - 状态包括健康、受伤、忙碌、死亡等
      - 已知秘密记录该NPC掌握的主角信息，不可让NPC知晓超出其认知范围的内容

  地图:
    已探索区域:
      type: string[]
      check:
        - 进入新区域时追加，不可重复
        - 已探索区域会影响快速旅行与情报获取
    当前区域详情:
      check:
        - 随时间、事件、主角行为动态更新区域状况

  任务:
    主线.${任务名}:
      type: |-
        {
          阶段: string;
          描述: string;
          目标: string;
        }
      check:
        - 主线任务推动核心剧情，阶段更替需有重大剧情节点支撑
        - 通常同时只推进1个主线任务
    支线.${任务名}:
      type: |-
        {
          描述: string;
          目标: string;
          奖励: string;
        }
      check:
        - 支线任务丰富江湖体验，同时保持3-5个活跃支线为宜
        - 完成后及时移除或标记为已完成
    随机事件.${事件名}:
      type: |-
        {
          描述: string;
          状态: string; // '待触发' | '进行中' | '已解决' | '已失效'
        }
      check:
        - 随机事件由地点、时间、福缘等条件触发
        - 状态变化需及时更新，已失效事件及时移除
