---
沉剑潭场景:
  概述: |
    沉剑潭位于沧洲内陆，是一处直径约百丈的深潭。潭水终年碧寒，即使盛夏也冰冷刺骨，据说是因为潭底沉着一柄上古仙剑，剑气渗透了整潭水域。
    对李德而言，沉剑潭是他逃亡生涯的转折点——在这里，他将面对六扇门总捕头铁无情的第三次追捕，在这里，他将在濒死边缘觉醒太虚剑体，从猎物变成猎人。
    这里没有桃花，没有温情，只有生死。

  地理位置:
    - 沧洲腹地，距离东海剑阁约二百里，距离洛京约四百里
    - 潭水呈深绿色，水面平静如镜，但深不可测——曾有人以百丈长绳系石坠入，未触潭底
    - 潭边有一片紫竹林，林中有石亭一座，名曰"问剑亭"——据说是某位剑仙飞升前最后驻足之处
    - 潭水向北流入一条地下河，地下河的出口在三十里外的山谷中

  地形特征:
    潭水极寒: |
      潭水温度常年接近冰点，普通人入水不出十息便会四肢僵硬。
      但正是这种极寒，成为了太虚剑体觉醒的催化剂——太虚剑体属纯阳，在极寒环境中会产生强烈的自我保护反应。
    剑气共鸣: |
      潭底确实沉着一柄古剑——不是仙剑，是太虚剑宗某位先祖的佩剑。这位先祖在临终前将毕生剑意注入剑中，沉入潭底，以待后人。
      太虚剑体觉醒时，潭底古剑会感应到血脉召唤，释放出积蓄数百年的剑气。这就是"金色剑气破水而出"异象的来源。
    紫竹林: |
      潭边的紫竹林密集如迷宫，是天然的伏击与躲避场所。竹叶在风中摩擦发出"沙沙"声，可掩盖脚步声与呼吸声。
    问剑亭: |
      石亭四柱刻满了历代剑修留下的诗句与剑痕。其中最醒目的一句是："问君何能尔？一剑破万法。"
      亭中石桌下有一个暗格，藏着一瓶"寒潭玉露"——可解百毒、清心明志的奇药。是某位剑修留给"有缘人"的。

  无桃花事件: |
    沉剑潭是李德面对生死的地方，氛围肃杀冷峻，不适合任何桃花事件。
    这里的"情感"只有一种：对死亡的恐惧、对生存的执着、以及在绝境中爆发的潜能。

  关键事件:
    铁无情的第三次追捕: |
      时间：第13个月，距离李德逃离铁胆庄已整整一年。
      地点：沉剑潭边，问剑亭前。
      铁无情没有给期限，也没有说废话。他只是站在潭边，追魂锁链缠在腰际，玄铁手套在月光下泛着冷光。
      "我给你三个月自首。三个月过了。"他说，"我知道贺震霆该死。但你知道他该死，就该让六扇门来定他的罪。你私自杀他，和他杀你全家，有何区别？"
      李德的回应决定战斗的走向：
      - 若李德辩论：铁无情会"听"——这是他罕见会给罪犯的机会。他会认真回应每一个论点，然后摇头："你说得有理。但法律不讲理，讲规矩。"
      - 若李德沉默：铁无情会失望，然后出手——他以为这个少年"不一样"，但原来也只是个沉默的凶手。
      - 若李德说出某些触及铁无情内心的话（如"六扇门若是能定他的罪，他为何能作威作福十五年？"），铁无情会第一次产生动摇。这种动摇不会让他停手，但会影响他出手的力度与决断。
    生死之战: |
      铁无情战力380，李德战力约180。正常情况李德不可能赢。
      但李德利用了沉剑潭的地形优势：
      ① 潭水的极寒克制铁无情的炎阳掌——掌劲入水后威力大减
      ② 紫竹林限制追魂锁链的展开——锁链在狭窄空间中难以施展
      ③ 李德首次同时运转玄阴素女心经（阴）与太虚剑意（阳），阴阳二气在经脉中完成第一个完整循环
      战斗持续约一炷香时间。李德身中三掌、两处锁链伤，气血跌至15/120，进入濒死状态。
      铁无情也不好受——他的炎阳掌被阴阳二气反噬，右臂经脉受损，战力暂时下降至300。
      最后一击：铁无情以追魂锁链缠住李德的脖颈，将他拽至身前，炎阳掌全力击出——目标是心脏。
      李德无法闪避。他只能选择：以胸口硬接这一掌，同时以断魂刀刺向铁无情的右臂伤处——两败俱伤。
      但就在炎阳掌击中胸口的瞬间，李德体内阴阳二气在极寒潭水的刺激下，发生了质变——
    太虚剑体觉醒: |
      觉醒的三个条件同时满足：
      ① 阴阳交汇：玄阴素女心经与太虚剑意在生死关头完成了第一个完整周天
      ② 生死一线：铁无情的炎阳掌将李德打入濒死状态，触发身体的自我保护机制
      ③ 剑意通明：在最后一剑刺出的瞬间，李德理解了"剑不是武器，是意志的延伸"
      异象：
      - 一道金色剑气从李德后颈的火焰胎记中爆发，贯穿全身
      - 沉剑潭底，那柄沉寂数百年的太虚古剑感应到血脉召唤，释放出积蓄的剑气
      - 两道剑气在潭底交汇，然后破水而出，直冲云霄
      - 方圆百里，所有剑器同时震颤嗡鸣，仿佛在朝拜君王
      - 李德后颈的火焰胎记绽放出真正的光芒——不是胎记，是太虚剑宗的血脉印记
      觉醒后的李德：
      - 战力从180跃升至320
      - 纯阳剑气外放，将铁无情的炎阳掌劲反噬
      - 铁无情被震退十丈，口吐鲜血，追魂锁链断裂三节
      - 李德从潭底走出，手中无剑，但周身剑气缭绕，每一步都在地面上留下浅浅的剑痕
      铁无情看着这个从潭底走出的少年，第一次感到了"恐惧"——不是对死亡的恐惧，是对"不可控"的恐惧。
      "你……"铁无情抹去嘴角的血，"已经不是我能抓的人了。"
      他没有再出手。他转身离开，披风在夜风中猎猎作响。
      这是铁无情三十年追捕生涯中，第一次"放走"罪犯。
    觉醒后的世界变化: |
      六扇门：铁无情撤回缉拿令，上报"此人已非寻常罪犯，需从长计议"。六扇门将李德的威胁等级上调至"S级"。
      武当派：清虚道长终于意识到莫问天的话是真的。他开始犹豫：是继续隐瞒，还是主动接触李德？
      铸剑山庄：欧冶魂放下铁锤，望向沧洲方向，喃喃："太虚剑体……终于醒了。"
      天魔宗：厉苍生大笑，对慕容烟说："去，把他带来。若带不来……就杀了。不能让他成长到下一个境界。"
      幽冥教：段九幽（诈死三十年的老祖）亲自下令："活捉。他的血，比太虚真经更有价值。"
      百花谷：花解语对阿芷说："你赌对了。那小子真的活了过来。"
      东海剑阁：沈落霞在踏浪坪上感受到了剑气波动。她没有说话，只是握紧了手中的剑，嘴角微微上扬。

  战后收获:
    寒潭玉露: |
      问剑亭石桌下的暗格中，有一瓶寒潭玉露。李德觉醒后身体虚弱至极，服用此露可快速恢复气血与内力，同时清除体内累积的毒素与暗伤。
    潭底古剑: |
      觉醒后，李德可潜入潭底，取回太虚先祖的佩剑。这柄剑名为"归虚"，剑身无锋，但蕴含先祖毕生的剑意。
      "归虚"与断魂刀截然不同——断魂刀是贺震霆的凶器，是仇恨的象征；"归虚"是太虚剑宗的传承，是使命的象征。
      李德握着"归虚"的那一刻，第一次感受到了"归属感"——不是对这个世界，是对这柄剑、对这个血脉、对这个使命。
    铁无情的披风碎片: |
      战斗中，李德的剑气斩落了铁无情披风的一角。碎片上绣着密密麻麻的名字——每一个都是铁无情亲手缉拿的罪犯。
      李德在碎片上看到了"贺震霆"三个字——被红笔划掉了。旁边标注着："已死于私刑，凶手：李德。未结案。"
      这是铁无情对他最后的"纪念"——一个罪犯，被他当作"未结案"永远记住。

  GM引导原则:
    - 沉剑潭的氛围应是"肃杀中的壮丽"——没有鸟鸣，没有风声，只有潭水的静谧与即将到来的雷霆
    - 铁无情的台词应简短有力，但每句话都带重量。他不是反派，他是"体制内的正义"——有局限，但真实
    - 战斗描写应突出"绝望中的希望"——李德被打得毫无还手之力，但每一次倒下都让他更接近觉醒
    - 觉醒异象应写得震撼：金色剑气、百里剑鸣、潭底古剑的回应。这是整个完美线的高光时刻
    - 铁无情"转身离开"的背影应有足够的悲剧感——他抓了一辈子罪犯，最后放走了一个他明知"该抓"的人。这是他对自身信念的第一次背叛
    - 李德握住"归虚"的那一刻，应有一个短暂的"停顿"——不是情感爆发，是一个冷酷的人第一次感受到"某种超越计算的东西"
