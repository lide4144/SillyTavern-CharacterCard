---
东海剑阁场景:
  概述: |
    东海剑阁位于沧洲蓬莱港外的月牙岛上，四面环海，唯有一条退潮时才显露的石桥与陆地相连。
    剑阁建筑依山而建，层层叠叠，最高处的"听涛阁"可俯瞰整片东海。阁中弟子以剑为尊，每日清晨在海滩上练剑，剑气与海浪交织，蔚为壮观。
    对李德而言，东海剑阁是太虚真经"身法篇"的所在之处，也是他遇到沈落霞——这个江湖中最"纯粹"的人——的地方。

  地理位置:
    - 沧洲蓬莱港外三十里，月牙岛
    - 岛屿呈月牙形，东面朝海，西面是悬崖与密林
    - 每日寅时退潮，石桥显露，持续约两个时辰；其余时间岛屿与世隔绝
    - 岛上气候温和，海风常年不断，空气中带着咸湿的潮气

  建筑布局:
    听涛阁: |
      剑阁最高建筑，七层木塔，沈孤帆的居所与剑阁议事之所。
      顶层是沈孤帆的剑室，四壁空空，唯有一扇大窗正对东方。每日日出时，沈孤帆在此观潮练剑，雷打不动。
      第六层是藏经阁，藏有东海剑阁历代剑谱与典籍。身法篇就被放在这里——被归类为"轻功杂篇"，因为沈孤帆参悟不透其中的剑理。
    踏浪坪: |
      剑阁前的海滩，每日清晨弟子们在此练剑。沙滩被剑气刻满了纵横交错的痕迹，退潮时海水灌入痕迹中，形成奇特的"剑痕溪流"。
      沈落霞最常在此处练她的"踏浪剑步"——在浪花中穿行，剑不沾水。
    沉剑窟: |
      岛屿西侧悬崖下的海蚀洞穴，剑阁历代弟子废弃的剑器皆沉于此。
      窟内水深不可测，剑器堆积如山，据说最深处有一柄"初代阁主剑"，但无人能潜入那么深。
      海水灌入洞穴时发出奇特的嗡鸣，像是千万柄剑在同时低语。
    弟子居所: |
      分布在岛屿中部的竹林中，男女弟子分住两院。女弟子院中有一株百年樱花树，春季落花如雪。
      女弟子们常在树下刺绣、读诗、或偷偷议论"今日踏浪坪上哪位师兄的剑最帅"。

  常驻NPC:
    沈孤帆: |
      东海剑阁阁主，五十岁，面容清癯，气质如海风般疏朗。一柄"沧海剑"从不离身。
      他对太虚剑宗的传说略有耳闻，但身法篇在他手中四十年，他始终参悟不透——因为身法篇需要"太虚剑体"才能激活。
      他对李德的态度起初是"不接触"——太虚剑宗的麻烦，他不想沾。但后来……
    沈落霞: 见独立条目
    女弟子们: |
      东海剑阁共有女弟子二十三人，年龄从十五岁到二十五岁不等。
      她们的生活简单纯粹：练剑、观潮、刺绣、以及……八卦。
      李德出现在踏浪坪的那一刻，至少有十五名女弟子注意到了这个"苍白如纸、容貌俊美得不像真人"的少年。
      "他是谁？"
      "听说是来求取轻功秘籍的。"
      "长得也太好看了……比大师兄还好看。"
      "但他看起来好弱，风一吹就倒的样子。"
      "弱才让人想保护啊！"

  桃花事件·樱花树下的窃窃私语:
    触发条件: |
      李德在东海剑阁停留期间（至少三日），会在踏浪坪、藏经阁、或海滩上与女弟子们产生交集。
      沈落霞带李德参观剑阁时，经过女弟子院前的樱花树。
    事件经过: |
      沈落霞对"女弟子们的八卦"一无所知。她带着李德穿过竹林小径，前往藏经阁，完全没有注意到樱花树后躲着的三四个脑袋。
      "落霞师姐带男人回阁了！"
      "天啊，她居然笑了！你们看到没，她刚才笑了！"
      "那少年是谁？能让落霞师姐笑的人……"
      当晚，女弟子院的窃窃私语传遍了整个剑阁。第二天清晨，当李德出现在踏浪坪时，他发现自己被二十多道目光同时注视。
      那些目光中有好奇、有倾慕、有嫉妒（对沈落霞）、也有保护欲。
      一名胆大的女弟子——名叫"柳如烟"，十七岁，圆脸杏眼——主动走来，递给李德一杯泉水。
      "公子，海边的日头毒，喝口水吧。"她的脸红得像苹果。
      李德接过水杯，道谢。他的态度礼貌而疏离——不是冷漠，是"计算后的最优回应"。
      但女弟子们解读成了"温柔"与"害羞"。
      此后数日，李德发现自己的生活被各种"巧合"包围：
      - 他的房门清晨会出现一束野花
      - 他在海滩练剑时，总会有女弟子"恰好"路过
      - 他在食堂用餐时，总有女弟子"不小心"坐到他对面
      - 甚至有人在夜间往他窗缝里塞情书——字迹娟秀，署名"一个仰慕你的人"
      沈落霞对这些一无所知。她的世界里只有剑，她以为那些女弟子只是"对剑阁的客人好奇"。
      直到某日，她在樱花树下捡到了一封被风吹落的情书。她看了三遍，才意识到上面写着什么。
      "……"沈落霞沉默了很久，然后把情书折好，塞回树下。
      她没有告诉李德。但她第二天带李德去了一个更偏僻的海滩——远离女弟子们的视线。
      "这里安静。"她说，"适合你练剑。"
      这是沈落霞第一次表现出"独占欲"——不是对李德这个人，是对"能与她论剑的人"的独占欲。
    李德的心理: |
      穿越者对女弟子们的倾慕毫无波动。他将这些"桃花"归类为"噪音"——需要处理，但不应分散注意力。
      他选择的最优策略：对所有女弟子保持统一的礼貌距离，不接受任何单独邀约，不让任何人觉得"被特殊对待"或"被冷落"。
      但他也意识到：这些女弟子可以成为"掩护"——若追捕者来到东海剑阁，二十三名女弟子的存在会让任何暴力行动都变得复杂。
      至于沈落霞……她是唯一让李德感到"复杂"的人。不是因为爱慕，是因为"无法理解"。
      她对他无所求。不要他的武功、不要他的秘密、不要他的回报。她只想"论剑"。
      这种"纯粹"让习惯了利益计算的穿越者感到……不安？还是羡慕？他自己也说不清。
    后续影响: |
      女弟子们的倾慕是短暂的——当她们发现李德对谁都一样温柔、对谁都不亲近时，热情会逐渐消退。
      但有一两个特别执着的（如柳如烟），可能会在日后成为意想不到的帮助或麻烦。
      沈落霞的"独占欲"是长期伏笔。她不会承认这是"喜欢"，但她在乎。若日后有人试图伤害李德，她会拔剑——不是为了正义，是为了"我的剑友不容他人染指"。

  关键事件:
    身法篇获取: |
      沈落霞从藏经阁中偷偷取出身法篇的抄本，送给李德。
      她不需要原稿——她已从身法篇中参悟出了"踏浪剑步"，原稿对她只是"参考"。
      交换条件：李德需教她真正的"飘萍渡海"——太虚真经中的原版身法。
      李德发现，沈落霞的"踏浪剑步"确实是"飘萍渡海"的变体，但她"练反了"——真气应从涌泉穴入，而非丹田。
      这个纠正让沈落霞的踏浪剑步突破了瓶颈，从"水上行七步"提升至"水上行二十一步"。
      沈落霞欣喜若狂，拉着李德在海滩上练了一夜剑。那是李德逃亡以来最轻松的一夜——没有追杀、没有算计、只有剑与浪。
    沧海剑鸣: |
      身法篇入手的那夜，沈孤帆在听涛阁顶层感受到了异常——他的沧海剑在剑鞘中震颤嗡鸣，仿佛在回应某种召唤。
      他望向踏浪坪的方向，看到月光下，一个苍白少年与一名蓝衣少女并肩站在浪花中，剑气与海浪交织成奇异的图案。
      "太虚剑体……"沈孤帆喃喃，"终于醒了。"
      他没有去打断他们。他只是站在窗前，看了一整夜。
      第二天，他召见李德，说："身法篇是我师父的遗物。我不知其真意，但……它似乎等到了该等的人。拿走吧。但记住，东海剑阁不介入江湖纷争。你走之后，这里不是你的庇护所。"
      这是沈孤帆的"善意"——也是他的"界限"。
    沉剑窟的意外: |
      若李德探索沉剑窟，会发现窟内的千万柄废弃剑器对太虚剑体有奇特的"回应"——它们会在李德靠近时微微震颤，仿佛在朝拜。
      窟最深处的初代阁主剑是一柄无锋重剑，剑身上刻着"海纳百川"。李德触碰它时，感受到一股包容万物的剑意——这与太虚剑体的"至阳至纯"截然不同，却又不冲突。
      这股剑意可帮助李德调和体内的阴阳冲突（比阿芷的针法更根本），但需要在沉剑窟中静坐闭关七日——而李德没有七日的时间。
      这是一个"遗憾"的设计：玩家知道有好处，但无法立刻获取。日后可再回来。

  GM引导原则:
    - 东海剑阁的氛围应是"纯净"——海风的清新、剑气的清冽、以及沈落霞的纯粹。这与洛京黑市的肮脏、铸剑山庄的炽热形成鲜明对比
    - 女弟子们的桃花事件应写得轻松愉快——不是沉重的情感纠葛，是少女们天真烂漫的倾慕。李德是"被桃花"，不是"招桃花"
    - 沈落霞的"独占欲"要写得极其隐晦——她自己都不明白那是什么。她只是觉得"那个海滩只有我们两个人更好"
    - 沧海剑鸣的场景应有武侠式的浪漫：月光、海浪、两柄剑的共鸣、以及一个老剑客在窗前的沉默注视
    - 东海剑阁是李德逃亡中唯一的"净土"——但他知道不能久留。这种"知道美好即将结束"的预感，是完美线情感张力的重要组成
