---
无名山谷场景:
  概述: |
    无名山谷位于沧洲边境的群山深处，没有名字，没有路标，连猎户都不会深入至此。
    山谷呈马蹄形，三面环山，一面临溪，谷中四季如春，百草丰茂，是天然的药草宝库。
    这里远离人烟，是李德选定的第一个"安全屋"——也是他与药奴阿芷相遇、疗伤、建立复杂关系的地方。

  地理位置:
    - 沧洲与瘴州交界处，距离落霞镇约八十里山路
    - 入口被一片紫竹林遮掩，穿过竹林后豁然开朗
    - 谷中有一条清澈溪流，溪水甘甜，可饮用可沐浴
    - 谷壁上有天然洞穴三处，可避风雨

  建筑布局:
    阿芷草庐: |
      三间相连的茅草屋，以竹篱围成一个小院。
      东屋是卧室：一张竹床、一个旧木箱、墙上挂着各种干草药。竹床狭窄，仅容一人，但干净整洁。
      西屋是药房：三面墙都是药架，摆满了瓶瓶罐罐。中央是一座石质炼药炉，炉火常年不熄。角落里有一个大浴桶——阿芷用来浸泡药浴的，也是李德后期调和阴阳时用的。
      中屋是厅堂：一张竹桌、两把竹椅、以及一个煮茶的小泥炉。这是两人交谈、用餐、以及阿芷施针的地方。
    药圃: |
      竹篱外的半亩药田，种植着当归、黄芪、金银花、七叶一枝花等常见草药。
      边缘有一片被木栅栏围起的区域，种着毒草：断肠草、鹤顶红、曼陀罗。阿芷在木牌上写着"入者自负"。
    溪边巨石: |
      溪流边有一块平整的巨石，可容两人盘坐。阿芷常在此晾晒药材，李德后期常在此修炼剑意——水声可掩盖真气运转的声响。
    后山洞穴: |
      谷壁最高处的洞穴，深约十丈，内有地下泉水。阿芷将这里当作"冷库"，存放需要低温保存的药材。
      洞穴最深处有一具枯骨——据阿芷说，是三十年前一位避仇的剑客死在此处。枯骨身旁有一柄锈剑，剑身上刻着两个字："无悔"。

  常驻NPC:
    阿芷: 见独立条目《药奴阿芷详细设定》
    山民老周头: |
      六十七岁的采药人，每月来山谷一次，用山货到阿芷处换取伤药。
      他知道阿芷隐居在此，但不知道李德的来历。老周头耳聋眼花，但心地善良，偶尔会带些自家腌菜给阿芷。
      他是山谷与外界的唯一联系——若追捕者追踪到老周头，就能找到山谷。

  桃花事件·针尖上的呼吸:
    触发条件: |
      李德接受阿芷的治疗，进入七日施针阶段。
      每日申时，阿芷在中屋为李德施针，持续一个时辰。
    事件经过: |
      第一日到第三日，一切正常。阿芷专业、冷静、不说话。三十六根银针依次刺入李德周身大穴，每一针都精准无误。
      第四日，阿芷的状态明显疲惫——她前一天为了炼制一味辅药，通宵未眠。
      施针到一半时，她的手微微颤抖。在刺入"膻中穴"时，她身体前倾，脸颊离李德的胸膛只有三寸。
      她的呼吸拂过李德的锁骨。那不是故意的——是疲惫导致的身体失衡。
      李德没有动。不是因为心动，是因为任何移动都会导致银针错位。
      阿芷似乎也没有察觉到这个距离的尴尬。她继续施针，直到最后一根银针刺入"百会穴"。
      然后她坐在竹榻边缘，闭上眼睛，头微微偏向一侧——她睡着了。
      李德身上还插着三十六根银针，不能动。阿芷的头靠着竹榻的立柱，距离他的肩膀只有一拳之隔。
      阳光从窗纸透入，照在阿芷疲惫但平静的脸上。她的手指还搭在李德的手腕上，习惯性地感受着脉搏。
      这个画面持续了约一刻钟。直到阿芷惊醒，猛地坐直，面无表情地说："针留一盏茶时间。别动。"然后起身去药房，步伐比平时快了几分。
      第五日到第七日，阿芷恢复了专业态度，但她在施针时不再直视李德的——她会看着针，或者看着墙。
    李德的心理: |
      穿越者对阿芷没有男女之情。他在那一刻感受到的，是"同类的气息"——另一个被世界伤害过的人，在疲惫中露出的脆弱。
      原主的残留记忆让他想起贺婉清——但阿芷不是贺婉清。贺婉清的天真是需要被保护的；阿芷的脆弱是她自己选择的盔甲。
      李德在心中记录：阿芷的疲惫程度、她的信任阈值、以及她"假装不在意"的演技破绽。这些情报日后可能有用。
      但他也有一丝极其微弱的、连他自己都不愿承认的情绪：在这个偏僻的山谷里，在这个疲惫的女子身边，他感到了一种奇异的"安全"。不是物理上的安全，是"不需要表演"的安全。
    后续影响: |
      若李德在之后的某个时刻提及这件事（哪怕是间接的），阿芷会冷淡地否认："我那天太累了。不要多想。"
      但若李德在某次危机中保护阿芷（比如山民老周头带来追捕者的消息时，李德选择带阿芷一起逃离而非独自逃走），阿芷会在某个深夜主动说："那天……谢谢你没有动。"
      这不是表白。是两个破碎的人互相确认："你不是会趁人之危的人。这就够了。"

  关键事件:
    七日治疗: |
      第一至三日：阿芷施针压制阴阳冲突，每日一个时辰。李德感到体内寒热交替减轻。
      第四日：针尖呼吸事件发生，治疗继续。
      第五至七日：阿芷开始传授《玄阴素女心经》残篇。李德以太虚剑体的纯阳之气为引逆行修炼，痛苦异常但效果显著。
      第七日治疗结束时，李德的阴阳冲突被压制至"可忍受"水平，气血稳定在80/120，内力提升至30/80。
    枯骨锈剑: |
      若李德在修炼间隙探索后山洞穴，会发现那具枯骨与锈剑。
      锈剑上的"无悔"二字是那位剑客临终前以指力刻就。剑身无特殊，但李德以太虚剑体感知时，会发现剑身内部藏着一缕未散的剑意——那是剑客毕生的剑道感悟。
      吸收这缕剑意后，李德的剑法熟练度提升15点。但剑意中夹杂着剑客临终前的执念——"无悔"二字会在李德日后面临重大抉择时浮现，作为心魔的另一种形式。
    老周头的危机: |
      第七日治疗结束后，老周头来山谷换药时带来消息：落霞镇出现了六扇门的探子，在打听"一个苍白少年和一个采药女"的下落。
      李德必须决定：立刻离开山谷（放弃阿芷的后续治疗），还是带着阿芷一起转移。
      若选择独自离开，阿芷不会阻拦，但会冷冷地说："果然。"日后再次相遇时，阿芷的态度会极度冷淡。
      若选择带阿芷一起走，阿芷会愣住——她从未想过有人会"带上她"。她会拒绝一次，然后接受。这是两人关系从"交易"升级为"共生"的关键节点。

  GM引导原则:
    - 无名山谷的氛围应是"与世隔绝的静谧"——与铁胆庄的压抑、落霞镇的热闹截然不同
    - 阿芷的桃花事件必须是"无心的"——不能有任何刻意的暧昧，只有疲惫导致的意外亲近
    - 七日治疗是节奏缓慢的"喘息期"——让玩家从逃亡的紧张中暂时放松，但不要忘记危险仍在逼近
    - 枯骨锈剑是一个"武侠式浪漫"的细节——一位不知名的剑客死在山谷中，临终刻下"无悔"。这与李德未来的抉择形成对照
    - 老周头的消息是转折点——宁静结束，逃亡继续。玩家的选择将决定阿芷是否成为长期盟友
