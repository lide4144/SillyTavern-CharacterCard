---
铸剑山庄场景:
  概述: |
    铸剑山庄位于玄州边境的熔岩谷中，是天下第一铸剑圣地。山庄以火山地热为炉，终年热浪滚滚，铁锤敲打声昼夜不息。
    对李德而言，铸剑山庄是太虚真经"剑意篇"的所在之处——欧冶魂将剑意篇当作"铸剑图谱"收藏了四十年，却不知其真实价值。
    这里也是李德与欧冶子衿建立复杂友谊的地方，以及……被一名女铸剑师"盯上"的地方。

  地理位置:
    - 玄州熔岩谷，背靠活火山"赤霄峰"，前临玄铁河
    - 山庄占地约三百亩，以玄铁石砌成，耐高温但外观粗犷如堡垒
    - 谷中气温常年在三十度以上，夏季可达五十度。外人初入此地常因中暑而昏倒
    - 山庄外围有玄铁剑派弟子轮值守卫——铸剑山庄与玄铁剑派世代交好，互为臂膀

  建筑布局:
    铸剑大殿: |
      山庄核心，一座巨大的石质建筑，穹顶高十丈，中央是一座永不熄灭的熔炉。
      熔炉以火山岩浆为热源，温度可达千度，可熔化世间绝大多数金属。
      大殿四壁挂满了历代名剑的仿制品——真品皆已售出或赠予江湖名宿。
      欧冶魂常年在此打铁，即使身为庄主，他仍坚持每日亲自动手铸剑三个时辰。
    剑阁藏室: |
      山庄藏书与藏剑之处，共七层。前六层对外开放（需付费或有关系），藏有普通剑谱与成品剑器。
      第七层是禁地——欧冶魂的私人收藏室，只有他一人持有钥匙。剑意篇就藏在这里，被当作"太虚剑宗铸剑图谱"与一堆古旧图纸放在一起。
    子衿院: |
      欧冶子衿的居所，位于山庄东侧，相对独立。院内有一座小型铸剑炉、一间剑室、以及一间堆满古籍的书房。
      书房中有大量关于太虚剑宗的资料——欧冶子衿的"私藏"。
    弟子居所: |
      山庄共有铸剑弟子四十七人，男女混居（铸剑山庄不讲究这些）。居所是通铺大屋，冬热夏更热。
      女弟子中有一个人对李德产生了浓厚的兴趣——铁心兰。
    淬剑池: |
      山庄后山的一座天然温泉池，池水因富含矿物质而呈淡红色。铸剑弟子在铸剑后常来此淬炼剑身，也用来泡澡解乏。
      池边有巨石屏风，男女分时段使用——但铁心兰从不遵守这个规矩。

  常驻NPC:
    欧冶魂: |
      铸剑山庄庄主，六十岁，须发皆白但肌肉如铁。一生痴迷铸剑，不理江湖纷争。
      他对太虚剑宗的传说略有耳闻，但从未将"剑意篇"与太虚真经联系起来——在他眼里，那只是一套"失传的古铸剑图谱"。
      若有人告知他真相，他的第一反应不是愤怒或贪婪，而是"兴奋"——"原来我铸了四十年的剑，只是皮毛？"
    欧冶子衿: 见独立条目
    铁心兰: |
      二十五岁，铸剑山庄女弟子，身高近六尺，肌肉结实，肤色因常年受炉火炙烤而呈小麦色。
      她使一柄三十六斤的重锤，铸剑手法粗犷豪放，连欧冶魂都夸她"有老夫年轻时的气势"。
      但铁心兰有一个与外表截然相反的偏好：她喜欢"小白脸"。
      不是那种风流倜傥的公子哥，是那种"苍白、瘦弱、看起来一推就倒"的病弱美少年。
      她曾在一次下山采购时对一名书生动过心，但那书生被她"热情"的表白吓跑了。
      李德来到铸剑山庄时，铁心兰正在淬剑池边擦汗。她一眼就看到了那个站在山庄门口、面色苍白如纸、在热浪中摇摇欲坠的少年。
      "我的天……"她喃喃道，手中毛巾掉进了池里。

  桃花事件·火炉边的荷尔蒙:
    触发条件: |
      李德以"苏文"身份进入铸剑山庄求剑，因不适应高温而在山庄门口中暑（或假装中暑以获取同情）。
      或者，李德在山庄中活动时与铁心兰偶遇。
    事件经过: |
      铁心兰对李德的"追求"是直接、粗暴、毫不掩饰的。
      第一次相遇：李德站在山庄门口，热浪让他头晕目眩。铁心兰大步走来，二话不说将他拦腰抱起，扛在肩上走向弟子居所。
      "新来的？你这身板得先适应三天，不然会烤熟。"她的声音洪亮，震得李德耳膜发疼。
      李德被放在一张竹榻上，铁心兰端来一碗凉茶，然后坐在榻边，近距离盯着他看——不是审视，是"欣赏"。
      "你长得真好看。"她说，"像画里的人。就是太瘦了，我一拳能打飞你。"
      李德："……"
      此后数日，铁心兰开始了她的"追求攻势"：
      - 每日清晨送早餐（量极大，够三个壮汉吃）
      - 主动要求"教他用锤"（实则是手把手教学，过程中有意无意地肢体接触）
      - 在淬剑池"偶遇"李德（她故意等到李德的使用时段才出现，然后"大方"地说"一起泡吧，我不介意"）
      - 向其他女弟子宣示"主权"："这个小白脸是我的，你们别碰"
      李德的应对是关键：若直接拒绝，铁心兰不会生气，但会"失落"，然后继续她的攻势，只是变得更小心翼翼（反而更难对付）。
      若顺势接受她的"好意"，铁心兰会把李德当作"自己的人"来保护——任何想伤害李德的人（包括山庄内部想揭穿他身份的人）都会遭到她的铁锤。
      最理想的应对是"有限度的接受"：接受她的保护、利用她的好感获取情报（尤其是第七层藏室的布局与钥匙位置）、但始终保持情感距离。
    李德的心理: |
      穿越者对铁心兰的"类型"完全无感。但他迅速评估出了她的利用价值：
      ① 她是山庄弟子，知道第七层藏室的机关与钥匙存放位置
      ② 她在山庄中颇有威望，若与她交好，可获得庇护与掩护
      ③ 她的"单纯"意味着她不会出卖他——除非她发现被利用，但那时李德已拿到剑意篇远走高飞
      所以李德选择了一种"温柔的利用"：他会在她递茶时说谢谢、在她教他铸剑时认真学、在她靠近时不闪不躲——但也不主动回应。
      这种态度让铁心兰更加着迷。她习惯了"被怕"或"被敬"，第一次遇到一个"不怕她、不敬她、只是平静地存在"的人。
      "你到底在想什么？"她曾问李德。
      "在想一柄剑。"李德答——这是真的。他在想剑意篇。
    后续影响: |
      若李德利用铁心兰取得剑意篇后不辞而别，铁心兰会伤心，但不会恨他。她会在淬剑池边坐了一夜，然后对欧冶子衿说："那个小白脸……是个骗子。但我不后悔。"
      若李德在离开前对她坦诚（哪怕只是一句"对不起，我骗了你"），铁心兰会哭——不是软弱，是"终于被当作一个人看待"的释放。她会帮他拖延追兵，甚至在他日后被追捕时暗中相助。
      若李德选择带她一起离开（极不可能，但玩家可能这么选），铁心兰会成为他最可靠的护卫——一柄三十六斤重锤，足以挡住大多数追兵。

  关键事件:
    剑意篇获取: |
      通过欧冶子衿的交易或铁心兰的协助，李德进入剑阁藏室第七层。
      剑意篇不是文字，而是三百六十幅玄铁薄片——每一片上都刻着剑招轨迹，是太虚剑宗先祖以剑气直接镌刻。
      李德以太虚剑体触碰薄片时，能"感应"到其中剑意的流动。普通人看到的只是乱糟糟的划痕，他看到的是一套完整的剑道传承。
      但单独修炼剑意篇有极大风险：没有心法篇配合，剑意会反噬经脉。李德每次修炼后都需要阿芷的针法调和（或自己以玄阴素女心经勉强压制）。
    欧冶魂的考验: |
      若欧冶魂发现李德的真实身份，他不会立刻动手——他想看看这个"太虚剑宗后人"是否有资格接触剑意篇。
      考验内容：在铸剑大殿中，以普通铁锤打造一柄剑胚。欧冶魂不看成品，看"铸剑时的心"——他的手稳不稳、呼吸匀不匀、以及……眼中有没有"剑"。
      李德没有铸剑经验，但穿越者的逻辑思维让他理解了"铸剑即铸心"的道理。他以"心算"控制每一次锤击的角度与力度，最终打造出了一柄形状古怪但结构完美的剑胚。
      欧冶魂沉默良久，说："你不是铸剑师。但你懂剑。拿走你要的东西，然后……活得久一点。"
    火山异动: |
      李德离开铸剑山庄的那夜，赤霄峰发生了小规模喷发。岩浆流向山庄，弟子们紧急撤离。
      这不是偶然——是幽冥教的人在火山口动了手脚，试图趁乱截杀李德。
      铁心兰在撤离时发现李德不在人群中，她逆着人流冲向剑阁藏室——在第七层找到了正在取最后几片玄铁薄片的李德。
      "快走！"她扛起他就跑。身后，岩浆涌入大殿，将一切吞没。
      这是两人关系的最高点：在生死关头，她选择了他。而他……至少没有在她肩上挣扎。

  GM引导原则:
    - 铸剑山庄的氛围应是"热"——不只是温度，是情感的炽热。铁心兰的追求、欧冶魂的执着、以及炉火中锻造的金属，都是热的
    - 铁心兰的桃花事件必须写得"健康"——不是色情，是一个强壮女子对脆弱美少年的单纯迷恋。她的"粗暴"是天真，不是恶意
    - 欧冶魂的考验是"武侠式浪漫"——一柄剑胚定生死。李德不是靠技术赢的，是靠"理解"
    - 火山异动是节奏加速器——在温馨的山庄生活后，突然袭来的灾难提醒玩家：追杀从未停止
    - 铁心兰的眼泪（若有）应该是"壮汉柔情"式的——不哭则已，一哭惊人。她会一边抹眼泪一边说"我没哭，是烟迷了眼"
