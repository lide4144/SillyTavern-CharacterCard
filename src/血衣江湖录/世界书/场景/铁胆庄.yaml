---
新手村场景·铁胆庄:
  概述: |
    铁胆庄是李德被囚禁十五年的地方，也是整个故事的起点。这座庄园表面上是冀州武林盟主贺震霆的宅邸，实则暗藏杀机与秘密。
    庄内布局复杂，人物关系交织，每一处都可能藏着逃生的线索或致命的陷阱。

  地理位置:
    - 位于冀州黑石城郊外三里，背靠黑石山，面临漳水支流
    - 占地约五十亩，七进院落，三面临青砖高墙（高二丈，墙顶插碎瓷片），一面临水（漳水支流，宽五丈，深不可测）
    - 庄前是一条石板官道，通往黑石城；庄后有一条采药小径，蜿蜒入黑石山密林
    - 庄门悬匾"铁胆侠风"，是十年前冀州武林同道所赠

  建筑布局·七进院落:
    第一进·外院:
      门楼: |
        朱漆大门，两侧石狮子。白日有门房老张看守，夜间上闩。
        门房老张：六十岁老花匠兼门房，耳聋眼花，但记性极好——谁进出、何时进出，他都记得。
      马厩: |
        可容八匹马。现有贺震霆坐骑"乌云踏雪"、贺夫人上香马车（每月十五用）、以及两匹护院用马。
        马夫孙二是贺震霆心腹，嘴严，难以收买。
      门房: 老张的住处，兼作来访登记。

    第二进·宾客院:
      前厅: |
        贺震霆接待宾客之处，陈设气派：红木桌椅、刀枪架、墙上挂满"侠义"匾额。
        兵器架上有贺震霆年轻时用过的兵器，但真正的佩刀"断魂"从不离身。
      左右厢房: 客房，平日空置，武林大会或贺震霆寿辰时住人。
      茶房: 丫鬟冬梅负责煮茶。她知道很多宾客的八卦，嘴不严，可用糖糕收买。

    第三进·武院:
      练武场: |
        青石铺地，中央一座兵器架。每日卯时贺震霆在此练功，护院随之操练。
        场边有石锁、沙袋、木人桩。李德曾被押至此"观摩"贺震霆练功——实为威慑。
      兵器库: |
        上锁，钥匙在贺震霆与护院首领赵三手中。
        内有普通刀枪剑戟，以及三箱贺震霆私藏的幽冥教制式暗器（飞刀、毒蒺藜）。
      护院房: 十二名护院的集体宿舍，通铺。赵三独居一间小耳房。

    第四进·正院:
      正厅: |
        贺震霆起居与处理庄务之处。太师椅、紫檀书案、墙上"铁掌震河朔"锦旗。
        书案抽屉中有庄内账目、往来书信（明面上的）。
      书房: |
        贺震霆禁地，从不许妻女进入。门上挂着"闲人免进"木牌，实则内有机关。
        机关：门槛下第三块青砖踩错会触发暗弩——贺震霆自己进出时走固定路线。
        暗格：书架第三层《论语》后是一处暗格，藏有：幽冥教护法令牌、《移花接玉》邪术秘籍、伪造路引、以及部分与幽冥教的密信。
        密室：书案下有一块可活动的地砖，通往地下密室——贺震霆私刑拷问李德之处，也是藏有最深秘密的地方。
      卧房: 贺震霆独寝之所，与贺夫人分房已多年。

    第五进·内院:
      贺夫人闺房: |
        素雅干净，设有小佛堂。佛像后是藏药之处（回春丹、金创药、安神散）。
        床底有一个檀木箱，装着贺夫人未出阁时的旧物——以及一张后山采药小径的草图。
      贺婉清闺房: |
        少女气息浓重：绣花绷子、诗集、胭脂盒、以及一个上锁的木盒（内装她偷偷画的李德画像）。
        窗正对后园药圃，是她每日发呆之处。
        床榻下藏有一个小包袱——是她无数次想"带德哥哥逃走"时准备的干粮与衣物，但从未付诸行动。
      小厨房: 专供内院主仆，丫鬟秋菊负责。可在此偷取食物与火种。

    第六进·杂院:
      柴房: |
        李德的囚牢。四壁土墙，一扇木门（外锁），屋顶有天窗（太小无法通过，但可通风透光）。
        地面铺稻草，角落有一个便桶。冬冷夏热，潮湿阴暗。
        但李德住了十五年，对每一寸地面、每一道裂缝都了如指掌。
        西侧墙壁有一道隐蔽裂缝——孩童时李德曾试着挖过，但只够伸进一只手臂。
        后山采药小径的入口就在柴房后方三丈外的杂草丛中。
      厨房: |
        大灶、水缸、米缸、腌菜坛子。厨子周胖子和刘瘸子负责。
        周胖子贪杯，夜间常偷喝酒后打盹。刘瘸子嘴碎，喜欢抱怨贺震霆抠门。
        米缸后方有一条通往庄外的运菜暗道——正道路线中贺婉清透露的情报来源。
      下人房: 春桃、夏荷、秋菊、冬梅四人合住。春桃是贺婉清的贴身丫鬟，对小姐忠心耿耿。
      茅房与澡房: 位于最角落。

    第七进·后园:
      药圃: |
        贺夫人种的药草：当归、黄芪、枸杞、金银花等。边缘有几株罕见的"七叶一枝花"（解毒圣药）。
        花匠老李头每日打理，耳聋，但眼力极好。
      假山: |
        太湖石堆砌，中空。内有通往地下酒窖的阶梯——酒窖也是贺震霆偶尔藏人的过渡之处。
      竹林: |
        一小片紫竹林，风吹竹叶沙沙作响。贺婉清常在此读书，也是她与李德"偶遇"的地方（童年时李德被允许在园内活动时）。
      后山小径入口: |
        被杂草掩盖，通向黑石山。贺夫人上香时偶尔走此路采药。
        小径狭窄，仅容一人，中途有一处断崖需攀藤而过——贺夫人的草图标出了安全路线。

  地下空间:
    酒窖: |
      位于假山下方，存放庄中陈酿。贺震霆偶尔将"审问对象"暂囚于此。
      有一条与私刑室相连的暗道（贺震霆运送囚犯的路线）。
    私刑室: |
      位于正院书房下方，是贺震霆拷问李德的地方。
      四壁无窗，仅以火把照明。墙上挂着各种刑具：铁链、皮鞭、竹签、夹棍。
      地面有暗沟排水——是为了冲洗血迹。
      角落有一个铁箱，装着贺震霆最隐秘的文件：与幽冥教全部的往来密信、灭门当晚的详细记录、以及幽冥教内部对贺震霆的"不信任调查记录"。
      进入方式：书房书案下的活动地砖，或酒窖暗道。

  庄内人员配置:
    贺震霆: 庄主，见独立条目
    贺夫人: 庄主夫人，见独立条目
    贺婉清: 庄主独女，见独立条目
    李德: 囚徒/养子，见独立条目
    护院首领·赵三: |
      三十五岁，使一柄朴刀，武功平平但忠心耿耿。早年受过贺震霆恩惠，对庄主唯命是从。
      但对李德有微妙的同情——他曾有一个弟弟，幼年夭折，李德的瘦弱让他想起弟弟。
      可被原主的温和感化（正道路线），但不会被收买（邪道路线中贺夫人提供的是钥匙蜡模而非策反赵三）。
    护院·其余十一人: |
      多为黑石城本地泼皮出身，武功不入流，胜在人多。
      夜间巡逻两人一组，每两个时辰换班。巡逻路线固定：外院→武院→正院→杂院→后园。
      他们最怕贺震霆，其次怕赵三，对李德则是"庄主不让靠近那小子"的态度。
    丫鬟·春桃: 贺婉清贴身丫鬟，十六岁，嘴甜机灵，对小姐忠心。知道贺婉清对李德的情愫，但守口如瓶。
    丫鬟·夏荷: 负责贺夫人起居，十八岁，沉默寡言，但眼神锐利——她其实对庄中异常有所察觉。
    丫鬟·秋菊: 内院小厨房，十七岁，贪吃，可用美食收买。
    丫鬟·冬梅: 前厅茶房，十五岁，嘴碎，八卦之王。
    厨子·周胖子: 大厨房，四十岁，贪杯，夜间值班时常打盹。
    厨子·刘瘸子: 大厨房，五十岁，左腿有旧伤，嘴碎爱抱怨。
    马夫·孙二: 四十岁，贺震霆心腹，沉默寡言，难以接近。
    花匠·老李头: 六十五岁，耳聋眼花，但记忆力惊人——尤其对植物。
    门房·老张: 六十岁，耳聋眼花，但谁进出庄门他都记得。

  各人物作息时间表:
    卯时(5-7): |
      贺震霆起床练功（练武场）
      护院巡逻开始
      贺婉清起床梳洗
      贺夫人佛堂念经
      李德：仍在柴房中（若前一晚未被提审）
    辰时(7-9): |
      贺震霆用早膳，处理庄务（正厅）
      贺夫人处理内务
      贺婉清偶尔去母亲房中请安
      下人开始一日劳作
    巳时(9-11): |
      贺婉清在闺房绣花或去后园
      贺震霆接待宾客或外出
      周胖子和刘瘸子准备午膳
    午时(11-13): |
      全庄用午膳
      贺夫人常独自在房中用
      护院换班，午休
    未时(13-15): |
      贺婉清午睡
      贺震霆闭关或外出
      李德若运气好，会有贺婉清或贺夫人送来额外的食物
    申时(15-17): |
      贺婉清常去厨房吩咐给李德做软食
      贺震霆若在庄中，常在书房
      冬梅在前厅煮茶待客
    酉时(17-19): |
      全庄用晚膳
      贺婉清与母亲同食
      贺震霆偶尔与妻女同桌（气氛冷淡）
    戌时(19-21): |
      贺婉清在房中刺绣或读诗
      贺夫人偶尔去女儿房中闲聊
      贺震霆若在庄中，常在书房密室
      护院夜间巡逻开始（两人一组）
    亥时(21-23): |
      贺婉清就寝（但常辗转难眠）
      贺夫人就寝
      贺震霆若在庄中，可能在书房或私刑室
      李德：柴房中，等待或休息
    子时(23-1): |
      全庄最安静的时刻。贺震霆若"审问"李德，通常在此时。
      贺婉清常偷偷去柴房附近徘徊（不敢靠近，只在远处望）。
      周胖子若值夜班，常在厨房打盹。
      赵三若在庄中，会亲自巡逻一趟。
    丑时(1-3): |
      万籁俱寂。最适合作案或潜行的时刻。
    寅时(3-5): |
      天色将明未明。护院最后一次换班前最疲惫的时刻。

  可探索区域与隐藏要素:
    柴房裂缝: |
      西侧墙壁有一道隐蔽裂缝，孩童时李德挖的。如今只够伸进一只手臂，但若使用工具（如柴刀）扩大，可容瘦小的人侧身通过。
      通过后是庄墙与柴房之间的夹道，可绕至后园药圃。
    书房暗格: |
      书架第三层《论语》后。需先避开门槛机关（走门槛左侧第三块砖），再找到暗格机关（《论语》书脊上的凸起）。
      内有：幽冥教护法令牌、《移花接玉》秘籍、伪造路引、密信。
    书房密室入口: |
      书案下活动地砖。需贺震霆的特定手法（左三右一）开启，或从酒窖暗道进入。
      酒窖暗道入口在假山中空处，需移开一块松动的太湖石。
    贺夫人床底檀木箱: |
      内有后山采药小径草图。箱子未上锁，但贺夫人对床底很敏感——进入她房间偷取需极高潜行技巧。
    贺婉清床底包袱: |
      干粮、旧衣物、以及一把生锈的小剪刀（她小时候用来剪线的）。
      包袱藏在床板下的暗格中，只有她知道机关。
    厨房运菜暗道: |
      米缸后方，一块可移动的木板。通往庄外菜地，是厨房每日运菜的通道。
      暗道狭窄低矮，需弯腰前行约二十丈。出口被菜棚遮挡。
    药圃七叶一枝花: |
      共三株，可解百毒。花匠老李头知道价值，但贺震霆不当回事。
      偷取后可在逃亡中抵御追兵的毒箭。
    马厩乌云踏雪: |
      贺震霆的宝马，通人性。一般人无法驾驭，但贺婉清可以——她小时候常偷偷喂它糖。

  人物交集网络:
    贺震霆→李德: 囚徒与施暴者，灭门仇人
    贺震霆→贺夫人: 表面夫妻，实则冷淡疏远
    贺震霆→贺婉清: 父亲与女儿，他爱她但更爱自己的"大侠"人设
    贺夫人→李德: 移情式母爱，暗中保护
    贺夫人→贺婉清: 真实而深厚的母女情
    贺婉清→李德: 青梅竹马的爱慕，从小到大
    贺婉清→贺震霆: 敬爱但逐渐发现父亲的阴暗面
    赵三→李德: 微妙同情，但忠于贺震霆
    春桃→贺婉清: 忠心丫鬟，知道小姐的秘密
    夏荷→贺夫人: 敏锐察觉到庄中异常
    周胖子→所有人: 贪杯嘴不严，但知道的不多
    冬梅→所有人: 八卦传播者，信息交换节点

  GM引导原则:
    - 铁胆庄应有一种"表面平静、暗流涌动"的氛围。白日里它是武林圣地，夜晚它是囚笼
    - 每个NPC都有自己的日程，玩家若在某处等待，应能看到符合时间的人物活动
    - 潜行与探索需考虑时间因素：子时最安全但也最黑暗；午时人多但混乱可做掩护
    - 贺震霆的"审问"周期是每隔三个月一次，持续三日。开局时距离下一次审问还有三日——这是给玩家的倒计时压力
    - 贺婉清的夜间徘徊是一个"随机事件"：她可能出现在柴房附近、后园竹林、或厨房——取决于她当日的心情
    - 贺夫人的上香马车每月十五可用，但玩家需提前布局（如在前一天让贺夫人"心软"答应带他出庄）
    - 庄内所有的"秘密"都应通过合理的探索或人际交往获得，不可凭空给予
