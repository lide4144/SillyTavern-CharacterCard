---
洛京黑市场景:
  概述: |
    洛京是大雍皇城，天子脚下，六扇门总衙所在。白日的洛京是秩序与威严的象征；但子夜时分，当更夫敲过三更鼓，洛京地下会升起另一座城市——黑市。
    黑市没有固定地点，每日子时在不同街巷间"流动"：今夜在城南废仓，明夜在城北枯井，后夜可能在某个权贵的地窖。
    只有持有"黑市令"（一种刻有鬼脸图案的铜牌）的人才能进入。千面佛是黑市的规则制定者之一，他的茶楼"忘川"是黑市中最稳定的交易点。
    对李德而言，洛京黑市是危险的乐园——这里有他急需的情报、有追捕他的六扇门、以及一个永远戴着笑脸面具的胖子。

  地理位置:
    - 洛京城地下及边缘区域，具体位置每日变化
    - 入口通常伪装成普通民宅、废弃寺庙、或权贵府邸的后门
    - 持有黑市令者会在子时收到当日入口位置的暗语（如烟缕形状、更夫敲鼓节奏等）
    - 黑市内部以灯笼照明，灯笼上绘着不同的标记，代表不同的交易区域

  建筑布局:
    忘川茶楼: |
      千面佛的据点，黑市中唯一"固定"的建筑——它是一辆巨大的、由十六匹黑马拉动的移动车厢，每夜在不同的地点停下。
      车厢分为三层：一层是大堂，供普通交易者饮茶等候；二层是雅间，需千面佛亲自邀请才能进入；三层是千面佛的私人空间，从未有人进入过。
      车厢内壁挂满了各式各样的面具——据说每一张面具都代表一个被千面佛"评估"过的客户。
    鬼面巷: |
      黑市中的"杂货区"，可买到赃物、禁药、假文书、以及来路不明的武功秘籍。
      摊位以布帘隔开，摊主皆戴鬼面，不问来路。
      价格以"黑市银票"结算——一种只能在黑市中流通的纸质货币。
    血荷池: |
      黑市中的"角斗区"，两个戴面具的人在池中厮杀，围观者下注。
      池底铺满红色荷花灯，血水流入灯中，将荷花染成暗红——"血荷"之名由此而来。
      千面佛禁止在黑市中动手杀人，但血荷池是唯一的例外——这里可以合法地杀人。
    哑琴阁: |
      黑市中的"风月区"，但不是普通青楼。这里的女子皆是"卖艺不卖身"的伶人——至少表面上如此。
      她们以琴棋书画侍客，实则每个人都是千面佛的"耳朵"，专门从醉客口中套取情报。
      阁中最有名的伶人名曰"玉箫娘"。

  常驻NPC:
    千面佛: 见独立条目
    玉箫娘: |
      哑琴阁头牌，年约双十，容貌清丽脱俗，擅吹箫、擅抚琴、更擅"听"。
      她是千面佛最得力的情报收集者之一，曾在三年间从醉客口中套取情报三百余条，无一失手。
      但她有一个"职业病"：她对"病弱的美人"有病态的兴趣。不是爱慕，是"收集"——她喜欢把脆弱而美丽的东西捧在手心，然后看着它们破碎。
      李德进入哑琴阁的那一刻，她就注意到了他——苍白如纸的面容、瘦削的身形、以及那双冷静得不像活人的眼睛。
      "这个客人……"她低声对丫鬟说，"我要亲自招待。"
    血荷池主事·鬼面刀: |
      血荷池的裁判与主事，从不说话，以手势判胜负生死。据说他曾是六扇门的刽子手，因杀太多人而哑了。

  桃花事件·玉箫娘的碎玉之诱:
    触发条件: |
      李德进入哑琴阁（可能是为了收集情报、躲避追捕、或被千面佛邀请）。
      玉箫娘主动要求"亲自招待这位客人"。
    事件经过: |
      玉箫娘将李德引入一间名为"碎玉斋"的雅室。房间以白玉装饰，灯火柔和，空气中飘着龙涎香与某种淡淡的迷药——剂量极轻，不足以让人昏迷，但足以让人放松警惕。
      "公子气色不好。"玉箫娘微笑着说，手指"不经意"地搭上李德的手腕——她在搭脉，评估他的身体状况。
      李德没有缩手。他知道这是试探，缩手反而显得心虚。
      "姑娘好医术。"他说。
      玉箫娘笑得更深了。她取出一支玉箫，吹奏了一曲《折杨柳》。箫声哀怨婉转，配合迷药的效用，足以让普通人心神恍惚、倾诉衷肠。
      但李德是穿越者。现代心理学知识让他识别出了迷药的存在，心理韧性让他免疫了箫声的情绪诱导。
      他安静地听完，然后问："姑娘的箫吹得好。但这曲中……似乎少了点什么。"
      "哦？"玉箫娘挑眉。
      "少了真心。"李德说，"姑娘吹的是技艺，不是情感。技巧再高，没有情感的音乐只是噪音。"
      这句话让玉箫娘愣住了。三年来，没有人对她说过这样的话。所有人都夸她"技艺高超"，没有人注意到她其实"不会动情"。
      她的反应有两种可能：
      ① 被激怒：认为李德在侮辱她，将他的情报出卖给六扇门。
      ② 被触动：第一次有人看穿她的伪装。她决定"留下"这个客人——不是作为情报目标，是作为"值得观察的标本"。
      无论哪种反应，玉箫娘都会在接下来的相处中增加"真实"的暧昧：她会真的为他倒酒、真的为他抚琴、真的在他离开时站在门口望着他的背影。
      但这些"真实"中有几分是表演、有几分是真心，连她自己都分不清。
    李德的心理: |
      穿越者对玉箫娘的"表演"洞若观火。他识别出了迷药、识别了情绪诱导、识别了她"收集脆弱之物"的病态心理。
      但他也意识到：玉箫娘是千面佛的"耳朵"，若能让她"闭上耳朵"甚至"反水"，对他在黑市中的活动极有帮助。
      所以他选择了一种危险的游戏：不完全拒绝她的亲近，但也不完全接受。他让她觉得"这个人我看不透、得不到、但值得继续看"。
      这种若即若离让玉箫娘越来越着迷——她习惯了掌控猎物，第一次遇到不受控的猎物。
    后续影响: |
      若玉箫娘被"触动"，她会在日后多次帮助李德：提前通报六扇门的搜捕、在黑市中为他安排安全的藏身之处、甚至在他被白骨夫人的千魂噬心瘴所困时，以箫声唤醒他的神智。
      但她不会成为"爱人"。她会在某个时刻清醒过来，意识到自己差点真的动了心，然后选择离开——或者选择把这份"差点动心"当作最后的筹码，与李德做一笔交易。
      若玉箫娘被"激怒"，李德在黑市中的处境会变得极其危险。千面佛不会直接出卖他，但玉箫娘会以其他方式让他付出代价。

  关键事件:
    千面佛的交易: |
      在忘川茶楼二层，千面佛与李德进行首次正式交易。
      千面佛对幽冥教密信的内容极为满意，给出了三条情报作为回报：
      ① 莫问天被关在洛京天牢第九层，每月十五清虚道长会去"探望"
      ② 铸剑山庄的"铸剑图谱"实则是太虚剑意篇，欧冶魂不知其真意
      ③ 铁无情已离京南下，预计七日后抵达冀州
      千面佛还"附赠"了一条情报："段九幽……没死。三十年前是诈死。"
      这条附赠情报让李德心中剧震——灭门惨案的幕后主使还活着。
    天牢第九层线索: |
      千面佛提供了天牢第九层的详细布局图、守卫换班时间、以及清虚道长的行踪规律。
      但进入天牢需要"引路人"——一个能在六扇门内部打开通道的人。
      千面佛暗示：六扇门内部有人愿意"帮忙"，代价是"将来还一个人情"。这个人是谁，千面佛不说。
      （伏笔：这个人可能是沈砚秋在六扇门中的眼线，也可能是铁无情手下对铁无情不满的捕快。）
    血荷池的意外: |
      若李德在黑市中暴露了行踪（比如被某个认出断魂刀的江湖人指认），他可能被迫进入血荷池"角斗"以换取千面佛的庇护。
      血荷池的规则：连胜三场，千面佛保你一夜平安；连胜五场，千面佛保你离开洛京。
      李德的对手可能是：一名六扇门的弃捕（战力50）、一名幽冥教的外围弟子（战力45）、以及一名想拿赏金的江湖散人（战力60）。
      这是李德第一次在公开场合展示自己的实力，也是他在黑市中"立威"的机会。

  GM引导原则:
    - 洛京黑市的氛围应是"秩序的反面"——这里有序，但序是千面佛定的；这里有规则，但规则只为利益服务
    - 玉箫娘的桃花事件应突出"危险的美感"——她不是来爱李德的，是来"收集"他的。李德的危险在于，他可能真的会成为一个破碎的藏品
    - 千面佛的对话应像下棋——每一步都在试探，每一句都在埋雷。他不会直接说"段九幽活着"，他会说"三十年前的那场葬礼……我恰好知道一些内情"
    - 血荷池的角斗应写得干净利落——不是炫耀武力，是生存 necessity
    - 黑市是李德在完美线中最重要的"情报枢纽"。每次回到黑市，都应该有新的情报、新的交易、以及新的危险
