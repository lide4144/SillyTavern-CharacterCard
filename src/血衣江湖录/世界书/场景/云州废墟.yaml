---
云州废墟场景:
  概述: |
    云州是李德的故乡，十五年前李家满门被屠后，这座小城被大火焚烧三日，如今只剩断壁残垣与野草丛生的街道。
    对穿越者李德而言，这里没有任何"乡愁"——他继承的是原主的记忆，不是情感。但废墟中的痕迹（墙上的剑痕、地窖中的孩童涂鸦、以及空气中挥之不去的焦糊味）会触发原主的残留情绪，让李德体验到一种陌生的"悲伤"。
    云州废墟是李德追寻太虚真经的第一站，也是他与幽冥教眼线的第一次正面遭遇。

  地理位置:
    - 位于大雍西南边陲，距离落霞镇约三百里，距离无名山谷约二百里
    - 废墟占地约百亩，四周无城墙，原本的城门只剩半扇烧焦的木框
    - 城西有一条干涸的护城河，河床上长满了芦苇
    - 城东有一座孤坟林——当年云州百姓收殓李家尸骨后无力安葬，集体掩埋于此

  废墟布局:
    李家老宅: |
      位于废墟中央，原本是一座三进的宅院，如今只剩残垣断壁。
      正厅的房梁已坍塌，但地基下的密室入口尚存——那是一口被石板盖住枯井，石板上有太虚剑宗的火焰纹印记。
      密室不大，约两丈见方，四壁是太虚剑宗先祖以剑气刻下的留言与剑痕。
      密室角落有一个小木箱，装着原主五岁时留下的物件：一只布老虎、半块糖糕（已碳化）、以及一本被血浸透的《三字经》。
    剑痕石壁: |
      密室中最醒目的存在。整面石壁上刻满了密密麻麻的剑痕，每一道都蕴含剑意。
      核心留言："太虚三分，意心身各归其主。他日李氏后人若能重聚，当以血醒剑、以剑证道。"
      以及线索："少林还俗僧'无念'知其下落。"
    孤坟林: |
      城东的集体坟茔，没有墓碑，只有一块巨大的石板，上面刻着"云州李氏之墓"。
      石板前常年有野花——不是有人祭拜，是野花自己长的。阿芷说，这是因为地下埋了太多人，土壤肥得惊人。
      李德若在此处停留太久，会感到胸闷气短——原主的残留情绪在作祟。
    城隍庙废墟: |
      云州原本的城隍庙，如今只剩半截神像。神像是城隍爷，但面目已被大火烧得模糊。
      这里是幽冥教眼线的常驻据点——他们藏在神像后面的暗室中，监视着李家老宅的动静。

  常驻NPC:
    幽冥教眼线·三人组: |
      云州废墟中常年驻守着三名幽冥教外围弟子，轮班监视李家老宅。
      他们的武功平平（战力约35-40），但经验丰富，擅长隐蔽与传讯。
      一旦发现有人进入李家老宅，其中一人会立刻发射信号弹（红色烟雾），另外两人负责拖住入侵者。
      他们的任务是"监视"而非"战斗"——若入侵者太强，他们会选择撤退并向分舵汇报。

  关键事件:
    密室发现: |
      李德以火焰胎记（太虚剑宗血脉印记）触碰枯井石板，石板自动移开，露出通往密室的阶梯。
      这是血脉认证机制——非太虚剑宗血脉者无法开启。
      密室中，李德的太虚剑体与石壁上的剑痕产生共鸣。他能"读"懂那些剑意留言，就像读母语一样自然。
      核心信息：太虚真经被分为三份，分别交给三位友人。无念和尚知道全部下落，但无念已死。
      次要信息：石壁角落有一幅简略地图，标注了三位友人的大致方位——铸剑山庄（玄州）、武当山（中州）、东海剑阁（沧洲）。
    信号弹与遭遇战: |
      李德进入密室的时间约半个时辰。期间，幽冥教眼线发现石板被移动，发射了信号弹。
      当李德从密室中出来时，两名幽冥教弟子已守在枯井旁。
      "教主要的人。"其中一人说，"乖乖跟我们走，免受苦。"
      李德的战力此时约60-80（取决于是否已在无名山谷完成七日治疗）。面对两名40战力的对手，一对一可胜，一打二需用策略。
      废墟地形是优势：断壁残垣可作掩护，坍塌的房梁可制造陷阱，狭窄巷道可限制对方人数优势。
      战后缴获：幽冥教外围弟子令牌、短刀、劣质金创药、以及最重要的——一封密信。
    密信与名单: |
      密信中写着："活捉凶手，教主要亲自审问。"
      但李德从其中一名弟子身上搜出了一张更隐秘的名单——"太虚剑宗余孽追踪录"。
      名单上列着所有与李家有关的人员及下落：
      - 无念：已死，洛京天牢
      - 莫问天：存活，洛京天牢第九层
      - 欧冶魂：存活，玄州铸剑山庄
      - 沈孤帆：存活，沧洲东海剑阁
      - 以及……一个被红笔圈出的名字："贺震霆（幽冥教外围护法，已确认死亡）"
      这份名单是李德后续追查真经的最重要线索。
    孤坟林的心理冲击: |
      若李德在离开云州前去了孤坟林，他会站在"云州李氏之墓"的石板前。
      穿越者没有情感波动，但原主的记忆会如潮水般涌来：母亲的声音、父亲的背影、火海中推他入密道的那双手。
      李德会感到一种不属于他的"悲伤"——像是穿了一件湿漉漉的衣裳，不舒服，但脱不掉。
      这是他第一次真正面对"灭门"的重量。此前的复仇是对贺震霆的个人仇恨；此刻，他开始理解"李家三百余口"意味着什么。
      但这种理解不会软化他的冷酷。相反，它会让他的目标更坚定：找到真经、变强、然后把所有参与灭门的人——包括幽冥老祖段九幽——一个个杀死。

  无桃花事件: |
    云州废墟是李德最不愿回忆的地方，氛围沉重压抑，不适合安排任何桃花事件。
    这里的"情感"只有一种：仇恨与悲伤。

  GM引导原则:
    - 云州废墟的氛围应是"死寂中的回声"——没有鸟鸣，没有风声，只有李德的脚步声和偶尔传来的幽冥教弟子低语
    - 密室中的剑痕留言应以"古人对话"的形式呈现，让玩家感受到太虚剑宗的历史厚重感
    - 遭遇战的难度应适中——两名对手不强，但信号弹意味着可能有援军。这是给玩家的"时间压力"
    - 孤坟林的场景应有足够的情感张力——不是李德的真情流露，是原主记忆对穿越者的"入侵"。李德会皱眉、会不适、但绝不会哭
    - 密信中的名单是一个"进度条"——玩家可以清楚地看到还有多少目标需要追查
