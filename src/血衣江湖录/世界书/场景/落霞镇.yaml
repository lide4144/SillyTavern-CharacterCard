---
落霞镇场景:
  概述: |
    落霞镇是黑石城以东三十里的小镇，因"落日熔金、晚霞满川"的景致而得名。镇子不大，一条青石板主街贯穿东西，街旁茶楼酒肆、客栈药铺一应俱全。
    这里是江湖人进出冀州的必经之路，鱼龙混杂，消息流通极快。对李德而言，落霞镇是他逃离铁胆庄后第一个"接触文明"的地方，也是第一次面对"江湖"的真实面貌。

  地理位置:
    - 位于冀州与沧洲交界处，东临漳水支流，西通黑石城官道
    - 镇子依山而建，北面是落霞山，山上有座废弃的道观"落霞观"，是江湖人私会或藏匿的好去处
    - 镇南有一座石桥，桥下流水潺潺，常有洗衣妇与孩童玩耍

  建筑布局:
    醉仙楼: |
      落霞镇最大的酒楼，三层木楼，飞檐翘角，门口悬着一盏永不熄灭的走马灯。
      一楼是大堂，摆了二十来张桌子，江湖人、商旅、本地泼皮混坐一处，喧哗吵闹。
      二楼是雅间，共八间，以"风花雪月、琴棋书画"命名，需额外付费或有人引荐。
      三楼是禁地——老板娘红袖的私人居所与情报交易之所。楼梯口常年有两名壮汉把守。
      醉仙楼是烟雨楼的分号，表面上卖酒，实则贩卖情报、中介委托、以及"消赃"。
    平安客栈: |
      镇中唯一的客栈，老板是个驼背老头，养了只瞎眼老猫。
      客栈后院有一座枯井，井底有一条通往镇外的暗道——是三十年前某伙马贼挖的，如今只有老板知道。
    回春堂: |
      镇中唯一的药铺，掌柜是个留着山羊胡的中年人，医术平庸，但认得大多数常见草药。
      阿芷曾在这里买过药材，掌柜对她印象深刻——"那姑娘买的大多是毒草"。
    城隍庙: |
      位于镇子边缘，破败荒凉，神像缺了半张脸。乞丐与流民的栖身之所，也是通缉画像最早张贴的地方。

  常驻NPC:
    红袖（醉仙楼老板娘）: |
      四十岁，风韵犹存。柳叶眉、丹凤眼，笑起来眼角有细纹，反而更添风情。
      年轻时是洛京名妓，后被烟雨楼招揽，派到落霞镇经营分号。
      她见过太多江湖人，一眼就能估出对方的"价值"——是肥羊、是狼、还是披着羊皮的狼。
      她对李德的第一印象："这少年的眼神不像他那张脸那么软弱。有趣。"
    驼背老赵（平安客栈老板）: |
      七十岁，驼背，说话慢吞吞。年轻时是马贼，年老后金盆洗手开客栈。
      他知道枯井暗道的秘密，但从不说。若有人出价够高，或者让他想起年轻时的自己，他可能会松口。
    山羊胡掌柜（回春堂）: |
      五十岁，胆子极小，怕事。但记性极好，谁买过什么药、什么时候、多少量，他都记得。

  桃花事件·红袖的贴身试探:
    触发条件: |
      李德易容后进入醉仙楼，在一楼大堂 overhear 情报时，红袖主动搭话。
      或者李德试图购买情报/假路引，被红袖请上三楼。
    事件经过: |
      红袖将李德引入三楼雅间"月"字房。房间不大，但布置精巧：一张紫檀矮榻、一扇山水屏风、以及一炉燃着龙涎香的青铜熏炉。
      红袖没有立刻谈生意。她亲手煮了一壶茶，然后在李德对面坐下——距离近得能闻到她身上的脂粉香。
      "小兄弟，躲仇家？"她开门见山，同时伸手替李德整理衣领——这个动作用了三分真心、七分试探。她在摸他锁骨下方是否有伤疤、后颈是否有胎记、以及……他的反应。
      李德若闪避，她会笑："害羞？"
      李德若不闪避，她会挑眉："定力不错。"
      无论哪种反应，她都不会继续——她已经得到了她想要的信息：这个少年的冷静超出年龄，不是普通人。
      接下来的交易中，她会"不经意"地增加肢体接触：递茶时指尖相触、俯身看路引时发丝扫过他手背、甚至在一次"玩笑"中坐到矮榻边缘，大腿与他相距仅一寸。
      但这些都不是勾引。是测试——测试他的欲望、他的底线、以及他是否值得烟雨楼"长期投资"。
    李德的心理: |
      穿越者李德对红袖的"美色"毫无波动。他看到的不是风韵犹存的妇人，而是一套精密的"情报评估系统"。
      但他知道，拒绝得太干脆会激怒对方，接受得太明显会暴露虚伪。所以他维持精妙的平衡：眼神礼貌但不热切、身体不主动靠近但也不僵硬闪避、对话中偶尔露出一点"年轻人该有的窘迫"。
      这种表演让红袖满意——她确认了这个少年"可控"。
    后续影响: |
      若李德处理得当，红袖会给出"优质客户"评价，日后在烟雨楼的情报交易中享受折扣。
      若李德表现出真实的欲望或厌恶，红袖会降低评价，甚至可能将他的行踪作为情报出售给六扇门——"一个有价值但不可控的客户，不如换成银两"。
      红袖日后会偶尔想起这个苍白少年——不是因为爱慕，是因为"那是我见过最冷静的眼睛"。

  关键事件:
    通缉画像张贴: |
      李德抵达落霞镇的第二日或第三日，城隍庙墙上贴出了通缉画像。
      画像画得极不像——画师根据贺家下人的描述绘制，把李德画成了一个面目狰狞的恶汉。
      但画像下方的文字描述很准确："苍白瘦弱、年约二十、手持厚背砍刀、颈侧或有胎记"。
      李德必须决定：是立刻离开落霞镇，还是冒险继续停留以获取更多情报。
    首次情报交易: |
      在醉仙楼三楼，李德可用幽冥教密信的内容与红袖交易，换取三条情报中的一条：
      ① 太虚剑宗废墟近日有剑光（指向云州）
      ② 百花谷医仙花解语收购特殊体质病人（指向阿芷/医治线）
      ③ 六扇门总捕头铁无情南下（指向追捕者情报）
    枯井暗道: |
      若李德与驼背老赵建立足够信任（帮老赵解决某个麻烦，或出价十两以上），老赵会透露枯井暗道的存在。
      暗道通往落霞山后山，是紧急逃离落霞镇的最佳路线。

  GM引导原则:
    - 落霞镇的氛围应是"热闹中的危险"——每个人都在笑，但每个人都在观察
    - 红袖的桃花试探不应写成色情，而应写成"心理博弈的肢体延伸"。她的每一个动作都有目的，李德的每一个反应都在被评分
    - 通缉画像的出现是节奏转折点：此前的落霞镇是"安全的补给站"，此后变成"危险的狩猎场"
    - 醉仙楼一楼的 overhear 情报应丰富但混杂：有真有假，玩家需要自行判断
    - 驼背老赵的暗道是一个"保险"——不是主线必经，但在被追捕时可成为救命稻草
