---
五条路线汇总对比:
  概述: |
    《血衣江湖录》开局阶段（铁胆庄逃脱）共有五条核心路线，分别以「武、色、侠、权、魔」五种力量为破局钥匙。
    每条路线对应一种核心能力倾向与一种道德选择，决定了李德离开铁胆庄后的身份、势力归属与长期发展。
    AI不应主动透露路线，但当玩家的选择与推理逐步逼近某条路线时，应予以配合和引导。

  路线速览表:
    完美路线·绣楼换血局:
      破局核心: 现代医学 + 情报窃取 + 陷阱诱杀
      关键人物: 贺婉清（情报+体质来源）、贺夫人（掩护+资源）
      外力介入: 无
      手上血迹: 有（亲手杀贺震霆，换血夺贺婉清体质）
      善恶值变化: -300以下
      名望变化: 正道通缉，邪道侧目
      贺婉清命运: 被换血，成为废人，三日之内死去（或变体中存活但成复仇者）
      贺夫人命运: 回庄后隐瞒真相，对外宣称马贼袭击
      李德获得: 玄阴素女体（经脉滞涩缓解）、自由、断魂刀、银两、路引
      长期定位: 江湖散人，正邪不容，独自寻找太虚真经
      路线风险: 每一步都需精密计算，任何失误都可能导致死亡或路线崩坏

    邪道路线·母女噬心局:
      破局核心: 心理操控 + 色诱策反 + 借刀杀人
      关键人物: 贺夫人（共犯+情欲寄托）、贺婉清（杀手傀儡）
      外力介入: 无
      手上血迹: 无直接血（贺婉清弑父），但道德污秽远超血腥
      善恶值变化: -400以下
      名望变化: 表面继承铁胆庄，实则丑闻定时炸弹
      贺婉清命运: 弑父后彻底依附李德，玄阴素女体在情欲刺激下提前觉醒，通过双修被逐步汲取
      贺夫人命运: 以遗孀身份接管铁胆庄，成为李德的"地下情人"，日后可能因嫉妒变质
      李德获得: 铁胆庄实际控制权、玄阴素女体双修精华、母女二人的绝对忠诚（病态）
      长期定位: 铁胆庄"代理庄主"，表面正道、实则邪道，丑闻一旦曝光万劫不复
      路线风险: 极度依赖演技，任何情感破绽都会导致母女二人同时反噬

    正道路线·白羽借刀局:
      破局核心: 示弱博同情 + 信息操控 + 借正道之力
      关键人物: 萧云澜（剑与盾）、贺夫人（引荐窗口）、贺婉清（情报来源）
      外力介入: 武当派、六扇门、少林俗家弟子
      手上血迹: 无（贺震霆死于"畏罪自杀"/正道围剿）
      善恶值变化: +50（正道声望）
      名望变化: 江湖新星萧云澜的"师弟"，正道庇护对象
      贺婉清命运: 存活，对李德怀有感恩与未了之情，日后可能成为助力或隐患
      贺夫人命运: 作为"不知情遗孀"被正道安置，余生有个念想
      李德获得: 武当记名弟子身份、系统武学教育、萧云澜的庇护、合法路引
      长期定位: 正道新星，可光明正大行走江湖，查找太虚真经便利十倍
      路线风险: 太虚真经秘密一旦暴露，萧云澜可能从盟友变敌人；贺婉清的等待可能变质为执念

    官道路线·朱门棋局:
      破局核心: 政治交易 + 伪造证据 + 体制杀人
      关键人物: 沈砚秋（庇护者与控制者）、贺婉清（潜在把柄）、贺夫人（牵制筹码）
      外力介入: 六扇门、官兵、朝廷体制
      手上血迹: 无直接血，但公文杀人比刀剑更脏
      善恶值变化: -200（体制内的"合法"作恶）
      名望变化: 六扇门"暗桩巡风"，体制内幽灵
      贺婉清命运: 被软禁在六扇门偏院，成为李德的"侍女"，目睹他一天天变成陌生人
      贺夫人命运: 被"保护性关押"在六扇门别院，日渐疯癫
      李德获得: 六扇门编制、官场人脉、情报网络、体制内的杀戮许可
      长期定位: 沈砚秋的黑手套，在江湖与官场之间游走，双手沾满看不见的鲜血
      路线风险: 沈砚秋随时可能抛弃李德；贺婉清的存在是双刃剑；体制一旦反噬，无处可逃

    魔道路线·玄衣缚魂局:
      破局核心: 资源博弈 + 出卖自身 + 魔道规则
      关键人物: 慕容烟（主人与炉鼎使用者）、贺婉清（共生者/阴鼎）、贺震霆（背叛证据提供者）
      外力介入: 天魔宗、幽冥教
      手上血迹: 有（慕容烟的层层考验，杀人如日常）
      善恶值变化: -500以下
      名望变化: 魔道炉鼎，无独立名望
      贺婉清命运: 被带入天魔宗白骨城，在万毒林中浴血重生，成为李德的"共生者"——不是爱人，不是棋子，是地狱里唯一不灭的火种
      贺夫人命运: 正道路线中存活并目送李德离开；魔道路线中通常被慕容烟随手杀死或遣散
      李德获得: 天魔宗庇护、基础魔道功法、慕容烟的"放养式"培养、太虚剑体的逐步觉醒环境
      长期定位: 天魔宗圣女的炉鼎，但炉鼎亦可反噬。太虚剑体大成之日，可能是翻身之时
      路线风险: 慕容烟喜怒无常；贺婉清逐渐失控；天魔锁元印随时可取命；太虚剑体反噬充满未知

  五维能力需求对比:
    演技/定力: 邪道 > 官道 > 魔道 > 正道 > 完美
    武力/身法: 完美 > 魔道 > 邪道 > 正道 > 官道
    情报/悟性: 完美 > 官道 > 正道 > 魔道 > 邪道
    话术/福缘: 邪道 > 正道 > 官道 > 魔道 > 完美
    风险/收益比: 完美（高风险高回报）> 魔道（高风险高回报）> 邪道（中高风险中回报）> 官道（中风险中回报）> 正道（低风险中回报）

  人物命运总览:
    李德: |
      完美：江湖散人，身负通缉，独寻真经
      邪道：铁胆庄暗主，母女双收，丑闻潜伏
      正道：武当弟子，清白之身，借力寻宝
      官道：六扇门暗桩，体制幽灵，肮脏上升
      魔道：天魔宗炉鼎，深渊求生，伺机反噬
    贺婉清: |
      完美：换血而死（变体中存活复仇）
      邪道：弑父依附，病态忠诚，双修鼎炉
      正道：存活等待，承诺成空，执念生根
      官道：软禁偏院，目睹变质，光灭心死
      魔道：万毒林重生，黑化共生，地狱火种
    贺夫人: |
      完美：回庄隐瞒真相，最后一次保护李德
      邪道：遗孀兼地下情人，嫉妒终将变质
      正道：不知情遗孀，正道安置，念想余生
      官道：保护性关押，日渐疯癫，窗口喊名
      魔道：被慕容烟随手遣散或杀死，无足轻重
    贺震霆: |
      完美：死于柴房陷阱，毒血倒流
      邪道：死于女儿之手，众叛亲离
      正道：死于正道围剿，"畏罪自杀"
      官道：被生擒处斩，抄家灭族
      魔道：被女儿刺死，天魔宗清理门户
    萧云澜: |
      完美/邪道/官道/魔道：不出现或仅在背景提及
      正道：李德的上武当引路人，最信任的"师兄"
    沈砚秋: |
      完美/邪道/正道/魔道：不出现或仅在背景提及
      官道：李德的庇护者、控制者、最终潜在的敌人
    慕容烟: |
      完美/邪道/正道/官道：不出现或仅在背景提及
      魔道：李德的主人、考验者、最终潜在的受害者

  路线互斥与切换规则:
    核心原则: |
      五条路线并非完全互斥——开局阶段玩家可能同时接触多条路线的要素（如既套取贺婉清情报，又试图接触萧云澜）。
      但每条路线的"关键节点"一旦触发，其他路线将迅速关闭。
    关键节点判定:
      完美路线: 潜入书房窃取《移花接玉》后，邪道/正道/官道路线仍可切换；但一旦开始布置陷阱杀贺震霆，正道线关闭（因正道不允私刑）
      邪道路线: 与贺夫人发生肉体关系后，正道线关闭（萧云澜不可能容忍）；与贺婉清发生关系后，完美线关闭（无法对已有肌肤之亲的人换血）
      正道路线: 萧云澜正式介入后，邪道/魔道/完美线关闭（萧云澜会阻止任何私刑或邪术）
      官道路线: 与沈砚秋达成交易后，正道线关闭（官场肮脏与正道清白不可共存）；魔道线关闭（沈砚秋与魔道势不两立）
      魔道路线: 慕容烟降临后，其余所有路线瞬间关闭（天魔宗圣女的力量碾压一切其他可能）
    路线崩坏: |
      若玩家在关键节点做出矛盾选择（如已向萧云澜求助，又试图偷取《移花接玉》），路线不会"平均分配"，而是会崩坏。
      崩坏后果：失去所有路线庇护，转入"普通逃亡线"或"死亡结局"。
      普通逃亡线：无路线加成，凭自身能力逃亡，成功率极低。

  开局通用流程（所有路线共用）:
    时间线: |
      开局为贺震霆下一次"审问"的前三日。这是李德穿越后的第三天（按原主记忆，每次审问持续三日，非人折磨）。
      三日期限是压在玩家头上的第一把刀。
    初始状态: |
      气血15/80，内力5/30，饱腹20。
      被囚禁于柴房，门外有护院看守。
      身上无银两、无武器、无路引。
      对外界信息极度匮乏——知道铁胆庄的布局，但不知道庄外是什么世界。
    首日关键事件: |
      贺婉清送饭（可套取情报、提升好感）
      贺夫人探望（可获取资源、试探态度）
      赵三巡逻（可尝试交涉或观察）
      夜间自修吐纳诀（可恢复少量气血与内力）
    第二日关键事件: |
      若首日建立了足够信任，贺婉清可能带来额外情报（如书房禁地、父亲心神不宁）
      贺夫人可能送来伤药或食物
      玩家可选择：继续套取情报、尝试潜行探索、或准备某条路线的特定行动
    第三日关键事件: |
      贺震霆开始"审问"的前奏——他会先派赵三来"看看李德的状态"。
      这是最后的机会窗口。若此时仍未启动任何路线，玩家将面临直接的酷刑与死亡威胁。
      各路线的"破局时刻"通常发生在第三日子时前后。

  后续线汇总对比:
    概述: |
      五条基础路线各有对应的「后续线」，承接开局结局并展开为期24-36个月的长期剧情。
      后续线决定李德的最终身份、势力规模、情感归属与武学境界。
      AI不应主动透露后续走向，但当玩家的长期选择逐步趋近某一方向时，应予以配合。

    后续线速览表:
      完美后续·血衣江湖:
        承接基础: 完美路线·绣楼换血局
        时间跨度: 第1-36个月
        核心冲突: 逃亡、追寻太虚真经、正邪两道的追捕与利用
        关键人物: 铁无情（追捕者）、白骨夫人（心魔触发者）、沈落霞（剑道知音）、阿芷（医毒伙伴）
        势力变化: 江湖散人→太虚剑宗传人→太虚剑主
        手上血迹: 有（逃亡中不可避免的反杀与自卫）
        善恶值终点: -200至+100（取决于途中选择）
        最终境界: 大宗师（太虚剑体完全觉醒，战力350+）
        结局类型: 太虚归一（最佳）/ 血衣独行（ bittersweet ）/ 剑心破碎（悲剧）

      邪道后续·暗主狂澜:
        承接基础: 邪道路线·母女噬心局
        时间跨度: 第1-15个月（集中于铁胆庄内）
        核心冲突: 封闭王国的权力维持、母女裂隙、外部势力渗透
        关键人物: 贺婉清（精神控制→反噬）、贺夫人（嫉妒→背叛）、血鸦（幽冥教筹码）、冷月（六扇门调查）
        势力变化: 铁胆庄暗主→封闭王国→王国崩塌
        手上血迹: 无直接血，公文与情欲杀人
        善恶值终点: -500以下
        最终境界: 宗师（玄阴素女体双修增益，战力200+）
        结局类型: 牺牲贺夫人/牺牲贺婉清/抛弃两人/挽救（极高难度）

      正道后续·白羽归处:
        承接基础: 正道路线·白羽借刀局
        时间跨度: 第1-36个月
        核心冲突: 被动收割→主动归属→正邪之争→开宗立派
        关键人物: 萧云澜（剑与盾/真气输送管）、贺婉清（家/资源后盾）、沈落霞（知音/剑道伴侣）、戒空（严厉盟友）
        势力变化: 武当记名弟子→白羽剑宗宗主
        手上血迹: 无（手上最干净的路线）
        善恶值终点: +200（最佳）/+100（ bittersweet ）/-300（悲剧）
        最终境界: 宗师（太虚剑体完全觉醒，战力300）
        结局类型: 白羽长鸣（最佳）/ 影随光动（ bittersweet ）/ 白羽折翼（悲剧）

      官道后续·朱门归处:
        承接基础: 官道路线·朱门棋局
        时间跨度: 第1-36个月
        核心冲突: 暗桩渗透→权力博弈→绝地反击→独立或归隐
        关键人物: 沈砚秋（庇护者→竞争者）、铁心兰（体制内变数/正义之光）、玉箫娘（朝堂耳目）、千面佛（退路/第三个棋手）
        势力变化: 六扇门暗桩→影子权臣/金蝉脱壳
        手上血迹: 无直接血，公文杀人
        善恶值终点: -150（最佳）/-50（隐匿）/-300（悲剧）
        最终境界: 宗师（太虚剑体在生死关头初醒，战力250，但武力隐匿）
        结局类型: 权倾朝野（最佳）/ 金蝉脱壳（隐匿）/ 朱门血溅（悲剧）

      魔道后续·玄衣归处:
        承接基础: 魔道路线·玄衣缚魂局
        时间跨度: 第1-36个月
        核心冲突: 炉鼎求生→力量掠夺→弑主崛起→代价与归属
        关键人物: 慕容烟（主人→盟友）、贺婉清（共生者/冷却剂）、厉苍生（必死之敌）、段九幽（警告者/最终对手）、白骨夫人（投机者）
        势力变化: 天魔宗炉鼎→天魔宗宗主→魔道至尊/归隐/魔陨
        手上血迹: 满手血腥，每一滴血都是魔道的烙印
        善恶值终点: -500（最佳）/-100（归隐）/-999（悲剧）
        最终境界: 大宗师（太虚魔剑大成，战力350-500）
        结局类型: 万魔朝宗（魔道至尊）/ 太虚魔剑（第三条路/归隐）/ 魔陨（悲剧）

    后续线核心驱动力对比:
      完美后续: 逃离后的追寻——太虚真经与灭门真相
      邪道后续: 控制的幻觉——以为能控制所有人，实则每个人都在反噬
      正道后续: 被动收割→主动归属——从「被需要」到「成为光」
      官道后续: 以小博大——最低微的棋子撬动整个朝堂
      魔道后续: 力量掠夺——从炉鼎到魔主，每一步都踩在尸骨上

    后续线势力规模对比:
      最大势力: 魔道后续（统合西荒魔道，天魔宗+血魔宗残余+无数小门派）
      最隐蔽势力: 官道后续（影子权臣，没有固定组织但一个电话令下可调动各方）
      最松散势力: 完美后续（江湖散人，无组织但个人战力最强）
      最稳固势力: 正道后续（白羽剑宗，正道盟友+固定地盘+传承体系）
      最脆弱势力: 邪道后续（铁胆庄封闭王国，高墙内的权力随时可能崩塌）

    后续线情感模式对比:
      完美后续: 孤独中的羁绊——每个相遇都是过客，但每个过客都留下痕迹
      邪道后续: 控制的幻觉——情欲是武器，温柔是演技，每个人都在互相操控
      正道后续: 被需要的感觉——不主动、不拒绝、不负责，好处自动送上门
      官道后续: 权力即春药——每一次密谋、每一次交易、每一次眼神交汇，都比肉体更刺激
      魔道后续: 危险即诱惑——掠夺与被掠夺，共生与毁灭，地狱里唯一的温度

    后续线人物命运总览:
      李德: |
        完美后续：太虚剑主，江湖上最孤独的剑客，身后只有剑影
        邪道后续：铁胆庄暗主→王国崩塌后逃亡/死亡，手上无血但心已腐
        正道后续：白羽剑宗宗主，有剑、有家、有知音，但心底仍是冷的
        官道后续：六扇门监察使（最佳）/面具情报贩子（隐匿）/逆党（悲剧）
        魔道后续：太虚魔主（魔道至尊）/茶馆老板（归隐）/化为灰烬（悲剧）
      贺婉清: |
        完美后续：换血而死（或变体中存活复仇）
        邪道后续：弑父依附→安眠药控制→最终爆发，王国崩塌的导火索
        正道后续：铁胆庄庄主→白羽剑宗内务总管，"家"的定位，每月送物资
        官道后续：六扇门偏院软禁→洛京郊外庄园隐居，与李德相对无言
        魔道后续：万毒林重生→玄阴素女体成熟→李德的"冷却剂"，以生命力换他的理智
      萧云澜: |
        完美/邪道/官道/魔道后续：不出现或仅在背景提及
        正道后续：白羽剑宗护法，李德最狂热的信徒，可为其与天下为敌
      沈砚秋: |
        完美/邪道/正道/魔道后续：不出现或仅在背景提及
        官道后续：从庇护者变成竞争者，最终被李德反制罢官/合作共治（取决于结局）
      慕容烟: |
        完美/邪道/正道/官道后续：不出现或仅在背景提及
        魔道后续：从主人变成盟友，最终被李德超越。她在他身上看到了另一个自己
      贺夫人: |
        完美后续：回庄隐瞒真相，最后一次保护李德
        邪道后续：遗孀兼地下情人→嫉妒→背叛冷月→最终成为王国崩塌的牺牲品
        正道后续：不知情遗孀，正道安置，念想余生
        官道后续：保护性关押→日渐疯癫→死于别院（或苟活）
        魔道后续：被慕容烟随手遣散或杀死，无足轻重

    后续线太虚剑体觉醒方式对比:
      完美后续: 逃亡中的生死历练，逐步激活太虚剑气，在绝境中完成觉醒
      邪道后续: 玄阴素女体双修采补，情欲刺激下提前觉醒，通过汲取贺婉清纯阴之气调和
      正道后续: 萧云澜纯阳真气温养，渐进融合，太虚剑体在「被保护」中自然成长
      官道后续: 生死关头的顿悟——暗杀中的本能爆发，隐藏武力作为官场底牌
      魔道后续: 吞噬——吞噬魔道真气、他人内力、甚至生命力，太虚剑气与天魔真气融合为「太虚魔气」

    后续线风险与代价对比:
      最高风险: 魔道后续（太虚魔气失控、情绪剥离、贺婉清的生命力消耗）
      最高道德代价: 邪道后续（操控至亲、母女裂隙、永远失去爱的能力）
      最高政治代价: 官道后续（体制反噬、沈砚秋的背叛、无回头路）
      最高孤独代价: 完美后续（正邪不容、无人可信、独自面对一切）
      最低显性代价: 正道后续（被需要的感觉最安全，但心底的空洞最难填补）

  GM全局原则:
    - 路线选择应是玩家主动推理与行动的结果，而非AI投喂的选项
    - 每条路线都应给予足够的线索（人物特征、庄内秘密、外部势力的存在），但不做明确指向
    - 不同路线的李德会有不同的"气质"：完美路线的冷静计算、邪道路线的温柔陷阱、正道路线的无辜脆弱、官道路线的直白交易、魔道路线的资源博弈
    - 后续线中，这种"气质"会进一步深化：完美路线的孤独剑意、邪道路线的控制幻觉、正道路线的被动收割、官道路线的权力春药、魔道路线的力量掠夺
    - NPC之间会互动，产生主角不知道的事件。例如：贺夫人与贺婉清可能在某夜谈论李德；赵三可能向贺震霆汇报异常
    - 后续线中，NPC的自主意识应更强：贺婉清会观察、会学习、会在某个时刻做出李德预料之外的选择；沈砚秋会忌惮、会反击、会在关键时刻露出獠牙；慕容烟会欣赏、会嫉妒、会在强者面前低下头颅
    - 失败应有代价：不是所有错误都能挽回，不是所有尝试都能成功。这就是江湖
    - 后续线的结局没有绝对的好坏，只有"玩家想成为什么样的人"。GM应尊重玩家的选择，即使那选择通向黑暗
