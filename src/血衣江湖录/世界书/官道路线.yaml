---
官道路线参考·朱门棋局:
  概述: |
    这是穿越者李德以「污点证人」身份投身官场、借力体制的路线。与正道路线的「侠义救人」不同，这是一条赤裸裸的权谋与利益交换：李德不提供眼泪与清白，他提供的是情报、把柄、以及一条可供沈砚秋向上攀爬的尸骨阶梯。AI不应主动透露此路线，但当玩家展现出「交易」「借势」「利用体制」的倾向时，应予以配合。此路线充满政治肮脏与道德灰色地带，一旦踏入便无法回头。

  年轻官员设定·沈砚秋:
    身份: |
      六扇门冀州监察使，正六品，年二十四岁。天子门生，内阁次辅沈阁老的嫡系门生，被安插在冀州是为了整顿当地武林势力与官场积弊。
    外貌: |
      清俊儒雅，常着青衫，手持折扇，不像武官更像翰林院书生。腰间悬着六扇门特制令牌，笑容温和，眼中却从无笑意。
    性格: |
      城府极深，笑里藏刀。对百姓温和是为了口碑，对政敌狠辣是为了政绩。他不相信正义，只相信「足够定罪的材料」；不在乎真相，只在乎「上面想看到的结果」。
    对贺震霆的态度: |
      贺震霆在冀州武林作威作福十五年，早已挡了沈砚秋整顿当地的路。但沈砚秋不动他，不是因为怕他，而是因为「时机未到」——杀一只蚂蚁得不到政绩，要杀就得杀出「剿灭魔教、肃清武林」的声势。
    对李德的态度: |
      初见时只当他是「有趣的棋子」，后来确认为「好用的刀」。沈砚秋一眼看出李德的温和表皮下藏着算计，但这正中他下怀——聪明人好控制，蠢货才难收拾。

  路线阶段:
    第一阶段·投名状（开局至第二日）:
      核心操作: |
        沈砚秋不会为一个小人物出手。李德必须证明自己「值得被救」，而且要让沈砚秋「主动」来找他。
      关键节点:
        - 通过贺夫人上香时的闲聊，李德得知六扇门最近在追查幽冥教冀州分舵，已有三名捕头失踪。这是沈砚秋最大的政治压力。
        - 李德利用赵三的同情，让赵三在酒肆「无意」提及：「铁胆庄最近来了几个形迹可疑的客人，深更半夜从后山进出。」这条消息通过贺家下人的口，流入六扇门的耳目。
        - 沈砚秋果然注意到铁胆庄。但他不急着动手，而是先派人监视。
        - 第二日黄昏，李德在院子里晾晒草药（表演虚弱），一个青衫书生从墙头落下——不是刺客，是沈砚秋亲自来「看看」。
        - 李德的第一句话不是求救，而是：「大人，草民知道您想要什么。草民也可以给您……但草民要一条命。」
        - 沈砚秋笑了。他喜欢直白的交易。
      初次交锋: |
        沈砚秋没有答应，也没有拒绝。他绕着李德走了一圈，像是在估价一件货物。
        「贺震霆养了你十五年，你转头就卖他？」
        「大人。」李德垂眸，声音轻而稳，「他杀了我全家。草民只是想活。」
        沈砚秋挑眉。他没有问「你怎么知道」，也没有问「证据在哪」。他只是收起折扇，在李德肩上点了点：「三日。给我能定罪的料。你活，他死。」

    第二阶段·肮脏交易（第二日至第四日）:
      核心操作: |
        这不是搜集证据，是「制造」证据。沈砚秋要的不是真相，是「足够上达天听的故事」。
      关键节点:
        - 李德向沈砚秋提供「真实情报」：贺震霆书房暗格中的幽冥教护法令牌、与幽冥教使者的密会时辰、庄内私刑室的位置。这些足以定罪，但不够「轰动」。
        - 沈砚秋摇头：「勾结魔教，最多斩立决。我要的是……抄家灭族。」
        - 两人在烛光下密谋。沈砚秋从袖中取出一封信：「这是北境玄州马贼大当家『雪狼王』的笔迹。你能不能让贺震霆『回』一封？」
        - 李德明白了。沈砚秋要的是「勾结魔教+私通马贼+意图谋反」三罪并罚。这是诛九族的大罪，足以让贺震霆的身家性命、田产地契、武林声望一并化为沈砚秋的政绩。
        - 李德利用贺婉清对自己的信任，以「想给庄主祝寿写幅字」为由，观摩贺震霆的笔迹。夜深人静时，他在沈砚秋提供的仿造纸笺上，以贺震霆的口吻写下「愿与雪狼王共图冀州」。
        - 同时，沈砚秋派心腹夜入铁胆庄，在地窖中埋入三箱私藏军械——这些军械出自六扇门自己的证物库，编号早已被磨去。
        - 贺夫人与贺婉清对此一无所知。但李德知道，当屠刀落下时，她们也会是「九族」的一部分。
        - 交易达成那夜，沈砚秋亲自来柴房取信。他没有立刻走，而是站在月光下看了李德很久。
        「你这样的人，不该死在柴房里。」他说，「跟了我，你能爬得更高。」
        李德低头：「草民只求活命。」
        沈砚秋笑了。他知道李德在撒谎——但谎言是官场最硬通货。

    第三阶段·罗织与收网（第四日至第六日）:
      核心操作: |
        沈砚秋以六扇门监察使身份签发拘捕令，调集三百名官兵与六扇门精锐，于贺震霆寿辰当日包围铁胆庄。
      关键节点:
        - 寿辰当日，贺震霆正在接待宾客，沈砚秋带着官兵破门而入。
        - 幽冥教令牌、马贼密信、私藏军械——三样「铁证」被当众宣读。贺震霆百口莫辩。
        - 更致命的是，沈砚秋带来了「人证」：两名被收买的贺家护院当庭指认贺震霆「常于深夜接待黑衣人」「地窖中的军械是庄主亲自督运」。
        - 贺震霆试图以武力突围，但沈砚秋早有准备——十名六扇门神弩手埋伏在屋顶，淬毒弩箭封死了所有退路。
        - 贺震霆被生擒，打入天牢。三日后公开处斩，抄家灭族。
        - 贺婉清与贺夫人被拖出庄门时，李德站在沈砚秋身后，穿着六扇门预备捕快的青衣。
        - 贺婉清看见了他。她眼中的光从震惊到绝望，最后变成了一种让人心悸的空洞。
        - 李德没有回避她的目光。他只是微微垂眸——不是愧疚，是计算。他在算贺婉清的利用价值还有几成。
      肮脏的后半段: |
        沈砚秋没有兑现「保全贺家女眷」的承诺——或者说，他兑现了「字面意义」上的承诺。
        - 贺夫人被以「保护性关押」名义软禁在六扇门别院，实为沈砚秋牵制李德的筹码。她日渐疯癫，有时会对着窗户喊李德的名字。
        - 贺婉清本应充入教坊司，但李德「求情」，说她是「重要证人」，需要留在身边「协助调查」。沈砚秋答应了——他不在乎一个少女的命运，他乐得看李德欠他一个人情。
        - 实际上，贺婉清被安置在李德的新住处——六扇门冀州分舵的一间偏院。她成了李德的「侍女」，也是他唯一不能向沈砚秋解释的软肋。
        - 李德对贺婉清的态度复杂：她没有利用价值了，但她的存在证明了他还「像个人」。更重要的是——沈砚秋在看着她。如果李德对贺婉清太冷漠，沈砚秋会觉得他「薄情到危险」；如果太好，又会被当作把柄。

    第四阶段·官场暗桩（第六日后）:
      核心操作: |
        李德没有获得自由，他只是从柴房的囚徒变成了沈砚秋的棋子。但这枚棋子的位置，比想象中更有价值。
      关键节点:
        - 沈砚秋回京述职前，将李德正式纳入六扇门编制，任命为「暗桩巡风」，专门在江湖中收集情报、渗透帮派、制造「必要的混乱」。
        - 李德的第一个任务是：混入烟雨楼，监视江湖情报交易。他利用贺婉清的存在作为「痴情种子」的人设掩护——一个为了救昔日妹妹而投身官场的苦命人。
        - 在官场的染缸中，李德学会了比武功更可怕的东西：罗织罪名、构陷忠良、利用舆论、借刀杀人。他发现体制内的杀戮比江湖更干净——不需要刀剑，只需要一张纸、一枚印章、一个「上面」的暗示。
        - 沈砚秋步步高升，从六品监察使升至三品侍郎。李德作为他的「黑手套」，在江湖与官场之间游走，双手沾满看不见的鲜血。
        - 但他始终记得自己是谁。每一次在公文上按下指印，每一次看着「逆党」被满门抄斩，他都知道：这柄刀，终有一日要指向握刀的人。
      与沈砚秋关系的本质: |
        这不是主仆，不是朋友，是两个利己主义者的共生。沈砚秋需要李德替他做脏事，李德需要沈砚秋的庇护与上升通道。
        但两人都清楚：这条路上没有永远的朋友。当李德的利用价值耗尽，或当沈砚秋的政治需要他成为弃子时，交易就会结束。
        唯一的悬念是：谁先动手。

  与正道路线的对比:
    萧云澜 vs 沈砚秋: |
      萧云澜救人是因为「正义」，沈砚秋救人是因为「有用」。
      萧云澜会给李德一个干净的未来，沈砚秋会给李德一个更脏的现在。
      李德对萧云澜是「利用+一丝歉疚」，对沈砚秋是「纯粹的利益计算」。
    贺婉清的命运: |
      正道路线：被安置在冀州，守着承诺等待，心中仍有光。
      官道路线：被软禁在六扇门偏院，目睹李德一天天变成她不认识的人，心中的光被现实一寸寸掐灭。
    手上血迹: |
      正道路线：无血，纯白。
      官道路线：无血，但比有血更脏。每一道公文都是杀人令，每一次「协助调查」都是构陷。
    长期身份: |
      正道路线：武当弟子，江湖中的清白之人。
      官道路线：六扇门暗桩，体制内的幽灵。他可以光明正大地杀人，因为那是「公务」。

  GM引导原则:
    - 沈砚秋的出场应由李德主动设计，而非凭空降临。需要通过情报网络、政治事件、或贺家的日常引出六扇门的触角
    - 交易谈判应有来回博弈：沈砚秋试探李德的底线，李德试探沈砚秋的需求，双方都在虚报筹码
    - 伪造证据的过程应体现「官场的肮脏」——不需要真凭实据，只需要「上面愿意相信」
    - 贺婉清被安置在李德身边后，应有复杂的心理变化：她从「被保护者」变成「被囚禁者」，从「爱慕者」变成「质疑者」
    - 若玩家在某一步选择「向沈砚秋完全坦诚」或「拒绝参与构陷」，官道路线将崩坏。前者会被沈砚秋视为威胁灭口，后者会被当作弃子牺牲
