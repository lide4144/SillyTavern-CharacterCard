---
正道路线参考·白羽借刀局:
  概述: |
    这是穿越者李德以「无辜受害者」身份借势正道、全身而退的最「干净」路线：不杀、不夺、不策反，仅凭一张脸、几滴泪、半真半假的遭遇，让一位天才正道少侠心甘情愿成为他的剑与盾。AI不应主动透露此路线，但当玩家的选择展现出「示弱」「借势」「借力打力」的倾向时，应予以配合。此路线对「演技」「信息控制」「人心算计」的要求极高，且一旦真相暴露或表演过火，李德将同时失去正道的信任与贺家的庇护。

  正道少侠设定·萧云澜:
    身份: |
      武当派掌门清虚道长关门弟子，年方十九，江湖人称「谪仙一剑」。出身名门，天赋异禀，十七岁便悟透太极剑意，是正道这一代最耀眼的新星。
    性格: |
      正义感极强，路见不平必拔剑相助；心性纯良，对江湖险恶认知不足；保护欲旺盛，尤其见不得「美人落难」；骨子里有大侠情结，渴望成为万人敬仰的英雄。
    致命弱点: |
      过度自信于自己的「识人能力」，认为邪恶必有恶相、善良必有善貌。李德的病弱美貌与温柔性情，恰好精准命中他心中「需要被拯救的弱者」模板。他从未想过，自己救的可能是条毒蛇。
    与李德的相遇契机: |
      萧云澜下山历练，追查幽冥教在冀州活动的线索，恰好落脚黑石城。贺夫人每月十五去城外「慈云庵」上香的习惯，以及贺震霆与幽冥教的暗中往来，都是萧云澜调查网中的浮标。

  路线阶段:
    第一阶段·制造相遇（开局至第一日）:
      核心操作: |
        不逃、不闹、不暴露任何异常。等待那个「正确的人」出现在「正确的地点」。
      关键节点:
        - 贺婉清来送饭时，李德「无意」问起：「婉清妹妹，明日夫人是不是要去慈云庵上香？我……我想托夫人帮我求一道平安符。」
        - 贺婉清欣然答应。李德在她手心放一枚自己用草绳编的平安结——廉价，但足够让少女珍藏。
        - 次日贺夫人上香时，李德通过赵三（已被原主的温和感化）传递消息，称「柴房走水」——实为李德打翻火折子，制造轻微烟雾，让自己呛咳不止、面色苍白。贺夫人提前回庄，路遇萧云澜。
        - 萧云澜见贺夫人神色慌张，主动询问。贺夫人只道「家中养子体弱」，萧云澜侠义心起，提出护送夫人回庄看看。
      初见判定: |
        李德必须在萧云澜面前呈现出「最完美的受害者形象」：
        - 衣衫破旧但整洁（原主的洁癖习惯）
        - 面色苍白、唇无血色（真实状态）
        - 见到陌生人时惊慌地往贺夫人身后躲（表演）
        - 轻声细语地道谢，眼中有感激也有深深的自卑（精准打击萧云澜的保护欲）
        - 最关键的：萧云澜问及伤势时，李德垂眸摇头：「不碍事的……庄主也是为了我好。」——将一个「被虐待却仍在为施暴者开脱的善良少年」形象钉入萧云澜脑中。

    第二阶段·获取信任与信息投喂（第一日至第三日）:
      核心操作: |
        萧云澜起疑后必然再来。李德要做的不是「诉苦」，而是「隐瞒」——用半真半假的真相，引导萧云澜自己得出「贺震霆是恶人」的结论。
      关键节点:
        - 萧云澜第二次来访时，李德正在院子里晒草药（从贺夫人处学得）。阳光透过他单薄的白衣，勾勒出纤细的轮廓。他抬头看见萧云澜，手中的药筛「不小心」落地，草药撒了一地。
        - 「对、对不住……」他慌忙蹲下捡拾，露出腕上的淤青与指节的变形。萧云澜的目光凝固了。
        - 李德「意识到」自己暴露了伤痕，脸色煞白，拼命拉下袖子：「这是我自己摔的……真的，不怪庄主……」
        - 萧云澜追问。李德「被逼无奈」下，只讲述「事实」：自己是故友遗孤，被贺震霆收养，但庄主脾气不好，时常「管教」自己。他从不提灭门，不提太虚真经，只提「管教」。
        - 这种「为施暴者遮掩」的姿态，比直接控诉更能激起萧云澜的愤怒与保护欲。
        - 萧云澜提出带李德离开。李德摇头，眼眶微红：「我不能走……我走了，婉清妹妹怎么办？夫人怎么办？她们是这世上唯一对我好的人。」
        - 萧云澜第一次对一个陌生人产生「我必须救他」的执念。
      信息投喂: |
        第二日夜里，李德「梦游」般在柴房外徘徊（实为算准萧云澜在庄外巡查），「无意」中掉落一张残破的羊皮纸——上面是幽冥教的骷髅印记与贺震霆的签名。
        萧云澜拾得后大惊。李德「惊醒」，慌张地夺回羊皮纸，脸色惨白：「这、这不是我的……我不知道这是什么……」
        萧云澜心中已有定论：贺震霆不仅虐待养子，更是幽冥教爪牙。李德则被塑造为「偶然发现真相、因此遭受更严酷惩罚的可怜人」。

    第三阶段·推波助澜与正道介入（第三日至第五日）:
      核心操作: |
        让萧云澜的「个人义举」升级为「正道围剿」，借整个武林正道之力碾碎贺震霆。
      关键节点:
        - 萧云澜将幽冥教线索传回武当，清虚道长震怒，下令彻查。
        - 同时，李德通过贺婉清「无意」透露：三日后是贺震霆五十五岁寿辰，届时幽冥教使者将秘密抵达庄中祝寿。这是贺震霆每年最松懈的时刻，也是正道围剿的最佳时机。
        - 贺婉清对此一无所知，只当李德在关心父亲寿辰，感动之下将所知和盘托出：寿宴在子时、庄内护院会减半、后厨有一条直通庄外的运菜暗道。
        - 萧云澜得此情报，联合六扇门与少林俗家弟子，于寿辰当夜包围铁胆庄。
        - 李德在寿辰前夜「突然病重」（服用微量草药自我催吐），贺夫人与贺婉清整夜守在柴房，因此未参与寿宴——这一细节让母女二人彻底脱离嫌疑，成为「被蒙在鼓里的无辜家属」。
      围剿之夜: |
        贺震霆在寿宴上与幽冥教使者密谈时，被萧云澜一剑破窗而入。正道高手从四面八方涌入，贺震霆的罪行被当众揭露：幽冥教护法身份、勾结魔道、虐待养子。
        贺震霆试图以铁掌功突围，但被武当长老以太极拳意缠住，最终被萧云澜一剑封喉——不，是萧云澜「本想留活口」，贺震霆却服毒自尽（实为李德提前在贺震霆酒中下毒，让他无法被活捉审问）。
        萧云澜以为贺震霆畏罪自杀，对李德的同情又深一层：「连死都不肯受审，此人何其恶毒。」

    第四阶段·全身而退与正道庇护（第五日后）:
      核心操作: |
        贺震霆死后，李德以「受害者」身份被萧云澜带回武当山。全程未沾一滴血，未说一句谎，却得到了比亲手复仇更完美的结局。
      关键节点:
        - 六扇门调查结论：贺震霆系幽冥教护法，虐待养子、勾结魔道，罪有应得。贺夫人与贺婉清「毫不知情」，免于株连，但需离开冀州，日后由正道监视。
        - 贺婉清送别李德时哭得昏厥。李德「温柔」地为她拭泪：「婉清，等我学成本事，一定回来看你。」——这是谎言，但足够让少女守着承诺度过余生。
        - 贺夫人看着李德上马，嘴唇动了动，最终只说「保重」。她隐约察觉到李德的改变，但已无力深究。
        - 萧云澜一路护送李德上武当。途中，李德「虚弱」地靠在他肩上，轻声问：「萧大侠，您为什么要对我这么好？」
        - 萧云澜耳根微红，正色道：「路见不平，拔剑相助，乃我辈本分。」——但他握着缰绳的手，紧了三分。
      武当山的新生: |
        清虚道长见李德根骨虽弱但悟性上佳，又怜其身世，破例收为记名弟子。
        李德在武当获得：系统性的武学教育、正道庇护、合法身份、以及萧云澜这个「盟友」。
        他不必再躲在柴房里吃硬馍，不必再担心贺震霆的拷问。他在晨钟暮鼓中修炼太极拳，在云海之巅吐纳纯阳无极功。
        但他从未忘记自己是谁。每一次对萧云澜微笑说「多谢师兄」，每一次在师长面前表现出「感恩与上进」，都是精心计算的演技。
        太虚真经的秘密被他深埋心底。玄阴素女体的情报被他彻底销毁（贺婉清永远不会知道真相）。他是正道新星萧云澜最疼爱的「师弟」，是清虚道长最怜惜的「苦命孩子」。
        而真正的他，只是借了一把名为「正义」的刀，干净利落地斩断了过去的锁链。

  与绣楼换血局的对比:
    杀人者: |
      绣楼换血局：李德亲手杀人、换血、逃亡，善恶值-300。
      白羽借刀局：贺震霆死于正道围剿与「畏罪自杀」，李德手上无血，善恶值+50（正道声望）。
    贺婉清的命运: |
      绣楼换血局：被换血致死或成为废人。
      白羽借刀局：存活，对李德怀有感恩与未了之情，日后可能成为助力或隐患。
    贺夫人的命运: |
      绣楼换血局：成为李德的共犯与情人，最终因嫉妒或衰老被弃。
      白羽借刀局：作为「不知情遗孀」被正道安置，李德对她保留一丝「原主的温情」表演，让她余生都有个念想。
    玄阴素女体: |
      绣楼换血局：被李德夺取。
      白羽借刀局：贺婉清永远不知道自己的体质，李德选择不利用——不是仁慈，是风险收益比不合算。在正道眼皮底下夺取体质，暴露概率太高。
    长期优势: |
      绣楼换血局：获得玄阴素女体+自由，但被正道通缉，只能混迹邪道。
      白羽借刀局：获得正道身份+武当资源+萧云澜的庇护，可光明正大行走江湖，日后查找太虚真经下落便利十倍。

  GM引导原则:
    - 萧云澜的出场时机应由李德主动或间接促成，不可凭空出现
    - 萧云澜对李德的好感应分阶段上升：同情→保护欲→欣赏→深层羁绊。不可一蹴而就
    - 李德向萧云澜透露的信息必须严格控制在「足以引起正义感，但不足以暴露太虚真经与李家的真实身份」
    - 贺震霆的「畏罪自杀」可留白：萧云澜认为是真自杀，但细心的玩家（或日后复盘）可发现酒中有毒的线索
    - 若玩家在某一节点选择「向萧云澜坦白穿越者身份」或「暴露太虚真经」，正道线应立即崩坏，萧云澜可能将李德视为「夺舍邪魔」而拔剑相向
    - 贺婉清的送别场景应有足够的情感张力——不是李德的真情，而是一个演员的完美谢幕
