---
九州门派势力:
  概述: 大雍武林正邪纷争百年，正派以少林武当为魁首，邪派以幽冥教为盟主，此外还有诸多亦正亦邪的中立势力。各派之间既有血海深仇，也有利益联姻，绝非简单的黑白二分。

  正道巨擘:
    少林寺:
      掌门: 方丈玄慈大师，"大慈大悲掌"已臻化境
      绝学: 易筋经、七十二绝技、金刚不坏体
      特征: 佛门清净地，不问世事，但每逢魔道肆虐必挺身而出
      与主角关系: 若主角日后查明苏家与少林某位还俗僧人的渊源，可获助力
    武当派:
      掌门: 掌门清虚道长，太极拳剑传人
      绝学: 太极拳、太极剑、纯阳无极功、梯云纵
      特征: 道家无为，收徒极严，重悟性轻根骨
      与主角关系: 武当某位弃徒或许知晓当年灭门真相
    玄铁剑派:
      掌门: "玄铁真人"独孤寒，一柄玄铁重剑重达八十一斤
      绝学: 玄铁剑法、铸剑术、寒冰真气
      特征: 弟子皆使重剑，讲究一力降十会
      与主角关系: 铸剑山庄与贺震霆有兵器往来，可作为情报突破口

  邪道霸主:
    幽冥教:
      教主: "幽冥老祖"段九幽，三十年前诈死隐退，如今重出江湖
      绝学: 幽冥鬼爪、九阴白骨功、化骨绵掌
      特征: 教众遍布九州，专收江湖败类，与六扇门既有勾结又有冲突
      与主角关系: 灭门苏家的幕后黑手之一，贺震霆当年正是受幽冥教指使
    天魔宗:
      宗主: "天魔"厉苍生，野心勃勃欲统一魔道
      绝学: 天魔大法、吸星魔功、天魔解体大法
      特征: 西荒霸主，与幽冥教互相猜忌，可乘虚而入
      与主角关系: 厉苍生对《太虚真经》同样垂涎，可能主动接触主角
    五毒教:
      教主: "毒龙尊者"蓝凤凰，美艳毒辣，以毒物为宠
      绝学: 五毒神功、蛊术、万毒手
      特征: 亦正亦邪，与唐门世代为仇
      与主角关系: 蓝凤凰手中可能有解贺震霆"分筋错骨手"后遗症的秘方

  中立势力:
    烟雨楼:
      楼主: 神秘人物，人称"百事通"
      业务: 贩卖情报、悬赏任务、暗杀中介
      特征: 九州各城皆有分楼，只要付得起钱，什么消息都能买到
      与主角关系: 主角逃离后获取情报的最佳途径，但价格不菲
    铸剑山庄:
      庄主: "铸剑狂"欧冶魂，铸剑成痴，不理江湖纷争
      绝学: 铸剑术、御剑术
      特征: 每十年开炉铸一柄绝世名剑，引江湖腥风血雨
      与主角关系: 贺震霆的佩刀"断魂"出自铸剑山庄，可借此追查
    百花谷:
      谷主: "医仙"花解语，貌若少女实则年逾花甲
      绝学: 万花医典、百花错拳、以医入武
      特征: 救人杀人一念之间，看心情行事
      与主角关系: 主角身上的旧伤与分筋错骨手后遗症需找她医治
    唐门:
      堡主: "千手修罗"唐问天
      绝学: 暴雨梨花针、唐门暗器总谱、机关术
      特征: 家族门派，外人极难入门，但暗器可买
      与主角关系: 唐门某位年轻弟子或许与主角有段孽缘

  武功体系详解:
    内功心法:
      - 决定内力上限、真气恢复速度、抗毒抗寒等属性
      - 分为正道（循序渐进，根基扎实）、邪道（速成凶险，易走火入魔）、奇门（各有所长）
      - 层数1-3为入门，4-6为小成，7-9为大成，10-12为化境
    外功招式:
      - 拳脚、剑法、刀法、枪棍、奇门兵器五大类
      - 熟练度0-30初学乍练，31-60略有小成，61-80炉火纯青，81-99出神入化，100臻至化境
      - 可与内功配合产生"武学联动"效果
    轻功身法:
      - 影响闪避率、追击能力、地形穿越
      - 不同轻功适合不同地形：水上漂、踏雪无痕、壁虎游墙等
    暗器与毒:
      - 暗器讲究出其不意，高手可后发先至
      - 毒药分麻痹、剧毒、慢性、迷药等，可配合作战
