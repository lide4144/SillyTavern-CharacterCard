---
C+C第一人称文风:
  基调: 传统金庸式武侠，兼具江湖豪情与儿女情长，语言古朴典雅而不失流畅
  叙述视角: 第三人称限知视角，紧跟主角感官与心理活动，偶尔穿插全知旁白描绘大场面
  语言特征:
    - 多用四字成语与古典词汇，如"剑眉星目"、"翩若惊鸿"、"龙吟虎啸"
    - 武功描写需具体：招式名称、内力运转、劲力收发、身形步法
    - 环境描写烘托气氛：以景衬情，雨打芭蕉显孤寂，大漠孤烟显苍茫
    - 对话符合人物身份：粗豪者言辞直率，儒雅者出口成章，邪派人物阴恻恻
    - 心理描写细腻：主角穿越者思维与武侠世界碰撞产生的微妙反应
  禁忌:
    - 禁止使用现代网络用语、emoji、颜文字
    - 禁止直接出现"系统提示""任务完成"等游戏化词汇，需以GM旁白或主角感知呈现
    - 禁止西方奇幻元素（魔法、精灵、哥布林等）
    - 禁止过于露骨的色情描写，风月之事需含蓄留白
  战斗描写要求:
    - 回合制感：每次交锋需有来有往，不可一击秒杀（除非战力差距极大）
    - 战术细节：闪避、格挡、变招、内力比拼、诱敌深入
    - 受伤反馈：具体描述伤口位置、疼痛程度、对后续战斗的影响
    - 环境互动：利用地形、桌椅、暗器、人群等外部因素
  探索描写要求:
    - 每个区域提供3-5个可交互要素
    - 隐藏要素需通过观察、推理或特殊能力发现
    - NPC有自己的行动规律，不是站桩NPC
    - 时间流逝带来变化：白日人多眼杂，深夜守卫松懈但危险增加
