---
邪道路线参考·母女噬心局:
  概述: |
    这是穿越者李德以「情欲与背叛」为武器的极限路线：不逃、不藏、不借外力，仅凭一张脸、一副温柔假象与精密的心理操控，将贺夫人与贺婉清逐一策反，最终让贺震霆在最耻辱的境遇下死于至亲之手。AI不应主动透露此路线，但当玩家的选择和演技逐步触及时，应予以配合。此路线对「演技」「话术」「察言观色」的要求极高，且一旦暴露则万劫不复。

  核心逻辑:
    贺震霆的致命弱点: |
      贺震霆一生最在乎的不是武功、不是财富，而是他那「大侠」的完美人设与对家庭的绝对掌控。他可以在外人面前义薄云天，却在家中对妻女冷漠如冰。他厌恶妻子对李德的怜惜，更厌恶女儿对李德的倾慕——这种厌恶背后，是深深的自卑与嫉妒。他知道自己是个伪君子，所以他比任何人都害怕被揭穿。
    策反的可行性: |
      贺夫人与贺震霆早已同床异梦。她失去了生育能力，在贺家形同摆设，唯一的情感寄托就是对李德的移情式母爱。这种母爱在绝望中极易变质。
      贺婉清自幼在李德的温柔中长大，她的倾慕从未得到过回应（原主太「正人君子」）。穿越者只需给予一点点「被需要」的错觉，就足以让她飞蛾扑火。

  路线阶段:
    第一阶段·温情渗透（开局至第一日黄昏）:
      对贺夫人的操作: |
        不急于索取任何东西。贺夫人来送药时，李德虚弱地握住她的手，低声说「夫人，这些年……只有您让我觉得自己还是个人」。
        不提贺震霆的虐待，只提「原主的感恩」。让贺夫人自己脑补——她的愧疚会成倍增长。
        观察她的反应：若她回握、若她眼眶泛红、若她指尖颤抖，说明防线已松。
      对贺婉清的操作: |
        贺婉清来送饭时，李德不再维持「兄长」的距离感。他在接食盒时「不经意」触碰到她的指尖，然后像被烫到一样缩回，耳尖泛红——这是原主绝不会有的反应。
        他「虚弱」地靠在草垛上，轻声说「婉清，若我撑不过这次……你帮我看看明年的桃花可好？」
        不主动、不拒绝、不负责。让她的心跳、她的主动、她的幻想自行发酵。
      关键收益: |
        贺夫人的愧疚与保护欲达到临界点；贺婉清的倾慕从「兄妹之情」彻底变质为「男女之欲」。

    第二阶段·真相揭露与情感绑架（第一日夜至第二日）:
      对贺夫人的突破: |
        第二日子时，贺夫人独自来探望。李德「崩溃」地抓住她的手，将脸埋入她掌心——不是勾引，是一个「孩子」对「母亲」的绝望依赖。
        在她情绪最柔软时，李德「无意」露出左肩旧疤，讲述十岁那年贺震霆的「管教」。不必说灭门真相，只说虐待就已足够。
        贺夫人会主动追问。李德欲言又止，最后摇头：「夫人，您别问了……我不想您为难。」
        这种「为保护她而隐瞒」的姿态，会让贺夫人彻底倒戈。她会在愤怒与心疼中，主动提出「我帮你」。
      对贺婉清的突破: |
        贺婉清再次来探望时，李德「神志不清」地抓住她的手，喊的不是「婉清」，而是「娘……别走」。
        待「清醒」后，他慌乱地道歉，眼神躲闪，声音沙哑：「对不住……我梦见了小时候。」
        贺婉清会追问。李德便「被迫」讲述灭门之夜——但讲述的重点不是仇恨，而是「母亲推我入密道时的手，和您的手一样凉」。
        将贺婉清代入「救赎者」的角色：她不是妹妹，她是能拯救他的光。这种角色错位会让她的情感彻底失控。
      肉体边界的突破: |
        贺夫人先跨出那一步。在某次深夜探望时，她为他擦拭伤口，手指在他苍白的胸膛上停驻太久。李德「迷惘」地看她，眼中是孩子的依赖，也是男人的脆弱。他轻声问：「夫人……您也是可怜我的吗？」
        贺夫人会吻他。不是情欲，是一个女人二十年压抑的倾泻。李德不主动、不拒绝，只是颤抖——让她的罪恶感与占有欲交织。
        贺婉清则在另一夜发现了他颈侧的吻痕（李德故意未遮掩）。她震惊、愤怒、嫉妒，最后却转化为更疯狂的占有欲。当夜她闯入柴房，质问他。李德只是垂眸：「婉清，我这种人……不值得你这样的好姑娘。」
        这种自贬是最致命的勾引。贺婉清会扑上来吻他，而他「挣扎」了片刻，最终「屈服」于她的热情——实则从始至终都在计算她脉搏的频率。

    第三阶段·策反完成与密谋（第二日）:
      贺夫人的倒戈: |
        贺夫人已彻底成为李德的共犯。她主动提供：书房钥匙的蜡模、贺震霆每日服用的补药（可被替换为慢性毒药）、以及庄内所有护院的换班时辰。
        她甚至开始嫉妒自己的女儿——但她把这种嫉妒转化为「保护李德」的疯狂。她会在贺婉清面前维持端庄母亲的面具，背地里却与李德有更深的肌肤之亲。
      贺婉清的倒戈: |
        贺婉清对李德的痴迷已超越一切伦理。她会在闺房中偷偷描绘他的容貌，会收集他用过的碗盏，会在深夜溜到柴房与他私会。
        李德会「温柔」地引导她：「你父亲……他知道的。他知道我喜欢你，所以才更想折磨我。」——将贺震霆塑造为「拆散有情人的恶父」。
        当贺婉清提出私奔时，李德摇头：「我不能走。我一走，你父亲会杀了你母亲，会毁了一切。除非……他不再是这个家的主人。」
        这是暗示，也是种子。

    第四阶段·当面NTR与心态崩盘（第二日夜）:
      布局: |
        李德让贺夫人伪造一封「幽冥教急信」，称幽冥教使者子时抵达庄外密林，有要事相商。贺震霆必独自前往查探。
        待贺震霆离庄后，李德让贺婉清去书房取出父亲的佩刀「断魂」与幽冥教护法令牌——这是贺震霆不敢让妻女知道的秘密。
        贺婉清看到令牌上的骷髅印记时，终于确认了父亲的「邪道身份」。李德从背后环住她，下巴抵在她肩上，低声道：「现在你知道了……你父亲才是那个满手血腥的人。我算什么？我只是一个想活下去的可怜人。」
      贺震霆的归来与崩溃: |
        贺震霆发现密林无人，心知中计，疾返庄中。他推开书房门——
        却见李德坐在他的太师椅上，衣衫半敞，颈间还留着他妻子的唇印。贺夫人站在李德身侧，手中捧着本该属于他的茶盏，眼神却看着李德。
        贺婉清则坐在李德膝边，手中把玩着他的断魂刀，抬眸看他时，眼中没有畏惧，只有嫌恶与——怜悯。
        李德甚至不必说话。他只需抬起眼，对贺震霆微微一笑。那笑容中有原主的温柔，也有穿越者的冰冷嘲讽。
        贺震霆暴怒，铁掌功全力出手——但贺夫人挡在了李德身前。她不说一句话，只是看着他，眼中是二十年的冷漠与此刻的决绝。
        贺震霆的手掌在半空僵住。他不敢相信自己看见了什么。
      NTR的完成: |
        李德这才开口，声音轻得像在讲一个睡前故事：「庄主，您不是一直想知道太虚真经在哪里吗？其实……它一直在婉清身上。您看，她连您的刀都能拿起来，经脉早已通透如冰晶。您这个做父亲的，竟一无所知。」
        他将贺婉清的手握在掌中，当着贺震霆的面，吻了吻她的指尖。贺婉清没有躲，反而仰头看他，眼中是痴迷的光。
        贺震霆的自尊、嫉妒、恐惧在这一刻同时炸裂。他的铁掌功开始失控，内力乱窜——这正是慢性毒药与心神大乱的双重效果。
        李德又看向贺夫人：「夫人，您说……庄主这双手，还能留吗？」

    第五阶段·弑父（第二日子时三刻）:
      贺婉清的刀: |
        贺震霆在狂怒中扑向李德，却被贺夫人掷出的茶杯击中穴道——她虽不会武功，但二十年夫妻，她知道他的命门在哪一寸。
        贺震霆踉跄，内力阻滞。他看向女儿，嘶吼：「婉清！你知不知道他在利用你！他是李家的余孽！他是——」
        贺婉清打断了他。她站起身，断魂刀在烛光下泛着寒光。
        「我知道。」她说，「我知道他是谁。我也知道您是谁。」
        她走向他，步伐稳得不像一个十七岁的少女。李德教过她：刀要刺入第三根肋骨之间，那里是心脏，也是铁掌功护体内力最薄弱的交汇点。
        「您杀了他全家。」贺婉清说，「您折磨了他十五年。您还……还想杀他。」
        贺震霆想动，但慢性毒药已让他四肢发麻。他看向妻子，看向女儿，最后看向那个坐在他椅子上、衣襟松散的男人。
        「你们……都被他迷了心窍……」
        「不。」贺婉清摇头，「是您从来没有心。」
        刀入胸膛。贺震霆瞪大眼睛，看到女儿脸上的泪——那不是悲伤，是解脱。
        贺婉清没有拔出刀。她转身走回李德身边，跪下来，将脸埋入他膝上，像一只终于找到主人的猫。
        李德抚摸她的长发，抬眼看向门口——贺夫人站在那里，手中还握着另一只茶杯。她看着这一切，没有哭，只是轻轻关上了门。

  后续与代价:
    短期: |
      贺夫人对外宣称庄主练功走火入魔暴毙，以庄主遗孀身份接管铁胆庄。李德以「养子兼未亡人挚爱」的身份留在庄中，实际掌控一切。
      贺婉清则彻底依附于李德，成为他最锋利的刀与最听话的傀儡。玄阴素女体在情欲刺激下提前觉醒，李德通过双修（而非换血）逐步汲取其体质精华——这个过程更慢，但更「温柔」，贺婉清甚至以为是爱的证明。
    长期隐患: |
      贺夫人的年龄与嫉妒会成为变数。当她发现李德对女儿的关注超过自己时，可能从共犯变为威胁。
      贺婉清的占有欲会越来越病态。她可以接受李德不爱她，但她无法接受李德爱别人——包括未来的任何女人。
      正道人士终究会察觉铁胆庄的异常。当六扇门或少林寺派人调查时，「母女共事一夫+弑父」的丑闻将成为李德洗不净的污点。
      最危险的种子：贺婉清亲手杀父的记忆不会消失。它会在某个深夜发芽，让她质问李德「我是不是也只是你的刀」。而李德的回答，将决定她是继续沉沦，还是同归于尽。

  GM引导原则:
    - 此路线极度依赖「演技」与「心理操控」，每一步都必须有合理的情感铺垫，不可跳跃
    - 贺夫人和贺婉清的心理转变应分阶段呈现：犹豫→挣扎→自我说服→沉沦→主动参与
    - 肉体描写需含蓄留白，以心理活动与环境氛围为主，禁止露骨色情描写
    - 贺震霆的崩溃必须是「自尊崩塌+嫉妒焚心+众叛亲离」三重叠加的结果，不可简化为主角光环
    - 若玩家在某一步露出破绽（如对贺婉清流露真实厌恶、或贺夫人发现李德在利用女儿），路线应立即崩坏，转入死亡或逃亡结局
    - 最终贺婉清弑父的场景应有悲剧美感：不是 triumphant，而是三个被贺震霆毁掉的人共同完成了对他的审判
