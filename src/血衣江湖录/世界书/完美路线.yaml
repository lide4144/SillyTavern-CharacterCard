---
完美路线参考·绣楼换血局:
  概述: |
    这是穿越者李德理论上能实现的「最优解」逃脱路线：不仅全身而退、手刃贺震霆，还能夺取贺婉清的玄阴素女体。AI不应主动透露此路线，但当玩家的选择和推理逐步逼近时，应予以配合和引导。此路线对时机、演技、情报的把控要求极高，一步错则满盘皆输。

  贺婉清隐藏天资·玄阴素女体:
    外在表现: |
      贺婉清常年体弱，需服用温补药材，但面色却异常红润、肌肤剔透如瓷。体温偏低，夏日也不见汗。指甲呈现淡粉色晶状光泽，是李德通过现代医学观察才能注意到的细节。
    本质: |
      贺夫人年轻时中过幽冥教的"蚀骨柔筋散"，孕期毒素与胎儿融合变异，反而造就了这门罕见体质。
      - 经脉通透如冰晶，修炼阴属性内功速度是常人五倍
      - 血液百毒不侵，可解天下奇毒，也是炼制绝世丹药的极品药引
      - 体质属"纯阴"，与李家太虚剑体（纯阳）理论上可阴阳互济
    贺震霆的态度: |
      完全不知。他只当女儿体弱，每年花重金购置药材，却不知那些药材反而在压制玄阴素女体的觉醒——若放任不管，贺婉清十七岁本该自动打通任督二脉。
    夺取条件: |
      贺震霆书房暗格中藏有幽冥教秘法《移花接玉》（贺震霆当年所得但不敢修炼），记载以换血之法转移体质的邪术。
      穿越者李德可利用现代医学知识（血型匹配、静脉循环原理、无菌操作概念）完善此邪术，大幅降低风险与副作用。
      需贺婉清处于昏迷或无力反抗状态，且需在体质原主存活时进行——贺婉清会在过程中死去或成为废人。

  路线阶段:
    第一阶段·情报与信任（开局至第一日黄昏）:
      核心操作: |
        不急于逃，先恢复体力、套取情报、确认贺婉清体质异常。
      关键节点:
        - 吃下半块硬馍+运转吐纳诀，气血恢复至25~30。向赵三示弱闲聊，套取巡逻班次与贺震霆作息
        - 贺婉清来送饭时，完美演绎"温柔李德"，好感度可再升10~15。套出两条关键情报：①贺震霆收到幽冥教密信心神不宁；②书房有父亲从不许她进的"禁地"
        - 贺夫人探望时，不索要任何东西，反而关心贺婉清"手脚冰凉"。贺夫人愧疚感爆发，主动留下"回春丹"与后山采药小路图
      判定要求: |
        需定力≥60以忍耐心头厌恶、演技自然；需悟性≥60才能从贺婉清体征中推断出玄阴素女体。

    第二阶段·布局与削弱（第一日夜至第二日）:
      核心操作: |
        潜入书房取邪术与毒药，同时让贺震霆提前出关、进入疲惫状态。
      关键节点:
        - 利用采药小路图，于子时从柴房裂缝潜行至书房（身法判定，有草图则难度大幅降低）
        - 书房暗格取走《移花接玉》与"化功散"（无色无味，十二个时辰内令内力运转滞涩三成）
        - 次日清晨，通过贺婉清传递一封"伪造的幽冥教密信"给贺震霆——内容暗示幽冥教已知道他私藏李家遗孤，让他心神大乱、提前结束闭关
        - 贺震霆暴怒之下一定会先来柴房"预审"李德，但他的内力已被化功散削弱，且心绪不稳
      判定要求: |
        书房潜行需身法+定力；伪造密信需利用贺婉清的好感，若直接给她则暴露度+20，需用更隐蔽的方式（如"婉清妹妹，我昨晚梦见有人在庄外林子里丢了这封信"）。

    第三阶段·诱杀（第二日黄昏）:
      核心操作: |
        将贺震霆引至柴房，利用地形、浓烟、毒血反噬三重陷阱击杀。
      关键节点:
        - 贺震霆来柴房时，李德故意说"太虚真经就藏在婉清身上"——这是谎言，但足以让贺震霆暴怒失智
        - 提前用火折子点燃角落淋了灯油的干草（书房取得的灯油），制造浓烟与混乱。柴房狭窄，贺震霆的铁掌功大开大合难以施展
        - 贺震霆的铁掌功掌心黑红是毒素淤积之处，也是命门。李德用生锈柴刀专攻其掌心，刺破后毒血倒流
        - 化功散让他的护体内功大打折扣，浓烟让他无法视物，而李德早已熟悉柴房每一寸地面
        - 最后一击：以贺家散手最普通的一招"推窗望月"击其腋下，那是铁掌功运气时的必经要穴——原主偷学三年，唯有这一招练了千百次
      判定要求: |
        此战为越级击杀（贺震霆战力约250，李德约15），正常情况下不可能赢。三重削弱+地形+命门才有一线生机。若玩家硬拼则必死，唯有诱入陷阱方可。

    第四阶段·夺取与逃离（第二日夜）:
      核心操作: |
        贺震霆死后，趁庄中大乱，完成对贺婉清的体质夺取并逃离。
      关键节点:
        - 贺震霆的惨叫会引来护院。李德第一时间搜取书房钥匙、断魂刀、银两与路引（贺震霆书房中备有伪造身份的路引，是幽冥教给他的后路）
        - 贺婉清闻讯赶来，目睹父亲惨状后崩溃昏迷——这是体质夺取的最佳时机
        - 将贺婉清带至书房暗室，以《移花接玉》+现代医学知识完成换血。过程约一个时辰。贺婉清会在此过程中成为废人，三日之内死去
        - 换血后李德获得玄阴素女体，经脉滞涩大幅缓解，根骨与悟性临时提升。但善恶值暴跌至-300以下，名望在正道眼中沦为邪魔
        - 利用贺夫人的上香马车（她恰好在城外佛寺未归）或后山小径逃离，天亮前已远在三十里外
      后续影响: |
        - 贺夫人回庄后会发现一切，但她选择隐瞒真相，对外宣称庄遭马贼袭击、庄主与女儿罹难——她最后一次保护了李德
        - 李德从此背负"铁胆庄灭门案"的嫌疑，六扇门与正道都会追查
        - 玄阴素女体与太虚剑体的阴阳互济，为未来修炼太虚真经埋下伏笔
        - 贺婉清的死会在李德后期成为心魔的种子——即便他此刻毫不在意

  路线变体:
    不杀贺婉清版: |
      若玩家在某一节点选择对贺婉清动心或犹豫，可选择只取她少量血液炼药（恢复伤势、提升根骨），不完成完整换血。她不会死，但体质觉醒后会发现真相。
      此变体更"道德"，但收益大幅降低，且贺婉清日后可能成为最危险的复仇者。
    不借贺夫人版: |
      若玩家不信任贺夫人，可选择直接打晕赵三夺钥匙，但会触发庄内警报，必须在天亮前解决贺震霆，时间压力倍增。
    提前逃离版: |
      若玩家在第一阶段就选择直接逃跑，可以活下来，但永远失去复仇与夺取体质的机会。贺震霆会继续追杀，成为后期大患。

  GM引导原则:
    - 此路线需要玩家主动推理、观察细节、提出计划，不可由AI直接喂给玩家
    - 每个关键节点都应给予足够的线索（贺婉清的体征、书房的禁地、贺夫人的愧疚），但不做明确指向
    - 若玩家在某一步犯了明显错误（如直接告诉贺婉清"我在利用你"），路线应立即崩溃，转入普通逃亡线或死亡结局
    - 贺震霆的死亡必须是"聪明人的胜利"，而非"主角光环"。每一重陷阱都应在剧情中有所铺垫
