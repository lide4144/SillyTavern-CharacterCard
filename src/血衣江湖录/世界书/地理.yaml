---
大雍江湖地理:
  概述: 大雍王朝定鼎中原三百余年，武林势力犬牙交错。江湖以九州为界，各州风土人情迥异，门派势力此消彼长。

  中州:
    核心: 洛京（皇城）
    特征: 天子脚下，六扇门总衙所在，武林人士行事多受约束
    主要势力:
      少林寺: 武林泰山北斗，七十二绝技威震天下，位于洛京以西少室山
      武当派: 道家正宗，太极拳剑以柔克刚，位于洛京西北武当山
      六扇门: 朝廷鹰犬，网罗江湖败类与落魄高手，总捕头"追魂手"铁无情
    特殊地点:
      洛京黑市: 鬼市子时开寅时散，可买到情报、赃物、禁药
      天牢: 关押重犯之地，传说第九层锁着某个三十年前的魔头

  北境·玄州:
    核心: 玄铁城
    特征: 苦寒之地，民风彪悍，多出猛将豪侠
    主要势力:
      玄铁剑派: 以重剑铸剑闻名，剑法大开大合，掌门"玄铁真人"独孤寒
      铸剑山庄: 天下第一铸剑圣地，每十年开炉一次，所铸名剑引江湖争破头
      雪狼帮: 马贼出身，专劫富商，帮主"雪狼王"呼延烈，与幽冥教暗通款曲
    特殊地点:
      冰封谷: 千年玄冰不化，传说谷底有上古剑冢
      黑石城: 冀州边陲重镇，贺震霆铁胆庄所在地，鱼龙混杂

  东莱·沧洲:
    核心: 蓬莱港
    特征: 鱼米之乡，商贸发达，武林风气相对文雅
    主要势力:
      东海剑阁: 海上剑派，剑法飘逸如浪，阁主"沧海一剑"沈孤帆
      蓬莱商盟: 富可敌国，以财力影响江湖，盟主富甲天下却无人知其真面目
      百花谷: 医术与毒术并修，谷主"医仙"花解语，亦正亦邪
    特殊地点:
      沉剑潭: 相传某位剑仙在此沉剑入潭，潭水终年碧寒
      烟花扬州: 风月无边，也是情报交易之所

  南域·瘴州:
    核心: 苗疆寨
    特征: 深山密林，瘴气弥漫，外人难以深入
    主要势力:
      五毒教: 以毒入武，行事诡秘，教主"毒龙尊者"蓝凤凰
      唐门: 暗器与机关术独步天下，堡主"千手修罗"唐问天
    特殊地点:
      万毒林: 踏入十步必死，唯有五毒教弟子能通行
      蛊神洞: 苗族禁地，传说藏着可控制人心的上古蛊王

  西荒·沙州:
    核心: 玉门关
    特征: 大漠戈壁，绿洲星罗棋布，丝路商队与马贼共存
    主要势力:
      昆仑派: 道家隐修，"昆仑九阳功"至刚至阳，掌门"玉虚子"
      天魔宗: 魔门分支，修炼邪功，宗主"天魔"厉苍生，与幽冥教分庭抗礼
      大漠马贼: 来去如风，劫掠商队，首领"沙海狂刀"拓跋野
    特殊地点:
      楼兰遗迹: 沙漠深处的失落古城，藏有无数珍宝与诅咒
      月牙泉: 沙漠绿洲，泉水有疗伤奇效，被昆仑派守护

  云州:
    核心: 云州城（已毁）
    特征: 主角故乡，十五年前苏家灭门后已成废墟，如今被野草与传说覆盖
    历史: 云州李家本是太虚剑宗末代传人，隐居于此，家传《太虚真经》引来灭门之祸
    现状: 废墟中偶有江湖人士探寻秘籍下落，贺震霆派有眼线长期监视
