---
邪道路线后续·暗主狂澜:
  概述: |
    邪道路线中，李德以情欲为刃、以背叛为盾，将贺夫人与贺婉清逐一策反，让贺震霆在最耻辱的境遇下死于至亲之手。
    与完美线的"逃离"截然不同，邪道线的李德不逃。他以"养子兼未亡人挚爱"的身份留在铁胆庄，以贺夫人为明面庄主、自己为暗面操控者，将这座庄园变成他的王国、他的牢笼、他的修炼场。
    这里的"世界"不是江湖，是铁胆庄的高墙之内——一个封闭空间里的权力博弈、情欲纠缠、以及母女之间逐渐变质的关系。
    后续剧情分为四幕：暗主、双修、暗流、裂变。每一幕都在铁胆庄内部展开，但外部世界的压力（正道、幽冥教、六扇门）会不断渗透高墙，最终将这封闭的王国撕裂。

  第一幕·暗主（弑父后第1-3个月）:
    概述: |
      贺震霆死后，贺夫人对外宣称庄主"练功走火入魔暴毙"，以遗孀身份接管铁胆庄。李德以"养子"身份料理丧事、安抚宾客、逐步接管庄务。
      这一阶段的核心是"稳定"——让外界相信贺震霆的死是意外，让庄内护院与下人接受新的权力结构，以及……让贺婉清与贺夫人的精神状态不至于崩溃。

    丧事（第1-7日）:
      对外表演: |
        贺夫人一身素缟，在正厅设灵。她哭得肝肠寸断——其中三分是真（二十年夫妻，即使没有爱情也有惯性），七分是演技（她必须让所有人相信她是悲痛的未亡人）。
        李德跪在灵前，一袭白衣，面色比纸还白。他哭得无声，只是肩膀微微颤抖——这是最高级的演技，因为"无声的悲痛"比"嚎啕大哭"更令人信服。
        来宾包括：冀州武林同道、六扇门冀州分衙的代表、黑石城地方官员、以及……幽冥教的一名外围使者（以"贺震霆故友"身份出席）。
        李德在丧礼上的一举一动都被审视。他必须完美地扮演"悲痛养子"：接待宾客时谦逊有礼、答话时声音沙哑、提及贺震霆时眼眶泛红。
        最危险的时刻：幽冥教使者单独找他谈话。"贺庄主走火入魔？"使者似笑非笑，"我教中有一种功法，走火入魔时掌心会现黑纹。贺庄主的掌心……可有这样的黑纹？"
        李德垂眸："草民不懂武功。但义父临终前……确实掌心漆黑如墨。"
        使者盯着他看了很久，最终离去。但他没有离开黑石城——他在等，等一个破绽。
      贺婉清的状态: |
        贺婉清在弑父后陷入了极度的精神混乱。白天，她能在人前维持正常：穿衣、梳妆、接待女宾。夜晚，她会在闺房中尖叫、哭泣、用指甲抓挠自己的手臂。
        李德每晚都会去她房中"陪伴"。这不是出于关心，是出于"控制"——若贺婉清的精神崩溃被人察觉，整个计划都会暴露。
        他的"陪伴"方式是：将她拥入怀中，轻声讲述原主记忆中的童年故事（萤火虫、糖糕、夏夜的风），直到她在他怀中睡着。
        这种"温柔"让贺婉清越来越依赖。她开始产生错觉：德哥哥是她的救赎、她的光、她在这世界上唯一的意义。
      贺夫人的状态: |
        贺夫人比贺婉清更冷静，但也更危险。她完美地扮演着"悲痛遗孀"，但在无人时，她会坐在佛堂中，对着佛像发呆。
        她不是在忏悔。她在"消化"——消化自己参与杀夫的事实、消化对李德的感情已从母爱变质为情欲、以及消化一个让她恐惧的念头：她嫉妒自己的女儿。
        李德每晚也会去她房中。与对贺婉清的"温柔陪伴"不同，他对贺夫人的"陪伴"是肉体上的——他们在贺震霆的卧房中做爱，在贺震霆的书房中密谋，在贺震霆的练武场边低语。
        这种"占有仇人一切"的快感，对穿越者李德而言是冰冷的胜利宣言。但对贺夫人而言，这是"解放"——她终于不再是那个被冷落的妻子，她是一个被需要的女人。

    权力交接（第1个月）:
      庄务接管: |
        贺夫人成为名义上的庄主，但她不懂武功、不懂江湖规矩、不懂如何管理护院。所有的决策实际上都由李德做出。
        李德的第一步：清理贺震霆的心腹。护院首领赵三被"遣散"（实则是被李德以化功散废去武功后逐出庄外）；马夫孙二被调去管理外庄田产；厨子周胖子因"贪杯误事"被辞退。
        取而代之的是李德安插的人：从黑市雇佣的两名退役镖师（战力约60，只听命于银两）、以及贺婉清亲自挑选的"贴身丫鬟"（实则是贺婉清的耳目）。
      对幽冥教的应对: |
        幽冥教冀州分舵对贺震霆的死因始终存疑。他们派来了第二名使者——这一次不是外围，是内部人员"血鸦"。
        血鸦是个女人，三十岁，美艳而危险。她的任务是"确认贺震霆之死是否与太虚剑宗有关"。
        李德知道，血鸦不能杀（杀了会引来更多追查），也不能让她查出真相。所以他选择了第三条路：色诱。
        这不是说李德亲自色诱血鸦。他利用的是贺婉清——让贺婉清在血鸦面前"无意间"展示出玄阴素女体的迹象（指尖的晶状光泽、异常的体温），同时散布谣言："贺庄主的女儿自幼体弱，是因为体内有某种'特殊体质'。"
        血鸦果然上钩。她认定贺震霆的"暴毙"与玄阴素女体有关——贺震霆可能在试图夺取女儿体质时走火入魔。这个解释完美符合幽冥教的逻辑。
        血鸦向分舵汇报后，幽冥教将注意力从"追查凶手"转向了"确认玄阴素女体的下落"。李德成功转移了目标。
        但血鸦离开前，对李德说了一句让他铭记的话："你很有趣。我们还会再见面的。"

  第二幕·双修（第3-6个月）:
    概述: |
      铁胆庄的权力稳定后，李德开始专注于自己的核心目标：修炼。
      邪道路线中，他没有通过换血夺取玄阴素女体，而是选择了更"温和"但更漫长的方式——双修。通过与贺婉清的阴阳交合，逐步汲取其纯阴精元，调和太虚剑体的纯阳之气。
      这个过程比换血慢，但副作用小，且贺婉清不会死。相反，她会在双修中获得一定程度的修为提升——虽然大部分精华都被李德吸走，但她以为是"爱的馈赠"。

    玄阴素女体觉醒: |
      弑父的剧烈情绪冲击+与李德的双修刺激，让贺婉清的玄阴素女体提前觉醒。
      觉醒迹象：
      - 她的体温变得更低，即使在炎夏也冰凉如玉
      - 她的肌肤透明度增加，在阳光下可隐约看到皮下淡蓝色的血管
      - 她的指甲晶状光泽更加显著，且能在月光下发出微弱的磷光
      - 她开始能感知到李德体内的"热流"——那是太虚剑体的纯阳之气，对玄阴素女体有致命的吸引力
      - 她的经脉在觉醒后第一个月内自动打通了任督二脉，内力从无到有，迅速提升至相当于普通内功第三层的水平
      但贺婉清对这些变化一无所知。她只以为自己"最近精神好了一些"、"不怕热了"。李德没有告诉她真相——让她知道得越少，越好控制。

    双修机制·阴阳采补:
      功法来源: |
        贺震霆书房暗格中的《移花接玉》记载了换血之法，但也提到了"阴阳交泰、互补互济"的概念。李德以现代医学知识（内分泌系统、激素循环、能量代谢）完善了这套理论，创造出属于他自己的"双修采补法"。
      具体操作: |
        每月初一、十五的子时，李德与贺婉清在闺房中进行双修。不是普通的交合，而是以特定穴位接触、特定呼吸节奏配合、以及真气在双方经脉中的循环流转。
        李德以太虚剑体的纯阳之气为"引"，诱导贺婉清体内的玄阴之气沿特定经脉流动，然后在交汇点（通常是两人手掌相抵或身体最亲密接触的部位）将纯阴精元吸入自己体内。
        每次双修后，李德的气血与内力上限会小幅提升（约+5/+3），而贺婉清会暂时虚弱（气血-10，需三恢复），但经脉通透度会小幅增加。
        长期来看（每月两次，持续一年），李德的太虚剑体将逐步激活，而贺婉清的玄阴素女体将从"觉醒"进入"成熟"——成熟后的玄阴素女体可产出的精元质量更高，但贺婉清本人会更加依赖双修（断食尚可，断双修则会精神崩溃）。
      贺婉清的感知: |
        贺婉清不知道这是"采补"。她以为这是"德哥哥教我的养生功法"。
        每次双修后，她都会感到一种奇异的"满足"——不是肉体上的，是精神上的。她觉得与德哥哥"融为了一体"，这种感觉让她上瘾。
        她开始期待初一、十五的到来。在其他日子里，她会变得焦躁不安、心神不宁。
        李德利用这种"上瘾"来控制她。若她某次不听话，李德会"推迟"双修日期，让她在焦虑中自行修正行为。

    贺夫人的嫉妒:
      嫉妒的萌芽: |
        贺夫人最初没有察觉李德与贺婉清的"双修"。她以为李德每晚去贺婉清房中只是"安慰丧父的悲伤"。
        但某夜，她去女儿房中送安神汤，在门外听到了不该听到的声音——不是普通的呻吟，是一种她从未听过的、奇异的韵律，伴随着两人的呼吸起伏。
        她没有推门。她端着汤，在门外站了一刻钟，然后悄然离去。
        那夜，贺夫人第一次没有等李德来她的卧房。她独自坐在佛堂中，捻着念珠，直到天明。
      嫉妒的表现: |
        贺夫人不会直接质问。她会用更微妙的方式表达：
        - 她开始"频繁"地出现在贺婉清面前，以"关心女儿"的名义打断两人的独处
        - 她会在李德面前"不经意"地提起"婉清年纪还小，有些事不宜过早"
        - 她开始对贺婉清的衣食格外上心——实则是想掌控女儿的一切，包括与李德的接触时间
        - 她会在双修之夜（初一、十五）"生病"，召李德去她房中侍疾
        这些行为不会立刻引发冲突，但会在母女之间埋下裂痕。
      李德的应对: |
        李德不会选边站。他会维持精妙的平衡：
        - 对贺夫人：更多的肉体温存、更多的"只有我们两个人的时刻"、更多的甜言蜜语
        - 对贺婉清：更频繁的精神陪伴、更多的"你是唯一懂我的人"的暗示
        - 对两人：从不比较、从不偏袒、从不承诺
        这种平衡极其脆弱，但只要两个女儿还在互相猜忌而非联合对抗，李德就是安全的。

  第三幕·暗流（第6-12个月）:
    概述: |
      铁胆庄表面的平静持续了半年，但高墙之外的世界已经开始怀疑。
      正道人士注意到"贺震霆暴毙"的时间点恰好与他虐待养子的传闻重合；六扇门收到了匿名举报信；幽冥教虽然转移了注意力，但血鸦的"我们还会再见面"不是空话。
      这一阶段，外部压力开始渗透铁胆庄的高墙。李德必须在外部调查与内部裂痕之间走钢丝。

    正道调查·六扇门女捕快"冷月": |
      六扇门冀州分衙收到匿名举报信，信中暗示贺震霆之死并非走火入魔，而是"被人谋害"。分衙派遣了一名女捕快"冷月"前来"例行调查"。
      冷月二十四岁，使一对短剑，武功约70。她不是铁无情那种级别的捕头，但她有一个致命的特质：直觉极准。她不靠证据断案，靠"闻"——她能闻到谎言的味道。
      冷月入庄第一日，就注意到了异常：
      - 贺夫人对李德的"关怀"超出了继母对养子的范畴
      - 贺婉清看李德的眼神不是兄妹之情
      - 李德本人……太完美了。完美的悲痛、完美的谦逊、完美的无辜。
      "完美的受害者往往是完美的凶手。"冷月在调查笔记中写道。
      她开始私下接触庄中下人、试图找到赵三（已被逐出）、以及……接近李德本人。
      李德意识到冷月的危险。他不能杀她（杀六扇门捕快会引来铁无情），也不能让她查出真相。所以他选择了最擅长的武器：情感操控。
      他开始"无意"地在冷月面前展现"脆弱"：独自一人时在贺震霆灵前发呆、深夜在庄中漫步时轻声叹息、以及……在冷月调查他时，"崩溃"地承认"义父确实虐待过我，但我没有杀他……我怎么可能杀他？"
      冷月第一次对自己的直觉产生了怀疑。她看到了一个被虐待的养子、一个失去父亲的少女、一个悲痛过度的寡妇。这个画面太"合理"了，合理到让她怀疑自己的怀疑。
      但她在离开前，对李德说了一句话："我不知道你是不是凶手。但我知道，你不是一个普通的养子。"
      这是警告，也是认可。

    幽冥教再临·血鸦的筹码:
      血鸦在第9个月再次出现在黑石城。这一次，她带来了幽冥教的"提议"：
      幽冥教已确认贺婉清是玄阴素女体。他们愿意以"保护铁胆庄不受正道追查"为条件，换取每年一次的"采血"——玄阴素女体的血液是炼制绝世丹药的极品药引。
      李德评估：若拒绝，幽冥教可能直接动手抢人；若接受，贺婉清会成为幽冥教的长期药库，但她的价值会被削弱（失血过多会影响双修效果）。
      他的第三条路：与血鸦达成私下交易。他提供自己的"太虚剑体精血"（少量，不会伤根本）作为替代品，换取幽冥教的庇护与情报支持。
      血鸦对这个提议极感兴趣——太虚剑体的纯阳精血对幽冥教的阴属性功法修炼者而言，是比玄阴素女体血液更珍贵的补品。
      但血鸦的条件是：交易必须在幽冥教总坛进行，由她亲自"采集"。
      这意味着李德必须离开铁胆庄、深入幽冥教的地盘——风险极高，但回报是幽冥教的正式庇护。
      血鸦在李德犹豫时，做了一件让他意外的事：她走到他面前，仰头看着他，眼中没有威胁，只有一种奇异的……渴望。
      "你知道吗？"她说，"我采过很多人的血。但从没有一个……让我想先尝一口他的人。"
      这是幽冥教的"桃花"——比正道更危险，比贺婉清更复杂。血鸦对李德的兴趣，既是职业性的（他的血值钱），也是个人性的（他的冷静让她着迷）。

    母女裂隙的扩大:
      冷月的调查让贺夫人精神紧张。她开始更加频繁地"监视"李德与贺婉清。
      贺婉清则因为冷月的出现而感到威胁——她发现母亲和李德都在"关注"这个女捕快，而她被排除在外。
      裂痕在某一夜晚爆发：贺婉清偷听到母亲与李德的对话。贺夫人在哭："你最近去她房中的次数比去我的多。你是不是……厌倦我了？"
      李德的声音温柔而冷静："夫人，婉清只是个孩子。您才是这个家的主人。"
      贺婉清在门外咬破了嘴唇。她不是孩子。她杀了自己的父亲。她为他做了那么多。她每晚都在他身下辗转呻吟。而他说她只是"孩子"？
      这种嫉妒没有立刻爆发。它像一颗种子，埋在贺婉清心中最阴暗的角落。

  第四幕·裂变（第12个月及以后）:
    概述: |
      所有的伏笔在这一幕收束：贺婉清的占有欲、贺夫人的嫉妒、正道与幽冥教的双重压力、以及李德自身越来越难以维持的平衡。
      铁胆庄这座高墙内的王国，终将崩塌。问题是：崩塌时，谁能活下来？

    贺婉清的爆发: |
      导火索是李德的一次"疏忽"：他在与贺婉清双修后，随口说了一句"夫人今天做的桂花糕很好吃"。
      贺婉清的脸色瞬间变了。她微笑着说"德哥哥喜欢的话，我也学着做"，但当晚，她在厨房中砸碎了所有的碗碟。
      三日后，贺夫人"误食"了某种导致腹泻的草药。不是毒药，只是让她在床上躺了三日——足够让贺婉清独占李德三晚。
      贺夫人知道是女儿做的。她没有揭穿，但她对贺婉清的态度从"母亲"变成了"竞争对手"。
      更危险的信号：贺婉清开始在李德的茶中下微量安眠药——不是为了害他，是为了确保他"每晚都在她房中"。剂量极轻，李德不会察觉，但长期累积会影响他的内力运转。
      李德 eventually 会察觉。他会面临一个选择：
      ① 揭穿贺婉清，打破她的幻想——风险是她可能彻底崩溃，将一切公之于众
      ② 默许她的行为，继续维持平衡——风险是剂量会逐渐加重，直到他失去反抗能力
      ③ "引导"她将嫉妒的矛头转向外部（如冷月、血鸦）——这是最高级的操控，但也是最高风险的

    贺夫人的背叛: |
      贺夫人的嫉妒最终压倒了一切。她开始秘密与冷月接触——不是出卖李德，是"寻求帮助"。
      她告诉冷月："我不知道贺震霆是怎么死的。但我知道……李德不是表面上那么简单。我需要你帮我查清楚，他到底想要什么。"
      这是贺夫人第一次主动寻求外部帮助。她不再信任李德，但她也舍不得彻底摧毁他——她只是想"重新掌控"这段关系。
      冷月抓住了这个机会。她终于获得了突破调查的缺口。
      但贺夫人不知道的是，冷月也有私心。她在与李德的接触中，逐渐对这个"神秘的养子"产生了超越职业的兴趣——不是爱慕，是"想要了解"的执念。

    幽冥教的 ultimatum:
      血鸦带来了幽冥教最后的通牒：要么李德亲自前往总坛"履约"（提供太虚剑体精血），要么幽冥教会"亲自来接人"（带走贺婉清）。
      同时，血鸦私下给了李德一个"额外选项"：若李德愿意与她"共度一夜"，她可以用个人权限将期限延长三个月。
      这是赤裸裸的交易——她的身体，换他的时间。
      李德知道，接受意味着进一步陷入幽冥教的控制；拒绝意味着失去最后的缓冲期。
      但他也意识到：血鸦对他个人兴趣是真实的。这种"真实"比任何筹码都更有价值——因为真实意味着可利用。

    最终裂变:
      所有的压力在第15个月的某个夜晚同时爆发：
      - 冷月带着搜查令（伪造的，但她赌李德不敢揭穿）进入铁胆庄，要求"重新调查贺震霆之死"
      - 血鸦在庄外埋伏，若李德不跟她走，她会直接杀入庄中带走贺婉清
      - 贺婉清在茶中下的安眠药剂量达到了临界点——李德的内力运转出现滞涩
      - 贺夫人在佛堂中对着佛像发誓："若他背叛我，我便与他同归于尽。"
      李德被困在铁胆庄中，四面楚歌。他的计算能力在药物影响下开始下降，而这是他最致命的弱点。
      但他还有最后一张牌：母女之间的裂痕。
      他利用贺婉清对贺夫人的嫉妒、贺夫人对贺婉清的恐惧，以及两人对他共同的执念，设计了一场"母女对决"。
      结果取决于玩家的选择：
      ① 牺牲贺夫人：让贺婉清相信"母亲想害你"，借贺婉清之手除掉贺夫人，然后带着贺婉清逃离铁胆庄，投奔幽冥教
      ② 牺牲贺婉清：让贺夫人相信"女儿疯了"，将贺婉清软禁/送走，然后与贺夫人继续维持铁胆庄的假象
      ③ 同时抛弃两人：利用混乱独自逃离，将铁胆庄和母女二人留给六扇门与幽冥教
      ④ 尝试挽救（极高难度）：在药物影响下，凭意志力和演技同时安抚母女二人、击退血鸦、并说服冷月暂缓调查。若成功，铁胆庄的王国可再延续一年；若失败，死亡。

  邪道线独有机制·情欲操控:
    概述: |
      邪道路线中，李德的"武器"不是刀剑，是情感与欲望。他需要不断维持多个女性角色的好感度与依赖度，同时防止她们互相联合或背叛。
    操控手段: |
      ① 承诺的碎片化：对每个人只承诺"一部分未来"，从不给完整的承诺。贺夫人得到的是"夫人，这个家离不开您"；贺婉清得到的是"婉清，只有你能理解我"；血鸦得到的是"你的提议……我需要时间考虑"。
      ② 嫉妒的引导：让每个人都觉得"他对我最好，但别人也想抢走他"。嫉妒会阻止她们联合，但也会让每个人都更紧地抓住他。
      ③ 身体的控制：通过双修的频率与质量，控制贺婉清的生理依赖；通过肉体温存的频率，控制贺夫人的情绪稳定。
      ④ 信息的隔离：母女之间从不共享关于李德的"全部信息"。每个人都只知道李德想让她知道的部分。
    风险与代价: |
      ① 情感疲劳：长期维持多重关系会让李德的精神负荷达到极限。他需要越来越多的"表演"来维持平衡。
      ② 药物与暗算：被操控者可能反过来操控他——贺婉清的安眠药、贺夫人的"求助"、血鸦的"交易"，都是反操控的尝试。
      ③ 外部压力：正道与邪道都不会允许一个"玩弄人心的恶魔"长期存在。铁无情 eventually 会亲自来查；白骨夫人 eventually 会发现太虚剑体的存在。
      ④ 最大的代价：当一切都结束后，李德会发现自己已经"不会正常地爱一个人"了。贺婉清的痴情、贺夫人的温柔、甚至血鸦的直白，对他来说都只是"可计算的资源"。这种能力的丧失，是邪道路线最深层的惩罚。

  GM设计原则:
    - 邪道线的核心主题是"控制的幻觉"——李德以为他在控制所有人，但实际上每个人都在以各自的方式反噬他
    - 贺婉清与贺夫人不是"工具"，是有自主意识的个体。她们会观察、会学习、会在某个时刻做出李德预料之外的选择
    - 双修描写应含蓄而隐喻化，以"真气流转""阴阳交汇"等武侠概念为主，禁止露骨色情
    - 桃花事件在邪道线中是"武器"而非"福利"——每一次情欲纠缠都有其政治目的，李德从不为 pleasure 而做爱
    - 母女之间的裂痕应缓慢而真实地扩大：从微妙的不快→公开的冷淡→暗中的 sabotage→最终的决裂
    - 铁胆庄的氛围应从"平静的庄园"逐渐变质为"压抑的牢笼"——下人们感觉到异常但不敢问，宾客们感觉到诡异但说不清，而高墙内的三个人都在微笑中互相提防
    - 若玩家在某一步"真情流露"（如对贺婉清产生真实情感、或拒绝继续操控贺夫人），路线不会立刻崩坏，但会转入"救赎变体"——一个更困难但可能更"人性"的结局
