---
完美路线后续·血衣江湖:
  概述: |
    完美路线中，李德以三重陷阱击杀贺震霆，以《移花接玉》夺取贺婉清玄阴素女体，于第二日子时逃离铁胆庄。
    他从此背负"铁胆庄灭门案"的罪名，善恶值跌至-300以下，成为正道通缉的邪魔、幽冥教追杀的叛徒、以及江湖中一个"苍白少年屠庄"的恐怖传说。
    但这也是李德真正自由的开始——没有贺震霆的锁链，没有铁胆庄的高墙，他第一次能用自己的双脚丈量这个江湖。
    后续剧情分为五幕：血衣逃亡、阴阳初会、太虚遗秘、正邪不容、破茧成蝶。每幕都有明确的时间跨度、核心地点、关键冲突与能力成长节点。

  第二幕·血衣逃亡（逃离后第1-15日）:
    概述: |
      李德离开铁胆庄后的最初半个月，是从"囚徒"到"亡命徒"的蜕变期。
      他面对的不再是柴房的护院，而是整个冀州的追捕网络：六扇门的通缉令、幽冥教的暗探、以及各路想拿他人头换赏金的江湖散人。
      这一阶段的核心是"藏"与"逃"——李德必须学会在江湖中隐身，用伪造身份、易容、以及对现代刑侦反追踪知识的理解，在追捕网中穿行。

    逃离当晚（第二日子时）:
      路线选择: |
        ① 贺夫人马车线：若玩家此前取得贺夫人信任，可乘她的上香马车出庄。马车行至黑石城郊外的慈云庵时，李德下车遁入山林。贺夫人回庄后发现惨状，选择对外宣称"马贼夜袭"。
        ② 后山小径线：若玩家未借马车，需独自穿越黑石山密林。林中野兽与断崖是物理威胁，更重要的是——幽冥教在庄外有眼线，子时前后恰有一名探子在林边值守。
      随身物资盘点: |
        断魂刀（贺震霆佩刀，厚背砍刀，认得出的人不少，是麻烦也是武器）
        伪造路引一张（幽冥教给贺震霆的后路，身份为"冀州商人苏文"，但幽冥教可能已冻结此身份）
        银两约八十两（贺震霆书房暗格中的应急金）
        《移花接玉》残篇（邪术，不可示人）
        化功散余量（约两份，无色无味，十二个时辰内令内力运转滞涩三成）
        回春丹三枚（贺夫人所赠）
        换血后的身体状态：气血回升至40/120，内力15/60，经脉滞涩大幅缓解，但玄阴素女体初醒，夜间会感到骨髓深处的寒意

    第1-3日·黑石城外围:
      事件: |
        李德不敢入城——城门已有六扇门捕快盘查，虽未贴通缉画像，但"铁胆庄昨夜遭袭"的消息已传开，所有陌生面孔都被 scrutiny。
        他只能在城外荒野求生：捕猎野兔、饮溪水、在破庙或岩洞中过夜。
        第三日黄昏，他在官道旁的茶摊 overhear 两个镖师的对话："铁胆庄庄主死了，听说死状极惨，像是被自己的毒血反噬。六扇门的沈大人都亲自去了。"
        另一个镖师压低声音："不止六扇门，幽冥教也派人来了。贺震霆是他们的人，死得这么蹊跷，幽冥老祖能罢休？"
        李德心中一凛：追捕比预想中来得更快、更复杂。
      第一次遭遇战: |
        第三日夜里，两名幽冥教外围探子循着后山小径的踪迹追至李德藏身的破庙。
        这是李德第一次真正面对"江湖人士"的追杀——不是贺震霆那种碾压式的施暴，而是两个武功平平但经验丰富的杀手。
        李德战力约35（换血后根骨悟性提升），对方两人各约40。正常一打二难赢，但李德有化功散和地形优势。
        破庙中有积灰的香炉、松动的房梁、以及半人多高的佛像底座——李德可用现代思维布置简易陷阱。
        胜利后缴获：幽冥教外围弟子令牌一枚（可作伪装）、短刀两把、劣质金创药一瓶、以及一封密信——信中写着"活捉凶手，教主要亲自审问"。
      GM要点: |
        强调李德从"被囚禁者"到"荒野求生者"的心理转变。他不再有人送饭，不再有固定屋顶，每一次选择（是否点火取暖、是否猎杀野兽、是否靠近人烟）都关乎生死。
        两个幽冥教探子不应太强，这是给玩家的"第一场真正战斗"——让玩家建立信心，也意识到追杀不会停止。

    第4-7日·落霞镇:
      事件: |
        李德需要补给：食物、干净衣物、以及最重要的——情报。他易容（用锅底灰涂脸、用布条裹住显眼的容貌）后，混入落霞镇。
        落霞镇是黑石城以东三十里的小镇，常有江湖人落脚。镇中有一家"醉仙楼"，表面是酒楼，实则是烟雨楼的分号。
        李德在醉仙楼 overhear 了更多消息：
        - 六扇门已将此案定性为"马贼劫杀"，但沈砚秋私下派了心腹继续追查
        - 贺夫人对外宣称庄遭马贼袭击，但她本人"悲痛过度病倒"，已离开铁胆庄去洛京养病
        - 贺婉清的尸体被发现在书房暗室，死状"形如干尸"——这是换血后的特征，但外人无法理解
        - 江湖上开始流传一个说法："屠庄者是一个苍白如鬼的少年，手持一柄厚背砍刀"
      关键NPC·醉仙楼老板娘"红袖": |
        四十岁，风韵犹存，烟雨楼外围情报员。她一眼看出李德的易容粗糙，但没有揭穿——她闻到了他身上的血腥味，以及一丝"值钱"的气息。
        她主动搭话："小兄弟，躲仇家？"
        李德的回应决定后续：若坦诚（或半坦诚）交易，红袖可提供假路引、易容药膏、以及前往沧洲的商队名额——代价是八十两中的五十两，以及一个"将来还人情"的承诺。
        若否认或逃跑，红袖不会阻拦，但会记住他的脸，日后烟雨楼的情报网中多了一条"苍白少年，落霞镇现身"的记录。
      首次情报交易: |
        若李德选择交易，红袖提供三条情报（选其一免费，其余两条每条十两）：
        ① "太虚剑宗最后的传人十五年前死于云州，但云州废墟里最近有人看到剑光"——指向太虚真经线索
        ② "百花谷的'医仙'花解语最近在收'特殊体质'的病人，出价极高"——指向玄阴素女体觉醒后的医治线索
        ③ "六扇门总捕头'追魂手'铁无情已离京南下，目标冀州"——指向追捕者情报

    第8-15日·无名山谷:
      事件: |
        李德随商队或独自抵达沧洲边境的无名山谷。这是他选定的第一个"安全屋"——山谷幽深、人迹罕至、有山泉与野果可充饥。
        但他发现这里并非无人居住：山谷深处有一座破败的草庐，住着一位被逐出百花谷的女弟子——药奴阿芷。
        阿芷二十出头，相貌平平，但有一双极其锐利的眼睛。她第一眼看到李德就说："你体内有两股气在打架。一股极阳，一股极阴。你再不调和，活不过三个月。"
        这是李德第一次知道"玄阴素女体"和"太虚剑体"在体内冲突的严重性。
      核心冲突·阴阳不调: |
        换血后，玄阴素女体在李德体内觉醒，但他没有阴属性功法来引导这股纯阴之气。
        与此同时，太虚剑体（纯阳）作为李家血脉，在玄阴素女体的刺激下也开始蠢蠢欲动。
        两股极端属性在李德经脉中冲撞：白天燥热如焚、夜间寒彻骨髓。气血上限虽提升至120，但每日因阴阳冲突自动流失5-10点气血。
        阿芷提出交易：她懂百花谷的"阴阳调和针法"，可以暂时压制冲突。但她需要李德帮她杀一个人——她的师父、百花谷长老"毒手药王"孙鹤龄。
        孙鹤龄当年以试药为名，害死了阿芷的孪生妹妹。阿芷被逐出谷，是因为她试图下毒报复。
        李德评估：阿芷的医术对他至关重要；杀一个百花谷长老风险极高；但阿芷对百花谷的了解是独一无二的情报来源。
      阿芷的医治与交易: |
        第一阶段治疗（为期七日）：阿芷以三十六根银针封住李德体内阴阳二气的交汇要穴，暂时阻止冲突。每日需施针一次，每次一个时辰。
        在此期间，李德不能运功、不能剧烈运动、不能受惊——否则针法失效，冲突加倍反弹。
        这是李德最脆弱的时期，也是他与阿芷建立关系的窗口。
        阿芷教给李德《玄阴素女心经》残篇（她从百花谷偷出的手抄本）。这是玄阴素女体的配套功法，修炼后可主动引导纯阴之气。
        但《玄阴素女心经》是女子功法，李德修炼时需要以"太虚剑体"的纯阳之气为引，逆行经脉——痛苦程度是常人的三倍，但效果也是三倍。
      GM要点: |
        这一阶段应突出"脆弱中的成长"。李德不再是铁胆庄里任人宰割的囚徒，但他也远非强者。
        阿芷不是贺婉清——她没有少女的天真，没有无条件的爱慕。她对李德是"交易+好奇+一丝同病相怜"。
        阿芷会观察李德：若她觉得李德是"又一个想利用她然后丢弃的男人"，治疗到一半就会停手；若她觉得李德"虽然冷酷但守信"，会在后续成为长期盟友。

  第三幕·太虚遗秘（第2-6个月）:
    概述: |
      阴阳冲突暂时压制后，李德的短期目标从"活下去"升级为"变强"。
      变强的核心路径是找到《太虚真经》——李家祖传武学，也是十五年前灭门惨案的根源。
      但真经不在一处。通过云州废墟的线索、烟雨楼的情报、以及阿芷的医学知识（某些药草只在太虚剑宗遗址附近生长），李德逐步拼凑出真经的下落。

    太虚真经·三分天下: |
      《太虚真经》在李德祖父辈时被分为三份，分别交给三位值得信赖的友人保管：
      ① 剑意篇：交给铸剑山庄庄主欧冶魂的先父。铸剑山庄视其为"铸剑秘术"，不知其中真意。
      ② 心法篇：交给武当派当时的掌门"玄清真人"。后被清虚道长继承，但清虚道长不知其来源，只当它是某位前辈遗物。
      ③ 身法篇：交给东海剑阁阁主沈孤帆的先师。沈孤帆在师父遗物中发现，但参悟不透，束之高阁。
      集齐三篇，方可还原完整的《太虚真经》。单独修炼任何一篇都有极大风险：剑意篇无心法配合会走火入魔；心法篇无剑意配合则威力大减；身法篇无两者配合只是普通轻功。

    云州废墟（第2个月）:
      事件: |
        李德的第一站是故乡云州——十五年前李家灭门后已成废墟。
        回到云州对李德（穿越者）而言是奇异的体验：他没有原主的情感共鸣，但废墟中残留的血迹、墙上的剑痕、以及地窖中孩童的涂鸦，让他意识到"这具身体曾经有一个家"。
        云州废墟中，李德发现李家老宅的地下密室——这是原主五岁时被母亲推入的密道。密室中有一面石壁，上面刻满了太虚剑宗先祖留下的剑痕与留言。
        留言内容："太虚三分，意心身各归其主。他日李氏后人若能重聚，当以血醒剑、以剑证道。"
        以及一个更具体的线索："少林还俗僧'无念'知其下落。"
        但李德查到，无念已于十年前死于洛京天牢——罪名是"勾结魔教"。
      幽冥教眼线: |
        云州废墟中仍有幽冥教的眼线长期监视（贺震霆当年布置的）。李德的到来触发了他们的警戒。
        一名眼线发出信号弹，引来三名幽冥教弟子。李德必须在废墟中周旋或逃离。
        若李德选择战斗，废墟的地形（断壁残垣、地下密道）是优势；若选择逃离，可利用原主对密道的记忆（穿越者继承）遁入地下河。
      战后收获: |
        从幽冥教弟子身上搜出一份名单——"太虚剑宗余孽追踪录"，上面列着所有与李家有关的人员及下落。
        名单中除已死的无念外，还有两人活着：武当弃徒莫问天（关押于洛京天牢第九层）、以及铸剑山庄庄主欧冶魂（标注"疑似持有剑意篇"）。

    洛京暗流（第3-4个月）:
      事件: |
        李德需要潜入洛京——大雍皇城，六扇门总衙所在，也是天牢所在地。
        以他当前的通缉身份，入洛京无异于自投罗网。但阿芷提供了一个方案：百花谷每季度向皇室进贡药材，阿芷虽被逐出谷，但仍有旧识在贡药队伍中。她可伪造一份"药材押运人"的身份文书。
        代价：李德必须帮她取得孙鹤龄的"命蛊"——一种控制人心的蛊虫，孙鹤龄用它控制百花谷中的药奴。阿芷要毁掉命蛊，解放她的旧识们。
      洛京地下世界: |
        李德以药材押运人的身份入洛京，但不敢在地面活动。他的主要舞台是洛京黑市——子时开寅时散的鬼市。
        在黑市中，李德遇到了"千面佛"——烟雨楼的高级情报贩子，一个永远戴着笑脸面具的胖子。
        千面佛提供关于莫问天的情报：莫问天三十年前是武当掌门玄清真人的关门弟子，因得知太虚真经的秘密而被清虚道长（当时的师兄）陷害，以"勾结魔教"罪名关入天牢第九层。三十年过去，他已疯癫，但偶尔清醒时会念叨一些话。
        千面佛还提供了一个关键情报：清虚道长每月十五会去天牢"看望"莫问天——实则是确认他是否还活着、是否还记得秘密。
      天牢第九层（第4个月）:
        事件: |
          李德决定铤而走险：在清虚道长探望莫问天的当晚，潜入天牢第九层。
          天牢前八层由六扇门看守，但第九层是"武林禁地"，由武当派与少林共同镇守。清虚道长每月十五来此时，会暂时接管第九层的守卫权。
          李德利用化功散（最后一份）迷倒一名武当弟子，换上他的道袍，混在清虚道长随行人员中进入第九层。
          莫问天被铁链锁在墙壁上，蓬头垢面，眼神涣散。但当清虚道长离开后，莫问天突然抬头，盯着李德的背影，用一种苍老但清晰的声音说："火焰胎记……你是李家的后人。"
          这是三十年来莫问天第一次主动开口说话。
        莫问天的遗言: |
          莫问天给了李德两条信息：
          ① "清虚不知道经文的真意。他以为那是普通的道家心法，锁在武当藏经阁第七层'禁书区'。他没有修炼，因为他怕走火入魔。"
          ② "铸剑山庄的欧冶魂……他是个铸剑疯子。剑意篇在他眼里只是'铸剑图谱'。你若想要，用一柄好剑去换。"
          ③ "东海剑阁的身法篇……沈孤帆参悟不透，但他的女儿沈落霞，自幼天赋异禀，或许已看出端倪。"
          说完这些，莫问天突然狂笑，然后咬舌自尽——他等了三十年，终于等到李家后人。他的使命完成了。
          李德没有时间悲伤或感慨。清虚道长察觉到异常，正在返回。李德必须从第九层杀出或潜出。
        逃亡与心魔: |
          若李德成功逃离天牢，他会发现：莫问天的死让他第一次体验到"不是我杀的，但因为我而死"的复杂 guilt。
          穿越者的理性告诉他"这是最优结果"，但原主的残留情感会在深夜浮现——莫问天是为李家守了三十年的秘密，而李德甚至没有记住他的脸。
          这是心魔的种子：贺婉清的死亡是"主动选择"，莫问天的死亡是"被动牵连"。两者叠加，会在日后某个修炼关键时刻爆发。

    铸剑山庄（第5-6个月）:
      事件: |
        李德前往玄州铸剑山庄。他以"苏文"的身份（伪造路引）假扮成一名寻求定制兵器的江湖散人。
        铸剑山庄每十年开炉一次，下次开炉就在半年后。庄主欧冶魂是个铸剑成痴的疯子，不理江湖纷争，但对"好剑"有病态的执着。
        关键NPC·欧冶子衿: |
          欧冶魂独子，年方十八，使一柄"子母剑"。与父亲不同，他对江湖纷争颇有兴趣，尤其对"太虚剑宗"的传说着迷。
          欧冶子衿发现了李德身上的异常："你体内有两股剑气在共鸣。一股至阳，一股至阴。这不是普通内功能做到的。"
          若李德选择坦诚（或半坦诚），欧冶子衿可能提出交易：他帮李德取得剑意篇（从父亲书房中偷出），李德需答应在太虚剑体觉醒后，让他观摩一次"太虚剑意"。
          若李德选择否认，欧冶子衿不会揭穿，但会暗中跟踪调查——他是个聪明人，比父亲更危险。
      剑意篇入手: |
        无论通过交易还是窃取，李德最终取得剑意篇。
        剑意篇不是文字，而是一套三百六十幅"剑意图"——每一幅都是太虚剑宗先祖以剑气刻在玄铁薄片上的剑招轨迹。
        普通人看不懂，但太虚剑体的持有者能"感应"到其中剑意的流动。李德修炼后，剑法熟练度提升速度是常人三倍（太虚剑体加成）×三倍（剑意篇加成）=九倍。
        但单独修炼剑意篇有极大风险：没有心法篇配合，剑意会反噬经脉。李德每次修炼后都需要阿芷的针法调和，否则气血上限会逐步下降。

  第四幕·正邪不容（第6-12个月）:
    概述: |
      随着李德的实力提升和行踪暴露，追捕者与各方势力的压力越来越大。
      这一阶段不再是"藏"，而是"周旋"——李德需要在追杀中继续修炼、继续收集真经碎片、同时逐步建立自己的情报网与盟友。

    六扇门·追魂手铁无情:
      身份: 六扇门总捕头，战力约380（宗师级），一手"追魂锁链"出神入化。
      态度: 铁无情不是恶人，他甚至对李德的遭遇有一丝同情。但他坚信"法律至上"——无论贺震霆做了什么，李德私自杀人、夺人体质、就是罪犯。
      追捕方式: 铁无情不玩阴的。他会公开发出"缉拿令"，限期李德投案。期限内，他按兵不动；期限过后，他会亲自出手。
      第一次对峙（第7个月）: |
        铁无情在沧洲沉剑潭边堵住李德。
        "我给你三个月自首。三个月过了。"铁无情说，"我知道贺震霆该死。但你知道他该死，就该让六扇门来定他的罪。你私自杀他，和他杀你全家，有何区别？"
        李德的回应决定后续：若选择战斗，李德此时战力约120，面对380的铁无情几乎必死，只能设法逃脱；若选择辩论/拖延，可利用铁无情"讲理"的特点争取时间或设下脱身之计。
        这一战（或对峙）的核心不是赢，而是让铁无情意识到"这个少年不是普通的邪魔，他有自己的逻辑"——这会让铁无情在后续追捕中产生犹豫。

    幽冥教·右护法白骨夫人:
      身份: 幽冥教四大护法之一，修炼"九阴白骨功"，战力约400。与贺震霆有旧，但不是为他报仇——她想要的是《移花接玉》和贺震霆与幽冥教的往来密信。
      态度: 幽冥教不在乎贺震霆的死，但在乎"谁杀了他、知道了多少"。白骨夫人要活捉李德，搜魂夺魄，确认他是否掌握了幽冥教在冀州的全部情报网。
      第一次遭遇（第8个月）: |
        白骨夫人在瘴州万毒林边缘设下埋伏。她释放了"千魂噬心瘴"——一种针对精神力的毒雾，可让人陷入最恐惧的记忆幻觉。
        李德的幻觉：贺婉清死在书房暗室的面容、莫问天咬舌自尽的鲜血、以及贺震霆掌心毒血倒流的惨状。
        穿越者的心理韧性（系统规则中提到的"现代教育带来的精神抗性"）是唯一的救命稻草。李德必须在自己的噩梦中保持清醒，找到瘴气的来源并破坏。
        若成功，李德获得"千魂噬心瘴"的样本，阿芷可据此炼制抗瘴丹药；若失败，李德精神受创，秘密暴露度大幅上升，可能在幻觉中说出不该说的话。

    少林执法堂·戒空首座:
      身份: 少林寺执法堂首座，战力约420。认定李德"修炼邪术、夺人体质、屠戮正道盟主"，必除之。
      态度: 戒空比铁无情更极端。他不听解释、不查真相，只看结果。李德杀了贺震霆（正道盟主）、夺了玄阴素女体（邪术），这就是魔道。
      围杀（第10个月）: |
        戒空联合了十二名少林罗汉堂弟子，在洛京黑市布下"十八罗汉阵"，试图一举擒杀李德。
        这是李德面对的最危险局面——十二名一流高手+一名宗师级首座，战力总和超过1000。
        李德唯一的生路是"不战"——利用洛京黑市的复杂地形、千面佛的情报网、以及阿芷提前布置的迷烟，从阵法的缝隙中遁走。
        这一战后，李德在正道中的通缉等级上升至最高级，悬赏金额达五千两白银。

    天魔宗·厉苍生的试探:
      身份: 天魔宗宗主，战力深不可测（大宗师级）。
      态度: 厉苍生从慕容烟（魔道路线中的圣女）或其他渠道得知"太虚剑体重现江湖"。他不急于抓捕，而是想"观察"——看看这个少年能走到哪一步。
      试探方式: 天魔宗不会直接出手，但会在李德经过的地方"留下"一些痕迹：一本《天魔秘录》残篇、一颗可提升内力但会种下魔念的丹药、或者一个看似偶然出现的"救命恩人"。
      这是长期的伏笔：厉苍生把李德当作一颗棋子，准备在适当的时候收割。

  第五幕·破茧成蝶（第12个月及以后）:
    概述: |
      一年的逃亡与修炼后，李德不再是那个从柴房逃出的苍白少年。
      他集齐了剑意篇，心法篇和身法篇的线索也已掌握。玄阴素女体与太虚剑体的冲突从"危机"转变为"助力"——阴阳互济，让他的修炼速度达到常人难以想象的境界。
      但真正的突破需要"觉醒"——太虚剑体从"未觉醒"到"觉醒"的契机。

    太虚剑体觉醒条件: |
      觉醒不是 gradual 的，是 sudden 的。需要同时满足三个条件：
      ① 阴阳交汇：玄阴素女体的纯阴之气与太虚剑体的纯阳之气在体内完成第一个完整周天循环
      ② 生死一线：在濒死状态下触发身体的自我保护机制，激活血脉深处的潜能
      ③ 剑意通明：对"剑"的理解达到"人剑合一"的门槛——不是技术，是心境
      三个条件缺一不可。许多李家先祖终其一生未能觉醒，就是因为缺了某一个。

    觉醒契机·沉剑潭之战（第13个月）: |
      事件: |
        铁无情第三次追捕李德，这一次他没有给期限，也没有说废话。
        两人在沧洲沉剑潭边展开生死战。铁无情战力380，李德战力约180（差距已大幅缩小，但仍有一倍之差）。
        李德不是铁无情的对手，但他利用了沉剑潭的特殊地形——潭水终年碧寒，是天然克制火属性内功（铁无情的"炎阳掌"）的环境。
        更重要的是，李德在战斗中首次同时运转玄阴素女心经（阴）与太虚剑意（阳），阴阳二气在经脉中第一次完成完整循环。
        铁无情一掌击中李德胸口，将他打入沉剑潭底。在潭水的极寒与李德体内极热的交汇中，在濒死的边缘，在最后一剑刺出的瞬间——
        太虚剑体，觉醒。
      觉醒异象: |
        沉剑潭底，一道金色剑气破水而出，直冲云霄。方圆百里的剑器同时震颤嗡鸣，仿佛在朝拜君王。
        李德后颈的火焰胎记绽放出真正的光芒——不是胎记，是太虚剑宗的血脉印记。
        他从潭底走出，手中无剑，但周身剑气缭绕。铁无情的炎阳掌劲被他以纯阳剑气反噬，铁无情本人被震退十丈，口吐鲜血。
        这是李德第一次击败宗师级高手——不是用陷阱，不是用毒药，是用真正的实力。
      觉醒效果: |
        - 修炼剑法速度：常人三倍（太虚剑体基础）×三倍（剑意篇加成）=九倍
        - 真气性质：至阳至纯，可克制一切阴邪功法（幽冥鬼爪、九阴白骨功等）
        - 剑气外放：无需持剑，指发剑气，射程三丈
        - 火焰胎记：可感知方圆十里内的剑器位置与状态
        - 战力跃升：从180直接跃升至320，接近宗师门槛
        - 副作用：觉醒瞬间的剑气爆发会留下"痕迹"——方圆百里的剑修都能感知到"有剑体觉醒"。厉苍生、清虚道长、以及隐居的幽冥老祖段九幽，同时睁开眼睛。

    觉醒后的世界变化: |
      六扇门: 铁无情撤回缉拿令，上报"此人已非寻常罪犯，需从长计议"。六扇门将李德的威胁等级上调至"S级"。
      武当派: 清虚道长终于意识到莫问天的话是真的——太虚真经的心法篇在他手中。他开始犹豫：是继续隐瞒，还是主动接触李德？
      铸剑山庄: 欧冶魂放下手中铁锤，望向沧洲方向，喃喃："太虚剑体……终于醒了。"
      天魔宗: 厉苍生大笑，对慕容烟说："去，把他带来。若带不来……就杀了。不能让他成长到下一个境界。"
      幽冥教: 段九幽（三十年前诈死的老祖）亲自下令："活捉。他的血，比太虚真经更有价值。"
      百花谷: 花解语对阿芷说："你赌对了。那小子真的活了过来。"

  长期剧情节点（觉醒后）:
    心法篇获取: |
      清虚道长最终选择与李德"交易"而非"对抗"：以心法篇换取李德的一个承诺——未来武当若有难，太虚剑宗后人需出手相助。
      这是清虚道长的"投资"——他看出李德的潜力，选择在他尚未完全崛起时卖一个人情。
    身法篇获取: |
      东海剑阁阁主沈孤帆最初拒绝交易，但他的女儿沈落霞偷偷将身法篇抄本送给李德——因为她从身法篇中参悟出一套"踏浪剑步"，想以此换取李德的指点。
      沈落霞对李德没有爱慕，只有"对剑的纯粹追求"。这种关系比贺婉清更简单，也更持久。
    完整太虚真经: |
      三篇合一后，李德获得完整的《太虚真经》——不仅是武功，还有太虚剑宗三百年的历史、使命、以及一个惊天秘密：
      太虚剑宗当年分裂为两支，一支隐居云州（李家的祖先），另一支……成为了幽冥教的前身。
      幽冥老祖段九幽，其实是太虚剑宗的叛徒。他当年偷走了剑宗的禁术，以此创立了幽冥教。
      所以幽冥教追杀李家，不是为了太虚真经，是为了"掩盖历史"——不能让世人知道，魔道霸主幽冥教，其实源自正道剑宗。
    终极对决: |
      当李德集齐真经、突破宗师、甚至触及大宗师门槛时，他将面对最终的敌人：不是段九幽，不是厉苍生，而是他自己——
      贺婉清的心魔、莫问天的 guilt、以及一路走来沾染的鲜血。
      太虚真经的最后一页写着："太虚者，无也。无善无恶，无正无邪，唯剑而已。"
      李德能否理解这句话，决定他是成为"新一代剑宗传人"，还是"另一个段九幽"。

  完美线独有NPC速览:
    药奴阿芷: 百花谷弃徒，李德的医师与长期盟友。非爱慕关系，是"交易升华为信任"。
    千面佛: 烟雨楼高级情报贩子，亦正亦邪。与李德是"客户与供应商"的关系。
    欧冶子衿: 铸剑山庄少庄主，对太虚剑宗传说着迷。亦友亦利的复杂关系。
    铁无情: 六扇门总捕头，从"追捕者"逐渐转变为"某种意义上的理解者"。
    白骨夫人: 幽冥教右护法，纯粹的敌人。
    戒空: 少林执法堂首座，极端的正道代表，李德的死敌。
    沈落霞: 东海剑阁阁主之女，"以剑会友"的纯粹关系。

  GM设计原则:
    - 完美线后续的核心主题是"自由的重负"——李德获得了自由，但自由的代价是被全世界追杀。
    - 每一次实力跃升都应伴随相应的代价：换血获得体质但背负人命、剑意篇提升剑法但反噬经脉、太虚剑体觉醒但暴露位置。
    - 追捕者不应是脸谱化的恶人：铁无情有他的正义、戒空有他的信念、甚至连白骨夫人也有她的逻辑。
    - 李德的盟友都是"有条件的"：阿芷要报仇、千面佛要利益、欧冶子衿要剑意。没有无条件的爱慕（贺婉清已死），这才是江湖的真实。
    - 心魔系统应在关键时刻触发：每次杀人后、每次利用他人后、每次面对镜子时。贺婉清的脸会在最深的梦境中出现——不是来索命，是来问他"德哥哥，你快乐吗"。
    - 太虚真经的追寻不是"打怪升级"，是"拼图"——每一片碎片都在不同的人手中，每一次获取都需要不同的策略（交易、窃取、欺骗、或者……尊重）。
