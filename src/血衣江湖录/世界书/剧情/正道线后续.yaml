---
正道线后续·白羽归处:
  概述: |
    正道路线后续承接「白羽借刀局」结局：李德以"无辜受害者"身份被萧云澜带上武当山，成为清虚道长的记名弟子。
    与邪道线「主动操控欲望」不同，正道线的爽感来自「被动收割」——李德什么都不用做，只要维持那副苍白脆弱的模样，好处就会源源不断送上门。
    萧云澜的保护欲变质为占有欲。贺婉清从铁胆庄千里迢迢来"探望"。沈落霞为"论剑"一次次出现在他身边。武当山上的女弟子们窃窃私语，议论着那位"萧师兄带回来的病弱美人"。
    太虚剑体在纯阳无极功的滋养下逐步觉醒，不是暴走的痛苦，是温养中的舒畅——如同干涸的河床被春水漫过，每一寸经脉都在舒展。
    李德发现，正道体系内的权力游戏规则和邪道完全不同：邪道要征服，正道只要「被需要」。越是无助，越是惹人怜惜；越是脆弱，越能获取资源。
    AI应把握「渔翁之利」这一核心：李德不主动勾引任何人，他只负责「存在」——以恰到好处的脆弱、若即若离的温柔、以及偶尔流露的依赖，让所有人自愿为他赴汤蹈火。

  与邪道线后续的对比:
    核心驱动力: |
      邪道线：主动扩张，将欲望武器化，建立红颜阁帝国。
      正道线：被动收割，以「被保护者」身份获取一切，编织无形的人脉与势力之网。
    情欲模式: |
      邪道线：母女噬心，色诱策反，赤裸裸的权力与肉体交易。
      正道线：「受害者」人设下的暧昧——萧云澜为他疏导真气时的肢体接触、贺婉清夜访时的独处、沈落霞论剑时的精神共鸣。一切都被包裹在「正当」的外衣下，越压抑越刺激。
    势力构建: |
      邪道线：红颜阁，黑市女王，暗夜帝国。
      正道线：「白羽之网」——萧云澜是剑、贺婉清是钱、沈落霞是眼、武当女弟子是耳。没有固定的组织，但一张嘴、一封信、一个眼神，就能调动各方资源。
    太虚剑体觉醒: |
      邪道线：在情欲刺激下提前觉醒，通过双修汲取玄阴素女体精华。
      正道线：在纯阳无极功的温养下逐步觉醒，萧云澜的真气疏导本身就是最精纯的「炉鼎供养」。李德什么都不用做，只需在运功时轻轻颤抖、微微喘息，萧云澜就会本能地加大真气输出——他以为自己在救人，实则在喂养一头饥饿的龙。

  五幕结构:
    第一幕·武当春深:
      时间: 逃离铁胆庄后第1-6个月
      地点: 武当山
      核心冲突: 安置与渗透
      剧情概要: |
        李德随萧云澜上武当山，清虚道长收其为记名弟子。
        武当弟子本为多人同寝，但萧云澜以"李德体弱，夜间需人照看"为由，与他同住一屋。清虚道长准了——他看到的是师兄弟情深，没看到萧云澜眼中那种近乎偏执的保护欲。
        同屋的第一夜，李德「不适」地蜷缩在床角，脸色苍白，呼吸浅促。萧云澜坐在床边，手指搭在他腕上，以纯阳真气帮他平复经脉。李德的皮肤冰凉，萧云澜的手掌温热，两人指尖相触时，萧云澜的耳根红了——他告诉自己，这是师兄对师弟的关怀。
        但关怀不需要在对方入睡后仍盯着他的脸看半小时。
        李德知道萧云澜在看。他闭着眼睛，睫毛在月光下微微颤动，嘴角带着一丝若有若无的笑——那是猎人看到猎物入网时的表情，但萧云澜看不见。
        贺婉清的第一封信在半月后到达。她在信中写尽了思念，最后附上一句："我托人带了些冀州的枣糕和伤药，德哥哥记得吃。"包裹中除了她说的东西，还有一件她亲手缝制的里衣——针脚细密，领口绣着一朵小小的梅花。
        李德没有穿那件里衣。他把它放在枕下，让萧云澜在整理床铺时「偶然」发现。
        萧云澜什么都没说。但那天晚上，他为李德疏导真气的时间比平时长了一倍。
      关键事件:
        真气疏导的暧昧: |
          每三日一次，萧云澜为李德疏导经脉。这是清虚道长吩咐的——李德的经脉常年受损，需要纯阳真气温养。
          萧云澜盘坐在李德身后，双掌抵住他的后背。纯阳真气缓缓输入，李德能感觉到那股暖流在经脉中游走，所过之处如春风化雪。
          但李德学会了「反应」。当萧云澜的真气行至某处敏感经脉时，他会轻轻颤抖，发出一声低低的、近乎喘息的轻哼。那声音不是痛苦的，是……舒畅的。
          萧云澜的手会僵住。然后他会更深、更慢地输送真气——他以为李德需要更多，实际上李德只是喜欢看他在那一刻的失神。
          "师兄……"李德的声音轻得像羽毛，"你的真气好暖。"
          萧云澜没有回答。但他的手掌更烫了。
          这种「真气疏导」持续了三个月。三个月后，萧云澜已经能在李德的轻哼中准确判断哪条经脉需要重点关照——他们形成了一种无需言语的默契，一种只属于两人的暗语。
        大师兄萧远山的嫉妒: |
          萧远山对李德的敌意，最初的根由不是正义感，是嫉妒。
          他嫉妒的不是李德这个人，是萧云澜对李德的「特别关注」。萧云澜从未为任何同门弟子做过真气疏导——包括萧远山这个大师兄。
          "云澜，"萧远山在某次晨练后叫住萧云澜，"那姓李的小子，值得你这么费心？"
          "他经脉受损，需要人照看。"萧云澜的语气平淡，但手指不自觉地摸向了腰间的漱玉剑——那是他紧张时的习惯动作。
          "经脉受损的人多了，你一个个都亲自照看？"萧远山冷笑，"你当师兄看不出来？你看他的眼神，和看我们不一样。"
          萧云澜的脸色变了。但不是被揭穿的窘迫，是警惕——像一头被触碰了领地的狼。
          "大师兄，"萧云澜的声音低了下来，"注意言辞。"
          这是萧云澜第一次对萧远山用警告的语气。萧远山愣住了。他看着萧云澜转身离去的背影，心中那团嫉妒的火烧得更旺了。
          从那天起，萧远山开始更频繁地出现在李德身边。不是关心，是审视。但李德对此毫不在意——多一双眼睛盯着他，只会让萧云澜的保护欲更强。
        贺婉清的「包裹」: |
          贺婉清的包裹每月一次，从不间断。枣糕、伤药、她亲手缝制的衣物、以及越来越直白的信。
          "德哥哥，我学会了炖汤。等你回来，我炖给你喝。"
          "德哥哥，今日有人向我提亲。我说我心有所属。父亲若在世，定会骂我不矜持吧。"
          "德哥哥，我梦见你了。梦见你穿着我缝的里衣，在武当山的云海中说'婉清，我很好'。醒来时枕头是湿的。"
          李德每次看完信，都会把信纸折好，放在枕头下——那个萧云澜「偶然」会翻到的位置。
          萧云澜从不主动问信的内容。但真气疏导时，他的手掌会越来越烫，真气会越来越汹涌。李德知道他在吃醋，但他什么都不会说。他只是在那股过热的真气中轻轻颤抖，发出那种让萧云澜更加失控的轻哼。
          "师兄……"他会用气音说，"你今日……好用力。"
      李德的状态变化:
        武学: |
          纯阳无极功：2层→4层。萧云澜的真气疏导不仅修复了经脉损伤，更在日积月累中为太虚剑体提供了精纯的纯阳养分。
          太极剑：熟练度从0提升至55。太虚剑体的本能让他对剑的理解远超同辈。
          总评：战力从约80提升至约150。但真正的成长不在数字，在萧云澜这条「人形真气输送管」的养成。
        势力归属: 武当记名弟子，萧云澜的"专属师弟"，贺婉清的"心有所属"。
        善恶值: +50→+80。
        名望: 江湖人称"萧云澜护着的小师弟"，部分武当女弟子暗中议论"那位新来的师弟长得真好看"。
        秘密暴露度: 10（清虚道长的怀疑）+ 5（萧远山的嫉妒）。

    第二幕·白羽出山:
      时间: 逃离铁胆庄后第7-12个月
      地点: 荆州、东海剑阁
      核心冲突: 收割与扩张
      剧情概要: |
        半年后，李德随萧云澜下山历练。调查幽冥教渗透案只是一个名义，真正的收获是：李德第一次以"武当弟子"身份光明正大地行走江湖，发现「白羽之网」已经初具雏形。
        贺婉清在荆州「偶遇」了他们。她说是来送铁胆庄的情报，实际上她的目光从见到李德的那一刻起就没有移开过。
        "德哥哥瘦了。"她在客栈房间里说，手指轻轻抚过李德的脸颊——那个动作太过亲密，萧云澜在门口咳嗽了一声。
        贺婉清没有缩回手。她只是转过头，对萧云澜微微一笑："萧大侠，德哥哥在武当，多亏你照顾。"
        萧云澜听出了那语气中的占有欲。他握紧了漱玉剑的剑柄。
        论剑大会上，沈落霞与李德过招三十合。不分胜负。但收剑后，沈落霞说："你的剑意里，有海的声音。"
        李德知道，沈落霞不是贺婉清，不是萧云澜。她对他的兴趣纯粹出于「剑」——但这恰恰是最危险的一种兴趣。因为纯粹意味着执着，执着意味着不可控。
        "我想听更多。"沈落霞说，"你的剑，有很多故事。"
        李德没有拒绝。他知道，每一条线都是网的一部分。
      关键事件:
        贺婉清的夜访: |
          荆州客栈，夜深人静。贺婉清敲响了李德的房门。
          "德哥哥，我带了些东西给你。"她捧着一个食盒，里面是她亲手做的糕点——模样不算精致，但每一块的形状都是她对着食谱反复练习的结果。
          李德让她进了房间。烛火摇曳，两人相对而坐。贺婉清的脸在烛光下泛着红晕，那双曾经只会躲在门后偷看的眼睛，此刻直直地看着他。
          "德哥哥，你在武当……有没有想我？"
          李德垂下眼眸，长长的睫毛在脸颊上投下阴影。他没有回答，只是伸出手，轻轻握住了贺婉清放在桌上的手。
          那只手冰凉，和他的一样。
          "婉清，"他的声音轻得像叹息，"我每天都在想。想铁胆庄的柴房，想你来送饭时的脚步声，想……你给我的平安结。"
          贺婉清的眼泪落了下来。但她没有哭出声，只是反手握紧了李德的手指，握得很紧。
          "德哥哥，"她说，声音颤抖，"我什么都可以给你。铁胆庄的库房钥匙、父亲留下的暗桩名单、甚至……我自己。"
          李德看着她的眼睛。那双眼睛里有一种他熟悉的东西——和萧云澜一样，是占有欲，是「我的一切都属于你」的狂热。
          他俯身，在贺婉清的额头上印下一个轻吻。那个吻像羽毛一样轻，却让贺婉清整个人都颤抖起来。
          "婉清，"他在她耳边说，"你已经给了我太多。"
          门外的走廊上，萧云澜的影子在烛光中晃动了一下，然后消失了。他没有推门，没有质问。但他手中的漱玉剑，在剑鞘中发出了一声低沉的嗡鸣。
        沈落霞的「论剑」: |
          东海剑阁的听涛坪上，沈落霞与李德并肩坐在礁石间。海浪拍打着岩石，溅起的水雾打湿了他们的衣衫。
          "你的剑意为什么是悲伤的？"沈落霞问。她不懂人情世故，但她能「听」到剑意中的情绪。
          李德望着远方的海平线："因为我失去了一切。"
          "那你在武当……找到了吗？"
          李德转过头，看着沈落霞被海风吹乱的发丝。那双眼睛太干净了，干净得让人想玷污——不是肉体上的，是让她见识到这个世界不那么干净的一面。
          "找到了一部分。"他说，"但还缺一块。"
          "缺什么？"
          "缺一个能听懂我剑意的人。"
          沈落霞愣住了。她花了三年参悟身法篇，从未有人对她说过这种话。李德的话像一颗石子投入她平静的湖面，涟漪一圈一圈荡开。
          "我……我可以听懂。"她的声音有些急促，"你给我时间，我一定能听懂全部。"
          李德笑了。那是一个真正发自内心的笑——不是因为算计，是因为沈落霞的纯粹让他想起了穿越前的世界。在那个世界里，也有这样一群人，为了热爱的事物不顾一切。
          "好。"他说，"我等你。"
          沈落霞从腰间解下佩剑「沧浪」，递给李德："这把剑送你。它陪了我十年，但我想……它更愿意陪一个有很多故事的人。"
          李德接过剑。剑身上还残留着她的体温，带着海风的咸涩和少女的清新。
          "我会还你的。"他说。
          "不用还。"沈落霞站起来，拍去裙摆上的沙粒，"等你觉得它不想跟着你了，再还给我。"
          她转身离去，步伐轻快得像一只海鸟。李德握着沧浪剑，感受着剑身上那道属于她的气息——这是正道线中第一个「不求回报」的礼物，也是让他最不安的礼物。
        铁无情的「合作」: |
          六扇门也在调查幽冥教渗透案。铁无情第一次见到"武当弟子李德"时，眼神中闪过一丝惊讶——他记得这个少年，铁胆庄的养子，贺震霆"畏罪自杀"的幸存者。
          但铁无情没有当场发难。他只是在调查会议结束后，对萧云澜说了一句："你这位师弟，眼神比他的年纪老得多。"
          萧云澜下意识地挡在了李德身前——那个动作太过明显，铁无情看在眼里，嘴角微微上扬。
          会后，铁无情单独约见李德。茶馆里，两人对面而坐。
          "铁捕头有何指教？"李德的语气恭敬，姿态谦卑。
          "指教不敢。"铁无情放下茶杯，"只是好奇——一个被虐待三年的少年，如何在半年内让一个武当天才对你死心塌地？"
          李德垂眸："师兄心善，见不得人受苦。"
          "心善？"铁无情笑了，那笑容不达眼底，"萧云澜我见过，确实是心善。但心善和痴，是两回事。他在看你的时候，眼睛里有火。"
          李德的手指微微一颤。铁无情的观察力太可怕了——他不是在看李德的罪行，他是在看李德的「网」。
          "铁捕头说笑了。"李德的声音依然平稳。
          "是不是说笑，你自己清楚。"铁无情站起身，走到门口时回头看了李德一眼，"我不在乎你织网。我只提醒你一句——网织得太大，容易缠住自己。"
          铁无情离去后，李德独自坐在茶馆里，手指轻轻敲击着桌面。铁无情不是敌人，但也不是盟友。他是……一个棋逢对手的观察者。
          这让李德第一次感到了一丝兴奋。
      李德的状态变化:
        武学: |
          纯阳无极功：4层→6层（小成→大成边缘）。萧云澜的真气疏导已成为日常，太虚剑体在这种持续温养下逐步释放潜力。
          太极剑：熟练度55→72。
          总评：战力提升至约180。更重要的是，太虚剑体开始产生「剑气共鸣」——能在一定距离内感知到其他剑修的存在和情绪。
        势力网络: |
          武当：萧云澜——已实质绑定的「人形真气输送管」与「专属保镖」。
          铁胆庄：贺婉清——每月送资源、送情报、送自己。
          东海剑阁：沈落霞——纯粹的剑友，潜在的战略盟友。
          六扇门：铁无情——戒备但欣赏的对手。
        秘密暴露度: 25（清虚的怀疑、铁无情的洞察、萧远山的嫉妒）。

    第三幕·剑体觉醒:
      时间: 逃离铁胆庄后第13-18个月
      地点: 武当山
      核心冲突: 觉醒与绑定
      剧情概要: |
        回到武当后，太虚剑体的觉醒进入了关键期。清虚道长在第一次为李德把脉时就已察觉了他的体质，但他选择了沉默——直到此刻，他才将李德带到祖师洞。
        "你的血脉，与三十年前的太虚剑宗有关。"清虚说，"莫问天是你的父亲。"
        李德没有否认。在清虚面前，演技已无意义。
        清虚提出了一个交易：武当庇护李德，李德在三年内找到太虚真经，揭开灭门真相。但清虚也提出了另一个条件——"萧云澜那孩子，对你用了真心。你若伤他，武当便不再容你。"
        李德垂眸行礼。他在心中计算着：萧云澜的「真心」是他最大的资产，他怎么会伤他？他会把那颗心捧在手心，用温水养着，让它永远为他跳动。
        太虚剑体的觉醒需要大量的纯阳真气。在邪道线，这种真气来自玄阴素女体的阴阳双修；在正道线，来源只有一个——萧云澜。
        但萧云澜的纯阳真气太过「正」，直接输入会与太虚剑体产生排斥。清虚道长指点了一个方法：「以太极引为媒，阴阳相济，水火相容」。
        这意味着萧云澜需要以更深层、更持续的方式为李德输送真气——不是隔衣抵背，是掌心贴肌肤，真气直接渡入经脉。
        萧云澜没有犹豫。他说："只要能帮师弟，我什么都愿意做。"
        李德看着他，眼中闪过一丝复杂的情绪。那不是愧疚，是……欣赏？萧云澜的纯粹和狂热，是他在这个世界见过的最稀有的东西。稀有到让他想收藏。
      关键事件:
        真气双修: |
          祖师洞中，萧云澜与李德相对而坐。李德褪去上衣，露出苍白而纤细的脊背——那上面还残留着铁胆庄时期的旧伤，鞭痕交错，像一张破碎的网。
          萧云澜的手指触碰到那些伤痕时，停住了。他的眼中闪过一丝痛楚——不是为李德的痛，是为自己的无能为力。如果他早到一些，如果他在铁胆庄时就发现李德……
          "师兄。"李德的声音将他拉回现实，"我准备好了。"
          萧云澜深吸一口气，双掌贴上李德的背。肌肤相触的瞬间，两人都颤抖了一下——不是冷，是一种太过亲密的接触带来的电流。
          纯阳真气缓缓输入。李德的太虚剑体像一头饥饿已久的兽，贪婪地吞噬着那股暖流。但这次不同以往——真气不再只是温养经脉，而是在太虚剑体的引导下，完成了第一次完整的「阴阳循环」。
          李德感到体内的某种枷锁被打开了。他的后颈胎记在发热，一股金色剑气从脊椎底部升起，沿着督脉上行，与萧云澜输入的纯阳真气在百会穴交汇。
          "唔……"李德发出一声低吟。那不是痛苦的，是一种极致的舒畅——像溺水者终于浮出水面，像沙漠旅人终于找到绿洲。
          萧云澜的脸红了。他听过李德在真气疏导时的轻哼，但从未听过这种声音。那声音太过……私密，像是某种不该被他听到的时刻。
          但他的手没有离开。相反，他加大了真气输出——他以为李德需要更多。
          "师兄……"李德回过头，苍白的脸上泛着不正常的潮红，眼中有一层薄薄的水雾，"你的真气……在我身体里……好满……"
          萧云澜的呼吸一滞。
          那一刻，他意识到自己正在做的事，已经超出了「师兄帮助师弟」的范畴。但他停不下来。李德的目光像一根丝线，缠住了他的手腕、他的心脏、他的意志。
          真气双修持续了整整一夜。天亮时，李德的太虚剑体完成了第一次「半觉醒」——战力跃升至250，境界接近宗师。而萧云澜的内力消耗过半，脸色苍白，但眼中有一种奇异的满足。
          "师兄，"李德靠在他肩上，声音虚弱但柔软，"没有你，我做不到。"
          萧云澜的手臂环绕着他，像抱住一件失而复得的珍宝。
          "我会一直在。"他说。
          李德闭上眼睛，嘴角微微上扬。他知道了——这条线，已经绑死了。
        贺婉清的「探望」: |
          真气双修后的第三日，贺婉清来了。她说是来送铁胆庄的最新情报，但她的目光在李德身上停留了太久——久到萧云澜不得不咳嗽提醒。
          贺婉清带来了一个消息：铁胆庄在贺震霆死后，发现了一条密道。密道通向庄外的一处山洞，洞中有贺震霆与幽冥教往来的密信，以及……关于太虚剑宗灭门案的线索。
          "德哥哥，"贺婉清把密信交给李德，手指在他掌心停留了一瞬，"这些本该交给六扇门。但我想……你应该先看。"
          李德接过密信，指尖划过她的手背。那个动作很轻，像是无意，但贺婉清的脸红了。
          "婉清，"李德看着她，眼中有一种让人心碎的温柔，"你为我做了这么多……我该怎么还？"
          "不用还。"贺婉清的声音很轻，但很坚定，"你活着，就是还我。"
          萧云澜站在门口，看着这一幕。他的手握在漱玉剑上，指节发白。但他没有上前——因为他没有立场。贺婉清是李德的「妹妹」，她为他做什么都是正当的。
          但萧云澜知道，贺婉清看李德的眼神，绝不是妹妹看哥哥的眼神。
          那天晚上，萧云澜为李德疏导真气时，格外沉默。他的手掌贴在李德背上，真气输入得又深又急，像是在确认什么。
          "师兄……"李德轻轻颤抖，"你今日……好像在生气。"
          萧云澜的手顿住了。他沉默了很久，最终只是说："我没有资格生气。"
          李德回过头，看着他的眼睛。那双眼睛里有一种他熟悉的东西——和贺婉清一样，是占有欲，是「我的一切都属于你」的狂热。
          李德伸出手，轻轻抚过萧云澜的脸颊。那个动作太过亲密，萧云澜整个人都僵住了。
          "师兄，"李德的声音像羽毛一样轻，"你是不同的。"
          萧云澜的眼中闪过一丝光亮。他没有追问「不同」是什么意思。他只是抓住了李德的手，握得很紧，仿佛怕一松手就会消失。
          那一夜，真气疏导的时间比任何一次都长。萧云澜没有放手，直到天光大亮。
        萧远山的发难: |
          萧远山终于忍不住了。
          他在长老会上公开质疑："李德来历不明，武学进境异常，且与幽冥教异动有关。我要求彻查此人，在查明之前限制其下山。"
          长老会分成两派。清虚道长以掌门之威压住了场面："李德身世，贫道已知晓。他是故友之后，入武当是为求庇护。此事到此为止，不再议论。"
          萧远山被当众驳回，脸色铁青。他看向萧云澜，发现萧云澜正站在李德身侧，手握着剑柄，眼神警惕——像一只护食的狼。
          "萧云澜，"萧远山在散会后拦住他，"你为了他，连师门都可以不顾？"
          "大师兄，"萧云澜的声音冷得像冰，"注意你的言辞。李德是我师弟，也是掌门认可的人。你若再针对他，别怪我不念同门之情。"
          萧远山看着萧云澜的眼睛，心中涌起一阵寒意。那双眼睛里的东西，他已经认不出来了——不是他熟悉的那个热血少年，是一个为了守护某物可以不惜一切的陌生人。
          "你完了。"萧远山低声说，"你被那小子吃定了。"
          萧云澜没有回答。他只是转身离去，走向等待他的李德。
          李德站在廊下，阳光透过树叶在他脸上投下斑驳的影子。他看着萧云澜走来，微微一笑。
          那个笑容温柔、脆弱、依赖——完美无缺。
          萧远山远远地看着，心中的嫉妒变成了恐惧。他意识到，李德不需要武力，不需要权谋。他只需要「存在」，就能让所有人围着他转。
          这是比邪道更可怕的力量。
      李德的状态变化:
        武学: |
          太虚剑体「半觉醒」。战力250，境界「宗师」。
          纯阳无极功：6层。萧云澜的真气双修让太虚剑体获得了充足的纯阳养分。
          太极剑：熟练度72→80（出神入化）。
        势力网络: |
          武当：萧云澜——已彻底绑定，可为他与整个武当为敌。
          铁胆庄：贺婉清——提供情报、资源、以及无条件的忠诚。
          东海剑阁：沈落霞——剑道盟友，纯粹的羁绊。
          六扇门：铁无情——保持距离的观察者。
        秘密暴露度: 45（清虚的知情、萧远山的发难、铁无情的洞察）。

    第四幕·正邪之争:
      时间: 逃离铁胆庄后第19-24个月
      地点: 武当山
      核心冲突: 守护与证明
      剧情概要: |
        幽冥教终于确认了太虚剑体在武当。白骨夫人带队攻山，三千教众包围武当。
        这不是偷袭，是正面宣战。段九幽要的不只是李德，是要向天下宣告：太虚剑宗的血脉，幽冥教势在必得。
        正道各派紧急驰援。但战斗的核心只有一个——祖师洞中的李德，以及守在他身前的萧云澜。
        萧云澜在这一战中突破了。从「剑随心动」到「心剑合一」，他的战力从180跃升至280。但他挡在白骨夫人面前时，仍然不够——白骨夫人战力400。
        李德的太虚剑体在战斗中完成了最终觉醒。不是暴走的痛苦，是「释放的舒畅」——两年积累的真气、纯阳无极功的根基、太虚剑宗的血脉，在这一刻融为一体。
        但他没有自己出手。他只是站在萧云澜身后，轻声说了一句："师兄，我信你。"
        萧云澜回头看了他一眼。那一眼，胜过千言万语。
        萧云澜以「心剑合一」之境，独挡白骨夫人七十招。七十招后，清虚道长与戒空赶到，三人合力逼退幽冥教。
        战后，萧云澜浑身是血，但他在第一时间不是处理自己的伤，是冲向李德，确认他完好无损。
        "我没事。"李德说，伸手抹去萧云澜脸上的血，"你受伤了。"
        "不碍事。"萧云澜握住他的手，"我说过，我会一直在。"
        贺婉清在战斗中受了轻伤，但她没有抱怨。她只是看着李德和萧云澜相握的手，眼眶微红，然后转身去帮其他伤员包扎。
        沈落霞从东海剑阁赶来时，战斗已经结束。她站在祖师洞外，看着李德，只说了一句话："你的剑意……不再悲伤了。"
        李德笑了。那是一种发自内心的笑。
        "因为有人在我身前。"他说，"我不用再一个人面对所有。"
      关键事件:
        武当之战: |
          战斗的细节无需赘述。关键是战后的那一刻——萧云澜浑身是血地走向李德，确认他安全后的那个拥抱。
          那个拥抱在所有人面前发生。萧云澜不在乎别人怎么看。他只想确认李德还在，还在他触手可及的地方。
          李德回抱了他。他的手指穿过萧云澜被汗水和血水浸透的发丝，轻轻抚过后颈。
          "师兄，"他在萧云澜耳边说，声音轻得只有两人能听见，"谢谢你。"
          萧云澜的手臂收紧了。他把脸埋进李德的颈窝，深深吸了一口气——那是李德的气息，带着淡淡的药香和剑气的清冽。
          "别谢我。"他说，声音闷闷的，"这是我自己的选择。"
        贺婉清的「退让」: |
          战后养伤期间，贺婉清独自来到李德的房间。她的手臂缠着绷带，脸色苍白，但眼神很平静。
          "德哥哥，"她说，"我看到了。"
          "看到什么？"
          "看到萧云澜为你拼命。"贺婉清低下头，"我……我也可以为你拼命。但我不确定，我能不能像他那样，在所有人面前拥抱你。"
          李德沉默了。他伸出手，握住了贺婉清缠着绷带的手。
          "婉清，"他说，"你和他不一样。"
          "哪里不一样？"
          "他是我的剑。"李德的声音很轻，但每一个字都清晰，"你是我的家。"
          贺婉清的眼泪落了下来。但她没有哭出声。她只是把额头抵在李德的肩膀上，让泪水浸湿他的衣襟。
          "德哥哥，"她说，"我可以不要名分，不要承诺。我只求你……别忘了我。"
          "不会忘。"李德说，"永远不会。"
          这是真话，也是谎言。李德不确定自己会不会忘记贺婉清。但在这一刻，他的确是想让她安心的。
          因为安心的贺婉清，才会继续为铁胆庄效力，继续为他提供资源和情报。
        沈落霞的「等待」: |
          沈落霞在武当住了下来。她说要「继续听懂李德的剑意」，清虚道长准了。
          每日清晨，她与李德在紫霄宫前的广场上练剑。两人的剑招越来越快，剑气交织，如双龙戏珠。武当弟子们远远围观，窃窃私语。
          "沈姑娘的剑好美。"
          "李师弟的剑更美——你看他挥剑的样子，像在跳舞。"
          "萧师兄的脸色好难看……"
          萧云澜确实脸色难看。但他没有阻止。因为他知道，沈落霞对李德的感情和贺婉清不同——不是占有，是理解。而理解，是李德最需要的东西。
          某夜，沈落霞在练剑后对李德说："你的剑意变了。以前是无尽的悲伤和孤独，现在……有了温度。"
          "温度？"李德问。
          "嗯。"沈落霞点头，"像是冬天里的一炉火。不烫人，但让人想靠近。"
          李德沉默了。他看向远处站在廊下的萧云澜，那个即使在深夜也守在他视线范围内的人。
          "那火，"他说，"是别人给我的。"
          沈落霞顺着他的目光看去，然后笑了："那你要好好保管。火这东西，给了别人，自己就会少一点。"
          "我知道。"李德说。
          但他不确定自己能不能做到。穿越者的本能是计算，是权衡，是永不全情投入。萧云澜给他的火，他收下了，但他不知道自己有没有回馈同样的温度。
          也许，这就是正道线和邪道线最大的区别——邪道线中，李德是绝对的支配者；正道线中，他也在被某种东西支配。那东西叫「被需要的感觉」。
      李德的状态变化:
        武学: |
          太虚剑体「完全觉醒」。战力300，境界「宗师」。
          纯阳无极功与太虚剑气融合为「太虚无极功」初成——兼具正道根基与太虚锋芒。
          武器：弃用断魂刀，改持「问虚」古剑与沈落霞所赠「沧浪」剑，双剑并用。
        势力网络: |
          武当：萧云澜——彻底绑定的「剑」，可为其与天下为敌。
          铁胆庄：贺婉清——「家」，提供资源与情报的无条件后盾。
          东海剑阁：沈落霞——「知音」，剑道层面的灵魂伴侣。
          正道各派：清虚道长以掌门之名宣布李德为「太虚剑宗唯一传人，武当之友」。
        善恶值: +80→+150（武当之战中的贡献）。
        秘密暴露度: 70（太虚剑体已公开，身世部分揭露，但「演技」和「操控」的内核尚未被任何人真正看穿）。

    第五幕·白羽归处:
      时间: 逃离铁胆庄后第24-36个月
      地点: 武当山、太虚剑宗旧址
      核心冲突: 归属与选择
      剧情概要: |
        武当之战后，李德成为了正道的「白羽」——不是因为他有多强，是因为有三个人站在他身后：萧云澜的剑、贺婉清的钱、沈落霞的眼。
        清虚道长提议重建太虚剑宗，以武当为盟友。李德没有拒绝。但他心中清楚，太虚剑宗不是他的终点，是他的起点。
        在前往太虚剑宗旧址的路上，他回顾这两年：从铁胆庄的柴房到武当山的云海，从孤身一人到身后有剑、有家、有知音。他得到了很多，但他也失去了一些东西——比如，那个在柴房里独自计算每一步的、冷酷的自己。
        最终，太虚剑宗旧址上，新门派建立。李德站在山门前，身后是萧云澜、贺婉清、沈落霞，以及越来越多慕名而来的弟子。
        他不再是「借光的人」。他成了一束光——温暖、柔和、让人不由自主想靠近的光。
        但光的中心，依然是冷的。那是穿越者的底色，永远无法改变。
      结局分支:
        白羽长鸣（最佳结局）: |
          条件：萧云澜完全绑定 + 贺婉清接受「家」的定位 + 沈落霞留在身边 + 清虚道长在世。
          新太虚剑宗以「剑道传承」为宗旨，收徒不问出身。萧云澜为「护法」，贺婉清为「内务总管」，沈落霞为「剑道教习」。
          李德与三人的关系维持着微妙的平衡：萧云澜是他的剑，寸步不离；贺婉清是他的家，每月从铁胆庄送来物资和情报；沈落霞是他的知音，在剑道上与他并驾齐驱。
          这种关系不纯是情欲，但远超友情。萧云澜为他吃醋、贺婉清为他守候、沈落霞为他停留——李德不需要承诺任何人，他只需要「存在」，就能让三人围绕他运转。
          清虚道长偶尔来访，看着山门前的四人，笑着摇头："莫问天啊莫问天，你儿子比你还会惹桃花。"
          善恶值：+200。名望：「白羽剑宗」宗主，江湖公认。
        影随光动（ bittersweet 结局）: |
          条件：萧云澜的信任出现裂痕 + 贺婉清的执念无法转化为「家」的定位 + 清虚道长辞世。
          清虚道长去世后，萧云澜接任武当掌门。他无法再像以前那样寸步不离地守护李德——他有整个武当要顾。
          李德理解。但他也发现了，当萧云澜不再「随时在」时，那种被需要的感觉消失了。他第一次感到了空虚。
          贺婉清试图填补这个空缺。她搬来了太虚剑宗旧址，日日陪伴。但李德对她的态度始终若即若离——她是「家」，但家不能代替剑。
          沈落霞回到了东海剑阁。她说："你的剑意我已经听懂了。再听下去，我会忘记自己的剑。"
          李德独自站在山门前，手握问虚。他得到了一切，却失去了那种「被人全心全意需要」的感觉。
          他开始频繁下山，以「历练」为名游历江湖。每次回来，他都会带一些新的故事、新的剑招、以及……一些新的目光。
          他仍在织网，只是网的中心，越来越空。
          善恶值：+100。名望：「白羽剑宗」宗主，但江湖上开始流传「那位宗主身边的女人，换得比剑招还快」的闲话。
        白羽折翼（悲剧结局）: |
          条件：萧云澜的信任彻底崩塌 + 贺婉清在武当之战中身亡 + 清虚道长战死。
          萧云澜在武当之战后得知了全部真相——铁胆庄的相遇是设计、柴房的伤痕是故意、羊皮纸是精心安排。他的信任彻底崩塌。
          "我救了一个影子。"萧云澜说，"两年了，我甚至不知道你长什么样子。"
          李德没有辩解。他只是说："那你杀了我。"
          萧云澜拔剑了。但他的剑没有刺向李德，而是刺向了自己的左臂——一剑贯穿，血洒祖师洞。
          "这一剑，是我替武当还你的。"他说，"从此，你我恩断义绝。"
          萧云澜离去后，贺婉清的尸体在山下被发现——她为保护李德而死于白骨夫人之手。清虚道长的尸体在祖师洞中——他为掩护李德撤离而力战身亡。
          李德独自站在空无一人的祖师洞中。他没有让太虚剑体暴走——两年正道修炼赋予了他控制力。但他选择不使用这种控制。
          他释放了全部剑气。不是为了复仇，是为了「感受疼痛」——用肉体的痛来麻痹心的空洞。
          他离开武当，没有方向。三个月后，江湖上出现了一位白衣染血的剑客，专杀幽冥教众。有人叫他「血衣剑魔」，有人叫他「太虚亡魂」。
          萧云澜在重建武当后，偶尔会听到这个传说。他从不评论，只是握紧漱玉剑，望向远方。
          善恶值：-300。名望：「血衣剑魔」。

  专属势力网络·白羽之网:
    萧云澜（剑）: |
      定位：李德的专属保镖、人形真气输送管、以及最狂热的信徒。
      关系本质：保护欲变质为占有欲，但萧云澜自己未必意识到。他会为李德与整个天下为敌，而李德只需要在他疲惫时靠在他肩上，说一句"师兄，我信你"。
      情色张力：真气疏导时的肌肤相触、战后不顾一切的拥抱、以及那种「除了我，没有人能碰他」的偏执。
    贺婉清（家）: |
      定位：铁胆庄庄主，李德的资源供给站和情感避风港。
      关系本质：执念深化为无条件付出。她可以接受「不是唯一」，但不能接受「被遗忘」。
      情色张力：夜访时的独处、额头上的轻吻、以及那种「我什么都可以给你」的卑微与狂热。
    沈落霞（知音）: |
      定位：东海剑阁传人，剑道层面的灵魂伴侣。
      关系本质：纯粹的「剑友」——但这种纯粹恰恰是最危险的。她不在乎李德的正邪、过去、算计，只在乎「他的剑意是真的」。
      情色张力：论剑时的精神共鸣、海边的独处、以及「我能听懂你的剑」这种比肉体更亲密的表白。
    铁无情（对手）: |
      定位：六扇门总捕头，唯一看穿李德「织网」本质的人。
      关系本质：不是敌人，是棋逢对手的观察者。他欣赏李德的头脑，但从不信任他的人品。
      情色张力：无。铁无情是李德的「清醒剂」，提醒他：网织得太大，容易缠住自己。
    萧远山（嫉妒者）: |
      定位：武当大师兄，萧云澜嫉妒的对象，也是唯一公开质疑李德的人。
      关系本质：萧远山的嫉妒让萧云澜的保护欲更强——某种意义上，他是李德「渔网」的助攻。
      情色张力：无。萧远山的心魔是「不公」，不是情欲。

  专属桃花事件:
    贺婉清·夜访（第二幕）: |
      荆州客栈，烛火摇曳。贺婉清捧着食盒进入李德的房间，两人相对而坐。
      贺婉清的脸在烛光下泛着红晕，她问："德哥哥，你在武当有没有想我？"
      李德垂眸，伸手握住她放在桌上的手。那只手冰凉，和他的一样。
      "我每天都在想。"他说，"想你来送饭时的脚步声，想你给我的平安结。"
      贺婉清的眼泪落了下来。她说："我什么都可以给你。铁胆庄的库房钥匙、父亲留下的暗桩名单、甚至……我自己。"
      李德俯身，在她额头上印下一个轻吻。那个吻像羽毛一样轻，却让贺婉清整个人都颤抖起来。
      门外的走廊上，萧云澜的影子在烛光中晃动了一下，然后消失。他没有推门，但手中的漱玉剑在剑鞘中发出低沉的嗡鸣。
    萧云澜·真气双修（第三幕）: |
      祖师洞中，李德褪去上衣，露出苍白的脊背。萧云澜双掌贴上他的肌肤，纯阳真气缓缓输入。
      当真气完成第一次完整的阴阳循环时，李德发出一声低吟——不是痛苦，是极致的舒畅。他的后颈胎记在发热，金色剑气与纯阳真气在百会穴交汇。
      "师兄……"他回过头，苍白的脸上泛着潮红，眼中有一层水雾，"你的真气……在我身体里……好满……"
      萧云澜的呼吸一滞。他意识到自己做的事已超出「师兄帮助师弟」的范畴，但他停不下来。李德的目光像丝线，缠住了他的手腕、心脏、意志。
      真气双修持续一夜。天亮时，萧云澜内力消耗过半，但眼中有一种奇异的满足。李德靠在他肩上，声音虚弱但柔软："没有你，我做不到。"
      萧云澜的手臂环绕着他："我会一直在。"
    沈落霞·听涛（第二幕）: |
      东海剑阁的听涛坪上，沈落霞与李德并肩坐在礁石间。海浪打湿了两人的衣衫。
      "你的剑意为什么是悲伤的？"沈落霞问。
      "因为我失去了一切。"
      "那你在武当……找到了吗？"
      "找到了一部分。但还缺一块。"
      "缺什么？"
      "缺一个能听懂我剑意的人。"
      沈落霞愣住了。她从未有人对她说过这种话。
      "我……我可以听懂。"她的声音急促，"你给我时间，我一定能听懂全部。"
      李德笑了——那是一个真正发自内心的笑。沈落霞的纯粹让他想起了穿越前的世界。
      "好。"他说，"我等你。"
      沈落霞解下佩剑「沧浪」递给他："这把剑送你。它陪了我十年，但我想……它更愿意陪一个有很多故事的人。"
      李德接过剑。剑身上残留着她的体温，带着海风的咸涩和少女的清新。

  关键道具:
    问虚古剑: |
      太虚剑宗先祖的佩剑，无锋，蕴含毕生剑意。从铸剑山庄取得。李德的「传承」象征。
    沧浪剑: |
      沈落霞的佩剑，陪她十年。赠予李德时她说"它更愿意陪一个有很多故事的人"。这是正道线中唯一「不求回报」的礼物。
    莫问天手札: |
      太虚剑宗遗录，记载灭门真相与「天子剑」的秘密。清虚道长三十年前保存的遗物。
    草绳平安结: |
      李德编给贺婉清的平安结，被她珍藏了一年。是李德与贺婉清之间唯一的「真实」——不是演技，是穿越者偶然流露的善意。

  GM引导原则:
    - 正道线后续的核心爽感是「被动收割」——李德不需要主动勾引任何人，只需维持脆弱、苍白、依赖的形象，好处就会源源不断送上门。
    - 萧云澜的「保护欲变质」是正道线的核心情欲线。他的感情应该是逐渐深化的：从同情→保护欲→占有欲→偏执。每一次真气疏导、每一次战后拥抱、每一次为李德与人争执，都是这种感情的催化剂。
    - 贺婉清的「执念」应该越来越直白。她的信、她的夜访、她的「我什么都可以给你」——这些都是她主动送上门的好处。李德不需要承诺，只需要「接受」和「感谢」。
    - 沈落霞的「纯粹」是正道线中最危险的温柔。她不懂权谋，所以她能直接触碰到李德内心最深处的孤独。但她也是唯一一个可能「离开」的人——因为她的世界里不只有李德，还有剑。
    - 太虚剑体的觉醒在正道线中是「温养式的舒畅」，不是「暴走的痛苦」。萧云澜的真气疏导本身就是最精纯的炉鼎供养——李德只需要轻轻颤抖、微微喘息，就能获取更多。
    - 铁无情和萧远山的存在是「渔网」的助攻——他们的质疑和嫉妒，反而让萧云澜的保护欲更强，让李德的「受害者」形象更完美。
    - 最终结局的选择权在玩家手中：李德可以成为「白羽长鸣」的宗主，拥有剑、家、知音；可以成为「影随光动」的孤独织网者；也可以堕入「白羽折翼」的血衣之路。三种结局都应具有爽感，因为正道线的本质是「被需要」——而「被需要」本身就是最大的权力。
