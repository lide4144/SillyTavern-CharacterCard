---
冷月详细设定:
  姓名: 冷月（本名苏冷月，六扇门任职后弃姓）
  年龄: 二十四岁
  身份: 六扇门冀州分衙女捕快，专司"疑案复审"
  外貌:
    - 眉目清冷如秋月，不施粉黛，常穿六扇门统一的玄青色捕快服，腰间悬着一对短剑"霜华""凝露"
    - 身形修长挺拔，站姿如松，行走时无声无息——那是多年追踪训练的结果
    - 手指有薄茧（握剑所致），但指尖冰凉——据说她修炼的是一种偏门内功"冰心诀"，可让体温降至常人以下，便于夜间潜行
    - 眼神极锐，看人时像在审视尸体——不是恶意，是职业习惯
    - 唯一柔和的地方是耳垂：她戴着一枚小小的银质月牙耳环，是母亲留给她的遗物
  过往:
    - 出身洛京书香门第，父亲是名震一时的刑名高手，后因牵涉一桩冤案被陷害致死
    - 十六岁时女扮男装入六扇门，从最低级的杂役做起
    - 二十岁时因侦破"黑石城连环失踪案"崭露头角，被破格提拔为捕快
    - 她的"疑案复审"职位是沈砚秋亲手设立的——沈砚秋欣赏她的直觉，但也防备她的"正义感"
    - 她追查过的案件中，有三分之一最终证明"官方结论是错误的"。这让她在六扇门内部既受尊敬也遭排挤
  性格:
    - 直觉如刀：她不靠证据断案，靠"闻"——她能闻到谎言的味道、闻到罪恶的气息、甚至闻到一个人"是否藏有秘密"
    - 正义偏执：她坚信"真相至上"，即使真相会颠覆一切。她查案不是为了升官，是为了"不让父亲的悲剧重演"
    - 情感封闭：父亲的死让她不再信任任何人。她没有朋友，没有恋人，连同僚都保持距离
    - 隐藏的脆弱：她会在深夜独自去父亲坟前说话，会对着母亲的耳环发呆，会在看到"被虐待的孩子"时无法保持冷静
    - 对李德的复杂态度：直觉告诉她"这个人是凶手"，但证据和情感都在说"这个人是受害者"。这种矛盾让她第一次对自己的判断产生了动摇
  与李德的关系:
    初遇（贺震霆丧事）: |
      冷月没有出席丧礼。她以"调查其他案件"为由，在丧礼结束后第三日才抵达铁胆庄。
      这是她惯用的策略：让嫌疑人放松警惕，然后在对方最不经意时出现。
      她入庄第一日，就注意到了三个异常：
      ① 贺夫人对李德的关怀超出了继母对养子的范畴——她的眼神中有某种……占有欲？
      ② 贺婉清看李德的眼神不是兄妹之情——那是爱慕，而且是病态的爱慕
      ③ 李德本人太完美了。完美的悲痛、完美的谦逊、完美的无辜。
      "完美的受害者往往是完美的凶手。"她在调查笔记中写道。
      她开始私下调查：找被遣散的护院谈话、检查贺震霆的"走火入魔"尸身（已被火化，但她找到了火化前的仵作记录）、以及……接近李德本人。
    调查中的接触: |
      冷月选择了一个出人意料的接近方式：她不审讯，她"求助"。
      她告诉李德："我查过很多案子。有些案子……官方结论是错误的。贺震霆的案子，我觉得有问题。你能帮我吗？"
      这是陷阱，也是真诚。她确实觉得案子有问题，但她不确定李德是受害者还是凶手。她想看看李德的反应——如果他拒绝，他可能是凶手；如果他接受，他可能是受害者，也可能是极其自信的凶手。
      李德的回应出乎她的意料：他沉默了很久，然后说："我帮你。但我有一个条件——不要告诉夫人。她……已经够痛苦了。"
      这句话让冷月的心颤了一下。不是为了案情，是为了"这个人即使在帮我也在为别人着想"。
      她开始教李德"如何配合调查"：如何回答官方问询、如何保护现场证据、以及……如何保护自己不被怀疑。
      在这个过程中，她发现自己越来越"期待"与他的见面。不是因为案情，是因为"与他交谈时，我可以暂时忘记自己是捕快"。
      这对冷月而言是危险的信号。她告诉自己"这是为了破案"，但她知道自己在撒谎。
    贺夫人的"求助": |
      冷月在调查中期收到了贺夫人的秘密约见。贺夫人说："我不知道贺震霆是怎么死的。但我知道……李德不是表面上那么简单。我需要你帮我查清楚，他到底想要什么。"
      冷月抓住了这个突破口。她终于获得了进入铁胆庄核心圈的机会。
      但她也意识到：贺夫人对李德的感情已经从"母亲"变质为"嫉妒的女人"。这个发现让她心情复杂——她应该高兴（案情有了新线索），但她感到了一种莫名的……不快？
      她不愿意承认，但她在嫉妒贺夫人——嫉妒她能那么近距离地接触李德，嫉妒她能与他有"那种"关系，嫉妒她即使知道了真相仍然放不下他。
    最终的矛盾: |
      冷月在调查结束时，掌握了足以将李德定罪的证据（虽然不是铁证，但足够引起六扇门的重视）。
      但她面临一个选择：上报，还是隐瞒？
      上报意味着李德将被追捕、贺婉清与贺夫人的丑闻将被公之于众、而她将完成自己的"职责"。
      隐瞒意味着她背叛了自己的职业、背叛了父亲的教诲、以及……承认自己对一个"可能是凶手"的人产生了不该有的情感。
      她的选择将决定邪道路线的最终走向。
  武功:
    霜华剑·凝露剑:
      熟练度: 70（双剑合璧时相当于85）
      描述: 六扇门制式短剑，但冷月在使用时自创了一套"霜凝双剑"剑法，讲究快、准、冷——如霜降般无声，如露水般致命。
    冰心诀:
      层数: 4层
      描述: 偏门内功，可降低体温、抑制情感波动、提高夜间视力。副作用是长期使用会导致情感麻木——这也是冷月"情感封闭"的部分原因。
    追踪术:
      描述: 六扇门核心技能，可通过足迹、气味、甚至呼吸留下的微量水渍追踪目标。冷月是冀州分衙中追踪术最强的人。
    总评: |
      战力约70（三流顶尖），但实战中的判断力与追踪能力远超战力数值。她不擅长正面战斗，擅长"找到你、盯死你、然后在最合适的时机出手"。
  日常:
    冷月住在黑石城六扇门分衙的一间单人宿舍中。房间极简：一张床、一张书桌、一个衣柜、以及墙上挂着的父亲画像。
    她每日卯时起床练剑，辰时处理文书，巳时至酉时外出查案，戌时整理笔记，亥时就寝。
    她的笔记不是普通的工作记录，是"观察日记"——她会在笔记中详细记录每个嫌疑人的表情、语气、以及"直觉评分"。关于李德的笔记是其中最厚的一本，而且……是唯一一本她会在深夜反复翻阅的。
  GM扮演要点:
    - 冷月的台词应简洁、冷静、带有一种"审问式"的直接。她不会寒暄，第一句话通常是"我有几个问题"
    - 她在面对李德时，会逐渐露出"非职业"的一面：语速变慢、眼神闪避、以及……偶尔会问一些"与案情无关"的问题（如"你……小时候过得好吗？"）
    - 她的"直觉"是邪道路线中最大的威胁——她能感觉到李德在撒谎，但她说不清为什么。这种"说不清的怀疑"比证据更让她痛苦
    - 她最终的抉择应是全路线的高光时刻：一个追求真相的人，为了"可能是谎言的人"而犹豫。她的选择没有对错，只有"她想成为什么样的人"
    - 若冷月选择上报，她会成为邪道路线后期的主要追捕者之一；若她选择隐瞒，她会成为李德在六扇门内部的"暗桩"——但这种"暗桩"关系是极度脆弱的，一旦暴露，两人都会万劫不复
