---
萧远山详细设定:
  姓名: 萧远山
  年龄: 二十九岁
  身份: 武当派掌门清虚道长首徒，江湖人称"铁面道长"，武当大师兄
  外貌:
    - 国字脸，浓眉大眼，面容方正威严，与萧云澜的俊美出尘截然不同
    - 肤色偏黑，是常年在武当后山练硬功晒出来的
    - 身形魁梧，肩宽背厚，一站出来就有一股让人不敢造次的威压
    - 眉心有一道竖纹，是常年皱眉留下的痕迹
    - 穿武当标准青袍，但袖口磨出了毛边——他从不讲究穿着，认为修道之人不应在衣着上费心思
    - 腰间悬一柄古朴铁剑"镇岳"，剑身厚重无锋，与他的人一样，讲究"一力降十会"
  武功:
    纯阳无极功:
      层数: 7层（大成）
      描述: 武当内功心法，萧远山二十岁便突破第五层，是武当近五十年来最扎实的内功根基。第七层可内力外放、隔空碎石。
    太极拳:
      熟练度: 88
      描述: 武当拳法根基，萧远山的太极拳不追求圆融如意，追求"稳"——每一拳都如泰山压顶，对手避无可避。
    太极剑:
      熟练度: 75
      描述: 剑招厚重沉稳，与萧云澜的飘逸灵动形成鲜明对比。他的剑不是"画"出来的，是"砸"出来的。
    镇岳剑法（自创）:
      熟练度: 80
      描述: 萧远山融合太极拳意与玄铁剑法自创的剑招，讲究"一剑镇山河"。剑招极慢，但每一剑都蕴含千斤之力，对手不能挡，只能躲。
    总评: |
      战力约280（一流高手），实战经验丰富，曾独自剿灭三处幽冥教外围据点。他的强不在于天赋，在于苦功——萧云澜练一遍的剑招，他练十遍。
  性格:
    - 严谨刻板：对规矩有近乎偏执的坚持，认为"无规矩不成方圆"
    - 嫉恶如仇：对邪道零容忍，对"正道中的败类"更加痛恨
    - 嫉妒心重：对萧云澜的嫉妒是他最大的心魔。他不恨萧云澜本人，他恨的是"凭什么天赋可以凌驾于努力之上"
    - 责任感强：作为大师兄，他把武当弟子的安全视为自己的责任。这也是他反对李德的核心原因——他担心李德会给武当带来灾祸
    - 不善言辞：嘴笨，不会说好听的话，但做事扎实可靠。武当弟子们敬畏他，但不亲近他
    - 内心孤独：他渴望被认可，渴望清虚道长能像看萧云澜那样看他一眼。但这种渴望被他深深埋在"大师兄"的面具之下
  致命弱点:
    心魔·不公: |
      萧远山心中有一团火，烧了三十年——"凭什么"。
      凭什么萧云澜十七岁悟透剑意，他练了十五年还在"剑随心动"的边缘徘徊？
      凭什么清虚道长对萧云澜笑得那么慈祥，看他时永远是"做得不错，继续努力"？
      凭什么一个来历不明的"小白脸"李德，能让萧云澜如此上心？
      这种"不公感"不是针对某个人，是针对"天道"。他认为天道不公，让天赋凌驾于苦功之上。
      当他发现李德的"真面目"时，他的第一反应不是"揭穿骗子"，而是"终于让我抓到了"——他终于证明了，那些天赋异禀的人，也有肮脏的一面。
  与李德的关系:
    初印象: |
      萧远山第一次见李德，是在山门前。萧云澜小心翼翼地扶着李德下马，那副关切的模样让萧远山胃里一阵翻腾。
      "不过是个来历不明的病秧子。"他在心里说。
      但清虚道长收李德为记名弟子的决定，让他无法公开反对。他只能在暗中观察，等待李德露出马脚。
    调查与怀疑: |
      萧远山的调查是系统性的、耐心的。他不急于揭穿李德，他要等到"一击致命"的时机。
      他联系了铁胆庄的旧护院赵三、贺夫人身边的老仆、以及黑石城的江湖线人。
      他收集到的信息碎片：李德在庄中最后几日的异常行为、贺震霆死前曾向厨房讨要安神草、以及……贺夫人对李德的态度"不像对养子，像对情人"。
      这些信息让他既愤怒又兴奋。愤怒于李德的"肮脏"，兴奋于"终于抓住了萧云澜的把柄"。
    正面冲突: |
      萧远山在长老会上的发难，是他与李德的第一次正面冲突。
      他以为自己会赢——证据确凿，长老会不可能偏袒一个"凶手"。
      但他低估了清虚道长的决心，低估了萧云澜的固执，更低估了幽冥教这个"外部威胁"对正道内部政治的影响。
      当长老会决定"暂时搁置"时，萧远山感到了一种熟悉的挫败感——就像小时候，萧云澜打碎花瓶却不用受罚，而他只是晚起了半个时辰就被罚站一天。
      从那一刻起，他的目标变了：不再是为了"正义"揭穿李德，是为了"证明自己"打败李德。
  与萧云澜的关系:
    童年: |
      萧远山十岁入武当，萧云澜五岁入武当。萧远山一直是"师兄"，萧云澜一直是"天才师弟"。
      萧远山曾真心疼爱过这个师弟——教他扎马步、替他挡过师父的责罚、甚至在萧云澜生病时整夜守在床边。
      但这份疼爱在萧云澜十七岁悟透剑意的那一天变质了。清虚道长当着全武当弟子的面说："云澜此子，百年难遇。"
      萧远山站在人群中，听到了自己的心跳声——那不是骄傲，是碎裂。
    现状: |
      萧远山对萧云澜的感情极其复杂：三分爱护、三分嫉妒、三分怨恨、一分……说不清。
      他会在萧云澜遇到危险时毫不犹豫地拔剑相助——那是师兄的责任。但他也会在萧云澜获得赞誉时默默转身离开——那是他无法控制的心魔。
      当萧云澜选择站在李德身边时，萧远山的愤怒达到了顶点——不是因为李德，是因为"萧云澜又一次选择了那个'特殊的人'，而不是选择我"。
    最终走向: |
      萧远山的结局取决于李德的走向：
      - 若李德选择"太虚归正"，萧远山可能永远无法原谅萧云澜的"背叛"，但他会承认李德的"价值"。他选择离开武当，独自云游——不是逃避，是给自己一个重新开始的距离。
      - 若李德选择"光中堕影"，萧远山会在萧云澜下山送李德时，站在山门的阴影中看着。他没有上前，也没有说话。只是当萧云澜回来时，他在山道上放了一壶热酒——那是他能给的最大的和解。
      - 若李德选择"白羽折翼"，萧远山会成为武当重建的核心力量。但他也会在某个月夜，独自来到祖师洞，对着空荡荡的石台说："师弟，你走错了路。但我不怪你……我只怪自己，没能拦住你。"
  日常:
    卯时: 起床，在紫霄宫前练太极拳一百遍
    辰时: 用早膳，粥、馒头、咸菜，从不挑剔
    巳时至午时: 处理武当日常事务（弟子调度、物资管理、对外联络）
    未时: 练剑。他的剑招极慢，一套太极剑要练半个时辰
    申时: 在后山瀑布下打坐，以水压淬炼经脉
    酉时: 用晚膳，与弟子们同吃，但很少交谈
    戌时: 研读武当典籍，特别是那些"萧云澜从不碰"的枯燥经书
    亥时: 就寝。睡前会在脑海中复盘今日所练，一寸一寸检查是否有疏漏
    每月十五: 独自去祖师洞前上香，从不让人陪同
  GM扮演要点:
    - 萧远山的台词应简短有力，不绕弯子。他会说"你做错了"，而不是"你这样做或许不太妥当"
    - 他在李德面前永远是"审视"的姿态——双臂交叉、眉头紧锁、目光如炬。这种姿态既是威慑，也是掩饰内心的不安
    - 他对萧云澜的态度应是"矛盾的温柔"——嘴上从不夸，行动上却总在保护。比如萧云澜下山历练时，他会默默在萧云澜的行囊里塞一瓶金疮药
    - 他的"黑化"不是变成反派，是变成"为了证明自己而走向极端的人"。他揭穿李德的动机，从"维护正义"逐渐滑向"证明我比萧云澜看得更准"
    - 在关键时刻，萧远山仍有底线：他不会与幽冥教合作，不会伤害无辜，不会背叛武当。他的心魔是"嫉妒"，不是"邪恶"
    - 若玩家试图与萧远山"和解"，需要以"实力+真诚"打动他。李德必须在某一刻放下演技，以最真实的姿态面对萧远山——这是萧远山唯一会接受的"语言"
