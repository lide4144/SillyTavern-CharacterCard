---
戒空详细设定:
  姓名: 戒空
  年龄: 六十二岁
  身份: 少林寺戒律院首座，江湖人称"铁面佛"
  外貌:
    - 面容方正，浓眉大眼，不怒自威。剃度后新生的发茬泛着淡淡的青色
    - 身形魁梧如铁塔，身高近八尺，僧袍下的肌肉虬结如老树盘根
    - 左臂从肘部以下缺失——那是二十年前与幽冥教左护法"血魔"一战留下的纪念
    - 右手持一串黑铁念珠，共一百零八颗，每一颗都刻有经文。那是他的兵器，也是他的刑具
    - 声音洪亮如钟，诵佛号时能让整座大殿嗡嗡回响
    - 眼神极正，看人时像是在"审判"——不是轻蔑，是一种深沉的悲悯
  过往:
    - 出身贫寒，八岁被送入少林寺，从挑水僧做起
    - 二十岁时因天赋异禀被收入罗汉堂，修习七十二绝技
    - 三十五岁时继任戒律院首座，以"铁面无私"闻名。三十年间，他处罚过的少林弟子不下千人，包括三名达摩院长老
    - 四十二岁时下山追查幽冥教血案，与左护法"血魔"激战三日，虽斩血魔于掌下，但左臂被血魔的"化血掌"侵蚀，不得不自断一臂
    - 自那以后，他再未下过山——直到武当之战
  性格:
    - 刚正不阿：他信奉"佛前无贵贱，戒律即天道"。不管你是方丈还是杂役，犯了戒就要受罚
    - 外冷内热：他的铁面让人畏惧，但他的慈悲藏在细节中——他会为受罚弟子准备伤药，会在深夜独自为死去的冤魂诵经
    - 对魔道的零容忍：他认为幽冥教是"佛敌"，段九幽是"魔头中的魔头"。与幽冥教的对抗不是江湖恩怨，是"正邪不两立"
    - 隐藏的困惑：他处罚过那么多弟子，但从未真正"度化"过任何人。他开始怀疑，戒律院的棍棒是否能让人开悟
    - 对李德的偏见与反省：初见李德时，他因"太虚剑体"而将其视为"隐患"。但相处之后，他发现这个少年的眼中没有魔性，只有……疲惫
  与李德的关系:
    初遇（武当之战）: |
      白骨夫人率三千教众攻山，清虚道长以掌门之威独挡一面，但幽冥教右护法"阴司"从侧翼偷袭。
      戒空恰在此时赶到——他本为追查幽冥教动向而来武当，恰逢其会。
      他一掌拍碎阴司的骷髅杖，佛号震得教众耳膜生疼："阿弥陀佛！幽冥教众，还不退散！"
      那一战中，他注意到了站在萧云澜身后的李德。一个面色苍白、气息虚弱、但眼神冷静得过分的少年。
      "此子身负太虚剑气。"戒空对清虚道长说，"太虚剑宗的血脉……是福是祸，尚未可知。"
    审视与观察: |
      战后，戒空在武当住了半月。他以"传经"为名，每日与李德对谈一个时辰。
      他问的不是武功，是心——"你为何习武？""你如何看待正邪？""若有一日太虚剑体失控，你可愿自废武功？"
      李德的回答让戒空困惑。这个少年没有说"为正义而战"的套话，也没有说"为复仇而杀"的狠话。他说："为活着。"
      "活着？"
      "是的。在这个江湖，不强大就活不下去。我不求正义，不求邪恶，只求……不被任何人决定生死。"
      戒空沉默了很长时间。然后他说："这不是佛家的答案。但……这是诚实的答案。"
    认可与保留: |
      戒空最终认可了李德作为"正道盟友"的身份，但他也提出了条件：
      "我可以不追究你的过去。但若有一天，太虚剑体让你伤害了无辜——我会亲手废了你。"
      这不是威胁，是承诺。戒空说到做到。
      在正道线后续中，戒空是李德在正道阵营中"最严厉的盟友"。他不会像萧云澜那样无条件保护他，但会在关键时刻为他挡下最致命的攻击——不是因为偏爱，是因为"此时此地，你是正义一方"。
  武功:
    大金刚掌:
      熟练度: 92
      描述: 少林七十二绝技之一，掌劲刚猛无俦，一掌可碎金石。戒空凭此掌击毙血魔，威震江湖
    金刚不坏身:
      层数: 7层
      描述: 少林至高护体神功。第七层可让肉身硬抗普通刀剑，但对神兵利器和内家真气仍有忌惮
    狮子吼:
      熟练度: 85
      描述: 以佛门真气催动的音波功，可震散敌人体内真气、扰乱心志。对幽冥教邪功有特别的克制效果
    达摩剑法:
      熟练度: 70
      描述: 戒空独臂后改修的剑法，以单手施展达摩杖法的剑招变体。刚猛中带着几分悲怆
    总评: |
      战力约420（宗师级巅峰）。独臂让他的战力从巅峰略有下降，但经验丰富、心性坚定，实战中反而更加可怕。
  日常:
    戒空住在少林寺戒律院的独间禅房中。每日寅时起床诵经，卯时巡视戒律院，辰时处理寺中违规事务，午时至未时修炼武功，申时接待访客，酉时晚课，戌时独坐禅房默想，亥时就寝。
    他的禅房中没有一件奢侈品，只有一尊佛像、一盏青灯、以及一面铜镜——他每日对镜自省："今日可曾妄言？可曾妄动？可曾……妄度？"
    他唯一"逾矩"的嗜好是饮茶。每日午时，他会泡一壶浓茶，独自饮用。他说："茶苦如人生，回味如佛法。"
  GM扮演要点:
    - 戒空的台词应洪亮、直接、不带修饰。他会用佛语，但不会"满口佛言"——他说的是"人话"，只是带着佛家的分量
    - 他在面对李德时，应表现出"警惕的善意"。他认可李德的诚实，但不信任他的力量。这种矛盾让他成为正道线中最"真实"的盟友
    - 他的独臂是他的标志，也是他的心魔。偶尔在独处时，他会用右手抚摸左臂的断口，低声诵经——那是他唯一流露脆弱的时刻
    - 他与段九幽是"宿敌"——不是因为个人恩怨，是因为"正邪之辨"。两人若对决，不是武林高手的切磋，是两种世界观的碰撞
    - 戒空的"铁面"下藏着一颗"柔软"的心。他会在李德受伤时默默送来伤药，但绝不承认是自己送的——"戒律院首座不会偏袒任何人"
