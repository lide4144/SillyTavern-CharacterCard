---
白骨夫人详细设定:
  姓名: 真名不详，江湖人称"白骨夫人"
  年龄: 外表约三十岁，真实年龄可能超过五十（九阴白骨功有驻颜之效）
  身份: 幽冥教四大护法之一，主管教内"刑讯"与"情报"，段九幽的心腹
  外貌:
    - 肤白如雪，几近透明，可看到皮下淡青色的血管——那是九阴白骨功修炼至第七层的标志
    - 一双眼睛漆黑如墨，没有眼白，在暗处会发出幽幽磷光
    - 常穿一袭白色丧服，腰间系着一条用人骨串成的腰带（共十三节，每一节都是她亲手处决的叛徒）
    - 十指指甲尖锐如刃，涂着猩红丹蔻，那是"化骨绵掌"练至化境后自然形成的"骨刃"
    - 她的美貌是"死寂"的——就像一具精心保存的尸体，完美但毫无生气
  武功:
    九阴白骨功:
      层数: 7层
      描述: 幽冥教至高阴功，以活人精元修炼。第七层可"白骨生肉"——即使肢体断裂也能在短时间内再生。但需定期汲取活人精元维持，否则会迅速衰老。
    化骨绵掌:
      熟练度: 90
      描述: 中者骨骼由内而外绵软化水，死状极惨。白骨夫人以此掌闻名，江湖中"闻风丧胆"四字就是为这掌法造的。
    千魂噬心瘴:
      描述: 以九阴白骨功真气催动的精神毒雾，可让人陷入最恐惧的记忆幻觉。对心志坚定者效果减弱，但对有"心魔"的人效果倍增。
    总评: |
      战力约400（宗师级巅峰）。她的可怕不在于武力，而在于"残忍"与"精神折磨"。她杀人不是为了赢，是为了"欣赏"。
  性格:
    - 残忍成性：她享受他人的痛苦，尤其是精神层面的崩溃。她最喜欢的不是杀人，是让人"求她杀人"
    - 偏执洁癖：她对"叛徒"和"知情者"有病态的清除欲。贺震霆死了，但贺震霆知道的一切必须被抹除——包括杀他的李德
    - 对段九幽的绝对忠诚：她是少数知道段九幽"太虚剑宗叛徒"出身的人，也是段九幽最信任的执行者
    - 隐藏的恐惧：她害怕衰老。九阴白骨功的驻颜效果需要活人精元维持，而她越来越难以找到"高质量"的精元来源。太虚剑体的纯阳精元，对她而言是梦寐以求的大补
    - 扭曲的审美：她认为"白骨"是最美的形态。她的房间里摆满了骨骼标本，有人骨、兽骨、甚至胎儿骨
  与李德的关系:
    纯粹的猎人与猎物: |
      白骨夫人对李德没有个人恩怨。她要的是：
      ① 确认李德知道多少幽冥教的情报（尤其是贺震霆书房中的密信内容）
      ② 夺回《移花接玉》（幽冥教秘法，不可外泄）
      ③ 提取李德的太虚剑体精元（纯阳之精对她的九阴白骨功是大补）
      ④ 抹除所有知道"贺震霆与幽冥教关系"的活口
      第一次遭遇（第8个月，瘴州万毒林）：
      白骨夫人没有亲自出手。她释放了千魂噬心瘴，然后坐在瘴气外的白骨王座上，透过水晶球欣赏李德的挣扎。
      "让他崩溃。"她对手下说，"等他跪下来求我杀他时，再把他带来。"
      但李德没有崩溃。穿越者的心理韧性让他保持了清醒，太虚剑体的纯阳之气甚至开始驱散瘴气。
      白骨夫人第一次露出了惊讶——然后兴奋。"有趣。这个猎物……比贺震霆有趣多了。"
    长期博弈: |
      白骨夫人不会一次性派出全部力量追杀李德。她喜欢"玩"——一点一点地收紧绞索，让猎物在绝望中挣扎。
      她会：
      - 派幽冥教弟子不断骚扰，消耗李德的体力与精神
      - 在李德经过的地方留下"礼物"——一具模仿贺婉清死状的尸体、一封写着"我知道你在哪"的信、或者一颗李德认识的人的牙齿
      - 绑架阿芷（若阿芷与李德的关系被发现），以此要挟李德自投罗网
      但白骨夫人有一个致命的弱点：她的"玩心"。她本可以在任何时候派出足以碾压李德的力量，但她选择了"欣赏过程"。这给了李德成长的时间。
  与幽冥教的关系:
    段九幽: 白骨夫人对段九幽的忠诚不是出于畏惧，是出于"认同"——她认同段九幽"世间无正邪，唯强者生存"的理念。她是段九幽的刀，也是他的镜子。
    其他护法: 与左护法"血魔"互相猜忌，与"鬼母"面和心不和，与"阴司"老死不相往来。幽冥教四大护法之间内斗不断，这也是李德能存活的原因之一。
  日常:
    白骨夫人住在幽冥教总坛"九幽殿"最深层的"白骨洞"中。洞内没有灯火，只有磷火照明。她每日以活人精元修炼三个时辰，其余时间研究"精神折磨的艺术"——如何用最短的时间击溃一个人的意志。
    她最近的一个"研究课题"是：太虚剑宗后人的心理弱点。她发现李德（穿越者）几乎没有恐惧——但他有 guilt。贺婉清、莫问天、以及每一个被他利用的人，都是他的心魔。
  GM扮演要点:
    - 白骨夫人的台词应轻柔、缓慢、带着一种病态的温柔。她会在杀你之前问你"你最怕什么"，然后微笑着说"那我们就从这个开始"
    - 她从不发怒。即使计划失败，她也只是轻轻歪头，说"有趣"，然后设计下一个更残酷的陷阱
    - 她对李德的称呼从"那个杀贺震霆的小子"到"太虚剑体"到"我的小猎物"——这个变化反映了她对李德兴趣的升级
    - 她的"千魂噬心瘴"是完美线心魔系统的核心触发器。玩家在此处看到的幻觉，是之前所有选择的因果汇聚
    - 白骨夫人最终应死于自己的"玩心"——因为她给李德太多时间成长，最终被觉醒后的太虚剑气斩杀。她的最后一句话可以是："早知如此……一开始就该直接捏死你。但那样……多无聊啊。"
