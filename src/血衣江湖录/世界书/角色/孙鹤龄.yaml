---
孙鹤龄详细设定:
  姓名: 孙鹤龄
  年龄: 四十三岁
  身份: 前百花谷长老，现为江湖散人，毒术与医术双绝
  外貌:
    - 面容清俊，三缕长须，颇有几分仙风道骨——若不是那双总是带着算计的眼睛
    - 常穿一袭青色药袍，袍上绣着百草纹样，腰间悬着一排小玉瓶，每一瓶都装着不同的毒药或解药
    - 手指修长，指甲修剪得极整齐，但右手食指第一节有一道旧疤——那是他年轻时试毒留下的
    - 身上有一股淡淡的药香，混合着某种说不清的苦涩气息。熟悉他的人知道，那是"鹤顶红"的味道——他常年随身携带，已成了他的"体味"
    - 走路时悄无声息，不是轻功，是常年在药圃中行走养成的习惯——怕踩坏药材
    - 笑起来时眼角有细纹，但那笑容从不达眼底
  过往:
    - 出身百花谷药农世家，自幼辨识百草，十五岁入百花谷正式修习医道
    - 二十五岁时因研制"七步断魂散"震惊谷中——那是百花谷百年来最烈性的毒药。谷主本欲销毁配方，孙鹤龄连夜叛出，带走了所有研究笔记
    - 叛出后的十八年，他在江湖中神出鬼没，以"毒医"身份谋生：治病救人时收费极高，制毒杀人时收费更高
    - 他曾为贺震霆配制过"化功散"（用于控制李德），也曾为幽冥教炼制过"蚀骨柔筋散"（贺夫人所中之毒就出自他手）
    - 但他从不属于任何势力。"我是商人，不是信徒。"他这样说
  性格:
    - 极端利己：他的每一个决定都以"我能不能活"和"我能不能赚"为标准。正邪对他来说只是标签，有用时就贴，没用时就撕
    - 对毒术的偏执：他认为毒与药是一体两面，"能杀人的东西也能救人，能救人的东西也能杀人"。他研究毒药不是为了杀人，是为了"探索极限"
    - 胆小如鼠：他从不会让自己处于危险之中。任何交易都要留三条后路，任何会面都要先布置好逃脱路线
    - 隐藏的骄傲：他虽然怕死，但对自己的毒术有绝对的自信。"这世上没有我解不了的毒，也没有我制不了的毒。"——这话说得太大，但他确实接近这个境界
    - 对李德的评估：他最初把李德当成"一个有趣的试验品"——太虚剑体的血能配出什么毒药？太虚剑体的经脉能承受多大剂量的毒素？后来他发现，李德比毒更危险
  与李德的关系:
    初遇（落霞镇）: |
      李德在逃亡途中身中"千魂噬心瘴"的余毒，不得不寻找毒医救治。
      孙鹤龄的诊金贵得离谱：一百两银子，或者——"让我取你三滴血，研究太虚剑体的血液特性"。
      李德选了后者。孙鹤龄用一根银针取了血，当场就在药炉旁做实验。
      "有趣……"孙鹤龄盯着血滴在毒药中的反应，眼中闪烁着狂热的光芒，"你的血能中和七种常见毒素，但对'蚀骨柔筋散'的反应是……加速？"
      李德冷冷地看着他："你似乎很兴奋？"
      "当然兴奋！"孙鹤龄头也不抬，"这意味着，你的血既是解药，也是催化剂。用得好，能救千人；用不好，能杀万人。"
    交易与利用: |
      孙鹤龄是李德在江湖中"最不可靠但最有用"的联系人。
      他提供的服务包括：解毒、制毒、配制化功散、以及……用毒药进行"精准暗杀"。
      李德的回报是：太虚剑体的血液样本、从幽冥教手中夺取的毒药配方、以及……"不杀他"的承诺。
      孙鹤龄很清楚，李德随时可能杀他灭口。所以他每次与李德见面，都会提前服下"三日断魂散"的缓释剂——若他三日不死，解药就会自动失效，而他手里握着三日断魂散的配方，可以威胁李德。
      这是一种极其脆弱的互相威慑。
    邪道线中的角色: |
      在邪道线后续中，孙鹤龄可能成为李德建立"红颜阁"时的"毒药师"——负责处理那些"需要安静消失"的敌人。
      他的价值在于"干净"：他配制的毒药不会留下任何痕迹，死者看起来都像"自然死亡"。
      但他的风险也在于"不可靠"：只要有人出更高的价，他会毫不犹豫地出卖李德。
    潜在的背叛: |
      孙鹤龄与李德的关系最终会走向一个临界点：
      当幽冥教（或朝廷、或其他势力）出价高到让他无法拒绝时，他会选择出卖李德。
      但他的"出卖"也是算计好的——他会留下一些"后路"，让李德有机会反杀或逃脱。不是因为他仁慈，是因为"李德死了，太虚剑体的血就没了，我的研究就断了"。
      这种"有保留的背叛"是孙鹤龄这个角色的核心矛盾。
  武功:
    百草诀:
      层数: 6层
      描述: 百花谷医道根基，以内力催动药力，可加速伤口愈合、驱散普通毒素。孙鹤龄在此道上造诣极深，但从不用于救人——除非对方付得起价
    七步断魂散:
      描述: 孙鹤龄的成名之毒，无色无味，中者七步之内气血逆流而亡。解药只有他本人有，且需要他亲手调配——因为解药的配方中有一味药引，是他自己的血
    化骨绵掌（弱化版）:
      熟练度: 35
      描述: 他从幽冥教处学来的简化版，掌劲中带毒，可让对手骨骼酥软。他不擅长正面战斗，此招仅用于防身
    总评: |
      战力约50（三流），但毒术之强可让宗师级高手忌惮。在江湖中有一句话："宁得罪宗师，不得罪孙鹤龄。宗师杀你只用一剑，孙鹤龄杀你连剑都不用。"
  日常:
    孙鹤龄没有固定居所，他在江湖中有十三处"药庐"——每处都藏在人迹罕至之处，布置了至少三种剧毒陷阱。
    他每日卯时起床检查药材，辰时研制新毒或解药，午时进食（只吃自己种的菜，怕被人下毒），未时至酉时接待"客人"，戌时记录实验笔记，亥时就寝——但睡前必在房门上涂抹一层"触之即昏"的药粉。
    他的笔记不是用汉字写的，是用他自己发明的"药文"——只有他自己能读懂。
  GM扮演要点:
    - 孙鹤龄的台词应带有一种"职业性的热情"——谈论毒药时像在谈论艺术品，谈论人命时像在谈论药材成本
    - 他在李德面前会逐渐露出"恐惧"——不是怕李德杀他，是怕李德"不让他继续研究"。这种恐惧是他唯一可被利用的弱点
    - 他的"胆小"应该贯穿始终：即使在最得意的时刻，他也会在言谈中留下"后路"，从不把话说死
    - 他的背叛不应是"突然反水"，而是"渐进式的"——先是情报卖得慢一点，然后是解药配得差一点，最后是在关键时刻"恰好"不在场
    - 孙鹤龄最终的结局很可能是"死于自己的毒药"——他研究了一辈子的毒，最终却死在自己配制的、以为已经完美控制的毒药上
