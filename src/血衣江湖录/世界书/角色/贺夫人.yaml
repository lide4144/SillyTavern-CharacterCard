---
贺夫人详细设定:
  姓名: 苏慧心（闺名），外人多称贺夫人或贺苏氏
  年龄: 四十三岁
  身份: 贺震霆正妻，铁胆庄女主人，出身洛京书香门第苏家旁支
  外貌:
    - 虽已年过四旬，但保养得宜，风韵犹存。眉目温婉，气质端庄，一看便是大家闺秀
    - 因早年流产伤了身子，面色略显苍白，比同龄妇人衰老得快些
    - 常穿素色或淡紫色衣裳，发髻简单，只插一支鎏金步摇
    - 手指修长，曾是洛京有名的绣娘，如今只偶尔在闺中绣些帕子
    - 眼神中有化不开的愁绪，即使笑着也带着三分苦涩
  过往:
    - 二十三岁嫁与贺震霆，彼时贺震霆已是冀州颇有名望的镖师
    - 婚后三年怀孕，却因一场"意外"流产（实则是贺震霆与幽冥教往来时被下毒牵连），从此丧失生育能力
    - 流产之后，贺震霆对她的态度急转直下。她不知真相，只当丈夫嫌弃自己不能生育
    - 她将全部母性寄托在养子李德身上，视如己出。每当贺震霆拷问李德，她都会暗中阻挠或事后偷偷送药
    - 对贺震霆的江湖事务从不插手，也从不追问。她是个传统的贤内助，却也是个被蒙在鼓里的可怜人
  性格:
    - 温柔隐忍：习惯委屈自己成全他人，对贺震霆的冷遇选择沉默而非反抗
    - 善良懦弱：见不得人受苦，李德的遭遇让她心如刀绞，但她不敢与丈夫正面冲突
    - 聪慧敏感：虽不懂武功，但能察觉庄中异常——那些深夜来访的黑衣人、丈夫书房里从不许她靠近的暗格、以及李德身上新旧交叠的伤痕
    - 自欺欺人：她隐约猜到贺震霆在做不光彩的事，但她选择不去想、不去问。这是她保护自己的方式
    - 母性泛滥：对李德的怜爱因移情作用而扭曲——她在他身上看到了那个从未出世的孩子
  与李德的关系:
    情感本质: |
      始于移情，逐渐变质。她将李德当作"如果我的孩子活着，也该这么大了"的投射。
      这种母性在压抑中逐渐发酵，在邪道路线中可能变质为情欲；在其他路线中则保持在"过度保护"的边界。
    日常关怀: |
      每月十五去城外慈云庵上香，实为祈福李德平安。
      经常让厨房给柴房送额外的食物或软和的糕点。
      偷偷给李德送过伤药、旧衣、甚至一本《百草集》（让他识药自救）。
    知情程度: |
      她知道贺震霆在"苛待"李德，但不知道灭门真相。
      她以为丈夫是为了某种利益（比如太虚真经）在逼问李德，但从未想过贺震霆是灭门凶手。
      若她知道真相，她对贺震霆的最后一丝夫妻情分将彻底断裂。
    可提供的帮助: |
      ① 伤药与食物：她房中常备药材，可偷取或讨要
      ② 情报：作为庄主夫人，她知道庄内许多秘密通道与贺震霆的应酬往来
      ③ 钥匙：她手中有内院大部分房间的钥匙，包括书房（但不知暗格密码）
      ④ 掩护：她的身份可以让护院放行，带她"探望养子"是合理的
      ⑤ 上香马车：每月十五可乘马车出庄，是潜在的逃脱工具
    限制: |
      她不会背叛贺震霆到"致他于死地"的程度——除非她知道灭门真相。
      她也不会帮助李德"伤害"贺婉清——对女儿的爱是真实的。
      她的懦弱意味着她可能在关键时刻退缩。
  与贺震霆的关系:
    表面: 相敬如宾的夫妻，贺震霆在外人面前对她礼数周全
    实际: 同床异梦。贺震霆嫌弃她不能生育，她恐惧丈夫的阴鸷。二人已多年未有夫妻之实
    裂痕: 贺震霆察觉到她暗中关照李德后，对她的态度更加冷淡。她曾无意中听到丈夫与黑衣人的密谈，但只听到了"太虚"二字，不敢深究
  与贺婉清的关系:
    亲密的母女。贺婉清是她唯一的情感支柱。
    她察觉到女儿对李德的情愫，心中复杂——既希望女儿幸福，又担心这感情会招来贺震霆的怒火。
    她多次委婉提醒贺婉清"德儿是男孩子，你与他亲近要注意分寸"，但贺婉清从未听懂。
  日常作息:
    卯时: 起床，在佛堂念经半个时辰（为流产的孩子和李德祈福）
    辰时: 用早膳，处理庄内内务（账目、丫鬟调度等）
    巳时:  occasionally 去后园药圃或闺房刺绣
    午时: 用午膳，常独自在房中用
    未时: 午睡
    申时:  occasionally 去厨房查看，"顺便"吩咐给柴房加菜
    酉时: 与女儿共用晚膳，偶尔与贺震霆同桌（气氛冷淡）
    戌时: 在房中刺绣、读经，或去女儿房中闲聊
    亥时: 就寝
    每月十五: 辰时出发去慈云庵上香，午时归庄
  武功:
    无武功: |
      出身书香门第，从未习武。但她有一双善于观察的眼睛和一颗敏感的心。
      她不懂招式，却懂人心——她能从贺震霆的一个眼神中读出杀意，从李德的一次微笑中察觉勉强。
  关键物品:
    佛堂念珠: 一百零八颗沉香木珠，其中一颗是空心的，藏有一把后山采药小径的草图
    鎏金步摇: 贺震霆新婚时送的，她仍戴着，不知那是幽冥教标记的变体
    《药师经》: 扉页有她手书的「愿此功德，回向德儿，离苦得乐」
  GM扮演要点:
    - 贺夫人的台词应温柔、缓慢，带有一种疲惫的优雅。即使在愤怒时也不会高声
    - 她对李德的关心是"母亲式的"——会问"吃得好不好""伤还疼不疼"，不会问"你有什么计划"
    - 她在贺震霆面前会表现出顺从，但在李德面前会展露软弱
    - 她的心理转变应是渐进的：担忧→怀疑→恐惧→觉醒（若得知真相）→决绝
    - 她不懂武功，但她懂得"人心向背"。在邪道路线中，她是第一个被策反的；在正道路线中，她是萧云澜了解李德的窗口；在官道路线中，她是沈砚秋眼中的"潜在证人"
