---
玉箫娘详细设定:
  姓名: 真名不详，江湖人称"玉箫娘"
  年龄: 外表约二十五岁，真实年龄不详
  身份: 洛京烟雨楼核心乐师，千面佛的"耳目"之一，专司以音律收集情报
  外貌:
    - 容貌清丽脱俗，肤若凝脂，眉目间带着一种不食人间烟火的疏离感
    - 常穿一袭淡绿色纱裙，裙摆绣着竹林纹样，走动时如风中摇曳的翠竹
    - 发间一支白玉箫簪，那是她的标志——也是她的兵器。箫身中空，内藏七枚透骨钉
    - 手指修长如玉，指尖有常年按箫留下的薄茧。她抚箫时，那双手像在跳舞
    - 身上有一股淡淡的檀香，混合着竹叶的清新气息
    - 她的美是"冷"的，像一块温润的玉——触之生温，但永远达不到火热的程度
  过往:
    - 出身江南书香门第，自幼习琴箫，十二岁时已能以箫声引百鸟来朝
    - 十五岁时家族卷入官场倾轧，满门被抄。她被发卖入乐籍，在洛京最大的乐坊"绕梁阁"中做了三年清倌人
    - 十八岁时被千面佛以重金赎出，转入烟雨楼。千面佛看中的不是她的美貌，是她的"耳力"——她能从箫声中听出一个人的心跳、呼吸、甚至情绪变化
    - 十年来，她以乐师身份游走于洛京权贵之间，在宴席上奏一曲《凤求凰》，便能将席间所有人的秘密听个七七八八
    - 她从未见过千面佛的真面目，只听命于他的密令。她不知道密令从何而来，只知道每月初一，她的箫盒中会多一张纸条
  性格:
    - 清冷自持：她很少笑，很少怒，很少说话。她的情感都倾注在箫声中——快乐时吹《春江花月夜》，悲伤时吹《苏武牧羊》，愤怒时……她从不愤怒，只吹《十面埋伏》
    - 对音律的绝对忠诚：对她而言，音乐是唯一的"真实"。在虚假的人间，只有音律不会说谎
    - 隐藏的疲惫：十年情报生涯让她厌倦。她常在深夜独自吹箫，对着月亮说："若有一日能隐于竹林，此生无憾。"
    - 对李德的兴趣：起初是任务——千面佛要她"接近那个少年，听听他的心跳"。后来变成了好奇——这个少年的心跳，与其他所有人都不同。不是快，不是慢，是……没有规律。像一个在演戏的人
  与李德的关系:
    初遇（洛京烟雨楼）: |
      李德为获取情报来到洛京烟雨楼，千面佛安排玉箫娘为他奏曲。
      那一夜，玉箫娘吹了九首曲子。每一首都在试探——《高山流水》试探他的志向，《凤求凰》试探他的情欲，《十面埋伏》试探他的恐惧。
      李德听完九首，只说了一句话："姑娘的箫声中，有杀气。"
      玉箫娘的手指停在箫孔上。这是她第一次被人"听穿"。
      "公子的耳力，不一般。"她说。
      "不是我的耳力好。"李德淡淡地说，"是你的杀气太重，藏不住。"
      那一夜之后，玉箫娘在笔记中写道："此人心如铁石，音律不入。但……他的心跳在第三首《凤求凰》时，快了半拍。"
    情报交易: |
      玉箫娘是李德在洛京的"高级情报源"。她提供的情报不是文字，是"声音"——某某官员在醉后说了什么、某某武林人士在听曲时呼吸变了几次、甚至……某某人的脚步声是否"心虚"。
      她的定价很简单：一首曲子换一条情报。但李德必须听完，不能中途离席。
      "音乐是尊重。"她说，"不尊重音乐的人，不值得尊重。"
    长期定位: |
      玉箫娘不会为李德冒险，也不会出卖他——除非千面佛下令。
      她是李德情报网中最"优雅"的一环，也是最"脆弱"的一环。她的价值在于"洛京权贵圈"的信息，但她的危险在于"千面佛随时可能收回她"。
      在官道路线中，若李德与朝廷势力接触，玉箫娘会成为他最宝贵的"耳朵"——朝堂上的风声、后宫中的私语、甚至皇帝的心情变化，都可能被她从某场宴席的箫声中捕捉。
    桃花线索: |
      玉箫娘对李德的感情是"知音之慕"。
      她在这个少年身上看到了一种"孤独"——不是她的那种"高处不胜寒"的孤独，是"与全世界为敌"的孤独。
      某夜奏完最后一曲，她忽然说："公子可知，箫有八孔，七孔发声，一孔透气。人亦如此——七窍用来生存，一窍用来呼吸。公子的那一窍……在哪里？"
      李德沉默了很久，然后说："我没有那一窍。"
      玉箫娘垂下眼眸，重新将箫凑到唇边。那一夜，她吹了一曲从未在人前吹过的《孤鸿》——那是她为自己写的曲子，写给那个永远到不了的竹林。
  武功:
    音波功·箫韵:
      熟练度: 80
      描述: 以内力催动箫声，可形成无形音波攻击。高音如针穿刺耳膜，低音如锤震动内脏。玉箫娘的造诣可让音波在十丈内精准定位
    透骨钉:
      熟练度: 65
      描述: 箫中暗藏的七枚透骨钉，涂有麻痹性毒药。她不轻易使用——"音律之外，皆属下乘"
    听音辨位:
      描述: 她能在嘈杂环境中分辨出三十丈内任何人的心跳声、呼吸声、甚至血液流动声。这是天赋，也是十年训练的结果
    总评: |
      战力约90（二流），但情报战中她的价值远超战力。她的音波功在群战中尤为可怕——一曲《十面埋伏》可让十丈内的敌人心神大乱。
  日常:
    玉箫娘住在洛京烟雨楼最顶层的"听竹轩"中。推窗可见洛京全景，但她从不多看——"人间烟火，看多了会心软"。
    她每日卯时起床练琴，辰时至酉时接客奏乐（实为收集情报），戌时独自在轩中吹箫，亥时就寝。
    她的房间中只有三件东西：一管玉箫、一幅竹林水墨画（她自己画的）、以及一个锁着的木盒——里面是她十五岁前写的诗词，那时她还叫"柳婉清"。
  GM扮演要点:
    - 玉箫娘的台词应简短、含蓄、带着一种"点到为止"的美感。她不会直接说"我喜欢你"，她会说"今日的箫声，为你而乱"
    - 她在李德面前会逐渐露出"破绽"：吹错一个音、停下来发呆、或者在奏完一曲后多看他一眼——这些是她表达情感的方式
    - 她的箫声是"情绪的镜子"——GM可以通过描述她吹的曲子来暗示她对当前局势的判断
    - 她与苏红袖是"同事"也是"对照"：苏红袖八面玲珑、热情似火；玉箫娘清冷自持、淡如秋水。两人若同时出现，会形成奇妙的张力
    - 她的最终命运可能是"归隐"——在某次任务后，她留下玉箫，独自离去，再也没有人见过她
