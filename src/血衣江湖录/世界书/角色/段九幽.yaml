---
段九幽详细设定:
  姓名: 段九幽（原名段长庚，太虚剑宗末代弟子）
  年龄: 外表约四十岁，实际年龄五十六岁
  身份: 幽冥教教主，幽冥教四大护法的直属上峰，江湖上最神秘的魔道枭雄之一
  外貌:
    - 面容清癯，三缕长须，若不是那双眼睛，几乎像一位仙风道骨的隐士
    - 那双眼睛是可怕的——瞳孔极黑，没有光泽，像两口深不见底的枯井。对视超过三息，会有一种被吸入其中的错觉
    - 常穿一袭玄色长袍，袍角绣着九条银蛇，象征幽冥教"九幽地府"的教义
    - 手指修长苍白，指甲修剪得极整齐。他从不留长指甲——"那是女人的把戏"，他这样说
    - 腰间悬着一柄无鞘古剑，剑身漆黑如墨，剑名"幽冥"。那是他叛出太虚剑宗时带走的唯一遗物
    - 他的气息几乎不存在。即使站在你面前，你也可能感觉不到他的呼吸和心跳——这是幽冥教至高心法"九幽绝息"练至化境的标志
  过往:
    - 三十年前，他是太虚剑宗掌门莫问天的师弟，天赋之高仅次于莫问天，被寄予厚望
    - 但他不满太虚剑宗"避世守成"的理念，认为剑道应为强者所用，而非锁在山门中供奉
    - 二十五年前，他偷走太虚真经剑意篇的抄本，叛出太虚剑宗，加入当时还只是一个江湖散团的幽冥教
    - 二十年间，他以雷霆手段统一幽冥教各派系，铲除异己，将幽冥教从一个江湖散团发展为能与正道六大门派抗衡的魔道巨擘
    - 十五年前，他参与了太虚剑宗灭门惨案。不是主谋，是执行者之一——他亲自斩杀了太虚剑宗的三名长老
    - 但他没有杀莫问天。不是因为心软，是因为莫问天在临死前将太虚真经的核心秘密告诉了他——那个秘密让他恐惧了十五年
  性格:
    - 绝对理性：段九幽从不愤怒、从不狂喜、从不恐惧。他的每一个决定都经过精密计算，即使是"杀人"也要算清楚"杀了这个人的收益与成本"
    - 深沉的自负：他认为自己是"唯一理解太虚剑道真谛的人"。莫问天太软弱，把剑道锁在山门中；后人太愚蠢，把剑道当成了招式。只有他，真正领悟了"太虚"二字——虚无、无形、无处不在
    - 对太虚剑宗的执念：他背叛了太虚剑宗，但他从未"否定"太虚剑宗。相反，他认为自己才是太虚剑宗真正的继承人——莫问天一脉太软弱，而他才是真正的"太虚意志"
    - 隐藏的恐惧：莫问天临死前告诉他的秘密，是他十五年来唯一的噩梦。他一直在寻找太虚剑宗的后人，不是为了斩草除根，是为了"确认那个秘密不会成真"
    - 对李德的复杂态度：他是李德的"杀父仇人"之一，但他对李德没有个人恩怨。他要的是太虚剑体——不是杀人，是"回收"。在他看来，李德体内的太虚剑宗血脉，本就属于他
  与李德的关系:
    猎人视角: |
      段九幽对李德的定位不是"敌人"，是"未完成的遗产"。
      他在得知李德是莫问天之子后，只说了一句话："师兄的儿子……比我预想的要活得久。"
      他不急于杀死李德。相反，他在等待——等待李德的太虚剑体觉醒，等待他收集太虚真经的所有碎片，等待他成长到"值得回收"的程度。
      "太虚剑体在觉醒前毫无意义。"他对白骨夫人说，"等他觉醒后，他的血、他的骨、他的剑意，才是最有价值的。"
    收服而非毁灭: |
      段九幽给了李德一个选择：加入幽冥教，成为他的"传人"。
      这个提议不是虚伪的。段九幽确实需要一个继承人——他没有子嗣，幽冥教四大护法各怀鬼胎，他需要一个真正继承"太虚意志"的人。
      "你父亲太软弱。"他对李德说，"他守着太虚剑宗的山门，看着它一点点腐烂。我让它燃烧——燃烧比腐烂更体面。你呢？你想做什么？继续腐烂，还是……成为火焰？"
      李德的回应将决定魔道路线的走向。
    最终对决: |
      段九幽不会亲自出手对付"未成长"的李德。他只会在两种情况下亲自出手：
      ① 李德的太虚剑体完全觉醒，威胁到他的地位
      ② 莫问天的秘密即将被揭开
      在对决中，段九幽的战力约500（大宗师级），但他不会用全力——他在测试李德是否"值得"。
      若李德胜，段九幽会含笑而死："师兄，你儿子……比你强。"
      若李德败，段九幽会亲手抽取他的太虚剑体精血，然后……用那滴血完成他十五年前未竟之事。
  武功:
    九幽绝息:
      层数: 9层（大成）
      描述: 幽冥教至高内功，可让修炼者的气息完全消失，达到"与天地同寂"之境。第九层可短暂操控周围人的呼吸节奏，让敌人在不知不觉中窒息
    太虚剑意·幽冥变:
      熟练度: 95
      描述: 段九幽以幽冥教心法改造的太虚剑意，已完全偏离正道。剑招阴冷诡谲，如九幽地府中伸出的鬼手。他凭此剑法斩杀过三名宗师级高手
    幽冥步法:
      熟练度: 90
      描述: 身形如烟如鬼，可在三丈范围内瞬间变换七次方位，肉眼无法捕捉
    总评: |
      战力约500（大宗师级），江湖上能与他正面交锋的不超过五人。但他极少亲自出手——他认为"教主亲自杀人"是"管理的失败"。
  日常:
    段九幽住在幽冥教总坛"九幽殿"最深层的"寂室"中。室内无灯、无窗、无家具，只有一块冰冷的石床——他在那里打坐、思考、以及做噩梦。
    他每日只进食一次（午时），只吃素食（"血肉会让气息浑浊"）。其余时间都在修炼或处理教中事务。
    他有一个秘密习惯：每月十五，他会独自去九幽殿后的枯井旁，对着井水说一段话——那是他对莫问天的"独白"。没有人知道他说了什么。
  GM扮演要点:
    - 段九幽的台词应简洁、低沉、不带任何情绪起伏。他像一台精密运转的机器，每一句话都有其目的
    - 他在提到太虚剑宗时，语气中会有极其微弱的波动——那是他唯一的人性残留
    - 他对李德的"邀请"是真心的，不是陷阱。这种"真心"比任何阴谋都更危险——因为它让李德面临一个真正的选择
    - 他最终的对决不应是"正邪大战"的俗套，而是"两种太虚剑道的碰撞"——莫问天的"守成"vs段九幽的"毁灭"vs李德的"新生"
    - 段九幽死前的最后一句话应揭示莫问天的秘密，为整个故事埋下最终伏笔
