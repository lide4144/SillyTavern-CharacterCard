---
血鸦详细设定:
  姓名: 血鸦（真名不详，幽冥教中以代号相称）
  年龄: 三十岁
  身份: 幽冥教冀州分舵内部使者，专职"特殊体质者"的追踪与采血
  外貌:
    - 美艳而危险，一双丹凤眼眼尾微微上挑，瞳孔在暗处会泛出淡淡的血红色——那是长期饮用人血修炼的副作用
    - 肤色苍白近乎透明，嘴唇却异常鲜红，像是刚饮过血
    - 常穿一袭暗红色紧身劲装，腰间悬着一排小巧的采血瓶，以及一柄薄如柳叶的"血刃"
    - 十指指甲涂着黑色丹蔻，指尖有常年采血留下的淡褐色痕迹——洗不掉，是功法的烙印
    - 她的身上有一股奇特的气息：不是脂粉香，是一种淡淡的铁锈味，像是刚磨过的刀
  过往:
    - 十二岁被幽冥教掳走，作为"药人"培养
    - 十五岁时因体质特殊（可承受大量血液流失而不死），被选为"采血者"——专门从特殊体质者身上采集血液供教中炼丹
    - 二十岁时杀了自己的师父（一名虐待她的采血者），取而代之成为冀州分舵首席采血使者
    - 十年间，她采过三百七十余人的血，从未失过手。她以此为荣，也以此为耻
  性格:
    - 职业性的冷酷：采血对她而言是工作，不是杀戮。她会在采血前对被采者说"谢谢"，然后在采完后给对方一颗糖——这是她的"仪式感"
    - 病态的好奇心：她对"特殊体质"有病态的执着。不是贪婪，是"收集癖"——她想尝遍天下所有特殊体质者的血，然后写一本《血谱》
    - 扭曲的审美：她认为"血是最诚实的语言"。一个人的血可以告诉你他的恐惧、他的欲望、以及他是否在说谎
    - 隐藏的孤独：她没有朋友，没有爱人，连幽冥教的同僚都怕她。她唯一的"伴侣"是那些采血瓶——每只瓶子里都装着一个人的故事
    - 对李德的复杂兴趣：起初是职业性的（太虚剑体+玄阴素女体），后来变成了个人性的——他的血太"干净"了，干净到让她想弄脏
  与李德的关系:
    初遇（贺震霆丧事）: |
      血鸦以"贺震霆故友"身份出席丧礼，实则是幽冥教派来调查死因的使者。
      她第一次见到李德时，他正在灵前无声哭泣。她闻到了他身上的血腥味——不是新鲜的，是旧伤累积的气息。
      "你的血……"她低声说，"闻起来很悲伤。"
      李德抬头看她，眼中是恰到好处的迷茫："姑娘说什么？"
      血鸦笑了。她知道这个少年在装——他的脉搏太平稳了，稳定到不像一个悲痛的人。
      但她没有揭穿。她喜欢有秘密的猎物。
    再临（第9个月）: |
      血鸦带来幽冥教的提议：以庇护换玄阴素女体的血液。
      李德以"太虚剑体精血"作为替代方案。血鸦对这个提议极感兴趣——太虚剑体的纯阳精血，她从未尝过。
      "我采过纯阴之血、混血之血、甚至佛子之血。"她说，"但从没采过'剑'的血。"
      她的条件：交易必须在幽冥教总坛进行，由她亲自采集。这意味着李德要深入敌营。
      但她也给出了"额外选项"：若李德愿意与她共度一夜，她可延长期限三个月。
      这不是威胁，是邀请。她的眼神在说："我想尝尝你的血，也想尝尝你。"
    长期博弈: |
      血鸦是李德在邪道路线中最危险的"桃花"。她比贺婉清醒、比贺夫人冷酷、比冷月直接。
      她不在乎李德是不是凶手、不在乎他有没有感情。她只在乎两点：他的血值多少钱、以及他的人有多有趣。
      李德对血鸦的应对是最艰难的——他不能用"温柔"打动她（她免疫），不能用"真诚"说服她（她不信），不能用"利益"完全控制她（她的欲望超越了利益）。
      他唯一能做的，是让她觉得"这个人我看不透、得不到、但值得继续看"。——这与他对千面佛的策略相同，但血鸦比千面佛更危险，因为她不讲规则。
    隐藏线索: |
      血鸦的师父（那个被她杀死的采血者）曾参与过十五年前的李家灭门。血鸦在师父的遗物中发现了一本笔记，记载着"太虚剑宗血脉有特殊标记——火焰形胎记，其血至阳至纯，可破九阴白骨功"。
      这正是白骨夫人急于得到李德的原因，也是血鸦对李德感兴趣的深层动机——她想在白骨夫人之前"尝"到这份血。
  武功:
    血影步:
      熟练度: 75
      描述: 幽冥教轻功，身形如烟如雾，可在十息内变换三次方位。适合暗杀与逃脱。
    血刃十三式:
      熟练度: 80
      描述: 以薄刃割脉取血的招式，招招不离要害血管。不致命，但极难防御。
    饮血功:
      层数: 5层
      描述: 幽冥教邪功，以饮用特殊体质者血液修炼。第五层可短暂复制所饮血液者的部分能力（如饮用玄阴素女体之血后可获得短暂抗毒能力）。
    总评: |
      战力约200（二流顶尖），但实战中的诡异程度远超数值。她杀人不见血——因为她要的是血，不是命。
  日常:
    血鸦没有固定居所。她在冀州有七处"采血站"——废弃的庙宇、地窖、或者富商的别院。
    她每日寅时起床检查采血瓶，辰时修炼饮血功，午时进食（只食肉，不碰谷物），申时外出执行任务，戌时记录《血谱》，亥时就寝——但睡眠极浅，任何风吹草动都会让她惊醒。
    她的《血谱》是一本手写册子，记载了所有她采过血的人：姓名、年龄、体质、血液味道的描述、以及"采血感受"。最新的一页空着，标题写着："太虚剑体——待采"。
  GM扮演要点:
    - 血鸦的台词应带有一种"职业性的温柔"——她会微笑着说"不要怕，很快的"，然后割开你的血管
    - 她对李德的兴趣应逐步升级：从"他的血很值钱"到"他的人很有趣"到"我想看他崩溃时会是什么表情"
    - 她的"桃花"不是传统意义上的爱慕，是"捕食者对猎物的欣赏"——她想要李德，就像收藏家想要一件稀世珍品
    - 她偶尔会露出罕见的脆弱：在独自饮酒时，她会对着采血瓶说话，仿佛那些瓶子是她唯一的朋友
    - 血鸦最终可能会死于自己的"玩心"——她给了李德太多时间准备，最终被反杀。她的最后一句话可以是："你的血……比我想象中更甜。"
