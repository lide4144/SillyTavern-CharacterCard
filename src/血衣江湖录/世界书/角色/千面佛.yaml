---
千面佛详细设定:
  姓名: 真名不详，江湖人称"千面佛"
  年龄: 外表约四十岁的胖子，真实年龄可能更大
  身份: 烟雨楼高级情报贩子，洛京黑市的实际掌控者之一
  外貌:
    - 永远戴着一张笑脸弥勒佛面具，从不以真面目示人
    - 体态肥胖，穿锦缎长袍，手指上戴满了各色的宝石戒指——每一枚都代表一条他掌握的重要情报线
    - 声音温和如佛堂诵经，带着一种让人放松的磁性
    - 身上有一股淡淡的檀香，掩盖了他真正想掩盖的气息
    - 没有人知道他的真容、真名、甚至真实性别。有人猜测"千面佛"不是一个人，而是一个代代相传的身份
  性格:
    - 绝对中立：他不属于正道、邪道、或朝廷。他只属于"利益"
    - 信息至上：对他而言，情报比金银更有价值。一条独家情报可以换一条命，也可以换一座城
    - 礼貌的冷酷：他永远笑眯眯的，永远用敬称，永远倒茶让座。但他的每一句话都经过精密计算，不会多透露一个字
    - 风险评估大师：他不会与任何"即将沉没"的人做生意。若他认为李德活不过三个月，他会礼貌地拒绝交易；若他认为李德有"长期投资"价值，他会主动提供优惠
    - 隐藏的正义感（极其微弱）：他偶尔会在交易中"多给一点"——不是同情，是"看戏"。他觉得一个有潜力的棋子成长起来的过程，比直接收割更有趣
  与李德的关系:
    初遇: |
      李德在落霞镇醉仙楼第一次与烟雨楼接触时，接待他的是老板娘红袖。
      千面佛亲自出场，是在李德抵达洛京黑市之后——他判断李德"有资格"与他直接交易。
    交易模式: |
      千面佛从不收纯银两。他的定价方式有三种：
      ① 等值情报：你用一条情报换一条情报
      ② 未来承诺：你现在欠我一个人情，将来我需要时还我（利息极高）
      ③ 稀有物品：功法残篇、禁药、或者……某个人的"把柄"
      李德第一次与千面佛交易时，用"贺震霆书房暗格中的幽冥教密信内容"换取了莫问天的情报。
      千面佛非常满意这个交易——幽冥教的内部密信在情报市场上的价值远超百两黄金。
    长期定位: |
      千面佛是李德在江湖中的"信息中枢"。无论是追捕者的动向、真经碎片的下落、还是某位大人物的弱点，千面佛都能提供——只要价格合适。
      但千面佛从不站队。若六扇门出的价更高，他会毫不犹豫地出卖李德的位置；若李德能提供更有价值的情报，他会反过来帮李德设局。
      这是一种极其脆弱的平衡，但也是江湖中最真实的关系。
    隐藏线索: |
      千面佛似乎对"太虚剑宗"有超出寻常的兴趣。他在某些交易中会"不经意"地询问李德关于太虚真经的进展。
      阿芷曾警告李德："千面佛知道的比他卖的多十倍。他问你什么，比他卖你什么更重要。"
  武功:
    未知: |
      没有人见过千面佛出手。有人说他不会武功，有人说他是隐世大宗师。
      唯一能确定的是：洛京黑市中至少有三名宗师级高手为他效力，而他本人从未受过伤。
  洛京黑市:
    千面佛是黑市的"规则制定者"之一。黑市子时开寅时散，规则只有三条：
    ① 不问来路
    ② 钱货两清
    ③ 黑市内禁止动手（违者会被三名宗师联手抹杀）
    李德在黑市中是安全的——这是他唯一可以"公开露面"而不怕追捕的地方。
  GM扮演要点:
    - 千面佛的台词应圆滑、礼貌、滴水不漏。他像是一个开了几十年茶馆的老掌柜，见人说人话，见鬼说鬼话
    - 他不会直接回答"是"或"否"。他会说"这个消息嘛……值不值钱，取决于您怎么用它"
    - 他在谈到追杀李德的各方势力时，语气中没有偏向，就像在谈论天气
    - 偶尔可以在他的"不经意"话语中埋下伏笔——比如提到"三十年前太虚剑宗的事，我倒是知道一些"，然后笑着转开话题
    - 千面佛的"胖"和"笑"是他的伪装。在他最放松的时候（比如独自喝茶时），玩家可以察觉到一丝极其微弱的疲惫——仿佛这张笑脸面具戴了太久，已经嵌进了肉里
