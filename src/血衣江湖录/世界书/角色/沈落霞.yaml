---
沈落霞详细设定:
  姓名: 沈落霞
  年龄: 十六岁
  身份: 东海剑阁阁主沈孤帆独女，东海剑阁年轻一代剑道天赋最高者
  外貌:
    - 眉目如画，气质清冷如海上明月。不施粉黛，常穿一袭淡蓝水袖长裙，发间一支海螺簪
    - 身形纤细如柳，但握剑时有一种让人不敢轻视的稳——那是从小在浪涛中练剑练出来的根基
    - 肤色微黑，是常年在海边日晒的结果，与中原女子的白皙截然不同
    - 眼神清澈见底，没有江湖人的算计与阴霾，只有对剑的纯粹热爱
    - 笑起来时眼角弯如新月，牙齿洁白整齐，带着海边的爽朗
  性格:
    - 纯粹：她不懂人情世故，不懂权谋算计，她的世界里只有剑、浪、和父亲
    - 天赋异禀：三岁摸剑，七岁悟剑意，十二岁已能御剑破浪。她的剑道天赋甚至超过了年轻时的沈孤帆
    - 孤独：东海剑阁地处偏远，同龄弟子中无人能与她论剑。她渴望一个"能听懂她剑语"的对手或朋友
    - 叛逆（有限度）：她尊敬父亲，但不认同父亲"藏剑守成"的理念。她认为好剑应该在浪涛中磨砺，而非锁在剑阁中供奉
    - 对中原的好奇：她从未离开过沧洲，对中原的武林、门派、以及"那个被全世界追杀的苍白少年"充满好奇
  与李德的关系:
    初识: |
      李德为求取身法篇来到东海剑阁。沈孤帆最初拒绝见他——"太虚剑宗的麻烦，东海剑阁不碰"。
      但沈落霞在剑阁外的海滩上"偶遇"了李德。她正在练一套从身法篇中参悟出的"踏浪剑步"，而李德一眼就看出了这套步法的根本——"这是太虚真经中的'飘萍渡海'，你练反了。"
      沈落霞愣住了。她花了三年参悟的剑步，这个苍白少年只看了一眼就说"练反了"。
      "你……你怎么知道？"她问。
      "因为我体内，有这套步法的另一半。"李德说。
      这是他们的第一句对话。没有寒暄，没有试探，只有剑。
    交易与友谊: |
      沈落霞没有请示父亲，偷偷将身法篇的抄本送给李德——因为她从身法篇中已参悟出属于自己的"踏浪剑步"，身法篇本身对她不再神秘。
      她的交换条件不是金银、不是承诺，而是："你教我真正的'飘萍渡海'。作为交换，我送你身法篇。"
      对李德而言，这是风险最低的交易——教一套剑步，换真经碎片。
      对沈落霞而言，这是梦想成真的时刻——她终于遇到了一个"能听懂她剑语"的人。
    关系本质: |
      这不是爱慕。沈落霞对李德没有男女之情，她对他有一种更纯粹的情感——"剑友"。
      她不在乎李德是正邪、不在乎他被多少人追杀、不在乎他手上有多少血。她只在乎"他的剑意是真的"。
      这种纯粹让李德感到陌生——穿越者习惯了算计、习惯了利益交换、习惯了每个人都在索取。沈落霞的"只想要剑"让他不知道如何应对。
      偶尔，在深夜的海滩上，李德会教沈落霞剑招，沈落霞会给他讲海上的故事。这些时刻是李德在逃亡中最接近"平静"的时光。
    潜在冲突: |
      沈孤帆 eventually 会发现女儿的"背叛"。他不会伤害女儿，但他会加强对李德的敌意——从"不接触"变为"主动驱逐"。
      更复杂的局面：若沈砚秋（官道路线）或萧云澜（正道路线）得知李德与东海剑阁的关系，他们会试图利用沈落霞来牵制李德。
      沈落霞对这些一无所知。她的世界里，只有剑。
  武功:
    踏浪剑步:
      熟练度: 70
      描述: 沈落霞自创剑步，融合了东海剑阁的"凌波微步"与太虚真经身法篇中的"飘萍渡海"。可在水面上借力踏行七步，剑招随浪涛起伏， unpredictable。
    沧海一剑:
      熟练度: 60
      描述: 东海剑阁嫡传剑法，讲究"一剑断浪、两剑分海"。沈落霞在此基础上有自己的理解，剑招中多了一分飘逸、少了一分刚猛。
    潮汐心法:
      层数: 4层
      描述: 东海剑阁内功，以呼吸模拟潮汐起伏，真气绵长悠远，适合持久战。
    总评: |
      战力约85（年轻一辈顶尖），但实战经验极少。她的剑法华丽精妙，但若遇到不讲道理的莽夫（如铁掌功、玄铁重剑），会吃亏。
  日常:
    沈落霞住在东海剑阁最高层的"听涛阁"，推窗可见大海。每日卯时起床观潮，辰时练剑，巳时至未时研读剑谱，申时去海边踏浪练步，酉时与父亲用膳，戌时继续练剑或发呆，亥时就寝。
    她的房间里没有胭脂水粉，只有剑、海螺、以及一本她手抄的《问剑录》——记录着所有她见过的剑招与剑理。其中最新的一页写着："飘萍渡海，练反了。真气应从涌泉穴入，非丹田。——李德。"
  GM扮演要点:
    - 沈落霞的台词应如海风般清新、直接、不带修饰。她会问"你的剑意为什么是悲伤的？"而不是"你看起来不开心"
    - 她在谈到剑时会忘记一切——包括父亲禁令、江湖规矩、甚至自身安危。这是她的魅力，也是她的弱点
    - 她对李德的关心是"剑层面的"——她不会问你吃没吃饭，她会问"你的剑气最近是不是不稳？我感觉到阴阳二气在冲突"
    - 她与贺婉清是截然相反的两个人：贺婉清的爱是占有式的、依赖式的；沈落霞的"友"是独立式的、纯粹式的。若李德在完美线后遇到沈落霞，他会不自觉地将两人对比——这种对比本身就是一种心魔
    - 沈落霞的最终命运取决于李德的走向：若李德走上正道，她会是他的"剑道知音"；若李德深陷魔道，她会拔剑阻拦——不是为正义，是为"剑道不容玷污"
