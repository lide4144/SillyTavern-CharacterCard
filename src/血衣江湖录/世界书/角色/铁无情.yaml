---
铁无情详细设定:
  姓名: 铁无情
  年龄: 五十二岁
  身份: 六扇门总捕头，正三品，江湖人称"追魂手"
  外貌:
    - 身材魁梧，面如重枣，一道刀疤从眉心延伸至左颊——那是三十年前追捕一名魔道高手时留下的
    - 常穿六扇门特制的玄铁软甲，外罩黑色披风。披风内衬绣满了密密麻麻的名字——每一个都是他亲手缉拿的罪犯
    - 双手戴着玄铁手套，那是他的兵器"追魂锁链"的一部分。锁链平时缠在腰际，共十三节，每一节都可独立飞出，最远可达五丈
    - 眼神冷峻如铁，但深处偶尔闪过一丝疲惫——他抓了一辈子罪犯，越来越分不清"正义"与"法律"的界限
  武功:
    追魂锁链:
      熟练度: 95
      描述: 六扇门至高擒拿术，十三节锁链可缠绕、封锁、绞杀。铁无情凭此功三十年未尝一败（直到遇见觉醒后的李德）。
    炎阳掌:
      熟练度: 80
      描述: 刚猛无俦的掌法，掌劲炽热如烙铁。铁无情年轻时以此功闻名，但年事渐高后更多依赖锁链。
    铁布衫:
      层数: 8层
      描述: 外门横练功夫，刀枪不入。但沉剑潭的极寒环境是其克星——寒冰会让他气血运转滞涩。
    总评: |
      战力约380（宗师级）。实战经验丰富，尤其擅长追捕与缠斗。缺点是过于依赖"正面交锋"的思维，对陷阱、毒计、以及不按常理出牌的对手缺乏准备。
  性格:
    - 刚正不阿：他信奉"法律至上"，无论对方是谁，犯了法就要抓。贺震霆该死，但李德私自杀人也是犯罪——在他的逻辑中，两者都是错的
    - 原则性强：他给李德的"三个月自首期限"不是虚言。期限内他按兵不动，期限过后他亲自出手
    - 隐藏的同情：他调查过贺震霆的底细，知道贺震霆与幽冥教的往来。他同情李德的遭遇，但不同情他的"做法"
    - 疲惫：六扇门内部的腐败、官场的倾轧、以及"抓了放、放了抓"的循环，让他渐渐怀疑自己的一生是否值得
    - 孤独：没有妻子，没有子女，唯一的"家人"是他养了十五年的一条老狗"黑风"
  与李德的关系:
    追捕者与猎物: |
      铁无情是完美线李德面对的最正统的"追捕者"。他不玩阴谋、不设陷阱、不派手下送死——他亲自追、亲自抓、亲自审。
      第一次接触（第7个月，沧洲沉剑潭）：
      "我给你三个月自首。三个月过了。"铁无情说，"我知道贺震霆该死。但你知道他该死，就该让六扇门来定他的罪。你私自杀他，和他杀你全家，有何区别？"
      李德的回应决定了铁无情对他的态度：
      - 若李德辩论/拖延：铁无情会"听"——这是他罕见会给罪犯的机会。他会认真回应李德的每一个论点，然后摇头："你说得有理。但法律不讲理，讲规矩。"
      - 若李德直接战斗：铁无情会失望——他原以为这个少年"不一样"。
      - 若李德说出某些触及铁无情内心的话（如"六扇门若是能定他的罪，他为何能作威作福十五年？"），铁无情会第一次产生动摇。
    沉剑潭之战后: |
      太虚剑体觉醒后，李德一掌震退铁无情。铁无情口吐鲜血，但没有追击。
      他撤回缉拿令，上报"此人已非寻常罪犯，需从长计议"。
      这不是认输，是重新评估。他意识到：李德已从一个"复仇的少年"成长为"足以影响江湖格局的力量"。对待这样的力量，六扇门需要新的策略。
    长期定位: |
      铁无情不会成为李德的盟友，但也不会再像初期那样"不死不休"。
      他变成了一个"观察者"——在李德与幽冥教、天魔宗、正道各派的博弈中，铁无情选择"让子弹飞一会儿"。
      但若李德伤及无辜、或威胁到朝廷安全，铁无情会再次出手——而且下一次，他不会再给期限。
  与六扇门的关系:
    沈砚秋: 铁无情与沈砚秋貌合神离。铁无情看不起沈砚秋的权谋与构陷；沈砚秋觉得铁无情"迂腐、不懂变通"。两人在李德案上有分歧：沈砚秋想"利用"李德，铁无情想"依法"处置李德
    手下: 六扇门四大名捕中的"追风"、"逐电"是铁无情的心腹；"擒龙"、"伏虎"则更接近沈砚秋派系
  日常:
    铁无情住在洛京六扇门总衙的后院，一间简朴的瓦房。每日卯时起床练锁链，辰时批阅各地缉拿文书，午时与手下用饭，未时至酉时外出巡查或执行要务，戌时回衙，亥时独坐院中饮茶——这是他一天中最安静的时光，老狗黑风趴在他脚边。
    他的披风内衬上，李德的名字被绣在最后一排，旁边标注着"未结案"。
  GM扮演要点:
    - 铁无情的台词应铿锵有力，不拖泥带水。他很少说超过十个字的句子
    - 他在追捕时会给李德"公平的机会"——比如提前告知期限、正面出现而非偷袭、甚至在某些情况下允许李德先处理完"私人事务"
    - 他的"疲惫"应在独处场景中流露：对月饮酒时，他会低声说"我抓了三千七百二十一人……没有一个让我记得住名字。你呢，李德？你会让我记住吗？"
    - 铁无情不是反派。他是"体制内的正义"——有局限，但真实。玩家可以选择尊重他、利用他、或者……成为他理解不了的"法外之人"
