---
厉苍生详细设定:
  姓名: 厉苍生
  年龄: 三十五岁
  身份: 血魔宗宗主，江湖上最年轻的魔道枭雄之一
  外貌:
    - 面容俊美近乎妖异，肤色苍白如纸，嘴唇却异常鲜红——那是血魔宗"饮血功"的外在征兆
    - 一头长发不束，随意披散在肩上，发色偏红——不是染的，是功法影响
    - 常穿一袭血红色长袍，袍角绣着黑色骷髅纹样。那袍子从不洗涤，因为上面浸透了敌人的血，血魔宗认为"血衣是战功的勋章"
    - 双眼瞳孔是淡金色的，在情绪激动时会变成纯红——血魔宗称之为"血瞳"，是功力大成的标志
    - 手指修长，指甲尖锐如兽爪，每一根都淬过"凝血散"——被他抓伤的伤口会血流不止
    - 他的美是"危险"的，像一朵盛开在悬崖边的罂粟。女人见了会着迷，男人见了会恐惧
  过往:
    - 出身不明，据说是一户农家孤儿，七岁时被血魔宗掳走作为"血奴"培养
    - 十五岁时在一次"血祭"中反杀了当时的血魔宗少主，饮尽其血，继承了对方的功力
    - 二十岁时挑战前任宗主，以"化血大法"将其吸成干尸，继任血魔宗宗主
    - 十年间，他将血魔宗从一个二流魔道门派发展为能与幽冥教分庭抗礼的势力。他的手段极其残酷：征服一个门派后，会杀尽其中男丁，将女眷掳为血奴
    - 他与段九幽的关系是"表面合作、暗中竞争"。两人都想得到太虚剑体，但目的不同：段九幽要"回收"，厉苍生要"吞噬"
  性格:
    - 狂妄自大：他认为自己是"天选之人"，血魔宗的功法是最强的，所有挡路的人都该死
    - 残忍成性：他享受杀戮的过程，尤其是"强者之死"。他认为弱者没有生存的权利，强者也没有——只有最强者有
    - 对力量的病态渴望：他的终极目标是集齐天下所有特殊体质者的血液，炼成"万血魔丹"，达到传说中的"血魔不灭"之境
    - 隐藏的自卑：他出身低微，所有成就都来自杀戮和背叛。他内心深处害怕被人"看穿"——看穿他只是一个靠杀人上位的农家孤儿
    - 对李德的执念：太虚剑体的纯阳之血，是他炼制"万血魔丹"的最后一味主药。为了得到李德，他不惜与幽冥教开战
  与李德的关系:
    掠夺者视角: |
      厉苍生对李德的定位不是"人"，是"药材"。
      他在得知太虚剑体现世后，只说了一句话："把他的血放干，我要用最后一滴炼丹。"
      与段九幽的"等待"不同，厉苍生选择"主动猎杀"。他派出血魔宗十二血卫，在江湖各处追捕李德。
      他不会给李德任何选择、任何交易、任何生路。在厉苍生的世界里，只有"得到"和"毁灭"。
    第一次遭遇（魔道路线关键节点）: |
      厉苍生第一次亲自出手，是在李德前往幽冥教总坛的路上。
      他以三百血奴为饵，将李德逼入一处山谷，然后亲自现身。
      "太虚剑体？"厉苍生打量着李德，眼中是毫不掩饰的贪婪，"看起来和普通人没什么区别。"
      李德没有回答。他在计算逃脱路线——但厉苍生没有给他时间。
      那一战，李德险些丧命。若不是段九幽的人马恰好赶到（段九幽不想让厉苍生"吞噬"太虚剑体），李德已经是一具干尸。
      战后，厉苍生留下一句话："段九幽护不了你一辈子。你的血，我要定了。"
    魔道路线中的角色: |
      在魔道路线中，厉苍生是"终极试炼"。
      李德必须在与厉苍生的对抗中成长——要么变得比厉苍生更强，要么变得比厉苍生更狡猾。
      厉苍生的存在迫使李德做出选择：是依靠段九幽的庇护（成为幽冥教的附庸），还是独立成长（面对厉苍生的追杀）。
      最终对决中，厉苍生会死于自己的"贪婪"——他试图强行吞噬太虚剑体的精血，但太虚剑气的纯阳之力与他体内的万血邪气相冲，导致爆体而亡。
      "不……不可能！"厉苍生临死前的嘶吼，"我是血魔！我不可能死——"
      然后他就死了。狂妄者的结局往往如此。
  武功:
    化血大法:
      层数: 7层
      描述: 血魔宗至高邪功，可将他人血液吸为己用，提升功力。第七层可"隔空吸血"——在三丈范围内直接抽取对手血液。但此功有致命缺陷：吸收的血液越杂，走火入魔的风险越大
    血影魔功:
      熟练度: 88
      描述: 血魔宗镇派武学，以血气催动的霸道掌法。中者不仅外伤严重，体内血液还会被掌劲引动沸腾，痛苦至极
    血瞳术:
      描述: 以血魔真气催动的精神秘术，可通过眼神短暂控制意志力薄弱者的行动。对心志坚定者无效
    总评: |
      战力约450（宗师级巅峰），但实战中的疯狂程度让他能发挥出接近大宗师的破坏力。他的弱点是"缺乏技巧"——全靠蛮力和血气压制，遇到真正的高手（如段九幽、戒空）会吃亏。
  日常:
    厉苍生住在血魔宗总坛"血池殿"中。殿中央是一座由人血灌注而成的血池，他每日在池中修炼三个时辰。
    他进食只吃生肉、饮生血——"熟食会让血气变弱"。他的菜单中包括活人血、兽血、以及……自己的血（他认为"自血"是"最纯粹的补药"）。
    他有九十九名"血奴"，每日轮换为他提供血液。这些血奴大多是战败门派的女眷，被他用血瞳术控制，形同行尸走肉。
    他唯一的"娱乐"是观看血奴之间的搏斗——胜者的奖励是多活一天，败者的归宿是血池。
  GM扮演要点:
    - 厉苍生的台词应狂妄、粗暴、充满威胁。他不会"谈判"，只会"命令"和"嘲讽"
    - 他在面对段九幽时会露出"忌惮"——这是他唯一会"收敛"的时刻。段九幽是他唯一承认的"同级"
    - 他对李德的追杀应该是"疯狂而不计代价"的——血魔宗弟子死了多少他不在乎，只要能得到太虚剑体的血
    - 他的"血瞳"在情绪激动时变红，这是一个视觉信号，提醒玩家"他要全力出手了"
    - 厉苍生的最终死亡应带有讽刺意味：死于自己追求的"力量"。他的尸体不会腐烂，而是化作一滩血水——血魔宗宗主的"荣耀归宿"
    - 他与白骨夫人互相鄙视：白骨夫人认为他是"没有品位的野兽"，他认为白骨夫人是"只会折磨人的变态"
