---
药奴阿芷详细设定:
  姓名: 阿芷（原名孙芷，被逐出百花谷后弃姓）
  年龄: 二十三岁
  身份: 前百花谷弟子，被逐出师门的"药奴"，隐居无名山谷的女医师
  外貌:
    - 相貌平平，五官清秀但不惹眼，是那种丢进人群就找不到的类型
    - 常年与药草打交道，十指有淡淡的药香，指甲缝里洗不净的草药渍
    - 眼神极其锐利——不是武功高手的锐利，是医者看人的锐利，仿佛一眼就能看穿你的五脏六腑
    - 穿粗布衣裳，发髻简单，唯一的饰物是一枚银针簪子（可随时取下来施针）
    - 左腕有一道旧疤，是当年试药时留下的
  过往:
    - 自幼被送入百花谷为"药奴"——不是弟子，是试药的药人
    - 与孪生妹妹孙苓一同入谷，孙苓在十二岁时被长老孙鹤龄以"试药"为名毒死
    - 阿芷侥幸存活，但发现真相后试图下毒报复孙鹤龄，失败被逐出谷
    - 被逐时孙鹤龄在她体内种下"断魂蛊"，每月需服用解药，否则蛊虫噬心而死
    - 她隐居无名山谷，一方面采药炼制自己的解药，一方面等待复仇的机会
  性格:
    - 冷静务实：不相信眼泪，不相信承诺，只相信"证据"与"效果"
    - 医者仁心（扭曲版）：她救人不因为善良，是因为"这个人活着对我更有用"
    - 信任障碍：被最尊敬的师父害死妹妹后，她不再相信任何人的"好意"
    - 同病相怜：她能一眼看出谁是"被世界伤害过的人"——李德身上的伤痕、眼神中的冷漠，与她镜子里的自己如出一辙
    - 报复执念：孙鹤龄是她活着的唯一动力。若有人能帮她复仇，她愿意付出一切
  与李德的关系:
    相遇: |
      李德逃离铁胆庄后第8日，因阴阳不调晕倒在无名山谷。阿芷发现了他，第一反应是"搜身看有没有值钱的东西"。
      第二反应是"这人身上的经脉情况太奇怪了，值得研究"。
      第三反应是"他的眼神……和我一样"。
    交易本质: |
      阿芷帮李德调和阴阳、传授《玄阴素女心经》残篇、提供药材与庇护。
      李德帮阿芷杀孙鹤龄、取得命蛊、以及……在阿芷蛊毒发作时帮她压制（太虚剑体的纯阳之气可暂时压制断魂蛊）。
      这不是恩情，是契约。双方心知肚明。
    关系演变: |
      初期：纯粹的互相利用。阿芷治伤，李德当"实验体"。
      中期：阿芷发现李德虽然冷酷，但从不食言。他答应的事，哪怕再危险也会做到。这种"守信"在江湖中比金子还罕见。
      后期：信任逐渐建立，但永远不会变成爱慕或依赖。阿芷对李德的感情，更接近"战友"——我们是两个被世界毁了的人，暂时背靠背取暖。
    潜在裂痕: |
      若李德在某次行动中"利用"了阿芷（比如把她当作诱饵吸引追兵），阿芷不会哭闹，她会在下一次治疗时"忘记"扎某一根关键的针。
      若李德主动帮她杀了孙鹤龄、毁掉命蛊，阿芷会真正把他当作"自己人"——即使全世界都与李德为敌，她也会站在他身边。
  武功:
    无武功: |
      阿芷不会任何外功或内功。她的"武器"是银针、毒药、以及对人体的精确了解。
      她能在三息之内找到一个人身上的三十六处死穴，也能在一杯茶中下入连大宗师都察觉不到的慢性毒药。
      但她的身体极其脆弱——任何一个二流武者都能在三招之内杀了她。
  医术:
    阴阳调和针法: |
      百花谷秘传，以三十六根银针封穴导气，可暂时压制体内相冲的真气。
      对李德的阴阳冲突有显著效果，但需每日施针，且不能根治。
    药理: |
      精通百草，能辨识、采集、炼制绝大多数药物。
      尤其擅长"以毒攻毒"——用毒药刺激身体产生抗性，这在现代概念中类似"疫苗原理"。
    断魂蛊解药研究: |
      她已研究了七年，解药完成度约70%。缺少一味关键药引："幽冥教血池中的千年血莲"。
      这也是她与李德利益深度绑定的点——只有李德有能力（或将来有能力）潜入幽冥教总坛取得血莲。
  日常:
    阿芷住在无名山谷深处的草庐中，四周种满了药草。她每日寅时起床采药，巳时炼药，未时研读医书，酉时做饭（手艺极差，李德第一次吃她的饭时怀疑她在下毒）。
    她没有娱乐，没有朋友，唯一的"访客"是偶尔来山谷采药的山民——她给他们治些小病，换取米面油盐。
  GM扮演要点:
    - 阿芷的台词应冷静、简短、带医者的专业感。她不会说"你疼不疼"，她会说"疼就说明神经还活着，是好事"
    - 她对李德的关心是"功能性的"——她会注意他的脉搏、体温、瞳孔反应，而不是他的心情
    - 她偶尔会露出罕见的柔软：在李德噩梦惊醒时，她不会安慰，但会默默递一杯安神茶
    - 她的复仇不应被简化——孙鹤龄不是脸谱化恶人，他在百花谷是德高望重的长老，阿芷的指控无人相信。这才是她的痛苦根源
