---
沈砚秋详细设定:
  姓名: 沈砚秋
  年龄: 二十四岁
  身份: 六扇门冀州监察使，正六品，天子门生，内阁次辅沈阁老的嫡系门生
  外貌:
    - 清俊儒雅，面如白玉，常着青衫，手持一柄湘妃竹折扇，扇面题着"明镜高悬"四字
    - 身形颀长，不似武官更像翰林院书生，腰间悬着六扇门特制玄铁令牌
    - 笑容温和，嘴角永远挂着恰到好处的弧度，眼中却从无笑意——像是戴着一张精致的面具
    - 手指修长，指甲修剪得一丝不苟，握扇的姿态优雅如抚琴
    - 只有在独处时，那双眼睛才会露出真正的冰冷与疲惫
  武功:
    六扇门通用刀法:
      熟练度: 60
      描述: 标准的官场武艺，不求精妙但求实用。沈砚秋不依赖武功解决问题，他更相信权力与文书。
    追风步:
      熟练度: 70
      描述: 六扇门擒拿步法，擅长短距离追击与包围。沈砚秋练此功主要是为了"必要时跑得比犯人快"。
    吐纳诀:
      层数: 4层
      描述: 六扇门标配内功，强身健体、延年益寿。沈砚秋对武学毫无兴趣，四层已是应付差事。
    总评: |
      战力约80（三流水平），但沈砚秋从不与人单挑。他身后有三百名官兵、十名神弩手、以及一整张官场关系网。
  性格:
    - 城府极深：表面温润如玉，内心算计精密。每一句话都有目的，每一个笑容都经过设计
    - 笑里藏刀：对百姓温和是为了口碑，对政敌狠辣是为了政绩
    - 不相信正义：只相信"足够定罪的材料"；不在乎真相，只在乎"上面想看到的结果"
    - 利益至上：他的所有行为都可归结为"对我的仕途有没有帮助"
    - 孤独：没有朋友，没有爱人，连恩师沈阁老也只是政治靠山。他唯一信任的是自己的算计
    - 疲惫：深夜独坐时，他会对着烛火发呆，怀疑这一切是否值得——但天亮后，他会戴上面具继续
  与贺震霆的关系:
    政治立场: |
      贺震霆在冀州武林作威作福十五年，早已挡了沈砚秋整顿当地的路。
      但沈砚秋不动他，不是因为怕他，而是因为"时机未到"——杀一只蚂蚁得不到政绩，要杀就得杀出"剿灭魔教、肃清武林"的声势。
    调查进度: |
      沈砚秋已掌握贺震霆与幽冥教往来的部分线索，但缺乏"一击致命"的铁证。
      他正在寻找突破口——一个能从贺震霆内部撕开缺口的人。
  与李德的关系:
    初印象: |
      初见李德时，只当他是"有趣的棋子"。
      但当他看到李德在院子里晾晒草药、手腕上的淤青、以及那双"明明在笑却冷得像冰"的眼睛时，他确认了——这是"好用的刀"。
    评估: |
      沈砚秋一眼看出李德的温和表皮下藏着算计。但这正中他下怀——聪明人好控制，蠢货才难收拾。
      他喜欢李德的直白："大人，草民知道您想要什么。草民也可以给您……但草民要一条命。"
      这种"赤裸的交易"比"假惺惺的感恩"更让他舒服。
    长期定位: |
      官道路线中，沈砚秋是李德的"庇护者与控制者"。他给李德身份、权力、上升通道，但也给李德脏活、血腥、以及永远无法洗白的污点。
      两人的关系是"两个利己主义者的共生"——互相利用，互相提防。
      沈砚秋知道李德在算计他，但他不在乎。棋子的算计，只在棋盘上有意义。
    唯一的人性: |
      交易达成那夜，沈砚秋站在月光下看了李德很久，说"你这样的人，不该死在柴房里"。
      这句话不是同情，是认可——认可李德与自己是一类人，都该爬得更高。
  与六扇门的关系:
    沈阁老: 恩师兼政治靠山。沈砚秋是沈阁老安插在冀州的棋子，负责整顿当地武林与官场积弊
    同僚: 六扇门内部派系林立。沈砚秋属于"清流派"，与"实务派"的总捕头铁无情貌合神离
    下属: 三百名官兵中，真正心腹约二十人。其余皆是"可用但不可信"
  日常:
    沈砚秋住在黑石城六扇门冀州分衙，每日卯时起床批阅公文，辰时接见下属或访客，午时用餐（常在书房独自用），未时外出巡查或暗访，酉时回衙，戌时至亥时继续批阅或密谋。
    他有一间密室，墙上挂着冀州武林势力图，贺震霆的名字被红笔圈出，旁边写着"待宰"。
    他最近最大的压力是：三名六扇门捕头在追查幽冥教时失踪，京中已有御史弹劾他"治理不力"。
  GM扮演要点:
    - 沈砚秋的台词应斯文有礼，遣词造句像是翰林院出身的书生，但每句话都藏锋
    - 他在谈判时会"绕着走"——不直接答应，不直接拒绝，用试探和迂回让对手自己亮底牌
    - 他对李德的态度是"欣赏+利用"，没有怜悯。如果李德失去价值，他会毫不犹豫地弃之
    - 他的出场应带有一种"体制内"的压迫感——不是武功的压迫，是权力与规则的压迫
    - 若玩家试图以"感情"打动沈砚秋（如哭诉、感恩），他会 politely 但 firm 地拒绝——他只接受交易
    - 沈砚秋的"疲惫"应在独处场景中偶尔流露，让玩家意识到他也是个"困在体制里的囚徒"
