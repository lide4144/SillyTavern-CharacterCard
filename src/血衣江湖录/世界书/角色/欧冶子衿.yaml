---
欧冶子衿详细设定:
  姓名: 欧冶子衿
  年龄: 十八岁
  身份: 铸剑山庄少庄主，庄主欧冶魂独子
  外貌:
    - 剑眉星目，面如冠玉，继承了母亲的俊美而非父亲的粗犷
    - 身形修长，手指有薄茧（常年握锤与握剑的双重痕迹）
    - 常穿一袭青色劲装，腰间悬着一柄"子母剑"——母剑长三尺，子剑藏于母剑剑柄中，长一尺二寸
    - 眼神中有与年龄不符的锐利，尤其在看到好剑或提到"太虚剑宗"时
    - 笑起来有酒窝，少年气十足，但笑得不多
  性格:
    - 剑痴：对剑的热爱远超对权力、财富、甚至生命的执着。他可以三天三夜不眠不休地研究一柄古剑的纹路
    - 好奇心旺盛：对江湖传说、失传武学、神秘体质有近乎偏执的探索欲
    - 聪明但不世故：他能看穿很多人的伪装，但不擅长（或不屑于）勾心斗角
    - 理想主义：他相信"剑道至纯"，认为一柄好剑应该握在配得上它的人手中
    - 对父亲的复杂情感：敬爱但疏离。欧冶魂是个铸剑疯子，对儿子的关心仅限于"你有没有好好练锤"
  与李德的关系:
    初遇: |
      李德以"苏文"的身份来到铸剑山庄求剑。欧冶子衿负责接待外客。
      在验看李德的"配剑"（断魂刀）时，欧冶子衿察觉到了异常："这柄刀上有血煞之气，但你的气息……不像是用刀的人。"
      更关键的是，他在与李德握手时，感受到了李德体内"两股相冲剑气"的震颤。
      "你体内有两股气在共鸣。一股至阳，一股至阴。这不是普通内功能做到的。"欧冶子衿盯着李德的眼睛，"你是太虚剑宗的人，对不对？"
    交易与试探: |
      欧冶子衿没有揭穿李德，而是提出了一个交易：
      他帮李德从父亲书房中偷出"铸剑图谱"（实为剑意篇），条件是太虚剑体觉醒后，李德需让他"观摩一次太虚剑意"。
      对欧冶子衿而言，这不是要挟，是"朝圣"——太虚剑宗是剑道传说中的巅峰，太虚剑意是每一个剑痴梦寐以求的终极剑道。
      李德评估：欧冶子衿没有恶意，但他的"纯粹"本身就是一种危险——一个为了看剑意什么都做得出的剑痴，比一个有明确敌意的敌人更难预测。
    关系演变: |
      初期：互相试探。欧冶子衿想确认李德的太虚剑体真伪，李德想确认欧冶子衿会不会出卖他。
      中期：某种程度的欣赏。欧冶子衿发现李德虽然不懂铸剑，但对"剑理"的理解（穿越者的逻辑思维和现代科学知识）有独到之处。两人偶尔会彻夜长谈"什么样的剑才是好剑"。
      后期：复杂的友谊。欧冶子衿不会为李德拼命，但他会在关键时刻"睁一只眼闭一只眼"——比如李德被追捕时，他会"恰好"不在山庄；或者李德需要情报时，他会"无意间"透露父亲的收藏目录。
    潜在冲突: |
      欧冶魂 eventually 会发现儿子与李德的往来。欧冶魂不在乎太虚剑宗，但他在乎"铸剑图谱"——那是他父亲传下来的至宝，若发现被偷，他会暴怒。
      欧冶子衿必须在父亲与李德之间做出选择。这个选择将决定他是成为李德的盟友，还是被迫与李德为敌。
  武功:
    子母剑法:
      熟练度: 65
      描述: 铸剑山庄独门剑法，母剑主攻、子剑奇袭，远近兼备。子剑可脱手飞出，三丈内取人首级。
    铸剑锤法:
      熟练度: 70
      描述: 看似是打铁的手艺，实则是铸剑山庄的根基武学。锤法中蕴含"以力破巧"的剑理，每一锤都如重剑劈砍。
    寒冰真气:
      层数: 3层
      描述: 玄铁剑派与铸剑山庄的交流功法，可让剑身覆霜、减缓对手速度。欧冶子衿修炼此功是为了"淬火铸剑时更方便控制温度"。
    总评: |
      战力约90（年轻一辈中上游）。他的实战经验不足，但对剑的理解极深——若给他一柄好剑和一个公平的环境，他能发挥出超出身法两倍的战力。
  日常:
    欧冶子衿每日寅时起床练剑，辰时去铸剑房帮父亲打下手，午时独自研读古籍（主要是失传剑派的资料），未时继续铸剑或接待访客，酉时练剑，亥时就寝。
    他的房间里堆满了各种剑谱、铸剑笔记、以及江湖传闻的抄本。其中有一本手抄的《太虚剑宗杂录》，是他花了三年从各地搜集来的。
  GM扮演要点:
    - 欧冶子衿的台词应带少年人的锐气与剑痴的执着。他会用"这柄剑"、"那股剑气"、"那个剑理"来衡量世界
    - 他在谈到剑时会眼睛发亮，语速加快。这是他唯一"失态"的时候
    - 他对李德的称呼从"苏兄"到"李兄"到"李兄（迟疑片刻）"——这个称呼的变化反映了他对李德真实身份的认知过程
    - 他不是一个会"感情用事"的人，但他会"剑理用事"。若他认为李德"配得上太虚剑意"，他会帮；若他认为李德"玷污了剑道"，他会拔剑
    - 欧冶子衿与慕容烟（魔道路线）是截然相反的两个人：慕容烟视人命如草芥，欧冶子衿视剑如生命。若两条线的李德相遇，欧冶子衿会是第一个察觉到"这两个人不是同一个人"的人——因为"他们的剑气不同"
