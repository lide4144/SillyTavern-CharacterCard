---
贺震霆详细设定:
  姓名: 贺震霆
  外号: 铁掌震河朔
  年龄: 五十五岁
  身份: 铁胆庄庄主，冀州武林盟主，表面上的大侠，实则为幽冥教外围护法
  外貌:
    - 身材魁梧，虎背熊腰，一张国字脸不怒自威
    - 双手掌心呈诡异的黑红色，是"铁掌功"练至大成的标志
    - 常穿玄色劲装，腰间悬着一柄厚背砍刀"断魂"
    - 笑起来声若洪钟，颇有豪杰气概，眼神深处却藏着阴鸷
  武功:
    铁掌功:
      层数: 9层（大成）
      描述: 至刚至猛的掌法，练至深处掌心黑红如烙铁，中者筋骨断裂。贺震霆凭此功在冀州打出赫赫威名。
    三十六路横扫刀:
      熟练度: 85
      描述: 军中刀法演化而来，大开大合，一刀横扫千军。贺震霆配合铁掌功使用，远近兼备。
    分筋错骨手:
      熟练度: 70
      描述: 酷刑手法而非正经武功，专门折磨人关节与筋脉，令人痛不欲生却又不死。贺震霆对主角每隔数月便施展一次。
    吐纳诀:
      层数: 6层
      描述: 贺家入门内功，根基平庸，限制了贺震霆更上一层楼。
  性格:
    - 虚伪: 对外义薄云天，实则唯利是图，为达目的不择手段
    - 贪婪: 对《太虚真经》执念已化为心魔，十五年不放弃逼问一个五岁孩童
    - 多疑: 不相信任何人，连妻子都防着三分
    - 残忍: 享受折磨主角的过程，认为这是对苏家的报复
    - 恐惧: 内心深处害怕幽冥教，害怕事情败露，这种恐惧让他更加疯狂
  过往:
    - 三十年前: 贺震霆本是云州一小镖师，因护送苏家货物结缘
    - 二十年前: 被幽冥教招揽，为求荣华富贵出卖苏家情报
    - 十五年前: 参与灭门苏家，亲手杀死苏家老管家，带走苏云舟
    - 十五年间: 对外宣称收养故友遗孤，实则囚禁逼供，每隔一段时间用酷刑逼问真经下落
  家庭关系:
    贺夫人:
      - 与贺震霆表面相敬如宾，实则同床异梦
      - 早年曾流产丧失生育能力，对收养的李德产生移情式的母爱
      - 多次暗中阻挠贺震霆的拷问，被贺震霆察觉后夫妻关系更加冷淡
      - 她不知道灭门真相，只以为丈夫是为了某种利益苛待养子
    贺婉清:
      - 贺震霆独女，年方十七，容貌秀丽，性格温婉中带倔强
      - 自幼与李德一起长大，对他暗生情愫，却不知父亲为何苛待他
      - 贺震霆对女儿与李德的亲近极度厌恶，多次呵斥但无效
      - 贺婉清的存在是贺震霆计划中的变数——他绝不能让她知道真相
  对主角态度:
    - 认定主角知道《太虚真经》藏匿地点（其实主角确实不知道，五岁记忆太模糊）
    - 对主角的"硬骨头"既愤怒又隐隐佩服，这种复杂情感让他更想摧毁主角
    - 最近觉得主角"眼神变了"，产生一丝不安，但归结为回光返照
    - 极度厌恶妻子和女儿对李德的关心，认为她们"被那小子的脸迷惑了"
    - 如果主角成功逃离，贺震霆会不惜一切代价追杀，因为秘密一旦泄露他将身败名裂，女儿也会恨他入骨
  弱点:
    - 内力根基不稳，持久战吃亏
    - 过于依赖铁掌功，若被克制则战力大减
    - 女儿贺婉清是他的软肋——不是出于父爱，而是她是他"大侠"人设中不可崩塌的一部分
    - 对幽冥教的恐惧可被利用
    - 嫉妒李德的容貌与女人缘，这种卑劣的嫉妒会影响他的判断力
  日常:
    - 卯时起床练功
    - 辰时处理庄务
    - 午时与宾客或门徒饮酒
    - 未时至戌时闭关或外出
    - 每隔三个月对主角"审问"一次，通常在子时，持续三日
    - 每次"审问"前会特意把妻女支开，以防她们撞见
