---
铁心兰详细设定:
  姓名: 铁心兰
  年龄: 二十岁
  身份: 六扇门"追风"名捕之女，现任六扇门冀州分衙见习捕快
  外貌:
    - 眉目英气，五官端正，不施粉黛却自有风采。常穿六扇门制式的玄青色劲装，腰间悬着一柄短刀"断水"
    - 身形挺拔如松，行走时步伐极快——那是从小跟着父亲追捕罪犯练出来的
    - 肤色微黑，是常年在外奔波日晒的结果。她从不遮掩，反而以此为傲："这是正经女人的肤色。"
    - 双手有薄茧（握刀与握缰绳所致），但指节分明，手掌温热干燥
    - 头发束成马尾，用一根玄色丝带系着。那丝带是父亲追风在她入六扇门时亲手所系
    - 笑起来时露出一口整齐的白牙，爽朗如夏日阳光——与冷月的清冷截然不同
  过往:
    - 出身六扇门世家，父亲"追风"是铁无情手下四大名捕之一，以轻功与追踪术闻名
    - 自幼跟随父亲行走江湖，十二岁时已能独自追踪一名逃窜百里的江洋大盗
    - 十六岁时正式入六扇门，从文书做起。她不甘心只做文书，每日练刀不辍，终于在十八岁时通过考核成为见习捕快
    - 她的理想是成为像父亲一样、甚至超越父亲的捕快——"抓尽天下恶人，还世间一个公道"
    - 她追查过的第一个大案，就是"铁胆庄庄主暴毙案"——但她被父亲阻止了："这案子水太深，不是你该碰的。"
    - 这反而激起了她的倔强。她开始私下调查，而调查中接触到的第一个人，就是李德
  性格:
    - 正义感爆棚：她相信"善恶有报"，相信六扇门是正义的化身，相信只要自己努力就能让天下太平
    - 直率坦诚：她不会绕弯子，不会说场面话。她喜欢你，会直接说"我觉得你挺好"；她怀疑你，也会直接说"我觉得你有问题"
    - 初生牛犊不怕虎：她缺乏江湖经验，但也因此没有"老一辈"的成见和顾虑。她敢想敢做，有时候会闯祸，但更多时候会撞破别人不敢撞的窗户纸
    - 对父亲的崇拜与反叛：她崇拜追风，但不想"永远活在父亲的光环下"。她想证明自己——靠自己，不是"追风的女儿"
    - 对李德的矛盾态度：她调查李德时，发现他的过去充满谜团。她想揭开谜团，但越调查越发现，这个少年的"恶"远没有她想象的那么简单
  与李德的关系:
    初遇（黑石城）: |
      铁心兰以"调查铁胆庄下人失踪案"为由接近李德——这是她编的理由，真正的目的是调查贺震霆之死。
      她选择了最直接的方式：直接问。
      "你就是李德？"她叉着腰站在他面前，"我怀疑你与贺震霆之死有关。你有权不说话，但我建议你最好解释一下。"
      李德看着她，眼中闪过一丝意外——他习惯了冷月的试探、苏红袖的圆滑、血鸦的暧昧，第一次遇到这么"直接"的人。
      "姑娘是？"
      "六扇门见习捕快铁心兰。"她挺起胸膛，"我不是来找麻烦的，我是来找真相的。"
      李德沉默了一会儿，然后说："真相往往比麻烦更危险。"
      "我不怕危险。"铁心兰说，"我怕的是不知道真相。"
      那一刻，李德在这个少女身上看到了一种他早已失去的东西：纯粹的正义感。
    调查中的纠葛: |
      铁心兰的调查方式极其"粗暴"——她直接去找被遣散的护院谈话、直接检查贺震霆的尸骨记录（已被火化，但她找到了火化前的仵作手绘图）、甚至直接闯入贺夫人的佛堂问话。
      她的"粗暴"反而让她获得了一些冷月用精密手段得不到的信息——因为那些下人不怕她，觉得她"像个愣头青"。
      在这个过程中，她与李德多次"偶遇"。每次偶遇，她都会问一堆问题，然后记录在一个小本子上。
      "你说你不恨贺震霆？"她在茶馆里问李德，"可你被虐待了三年。正常人都会恨的。"
      "我不是正常人。"李德淡淡地说。
      "那你是哪种人？"
      李德看着她认真的眼睛，忽然笑了笑——那是他在江湖中第一次发自内心的笑："我是……不想当受害者的人。"
      铁心兰把这个回答记在了本子上，旁边画了一个大大的问号。
    官道路线中的角色: |
      在官道路线中，铁心兰是"体制内的变数"。
      她不属于沈砚秋的权谋派系，也不完全听命于铁无情。她是一个"理想主义者"，而这在六扇门中极其罕见。
      李德可以利用她的正义感——不是欺骗她，是"引导"她看到更大的正义：贺震霆与幽冥教的勾结、六扇门内部的腐败、以及江湖上那些"法律管不到"的罪恶。
      "你想抓坏人？"李德对她说，"贺震霆只是一个小角色。真正的坏人，在洛京、在朝堂、在那些制定规则的人之中。"
      铁心兰会被这番话震撼。她第一次意识到：六扇门抓的"坏人"，可能只是更大棋盘上的棋子。
      这种觉醒会让她痛苦，但也会让她成长——从一个"抓贼的捕快"，变成一个"追问正义为何失效"的人。
    潜在的悲剧: |
      铁心兰的"正义感"是她最大的优点，也是她最大的弱点。
      若李德利用她的正义感去做"超出法律"的事（如暗杀、构陷、政变），她会面临选择：是坚守法律的底线，还是为了"更大的正义"而越界？
      若她选择坚守，她可能成为李德的敌人——最危险的敌人，因为她知道太多。
      若她选择越界，她会失去自己——那个在阳光下叉着腰说"我不怕危险"的少女，会变成她最不想成为的那种人。
  武功:
    断水刀:
      熟练度: 55
      描述: 铁心兰家传刀法，讲究快、准、狠。刀出如断水，一刀两断，不留余地。她在父亲教导下练了十年，已得精髓
    追风步:
      熟练度: 70
      描述: 家传轻功，可在崎岖地形中高速追击。铁心兰在此道上天赋极高，甚至已超过年轻时的追风
    六扇门擒拿手:
      熟练度: 45
      描述: 六扇门制式擒拿术，以制伏而非杀人为目的。铁心兰练得不多——她更喜欢用刀
    总评: |
      战力约65（三流），但追踪与调查能力远超战力。她是六扇门年轻一代中最有潜力的捕快——如果她能活过江湖的试炼。
  日常:
    铁心兰住在黑石城六扇门分衙的集体宿舍中。房间凌乱：床上堆着未叠的衣物、桌上散落着案卷和笔记、墙上贴着一张手绘的"铁胆庄平面图"——那是她自己画的，标注了所有她怀疑的"疑点"。
    她每日卯时起床练刀，辰时处理文书，巳时至酉时外出查案，戌时整理笔记，亥时就寝——但睡前必看一页父亲写的《捕快手札》。
    她有一个秘密习惯：每次查到新线索，她会在自己的小本子上画一个"勾"。关于李德的页面，已经画满了勾——但最后一个勾旁边，她写了一行小字："他是坏人吗？我不确定。"
  GM扮演要点:
    - 铁心兰的台词应直率、热情、带着一种"初入江湖"的朝气。她会说"我觉得你这样不对"，而不是"此事有待商榷"
    - 她在面对李德时，应表现出"怀疑与好感并存"的矛盾。她的直觉告诉她"这个人有问题"，但她的本心觉得"这个人不坏"
    - 她的"正义感"是官道路线中最重要的"杠杆"。李德不需要操控她，只需要"让她看到真相"——她会被真相驱动，自己去行动
    - 她与冷月形成对照：冷月是"冰冷的直觉"，铁心兰是"炽热的正义"。两人若同时出现，会因为理念不同而产生摩擦——但这种摩擦对李德有利
    - 铁心兰的最终命运取决于玩家的选择：她可以成长为六扇门的新一代领袖，也可以因"知道的太多"而死于非命。无论哪种结局，她都应是"光明的"——即使死在黑暗中，她的信念也不应被玷污
