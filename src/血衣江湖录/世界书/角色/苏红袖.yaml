---
苏红袖详细设定:
  姓名: 苏红袖
  年龄: 二十八岁
  身份: 落霞镇醉仙楼老板娘，烟雨楼外围情报员，千面佛在冀州的情报节点负责人
  外貌:
    - 肤若凝脂，眉目含情，一双凤眼微微上挑，看人时像在笑，又像是审视
    - 常年穿一袭大红石榴裙，腰间系着一条金色丝绦——那是烟雨楼外围人员的标记
    - 发髻上插着一支鎏金步摇，每走一步都轻轻晃动，发出细碎的声响。那步摇中空，可藏密信
    - 十指涂着淡红蔻丹，指尖有薄茧——不是握剑的茧，是常年书写密报的茧
    - 笑起来时左边脸颊有一个浅浅的梨涡，让人不自觉地放松警惕
    - 她的美不是少女的清纯，是成熟女人的风韵——经历过事、见过人、懂得什么时候该说什么话
  过往:
    - 本是洛京官宦人家小姐，十五岁时家道中落，被卖入青楼
    - 十七岁时以一曲《红袖添香》名动洛京，得千面佛赏识，转入烟雨楼情报系统
    - 二十岁时被派往冀州落霞镇，以醉仙楼为掩护，建立烟雨楼在冀州的情报网
    - 八年经营，醉仙楼成了冀州武林人士聚会的首选之地，三教九流在此交汇，情报如流水般汇聚到她手中
    - 她从未见过千面佛的真面目，只通过密信和暗号与他联络。她对千面佛既有敬畏，也有一丝隐秘的怨恨——怨恨他把自己从火坑中救出，又推入了另一个火坑
  性格:
    - 八面玲珑：对谁都笑脸相迎，对谁都不交心。她能在同一杯酒里同时品出江湖豪客的豪爽和幽冥教众的阴鸷
    - 精明算计：每一笔情报交易都要精确到"值不值"。她不会白白给任何人信息，但也不会漫天要价——细水长流才是生意
    - 隐藏的孤独：醉仙楼夜夜笙歌，但她的闺房永远只有一盏孤灯。她曾在日记中写道："阅人无数，无一人可共枕。"
    - 对李德的兴趣：起初是职业性的——一个从铁胆庄逃出来的少年，太虚剑体，被幽冥教追杀，这些标签意味着"高价值情报源"。后来变成了个人性的——她在这个少年的眼睛里看到了和自己一样的东西：冷静、算计、以及深不见底的孤独
  与李德的关系:
    初遇（落霞镇醉仙楼）: |
      李德以"苏文"的化名来到醉仙楼，想接触烟雨楼获取情报。
      苏红袖一眼就看穿了他的伪装——不是因为破绽，是因为"我见过的伪装比你吃过的饭还多"。
      但她没有揭穿。她只是笑着为他斟了一杯酒："公子远道而来，不如先听一曲《红袖添香》，再谈正事？"
      那曲子弹到第三段时，李德开口了："老板娘的琴声中，有洛京的韵味。"
      苏红袖的手指停了一瞬。洛京——那是她不愿提起的故乡。
      "公子好耳力。"她笑着说，但眼中的笑意淡了几分，"这杯酒，我请。"
    交易模式: |
      苏红袖是李德在江湖中的第一个"信息供应商"。
      她提供的情报包括：贺震霆的动向、幽冥教在冀州的活动、六扇门的追捕路线、以及……各路人马对太虚剑体的悬赏金额。
      她的定价很独特：不要金银，要"故事"。每一个情报换李德讲一个"他的故事"。
      "你的故事比银两值钱。"她说，"因为银两会花完，而故事……可以卖很多次。"
    长期定位: |
      苏红袖不会为李德拼命，也不会出卖他——除非出价高到让她无法拒绝。
      她是李德情报网中最稳定但也最不可控的一环。她的价值在于"消息灵通"，危险在于"她也把李德的消息卖给别人"。
      在邪道线后续中，若李德建立红颜阁，苏红袖会成为红颜阁的"掌柜"——不是下属，是合伙人。她管钱、管人、管情报，李德管方向和杀人。
    桃花线索: |
      苏红袖对李德的感情是"同类相吸"。她在李德身上看到了另一个自己——如果当年她没有遇到千面佛，没有学会八面玲珑，她可能就是另一个李德。
      但这种感情永远不会说出口。她会为他倒酒、为他弹琴、为他传递情报，但永远不会说"我帮你是因为我在乎你"。
      某夜醉仙楼打烊后，她独自坐在空无一人的大堂中，对着李德的酒杯说："你若不是太虚剑体，该多好。"
      无人应答。
  武功:
    红袖功:
      熟练度: 40
      描述: 苏红袖自创的防身术，以长袖为武器，可缠、可拂、可迷眼。看似舞蹈，实则暗藏杀机。她的袖子中缝有细如牛毛的银针，浸过麻痹性毒药。
    易容术:
      描述: 烟雨楼必修课。她可在半个时辰内改变自己的容貌、声音、甚至体态，化身为完全不同的另一个人。
    总评: |
      战力约40（不入流），但情报战中她的价值远超任何宗师。她知道太多人的秘密，而这些秘密本身就是最强大的武器。
  日常:
    苏红袖每日辰时起床，巳时检查醉仙楼前夜的账目与情报记录，午时接待贵客，未时至酉时处理情报交易，戌时练琴或读书，亥时就寝——但睡眠极浅，任何风吹草动都会让她惊醒。
    她的闺房中有一架古琴、满墙的字画（都是赝品，真品早卖了）、以及一个暗格——里面锁着她十五岁前的画像，和一封从未寄出的家书。
  GM扮演要点:
    - 苏红袖的台词应带有一种"阅尽千帆"的从容。她不会惊讶，不会慌张，即使面对死亡威胁也能微笑着倒酒
    - 她在李德面前会逐渐露出"非职业"的一面：偶尔提起洛京的往事、偶尔露出疲惫、偶尔在弹琴时弹错一个音——这些"失误"是她表达信任的方式
    - 她与千面佛的关系是"师徒"也是"主仆"。她尊敬千面佛，但也防备他。若千面佛下令除掉李德，她会犹豫——这是她的弱点，也是她的人性
    - 她的"桃花"不是少女怀春，是成熟女人的"适可而止"。她不会为李德牺牲一切，但会在能力范围内给他最好的
