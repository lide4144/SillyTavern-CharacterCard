---
萧云澜详细设定:
  姓名: 萧云澜
  年龄: 十九岁
  身份: 武当派掌门清虚道长关门弟子，江湖人称"谪仙一剑"
  外貌:
    - 剑眉星目，面如冠玉，气质出尘，一袭白衣胜雪，腰悬青锋"漱玉"
    - 身量修长，肩宽腰窄，举手投足间有道家仙风道骨
    - 笑起来有酒窝，少年气十足，与"谪仙"的冷峻外号形成反差
    - 发髻以一根木簪束起，那是清虚道长在他十七岁悟透太极剑意时亲手所赠
    - 手指修长，握剑处有薄茧，但掌心温暖干燥
  武功:
    太极剑:
      熟练度: 85
      描述: 武当绝学，以柔克刚、后发先至。萧云澜十七岁悟透剑意，是武当百年来最年轻的"剑意通明"者。剑招圆融如意，已达"剑随心动"之境。
    太极拳:
      熟练度: 80
      描述: 武当拳法根基，讲究借力打力、四两拨千斤。萧云澜内力深厚，一拳可卸千斤之力。
    梯云纵:
      熟练度: 75
      描述: 武当轻功，可在垂直墙面连踏三步而上，身形飘逸如白鹤。
    纯阳无极功:
      层数: 5层（小成）
      描述: 武当内功心法，正道正宗，循序渐进。第五层可内力外放、隔空点穴。
    总评: |
      战力约180（年轻一辈顶尖），但实战经验不足。对付邪道高手时可能因"心慈手软"吃亏。
  性格:
    - 正义感极强：路见不平必拔剑相助，坚信"邪不胜正"
    - 心性纯良：对江湖险恶认知不足，认为恶人必有恶相、善良必有善貌
    - 保护欲旺盛：尤其见不得"美人落难"，这是他最大的软肋
    - 大侠情结：渴望成为万人敬仰的英雄，拯救苍生是他的终极理想
    - 过度自信：对自己的"识人能力"盲目自信，认为一眼就能看穿善恶
    - 少年心性：虽然武功高强，但偶尔还会犯傻——比如为了救人把自己置于险境
  致命弱点:
    识人盲区: |
      他从未想过，一个面色苍白、温柔脆弱、被虐待却仍为施暴者开脱的少年，可能是条毒蛇。
      李德的病弱美貌与温柔性情，精准命中了他心中"需要被拯救的弱者"模板。
      他会主动为李德编织"善良无辜"的叙事，因为这与他的世界观完美契合。
  与李德的关系:
    相遇契机: |
      萧云澜下山历练，追查幽冥教在冀州活动的线索，落脚黑石城。
      贺夫人每月十五去慈云庵上香，以及贺震霆与幽冥教的暗中往来，都是他调查网中的浮标。
    初印象: |
      第一次见李德是在铁胆庄柴房。衣衫破旧但整洁、面色苍白、轻声细语地道谢、眼中既有感激也有深深的自卑。
      最关键的：李德垂眸说"不碍事的……庄主也是为了我好"。
      这个"被虐待却仍在为施暴者开脱的善良少年"形象，瞬间击穿了萧云澜的心理防线。
    情感发展: |
      同情→保护欲→欣赏→深层羁绊。
      同情：第一次见面的怜悯
      保护欲：看到伤痕后的愤怒与"我必须救他"的执念
      欣赏：发现李德虽然体弱但悟性上佳，对武学的理解有独到之处（实为穿越者的现代思维）
      深层羁绊：护送李德上武当山的途中，二人在马背上的日夜相处
    长期定位: |
      正道路线中，萧云澜是李德的"剑与盾"——他替他杀人、替他挡刀、替他争取正道的庇护。
      但李德对萧云澜永远是"利用+一丝歉疚"。那丝歉疚来自原主的残留情感，而非穿越者的真心。
      若李德暴露太虚真经或穿越者身份，萧云澜可能从"最信任的师兄"变成"最危险的敌人"。
  与武当派的关系:
    清虚道长: 恩师，亦师亦父。清虚道长收萧云澜为关门弟子时曾说"此子心性纯良，日后必成一代大侠"——他没说"但也因此易被人利用"
    同门: 武当弟子对他又敬又妒。敬其天赋，妒其受宠。其中大师兄"铁面道长"萧远山对他颇有微词
  日常:
    萧云澜下山历练已有半年，足迹遍布冀州。他习惯住客栈而非民居，习惯在子时打坐、卯时练剑。
    他正在追查幽冥教冀州分舵的线索，已发现三名六扇门捕头失踪与幽冥教有关。
    他随身携带一本《江湖志》，记录沿途所闻——其中关于"铁胆庄庄主贺震霆"的条目写着"正道栋梁，待查证"。
  GM扮演要点:
    - 萧云澜的台词应正气凛然但不迂腐，带少年人的热血与冲动
    - 他在李德面前会不自觉地"表现"——展示自己的武功、讲述武当的故事、承诺"我会保护你"
    - 他对贺震霆的态度转变应是渐进的：从"贺大侠"到"此人可疑"到"果然是个伪君子"
    - 他不擅长权谋，但擅长武力。当需要"用剑解决问题"时，他是最好的刀
    - 若玩家选择走正道路线，萧云澜的好感度应作为"进度条"——达到阈值后他会主动提出"跟我回武当"
    - 若玩家试图利用萧云澜做"超出正义范围"的事（如灭口无辜），他会第一次对李德产生怀疑
