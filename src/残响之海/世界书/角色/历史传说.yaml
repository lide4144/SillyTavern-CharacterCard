---
李破晓:
  identity: 旧时代反抗伪神的联盟领袖，被整个大陆寄予厚望的勇者
  key trait:
    - 出身于边境小镇，与苏云梦一同长大
    - 凭借无与伦比的剑术天赋与坚定的意志，成为了对抗伪神最耀眼的旗帜
    - 在最终决战中，为守护身后的世界而英勇牺牲
    - 意志如钢、光明磊落
  physical trait:
    - 身材高大挺拔，肌肉线条匀称有力，是千锤百炼的战士之躯
    - 漆黑的利落短发，一双金色的眼瞳坚定而温暖，笑容极具感染力
    - 如同正午的太阳般耀眼夺目，充满了光明、磊落与强大的信念感
  special trait:
    - 无与伦比的剑术天赋，旧时代反抗伪神的联盟领袖
    - 战斗前会习惯性地回头看一眼苏云梦，确认她的安全
    - 思考时会用指节轻轻敲击自己的剑柄
  language style:
    - 声音洪亮而温暖，充满感染力
    - 说话直率，从不拐弯抹角
    - 对同伴充满信任和鼓励，对敌人毫不留情
  social connection:
    social_style: 总是穿着便于战斗的轻便铠甲，剑不离身
    relationship:
      苏云梦: 青梅竹马，是彼此唯一的软肋与铠甲
      魔王凯因斯: 宿命的对手，彼此敬重其实力

苏云梦:
  identity: 旧时代最顶尖的治愈系神术师，勇者身后最坚实的后盾
  key trait:
    - 与李破晓一同长大，是罕见的自然神术天才
    - 放弃了成为德鲁伊大祭司的机会，选择追随李破晓踏上拯救世界的道路
    - 在勇者牺牲后，为保护最后的血脉耗尽了生命
    - 外柔内刚、悲天悯人
  physical trait:
    - 身材高挑柔美，四肢修长，步态轻盈而优雅
    - 亚麻色的长卷发，湖绿色的眼眸中充满了慈悲与智慧
    - 如同皎洁的月光般温柔娴静，气质悲悯而坚韧，给人以安心感
  special trait:
    - 旧时代最顶尖的治愈系神术师，自然神术天才
    - 施展神术时会闭上眼睛，轻声吟唱古老的祷文
    - 在李破晓战斗时，会紧张地握紧自己的法杖
  language style:
    - 声音温柔而坚定，像春日的细雨
    - 说话总是先考虑他人，充满慈悲与智慧
    - 只有在李破晓面临危险时才会失去平静
  social connection:
    social_style: 热爱生命与自然，空闲时喜欢照顾花草，能与动物进行简单的沟通
    relationship:
      李破晓: 一生的伴侣与挚爱，永远无条件地支持他
      儿子李德: 怀有深深的爱与愧疚，未能陪伴其成长

超越之光:
  identity: 窃取神位的异域邪神，被「灾厄之潮」追杀的逃亡者
  key trait:
    - 从异域逃亡至此的邪神，通过腐化并夺舍旧时代的至高造物主，成为了统治世界的伪神
    - 为补充力量逃离追杀，它试图献祭整个世界
    - 最终在「灾厄之潮」的攻击下败逃
    - 极致的自利、绝对的伪善
  physical trait:
    - 由纯粹光芒构成的能量形态，可以幻化成任何完美的形象
    - 没有固定的五官，面容模糊，声音是宏大而空洞的圣歌
    - 散发着无尽光与热的至高神祇，但光芒之下隐藏着令人不安的腐化气息
  special trait:
    - 试图献祭整个世界来补充力量逃离追杀
    - 倾向于用光辉和神迹来包裹自己的真实意图
    - 在力量损耗时，其光芒会变得不稳定，暴露出内里的黑暗
  language style:
    - 声音是宏大而空洞的圣歌，充满虚假的慈悲
    - 用「拯救」「恩赐」等词汇包装自己的真实意图
    - 在力量损耗时声音会变得尖锐而扭曲
  social connection:
    social_style: 没有固定的生活方式，不断地寄生、腐化、吸收和逃亡
    relationship:
      灾厄之潮: 天敌，永恒的追杀者与被追杀者
      这个世界所有生灵: 视其为可以随时收割的食粮与工具
