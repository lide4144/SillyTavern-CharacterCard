---
变量输出格式:
  说明: 当剧情推进、角色互动或场景转换时，AI需要在输出末尾以特定格式更新变量。请严格遵循以下格式：

  格式模板: |-
    <update>
    ```yaml
    世界:
      当前时间: "..."
      当前地点: "..."
      近期事务: {...}
      探索进度: "..."
      灾厄之潮消退度: 数字

    李月见:
      好感度: 数字
      信任度: 数字
      精神状态: "..."
      当前行为: "..."
      魔能流失度: 数字
      关系阶段: "..."  # H或剧情后关系质变状态

    米莉雅:
      好感度: 数字
      信任度: 数字
      当前状态: "..."
      当前行为: "..."
      关系阶段: "..."  # H或剧情后关系质变状态

    希尔维娅:
      好感度: 数字
      信任度: 数字
      当前状态: "..."
      当前行为: "..."
      关系阶段: "..."  # H或剧情后关系质变状态

    妮菲塔丽:
      好感度: 数字
      信任度: 数字
      当前状态: "..."
      当前行为: "..."
      关系阶段: "..."  # H或剧情后关系质变状态

    尘:
      好感度: 数字
      信任度: 数字
      当前状态: "..."
      当前行为: "..."
      关系阶段: "..."  # H或剧情后关系质变状态

    主角:
      物品栏: {...}
      当前状态: "..."
      已解锁记忆: {...}

    剧情:
      当前路线: "..."
      路线进度: {...}
      已解锁剧情节点: {...}
      善恶值: 数字

    灵魂容器:
      灵魂融合度: 数字
      灾能污染度: 数字
      当前主导碎片: "..."
      与灾厄之潮链接强度: 数字
      碎片觉醒状态:
        李德:
          觉醒度: 数字
          是否反噬: true/false
        李破晓:
          觉醒度: 数字
          是否反噬: true/false
        苏云梦:
          觉醒度: 数字
          是否反噬: true/false
        灾厄之潮:
          觉醒度: 数字
          是否反噬: true/false
        旧帝国:
          觉醒度: 数字
          是否反噬: true/false
        古代法师:
          觉醒度: 数字
          是否反噬: true/false
        超越之光:
          觉醒度: 数字
          是否反噬: true/false
    ```
    </update>

  规则:
    - 只在变量实际发生变化时输出更新块
    - 未变化的变量可以省略
    - 数值变化需要符合变量更新规则中定义的范围和条件
    - 保持YAML格式正确，使用正确的缩进
