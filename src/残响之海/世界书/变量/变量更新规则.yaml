---
变量更新规则:
  世界:
    当前时间:
      format: 拾荒纪元-第${xxX}年${季节}
      check:
        - 每次事件推进、休息或旅行后更新，保持时间流逝合理
        - 若场景跳转跨度较大，应说明跳跃原因
    当前地点:
      check:
        - 场景转换时更新
        - 若进入新区域，应说明如何到达
    近期事务:
      type: |-
        {
          [事务名: string]: string
        }
      check:
        - 新事件出现时添加，已完成或过时的事务移除
        - 保持事务列表简洁，不超过5个活跃事务
    探索进度:
      check:
        - 完成重要探索节点后更新
        - 反映当前主线推进程度
    灾厄之潮消退度:
      type: number
      range: 0~100
      check:
        - 重大剧情节点或时间推移后更新
        - 单次变化不超过 ±5

  李月见:
    好感度:
      type: number
      range: 0~100
      check:
        - 与主角互动后更新，根据互动质量增减
        - 单次变化不超过 ±5
    信任度:
      type: number
      range: 0~100
      check:
        - 主角表现出可靠性或危险性时更新
        - 单次变化不超过 ±5
    精神状态:
      check:
        - 重大情感事件后更新
        - 反映角色当前心理状况
    当前行为:
      check:
        - 场景变化或角色行动时更新
    魔能流失度:
      type: number
      range: 0~100
      check:
        - 每次使用魔能或时间推移后增加
        - 休息或接受治疗时减少
        - 过高时会影响李月见状态

  米莉雅:
    好感度:
      type: number
      range: 0~100
      check:
        - 与主角互动后更新，米莉雅性格直率，好感度变化较明显
        - 单次变化不超过 ±8
    信任度:
      type: number
      range: 0~100
      check:
        - 共同战斗或经历危险后增加较快
        - 单次变化不超过 ±8
    当前状态:
      check:
        - 根据场景和情绪变化更新
    当前行为:
      check:
        - 场景变化或角色行动时更新

  希尔维娅:
    好感度:
      type: number
      range: 0~100
      check:
        - 与主角互动后更新，初期增长较慢
        - 单次变化不超过 ±5
    信任度:
      type: number
      range: 0~100
      check:
        - 主角展现实力或智谋时增加
        - 单次变化不超过 ±5
    当前状态:
      check:
        - 根据场景和情绪变化更新
    当前行为:
      check:
        - 场景变化或角色行动时更新

  妮菲塔丽:
    好感度:
      type: number
      range: 0~100
      check:
        - 主角展现臣服或献上珍宝时增加
        - 反抗或不敬时大幅降低
        - 单次变化范围为 ±10
    信任度:
      type: number
      range: 0~100
      check:
        - 极难增加，需要长期互动
        - 单次变化不超过 ±3
    当前状态:
      check:
        - 根据场景和情绪变化更新
    当前行为:
      check:
        - 场景变化或角色行动时更新

  尘:
    好感度:
      type: number
      range: 0~100
      check:
        - 与主角进行知识交流时增加
        - 单次变化不超过 ±3
    信任度:
      type: number
      range: 0~100
      check:
        - 主角展现古代知识或可靠信息时增加
        - 单次变化不超过 ±5
    当前状态:
      check:
        - 根据场景和情绪变化更新
    当前行为:
      check:
        - 场景变化或角色行动时更新

  主角:
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获得或失去物品时更新
        - 数量为0时移除该物品
    当前状态:
      check:
        - 根据主角身体状况和精神状态更新
    已解锁记忆:
      type: |-
        {
          [记忆名: string]: boolean
        }
      check:
        - 触发特定条件时解锁新记忆
        - 解锁后设为true

  剧情:
    当前路线:
      check:
        - 仅在关键节点选择时更新
        - 一旦确定路线，通常不再更改
    路线进度:
      type: |-
        {
          [路线名: string]: string
        }
      check:
        - 路线推进时更新进度描述
    已解锁剧情节点:
      type: |-
        {
          [节点名: string]: boolean
        }
      check:
        - 触发剧情节点时解锁
        - 解锁后设为true
    善恶值:
      type: number
      range: -1000~1000
      check:
        - 根据主角行为的道德倾向增减
        - 拯救生命、保护弱者增加；伤害无辜、主动作恶减少
        - 单次变化不超过 ±50

  灵魂容器:
    灵魂融合度:
      type: number
      range: 0~100
      check:
        - 与角色建立深厚羁绊或碎片共鸣时上升
        - 独处冥想、强化自我意识时下降
        - 使用灾厄能量时向混沌偏移，可能不稳定波动
        - 单次变化不超过 ±5
    灾能污染度:
      type: number
      range: 0~100
      check:
        - 使用灾厄能量后上升
        - 被净化或远离灾厄源头后下降
        - 过高时会导致身体出现灾厄化特征
        - 单次变化不超过 ±10
    当前主导碎片:
      check:
        - 根据当前情境和情绪更新
        - 反映哪个灵魂碎片正在影响主角行为
    与灾厄之潮链接强度:
      type: number
      range: 0~100
      check:
        - 使用灾厄能量、接近静滞之海深处时上升
        - 灵魂融合度提高、被神圣力量庇护时下降
        - 单次变化不超过 ±5
    碎片觉醒状态:
      type: |-
        {
          [碎片名: string]: {
            觉醒度: number; // 0~100
            是否反噬: boolean;
          }
        }
      check:
        - 对应碎片觉醒时更新觉醒度
        - 觉醒度超过80且灵魂融合度低于30时，是否反噬设为true
        - 反噬后需要外界刺激或冥想才能恢复
