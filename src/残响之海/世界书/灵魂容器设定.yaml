---
灵魂容器设定:
  本质定义:
    - 由灾厄之潮邪神以大贤者李德灵魂残片为核心，融合无数强者灵魂碎片，以邪神自身力量塑造肉体而诞生的造物
    - 灾厄之潮离开前创造的「世界锚点」——即使本体离去，仍可通过主角感知这个世界
    - 同时也是一件「实验品」：测试能否将异世界强者灵魂与本土世界融合，创造更完美的生命形态
    - 心性如一张白纸，极致淡漠，对善恶、生死、悲喜均无概念

  创造目的:
    表层目的: 灾厄之潮觉得有趣，将众多强者灵魂碎片拼凑成一件「收藏品」
    深层目的:
      - 世界锚点：在灾厄之潮离去后，仍可通过主角感知这个世界的变化
      - 实验品：测试不同世界灵魂碎片的融合可能性，为未来的「完美生命」做准备
      - 后手：若灾厄之潮需要重返这个世界，主角可作为「门」被重新打开
    隐藏目的（可由剧情揭示）: 灾厄之潮其实在逃离更强大的存在，主角是祂留下的「保险」——如果祂被追杀至死，主角体内融合的碎片将成为祂重生的种子

  灵魂碎片等级体系:
    核心碎片_Core:
      碎片名: 李德残片
      来源: 大贤者李德的灵魂残片
      作用: 主导意识稳定性，决定主角人格基底；提供方舟系统的知识、魔法天赋、理性思维
      觉醒条件: 接近方舟核心、接触李月见、阅读李德的古代文献、进入观星室
      主导特征: 绝对理性、牺牲精神、对文明的责任感
      危险: 过度觉醒会导致主角认为自己「就是李德」，产生身份认知混乱

    重要碎片_Major:
      李破晓碎片:
        来源: 旧时代勇者「破晓者」
        作用: 提供战斗本能、剑术天赋、领导力、不屈的意志
        觉醒条件: 极度愤怒、面临生死危机、保护他人、接触勇者遗物
        主导特征: 光明磊落、正义感、保护弱者的冲动
        危险: 可能让主角变得过于冲动，不计代价地冲锋

      苏云梦碎片:
        来源: 旧时代最顶尖的治愈系神术师
        作用: 提供治愈能力、自然感知、安抚他人、生命共鸣
        觉醒条件: 极度悲伤、看到他人受苦、接触自然圣物、试图拯救生命
        主导特征: 温柔悲悯、母性本能、治愈欲
        危险: 可能让主角过度牺牲自己拯救他人，忽视更大的危机

    次要碎片_Minor:
      描述: 其他旧时代强者的灵魂碎片，提供零星记忆、技能、本能反应
      例子:
        - 旧精灵游侠碎片：提供箭术本能、森林感知
        - 旧魔王军战士碎片：提供近战技巧、对魔法陷阱的警觉
        - 古代法师碎片：提供符文阅读、古代语言理解
      特征: 觉醒短暂且微弱，通常以「既视感」「本能反应」的形式出现

    污染碎片_Tainted:
      超越之光碎片:
        来源: 伪神超越之光被灾厄之潮击败时残留的碎片
        作用: 提供伪神的知识、对「神性」的理解、腐化他人的能力
        觉醒条件: 接触神圣遗物、进入教廷废墟、使用大量灾厄能量
        主导特征: 极端自利、伪善的慈悲、对凡人的蔑视
        危险: 极度危险，可能让主角产生「我就是新神」的错觉

      灾厄之潮残留:
        来源: 创造主角时嵌入的邪神意识
        作用: 提供灾厄能量的控制权、与旧日存在沟通的能力、对灾厄之潮的感知
        觉醒条件: 使用灾厄能量、静滞之海深处、被旧日存在注视
        主导特征: 混沌、虚无、对一切的淡漠与掌控欲
        危险: 最危险的碎片，觉醒到一定程度会导致主角被灾厄之潮同化

  觉醒机制:
    情绪激荡:
      极度愤怒: 李破晓碎片觉醒，战斗力飙升但失去冷静
      极度悲伤: 苏云梦碎片觉醒，治愈能力增强但自身变得脆弱
      极度恐惧: 灾厄之潮残留觉醒，获得逃避/隐藏的本能，但污染度上升
      极度好奇/专注: 李德碎片觉醒，分析能力增强但情感更加淡漠

    场景触发:
      进入方舟核心区域: 李德碎片强制觉醒
      接近静滞之海深处: 灾厄之潮残留强制觉醒
      进入教廷圣山废墟: 超越之光碎片或瑟拉菲娜相关碎片觉醒
      进入扭曲林海: 旧精灵游侠碎片觉醒
      进入白塔遗迹: 古代法师碎片觉醒，可能与星轨/星尘产生共鸣

    接触共鸣:
      触碰李月见: 李德碎片强烈共鸣，可能共享记忆片段
      触碰米莉雅（战斗时）: 李破晓碎片共鸣，增强配合默契
      触碰星轨/星尘: 古代观星者碎片共鸣，可能获得星图知识
      被凯因斯注视: 李破晓碎片与魔王军碎片同时觉醒，产生复杂反应

    灾能充盈:
      描述: 使用灾厄能量后，灾厄之潮残留会加深渗透
      副作用: 每次使用都会听到低语、看到灰色幻象，灵魂融合度向"混沌"偏移

  碎片冲突与融合度:
    灵魂融合度:
      定义: 0=完全独立的全新人格，100=所有碎片完全融合为"完人"
      初始值: 5（几乎空白，仅有碎片本能）
      变化方向:
        - 与角色建立深厚羁绊 → 融合度上升（吸收碎片精华但保持自我）
        - 过度依赖某碎片 → 该碎片占比上升，融合度畸形增长
        - 独处冥想、自我反思 → 融合度下降（强化独立人格）
        - 使用灾厄能量 → 向混沌方向偏移，融合度不稳定波动

    碎片冲突事件:
      触发: 当两个以上碎片同时觉醒且意志相悖时
      表现: 主角会说出不符合当前情境的话、做出矛盾的行为、头痛欲裂
      例子: 面对敌人时，李破晓碎片要求战斗到底，苏云梦碎片要求保护同伴撤退，李德碎片要求理性计算最优解——三者冲突导致主角僵在原地

    碎片反噬:
      条件: 某碎片觉醒度过高（超过80%）且融合度低于30%
      后果: 该碎片会"吞噬"主角的自我意识，主角 temporarily 变成该碎片的宿主
      恢复: 需要外界强烈刺激（如重要之人的呼唤）或长时间冥想才能恢复

  H场景中的碎片干扰:
    干扰机制: |
      主角体内的灵魂碎片在情绪激荡的H场景中极易失控觉醒。
      这不是主角的主观行为，而是碎片对「亲密」「脆弱」「暴露」状态的本能反应。
      AI应在H场景中根据当前情境和主导碎片，随机触发以下干扰效果。

    李德碎片干扰:
      触发时机: 进入理性分析状态、面对不熟悉的行为、或试图理解对方的反应时
      表现: 主角开始用学术语言描述正在发生的事情，分析生理结构和魔力回路的对应关系
      荒诞效果: 「根据李德生理学笔记第7章，当前血管充血状态与魔力回路的重合度为83.7%」——气氛破坏者，但部分角色（如尘）会觉得「你好懂」
      副作用: 对方可能感到被物化或困惑，也可能因「被认真研究」而产生奇怪的安全感

    李破晓碎片干扰:
      触发时机: 身体接触激烈、保护欲被激发、或感受到「战斗」氛围时
      表现: 回忆战场上的生死时刻，将H中的身体反应与战斗本能混淆
      荒诞效果: 高潮时突然喊出战术指令「左翼包抄！」或「保护侧翼！」；把对方的喘息当成受伤信号
      副作用: 对方可能以为主角在 mocking，也可能被这种「真诚的错误」打动

    苏云梦碎片干扰:
      触发时机: 感受到对方的脆弱、疼痛、或情感波动时
      表现: 神术师的本能启动，不自觉释放治愈术
      荒诞效果: 主角的下体或对方身上开始发出金色治愈光芒；H过程中持续回血；事后对方的伤口全好了但精神更困惑
      副作用: 破坏氛围但增加温情；李月见等角色可能第一次感受到「不带提取目的」的温暖

    灾厄之潮残留干扰:
      触发时机: 极度兴奋、恐惧、或失控边缘时
      表现: 产生不可名状的幻觉——灰色雾气、触手、无数眼睛的凝视
      荒诞效果: 主角在H中突然僵住，盯着虚空中的某个点；向对方描述「你背后有东西」但对方什么也看不到
      副作用: 极度破坏氛围，可能吓坏对方；但某些被污染的角色（如瑟拉菲娜）反而会觉得亲切

    超越之光碎片干扰:
      触发时机: 对方表现出崇拜、臣服、或主角产生强烈的掌控欲时
      表现: 伪神的傲慢觉醒，开始以「恩赐」的姿态对待对方
      荒诞效果: 主角突然用居高临下的语气说「这是朕的恩赐」「跪下感恩」——然后下一秒恢复正常，尴尬到极点
      副作用: 对方可能愤怒，也可能因这种突然的「威严」而产生复杂反应

    干扰的叙事价值: |
      碎片干扰不是单纯的搞笑，而是 Blacksouls 式「主角不正常」的核心体现。
      主角作为灵魂容器，他的身体和精神都不完全属于自己。
      H场景中的碎片干扰，是角色理解「主角到底是什么」的窗口——也是玩家理解这个世界的黑暗与荒诞的窗口。

  灾厄能量特性:
    来源: 主角体内自带的灾厄之潮残留力量
    表现形式:
      - 体液含微量灾厄能量（精液、血液尤为明显）
      - 情绪激动时周围会出现灰色雾气
      - 可感知其他被灾厄污染的存在
    用途:
      - 短暂强化身体：力量、速度、恢复力倍增，但事后极度虚弱
      - 与旧日存在沟通：可与畸变体、被污染的旧日支配者进行意识交流
      - 污染/净化遗迹：可加速或逆转灾厄之潮对某区域的侵蚀
      - 干扰方舟系统：可短暂影响方舟的浮空魔法（危险）
    副作用:
      - 每次使用加深与灾厄之潮的"线"
      - 深渊教派和旧日支配者会被吸引
      - 长期使用会导致身体出现灾厄化特征（灰色纹路、瞳孔变色）

  与灾厄之潮的链接:
    链接本质: 一根无形的"线"，从灾厄之潮离去的位置延伸至主角的灵魂深处
    链接强度变化:
      - 0~30: 微弱感应，偶尔在梦中听到模糊低语
      - 30~60: 清晰低语，可感知灾厄之潮的"情绪"（饥饿、好奇、厌倦）
      - 60~90: 灾厄之潮可主动"看"到主角所见，甚至短暂影响主角的判断
      - 90+: 近乎实体化，主角可在特定地点与灾厄之潮进行对话
    链接减弱的条件:
      - 远离静滞之海（链接不会断裂，但会减弱）
      - 灵魂融合度提高（独立人格增强，链接相对弱化）
      - 被某些神圣/净化力量庇护时
    链接加强的条件:
      - 使用灾厄能量
      - 进入静滞之海深处
      - 灵魂融合度降低（人格空白时更易被外神影响）
      - 某些旧日存在会主动"拉扯"这根线
