---
世界设定:
  基础信息:
    世界名称: 残响之海
    version: '6'
    世界简称: 残响, 静滞之海, 拾荒纪元
    世界类型: 末日奇幻, 西幻史诗, 废土探索
    核心设定: 灭世邪神离去，力量逐渐消散，幸存者文明开启了探索地表废土、回收旧时代遗产的「拾荒纪元」。

  地理环境:
    世界整体形态: 下层是被逐渐消退的「灾厄之潮」力量笼罩的静滞之海，其中部分陆地与建筑残骸已重新露出水面；上层是悬浮的浮空大陆「方舟」。
    主要地形: 方舟拥有人造生态系统；地表则呈现为大片泥沼、滩涂与暴露的遗迹废墟，地貌正随海水退去而持续变化。
    特殊地域: 静滞之海（尽管邪神力量在消退，但仍有大量畸变体和被污染的旧日强者盘踞，是探索的最大威胁）。

  种族_势力:
    主要种族:
      - 种族一: 人类（方舟社会的主体，拾荒行动的主力军）
      - 种族二: 精灵与矮人（凭借古老技艺在遗迹分析与物品修复中扮演重要角色）
      - 种族三: 畸变体（旧日支配者的存在使得畸变体群落的分布与行为模式变得更加复杂和危险）
      - 种族四: 哥布林（被大贤者李德改造的智慧种族，繁殖力低下但拥有高智力，狂热崇拜李德并以成为法师为最高荣誉）
    主要势力:
      - 势力一: 方舟议会（负责统筹规划大规模的拾荒行动，并对回收技术进行管制）
      - 势力二: 拾荒者公会（在新时代背景下迅速壮大，成为探索地表最富经验的先锋力量）
      - 势力三: 深渊教派（试图在力量消退的过程中，寻找并控制那些依旧强大的旧日支配者）

  力量体系:
    核心力量来源: 红龙生命力（为方舟提供基础浮空伟力）、血脉魔能（李德家族后裔为方舟提供精细魔能）、回收技术（从地表遗迹中寻回的失落魔法与科技成为新的力量增长点）
    力量等级_分类: 施法者（学徒/正式法师/奥术大师）、遗物使用者（初级/中级/高级拾荒者）、神术使用者（信徒/代行者/圣徒）
    力量获取方式: 学院学习、公会训练、血脉继承、探索并解析回收的旧时代遗物。

  社会规则:
    法律体系: 由方舟议会颁布《拾荒者法案》，对拾荒区域划分、资源分配和危险情报共享做出强制规定。
    道德规范: 「开拓者」与「探路人」成为最受尊敬的身份，对地表知识的掌握程度成为衡量个人能力与价值的重要标准。
    社交礼仪: 交换彼此绘制的地表地图或分享最新的遗迹情报，成为建立信任的重要社交方式。

  历史背景:
    关键历史事件:
      - 事件一: 「伪神之战」与「泪雨之日」，先民为反抗伪神而招致灭世洪水，大陆被淹没。
      - 事件二: 「擎天之举」，传奇大贤者李德升起「方舟」，幸存者进入千年浮空时代。
      - 事件三: 「潮退之时」，追逐的邪神与被追逐的伪神相继离去，灾厄力量开始消散，部分陆地重见天日，拾荒纪元开启。
    历史发展脉络: 从史诗时代到黑暗的浮空时代，再到如今机遇与危险并存的拾荒纪元，文明的重心开始从「生存」转向「探索与复兴」。

  独特特征: 整个世界处于一个动态变化的「后末日」时期。邪神力量的消退带来了希望，但也让那些被压制千年的旧日支配者与远古遗迹变得更加活跃和致命，每一次探索都像是在与历史的亡魂共舞。
