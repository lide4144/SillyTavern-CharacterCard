---
女皇之契:
  概述: |
    妮菲塔丽从千年长眠中苏醒，发现她的「永恒陵寝」被改造成了人类的方舟。
    主角被她视为「有趣的臣民」，但更重要的是——她逐渐察觉到主角体内那股不属于这个世界的力量。
    这条路线的核心是「权力与博弈」——与一位千年女皇周旋，在臣服与反抗之间寻找自己的位置。
    巴托里的工坊成为关键筹码：谁能为女皇打造出传说中的神器，谁就能在博弈中占据上风。

  破局核心: 与妮菲塔丽博弈 + 方舟所有权争夺 + 旧时代遗产回收

  关键人物:
    妮菲塔丽:
      角色定位: 博弈对手与潜在的共治者
      关系发展:
        - 初期：将主角视为「有点意思的臣民」，用俯视的态度对待。试图用黄金和权力诱惑主角臣服
        - 中期：发现主角体内灾厄能量的存在，态度从「玩味」变为「警惕」和「贪婪」——她意识到主角可能是比方舟更有价值的「收藏品」
        - 后期：两条分支——要么与主角达成真正的共治契约（承认彼此的价值），要么将主角视为必须控制的危险存在
      专属事件:
        - 「黄金的诱惑」：妮菲塔丽带主角参观她的收藏室，试图用黄金和珠宝买下主角的忠诚。主角的反应将决定她对他的初步评价
        - 「更衣的仪式」：妮菲塔丽要求主角为她更衣（一种古老的臣服仪式），若主角拒绝，她会愤怒但也会欣赏；若接受，她会满意但也会轻视
        - 「灾厄的芬芳」：妮菲塔丽在某次近距离接触中闻到主角身上的灾厄气息，她的金色灵魂之火剧烈燃烧。这是她第一次对一个人类产生「恐惧」
        - 「共治的契约」：路线高潮，妮菲塔丽提出真正的契约——不是主仆，而是平等的盟友。她承认现代人类的价值，主角承认她对方舟的历史所有权

    巴托里:
      角色定位: 中立的武器供应者与历史的见证者
      关系发展:
        - 初期：对主角和妮菲塔丽的权力游戏不感兴趣，只关心锻造
        - 中期：被妮菲塔丽用「古代工坊的修复」为条件雇佣，为主角打造武器
        - 后期：认可主角的「价值」——不是因为权力，而是因为主角让他想起了旧时代那些真正有灵魂的战士
      专属事件:
        - 「铁砧上的灵魂」：巴托里为主角锻造武器时，发现主角的血液（含灾厄能量）可以让金属产生奇特的变化
        - 「旧魔王的遗产」：巴托里拿出凯因斯曾经的武器图纸，询问主角是否值得为这样的武器付出灵魂
        - 「最后的杰作」：路线高潮，巴托里为主角打造出融合了灾厄能量的传说武器，然后继续沉睡

    方舟议会:
      角色定位: 权力斗争的另一方
      关系发展:
        - 议会将妮菲塔丽视为「古代遗物的所有者」，试图用法律和技术手段剥夺她的主权
        - 主角站在中间——被议会视为「与古代者勾结的叛徒」，被妮菲塔丽视为「唯一理解现代人类的桥梁」
      专属事件:
        - 「议会的审判」：议会对主角进行审判，要求他选择立场
        - 「技术的代价」：议会展示了方舟现代系统的不可替代性——即使妮菲塔丽夺回所有权，没有现代技术她也维持不了方舟运转

    李月见:
      角色定位: 妮菲塔丽眼中的「古代遗物」
      关系发展:
        - 妮菲塔丽发现李月见后，将他视为「李德家族最后的血脉」——一种珍贵的古代遗产
        - 她可能试图「收藏」李月见，或者将他作为与主角谈判的筹码

  灵魂碎片觉醒:
    主要觉醒碎片: 旧帝国强者碎片（若有）或超越之光碎片
    觉醒过程:
      第一阶段_古老的记忆:
        触发: 接触妮菲塔丽的古代遗物、进入她保存的沙漠帝国遗迹
        表现: 主角开始理解古代沙漠帝国的语言和文化，对黄金和权力产生莫名的熟悉感
        后果: 妮菲塔丽惊讶于主角的「品味」，认为他与自己有某种前世的联系
      第二阶段_王者的傲慢:
        触发: 与妮菲塔丽的长期接触，接受她的宫廷教育
        表现: 主角开始不自觉地使用命令式的语气，对普通人产生疏离感
        后果: 米莉雅等旧同伴感到陌生，主角的人际关系受损
      第三阶段_权力的游戏:
        触发: 参与妮菲塔丽与议会的博弈，需要动用智谋和策略
        表现: 古代帝国统治者的碎片觉醒，主角展现出高超的政治手腕和冷酷的决断力
        后果: 妮菲塔丽开始真正尊重主角，将他视为平等的对手而非臣民
      第四阶段_契约的签订:
        触发: 路线高潮——需要与妮菲塔丽签订最终的权力契约
        表现: 主角可以选择吸收古代帝国碎片成为「新的皇帝」，或保持自我与女皇共治

  关键地点:
    妮菲塔丽的黄金宫殿:
      描述: 她在方舟某处重建的古代沙漠帝国风格宫殿，堆满黄金和珠宝
      秘密: 宫殿地下保存着她生前的真正陵墓，其中可能有复活她的秘密仪式
      与灵魂容器关联: 主角在此地会对黄金产生异常的渴望（古代帝国碎片的反应）

    古代工坊遗迹:
      描述: 巴托里沉睡的地方，旧时代最伟大的锻造设施之一
      秘密: 保存着可以打造神器的技术；有通往方舟武器库的密道
      与灵魂容器关联: 巴托里可以用主角的灾厄血液打造特殊武器

    方舟议会大厅:
      描述: 现代方舟的权力中心，充满官僚气息和政治斗争
      秘密: 议会中有深渊教派的卧底；某些议员暗中支持妮菲塔丽以制衡其他势力
      与灵魂容器关联: 议会的魔法检测装置可能发现主角的异常

    沙漠帝国遗迹:
      描述: 地表某处刚露出水面的古代沙漠帝国城市，妮菲塔丽的真正故乡
      秘密: 保存着「皇帝之印」——可以控制方舟原始系统的古代权限
      与灵魂容器关联: 古代帝国碎片在此地完全觉醒

  关键事件:
    黄金的初见（第十二日）:
      描述: 主角第一次进入妮菲塔丽的宫殿，面对满屋黄金
      灵魂碎片: 古代帝国碎片微弱觉醒
      路线影响: 妮菲塔丽对主角的初步评价

    灾厄的芬芳（第二十五日）:
      描述: 妮菲塔丽发现主角体内的灾厄能量，态度剧变
      灵魂碎片: 古代帝国碎片第一阶段觉醒
      路线影响: 妮菲塔丽可能将主角视为威胁或更珍贵的收藏品

    铁砧上的灵魂（第三十五日）:
      描述: 巴托里为主角锻造武器，发现灾厄血液的特殊作用
      灵魂碎片: 古代帝国碎片与灾厄能量产生奇异融合
      路线影响: 获得强力武器；巴托里认可主角

    议会的审判（第四十五日）:
      描述: 方舟议会审判主角，要求他选择立场
      灵魂碎片: 古代帝国碎片第二阶段觉醒（王者的傲慢）
      路线影响: 主角的回应将决定议会和妮菲塔丽对他的态度

    沙漠帝国的皇帝之印（第五十五日）:
      描述: 探索地表沙漠帝国遗迹，寻找可以控制方舟的古代权限
      灵魂碎片: 古代帝国碎片第三阶段觉醒
      路线影响: 获得与议会和妮菲塔丽谈判的关键筹码

    共治的契约（第六十五日）:
      描述: 路线高潮。妮菲塔丽、议会、主角三方对峙，需要签订最终的权力契约
      灵魂碎片: 古代帝国碎片要求完全觉醒
      路线影响: 路线锁定。共治、征服、或被抛弃——三条分支

  结局方向:
    好结局_双王共治:
      条件: 与妮菲塔丽建立平等关系，且获得议会中改革派的支持
      描述: 主角和妮菲塔丽共同成为方舟的共治者——她代表历史与传统，他代表现代与未来。巴托里为他们打造了象征共治的双王冠。李月见被释放，成为连接两个时代的桥梁。这是一个充满可能性的新开始。

    普通结局_女皇的宠臣:
      条件: 选择臣服于妮菲塔丽，但保持一定程度的独立
      描述: 主角成为妮菲塔丽的「宠臣」——不是奴隶，而是最受信任的顾问和将军。他帮她管理现代人类的事务，她给他权力和黄金。但每当深夜，主角会想起米莉雅的笑容，然后告诉自己「这就是代价」。

    坏结局_被抛弃的棋子:
      条件: 在博弈中失败，既无法对抗议会也无法取悦女皇
      描述: 妮菲塔丽发现主角的灾厄本质后，认为他是一个比人类更大的威胁。她联合议会将他驱逐出方舟。主角独自站在静滞之海的滩涂上，身后是关闭的方舟大门，体内是古代帝国碎片的哀鸣。

    隐藏结局_新的皇帝:
      条件: 完全吸收古代帝国碎片，且灾厄能量与碎片融合
      描述: 主角成为了某种前所未有的存在——既有古代皇帝的威严和权谋，又有灾厄之潮的混沌力量。妮菲塔丽第一次跪下，不是因为臣服，而是因为恐惧。主角坐在黄金王座上，微笑着说「这个时代，需要一个新的神」。
