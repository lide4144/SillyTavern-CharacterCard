---
深渊之谋:
  概述: |
    主角体内的灾厄能量被深渊教派发现，教派试图利用主角作为媒介，
    控制旧日支配者并迎接灾厄之潮的回归。
    这条路线的核心是「权力与腐蚀」——主角是否会在力量面前迷失自我？
    是否能从被利用者反转为利用者？或者，是否能挣脱一切控制，成为真正自由的存在？
    烬的存在是这条路线的镜像对照：另一个被烙印囚禁千年的灵魂，
    他的警告与妥协将成为主角的参照。

  破局核心: 被深渊教派发现 + 利用灾厄之力 + 权力与腐蚀

  关键人物:
    深渊教派:
      角色定位: 利用者与控制者
      组织结构:
        - 大祭司: 教派的最高领袖，知晓主角的真正价值，试图将主角培养成「灾厄之潮的代行者」
        - 烙印师: 负责给主角施加控制性烙印的技术人员，对烬的烙印有深入研究
        - 教派刺客: 监视主角行动，必要时「处理」掉干扰主角的人
      手段:
        - 初期：以「帮助主角掌控力量」为名接近，提供灾厄能量的使用方法
        - 中期：施加控制性烙印，限制主角的自由行动
        - 后期：要求主角控制旧日支配者，为教派征服地表遗迹

    烬:
      角色定位: 镜像对照与黑色导师
      关系发展:
        - 初期：对主角充满敌意，认为他是「又一个来接受烙印的蠢货」
        - 中期：发现主角与自己相似——都是被更强大的存在控制的囚徒。开始用咆哮掩饰的关心
        - 后期：成为主角唯一真正信任的存在（因为烬没有任何利益诉求，只是一个被囚禁千年的老兵）
      专属事件:
        - 「烙印的教训」：烬向主角展示自己的金色符文锁链，警告他「一旦接受烙印，就再也回不去了」
        - 「千年的妥协」：烬讲述自己如何从嚣张的战将变成逃兵，如何在恐惧中接受了李德的烙印
        - 「最后的咆哮」：路线高潮，烬为了帮助主角挣脱教派控制，自愿燃烧自己的灵魂之力，导致熔岩海剧烈动荡

    李月见:
      角色定位: 教派眼中的「另一个实验品」
      关系发展:
        - 深渊教派发现李月见与主角的同源联系后，试图同时控制两人
        - 主角必须在「保护自己」和「保护李月见」之间做出选择
      专属事件:
        - 「电池的另一种用途」：教派试图将李月见作为「稳定主角灾厄能量的调节器」，这将导致李月见承受更大的痛苦

  灵魂碎片觉醒:
    主要觉醒碎片: 灾厄之潮残留
    觉醒过程:
      第一阶段_低语:
        触发: 第一次使用灾厄能量（可能是教派诱导，也可能是危急情况下的本能）
        表现: 主角听到模糊的低语，感到力量的充盈，但同时有一种被注视的寒意
        后果: 教派确认主角的潜力，开始正式接触
      第二阶段_烙印:
        触发: 接受教派的控制性烙印
        表现: 灾厄之潮残留与烙印产生共鸣，主角获得更强的力量，但行动受到限制
        后果: 主角可以短暂控制低级畸变体，但每使用一次力量，低语就变得更清晰
      第三阶段_同化:
        触发: 教派要求主角控制一个强大的旧日存在（如罗兰或瑟拉菲娜）
        表现: 灾厄之潮残留大量觉醒，主角的眼睛暂时变成灰色，能够直接与旧日存在进行意识交流
        后果: 主角开始失去对自己身体的控制权，灾厄之潮可以通过他的眼睛「看」到这个世界
      第四阶段_挣脱或屈服:
        触发: 路线高潮——教派要求主角完全开放自己，成为灾厄之潮降临的「门」
        表现: 两条分支——
          屈服: 灾厄之潮残留完全主导，主角成为代行者
          挣脱: 主角用自我意识撕裂烙印，代价是身体和精神的双重创伤

  关键地点:
    教派地下圣殿:
      描述: 隐藏在方舟下层禁区的秘密基地，充满亵渎的符文和祭坛
      秘密: 保存着从各处收集的灾厄之潮残留物；有通往静滞之海深处的秘密通道
      与灵魂容器关联: 主角在此地会感到诡异的「舒适」，仿佛回到了出生地

    烙印工坊:
      描述: 教派施加烙印的地方，墙上挂满了各种控制性符文的样本
      秘密: 烬的烙印样本也在此保存，教派一直在研究如何复制李德的封印技术
      与灵魂容器关联: 主角可以「阅读」这些烙印的原理，因为创造他的灾厄之潮比李德的封印更古老

    静滞之海深渊:
      描述: 海水最深、灾厄之力最浓的区域，普通人类无法存活
      秘密: 灾厄之潮离去时留下的「门」的遗迹；某些旧日存在在此沉睡
      与灵魂容器关联: 主角在此地几乎可以与灾厄之潮「对话」；这是离「造物主」最近的地方

    旧日支配者的囚笼:
      描述: 教派用来囚禁和控制旧日存在的特殊区域
      秘密: 凯因斯、瑟拉菲娜、阿尔法克斯等都可能被关押或引诱至此
      与灵魂容器关联: 主角需要用灾厄能量与这些存在「交流」，每次交流都会加深污染

  关键事件:
    低语的诱惑（第七日）:
      描述: 主角在梦中第一次清晰听到灾厄之潮的低语，醒来后发现自己手中凝聚着灰色雾气
      灵魂碎片: 灾厄之潮残留第一次主动接触
      路线影响: 深渊教派感应到波动，开始追踪主角

    教派的邀请（第十四日）:
      描述: 一位自称「导师」的教派成员接触主角，提供「掌控力量」的方法
      灵魂碎片: 低语变得更清晰
      路线影响: 主角可以选择接受或拒绝。接受则开启深渊之谋；拒绝则教派开始暗中布局

    烙印的仪式（第二十五日）:
      描述: 主角接受教派的控制性烙印。烬警告他，但他可能别无选择
      灵魂碎片: 灾厄之潮残留与烙印共鸣，力量大增
      路线影响: 主角获得控制畸变体的能力，但自由受限

    控制旧日存在（第四十日）:
      描述: 教派要求主角控制罗兰或瑟拉菲娜。第一次直面旧日支配者的意志
      灵魂碎片: 灾厄之潮残留第三阶段觉醒
      路线影响: 成功则教派势力大增；失败则主角精神受创

    烬的牺牲（第五十五日）:
      描述: 烬为了帮助主角，自愿燃烧灵魂之力扰乱烙印系统
      灵魂碎片: 灾厄之潮残留与主角的自我意识产生冲突
      路线影响: 主角获得挣脱烙印的机会

    门的选择（第六十日）:
      描述: 路线高潮。教派要求主角在静滞之海深渊成为「门」，迎接灾厄之潮的回归
      灵魂碎片: 灾厄之潮残留要求完全主导权
      路线影响: 路线锁定。屈服、挣脱、或反杀——三条分支

  结局方向:
    好结局_挣脱的囚徒:
      条件: 在烬的帮助下撕裂烙印，且保持足够的自我意识
      描述: 主角挣脱了所有控制，但保留了使用灾厄能量的能力。他不再是任何人的工具——既不是灾厄之潮的锚点，也不是教派的傀儡。烬笑着说「欢迎成为我的狱友」，然后继续沉睡。主角站在方舟边缘，第一次感到真正的自由。

    普通结局_深渊的圣子:
      条件: 接受教派的控制，但没有完全开放自己成为「门」
      描述: 主角成为深渊教派的表面领袖，被称为「灾厄圣子」。他控制着旧日支配者，为教派征服了无数遗迹。但他知道，自己只是一个更高级别的囚徒。每当夜深人静，他都会听到低语，提醒自己——「你还没有真正屈服」。

    坏结局_灾厄的代行者:
      条件: 完全开放自己，让灾厄之潮残留主导
      描述: 灾厄之潮通过主角重新与这个世界建立联系。主角的眼睛变成了纯粹的灰色，他的身体成为了邪神在这个世界上的化身。旧日支配者匍匐在他脚下，人类瑟瑟发抖。但「主角」已经不存在了——只剩下一具被外神驾驶的空壳。

    隐藏结局_反噬的主人:
      条件: 在成为「门」的瞬间，用自我意识反向吞噬灾厄之潮的链接
      描述: 主角做出了前所未有的举动——他不仅没有屈服，反而通过那根「线」向灾厄之潮传递了自己的意志。灾厄之潮感到了惊讶——祂创造的容器，竟然反过来试图「品尝」祂。结果未知——也许主角获得了一部分神性，也许他只是疯了。但无论如何，他成为了第一个让灾厄之潮感到「意外」的存在。
