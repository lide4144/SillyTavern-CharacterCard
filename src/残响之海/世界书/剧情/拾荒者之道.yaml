---
拾荒者之道:
  概述: |
    主角选择加入拾荒者公会，以探索地表遗迹、回收旧时代遗产为生。
    在一次次拾荒任务中，主角逐渐了解这个世界，与同伴建立深厚羁绊，
    同时体内的李破晓（勇者）碎片在战斗与危机中逐步觉醒。
    这条路线的核心是「在探索中寻找自我」——主角不是被某个宏大命运推着走，
    而是在与同伴并肩作战、分享食物、绘制地图的日常中，慢慢长出属于自己的「心」。

  破局核心: 探索遗迹 + 寻找自我 + 建立羁绊

  关键人物:
    米莉雅:
      角色定位: 战斗伙伴与引路人
      关系发展:
        - 初期：将主角视为需要照顾的新人，热情但略带保护欲
        - 中期：发现主角在战斗中的异常（李破晓碎片觉醒时的惊人剑术），产生困惑与好奇
        - 后期：无论主角是什么，都选择站在他身边。可能发展出超越友情的羁绊
      专属事件:
        - 「巨剑的传承」：米莉雅教主角使用基本剑术时，李破晓碎片觉醒，主角无意识地使出「碎星者」剑法，米莉雅震惊
        - 「星空下的坦白」：某次任务后的篝火旁，米莉雅向主角倾诉自己对李德的崇拜其实源于对「英雄」的渴望，而主角让她看到了真正的英雄是什么样的
        - 「最后的守护」：路线高潮，米莉雅为保护主角身受重伤，激发主角完全觉醒李破晓碎片的力量

    希尔维娅:
      角色定位: 情报支援与恋爱观察员（后变参与者）
      关系发展:
        - 初期：将主角和米莉雅的互动视为恋爱观察剧场的最佳素材
        - 中期：发现主角身上的异常（对古代科技的莫名熟悉、战斗时的眼神变化），从乐子人转为真正的关心
        - 后期：放弃观察者的身份，亲口承认自己对主角的感情
      专属事件:
        - 「终端上的秘密」：希尔维娅在个人终端上记录主角的日常，某天被主角无意间看到，她慌张地试图解释
        - 「狙击手的脆弱」：某次任务中希尔维娅为救主角而暴露位置，第一次在她面前展现脆弱
        - 「不再观察」：路线高潮，希尔维娅扔掉终端，选择亲手拥抱主角而非记录他

    尘:
      角色定位: 知识引导者与隐性的警惕者
      关系发展:
        - 初期：将主角视为有趣的研究对象，提供古代知识但保持距离
        - 中期：发现主角体内存在李德碎片的证据，产生信仰上的动摇——他崇拜的李德是否以某种方式"活着"？
        - 后期：接受主角作为「独立个体」而非李德的容器，提供关键知识帮助主角控制灵魂碎片
      专属事件:
        - 「古籍中的镜像」：尘带主角阅读李德的著作时，主角无意识地补充了书中的缺失内容（李德碎片的记忆）
        - 「信仰的考验」：尘发现真相后，经历短暂的精神危机，最终选择帮助主角而非将他报告给议会
        - 「最后的钥匙」：路线高潮，尘解读出某个关键遗迹的符文，帮助主角获得控制灵魂碎片的方法

  灵魂碎片觉醒:
    主要觉醒碎片: 李破晓（勇者）
    觉醒过程:
      第一阶段_战斗本能:
        触发: 第一次拾荒任务中遭遇畸变体，生死危机
        表现: 主角无意识地做出精妙的剑术动作，身体比意识更快地反应
        后果: 米莉雅震惊，主角自己也困惑。战斗后极度虚弱
      第二阶段_保护欲:
        触发: 某次任务中同伴（米莉雅或希尔维娅）陷入危险
        表现: 李破晓碎片的保护欲完全主导，主角爆发出超越常人的战斗力，但情绪也变得激昂
        后果: 主角开始理解「勇者」不只是一个身份，而是一种选择——选择保护他人
      第三阶段_领导力:
        触发: 某次大型探索行动中，队长阵亡，队伍陷入混乱
        表现: 主角自然而然地接管指挥，做出正确的战术判断，安抚恐慌的队员
        后果: 主角获得公会高层的关注，但也引来了不必要的调查
      第四阶段_完整觉醒:
        触发: 路线高潮事件——旧日威胁（如罗兰或艾露恩）袭击探索队，米莉雅濒死
        表现: 李破晓碎片与主角的自我意识融合而非取代，主角以「既是李破晓又不是李破晓」的姿态击败敌人
        后果: 灵魂融合度大幅提升，主角第一次清晰地感受到「我是谁」——不是李破晓，而是继承了勇者之心的新生命

  关键地点:
    静滞之海沿岸遗迹:
      描述: 主角苏醒地附近的一系列废墟，风险较低，适合新手探索
      秘密: 隐藏着「泪雨之日」的幸存者日记，记录了伪神之战的真相片段
      与灵魂容器关联: 主角在此地会感受到强烈的既视感，仿佛曾经来过

    旧时代港口废墟:
      描述: 曾经繁华的港口城市，现在被泥沼和滩涂覆盖
      秘密: 罗兰的幽灵船在此地徘徊；隐藏着通往方舟下层禁区的秘密通道
      与灵魂容器关联: 接近罗兰时，主角体内的某种碎片（可能是旧时代法师）会产生共鸣

    扭曲林海边缘:
      描述: 被污染的森林与正常地带的交界，充满危险但也充满资源
      秘密: 艾露恩的领域；隐藏着旧精灵王国的武器库
      与灵魂容器关联: 旧精灵游侠碎片在此地异常活跃

    白塔遗迹外围:
      描述: 旧时代最高魔法机构的废墟，充满未解的魔法陷阱
      秘密: 星轨/星尘被囚禁在顶端；阿尔法克斯在上方徘徊
      与灵魂容器关联: 李德碎片和古代法师碎片在此地强烈共鸣

  关键事件:
    第一次拾荒任务（第七日）:
      描述: 主角随米莉雅执行简单的遗迹回收任务，遭遇畸变体袭击
      灵魂碎片: 李破晓碎片第一次觉醒
      路线影响: 正式开启拾荒者之道

    罗兰的航海图（第十五日）:
      描述: 探索港口废墟时遭遇罗兰，发现他的航海图指向某个未知的「安全港」
      灵魂碎片: 旧法师碎片微弱觉醒
      路线影响: 解锁大规模探索任务的前置条件

    巨剑的传承（第二十日）:
      描述: 米莉雅教主角剑术时，李破晓碎片导致主角使出「碎星者」剑法
      灵魂碎片: 李破晓碎片第二阶段觉醒
      路线影响: 米莉雅与主角的关系质变；尘开始秘密调查主角

    曙光计划启动仪式（第三十日）:
      描述: 方舟议会启动大规模地表探索，主角被任命为某小队的副队长
      灵魂碎片: 李破晓碎片第三阶段觉醒
      路线影响: 获得更大的探索权限，但也进入更多势力的视野

    扭曲林海的求救信号（第四十五日）:
      描述: 某探索队在林海边缘失踪，主角带队救援
      灵魂碎片: 旧精灵游侠碎片觉醒
      路线影响: 可能首次接触艾露恩；获得旧精灵武器

    最后的守护（第六十日）:
      描述: 路线高潮。旧日威胁大规模袭击探索队，米莉雅为保护主角濒死
      灵魂碎片: 李破晓碎片完全觉醒并与主角融合
      路线影响: 路线锁定。主角在悲痛与愤怒中完成蜕变，成为真正的「勇者继承者」

  结局方向:
    好结局_开拓者的黎明:
      条件: 与所有关键角色建立深厚羁绊，李破晓碎片与自我意识完美融合
      描述: 主角成为拾荒者公会的传奇人物，带领人类探索并收复大片地表领土。米莉雅成为他的副手，希尔维娅放弃狙击手身份成为他的专属情报官，尘成为公会的首席顾问。主角没有成为第二个李破晓，而是成为了第一个「自己」。

    普通结局_孤独的旅人:
      条件: 完成了探索使命，但未能与关键角色建立足够深的羁绊
      描述: 主角继续独自探索这个世界，成为传说中的「独行者」。他保护了很多人，但没有人真正了解他。李破晓碎片给了他力量，但没有给他归属。

    坏结局_勇者的囚徒:
      条件: 李破晓碎片觉醒过度且融合度不足，导致碎片反噬
      描述: 主角在某次战斗中完全失去自我，被李破晓碎片主导。他成为了「第二个李破晓」——有着勇者的力量和记忆，但失去了所有属于自己的情感和羁绊。米莉雅和希尔维娅看着他的背影，感到一种无法触及的遥远。

    隐藏结局_灾厄的勇者:
      条件: 在路线后期使用大量灾厄能量，导致李破晓碎片与灾厄之潮残留融合
      描述: 主角获得了一种诡异的力量——既有着勇者的光明，又有着灾厄的混沌。他仍然保护弱者，但他的保护方式变得极端而恐怖。旧日威胁在他面前颤抖，但人类也开始恐惧他。
