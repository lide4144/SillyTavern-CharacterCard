---
灵魂之问:
  概述: |
    当主角的灵魂融合度达到极端（过高或过低），或者经历了足够多的事件后，
    体内的所有灵魂碎片将同时爆发冲突。这条路线的核心是「存在与超越」——
    主角必须直面最根本的问题：我是谁？我是李德的继承者？李破晓的转世？灾厄之潮的工具？
    还是一个独立的、全新的灵魂？
    星轨和星尘提供宇宙视角的启示——从星辰的高度看，一个人的灵魂不过是一粒尘埃，
    但正是这粒尘埃的选择，决定了无数星辰的命运。

  破局核心: 直面灵魂容器本质 + 寻找"我是谁" + 融合或独立

  关键人物:
    星轨:
      角色定位: 宇宙视角的启示者
      关系发展:
        - 星轨通过星辰计算"看到」了主角的存在——一个本不该出现在命运星图中的变数
        - 她不会直接给答案，但会提出问题：「你认为灾厄之潮为什么要创造你？祂需要一个锚点，还是一个答案？」
        - 她的沉默和计算本身就是一种启示——在无限的星空中，个体的选择有着无限的意义
      专属事件:
        - 「星图中的变数」：星轨第一次"看到"主角时，她的计算出现了错误。这千年来从未发生过
        - 「没有答案的问题」：星轨问主角「你希望自己是谁？」，然后在他回答之前说「不要告诉我。答案只对你有意义。」
        - 「世界的坐标」：星轨揭示她当年广播世界坐标的真正原因——不是为了毁灭，而是为了「让宇宙看到我们」。主角的存在，可能就是宇宙给予的回应

    星尘:
      角色定位: 情感共鸣者与悲伤的镜像
      关系发展:
        - 星尘能感受到主角体内无数碎片的痛苦——每一个碎片都曾经是一个完整的人，都曾经爱过、痛过、希望过
        - 她会在主角碎片冲突时，用自己的悲伤去安抚那些碎片，仿佛在为它们哭泣
        - 她是唯一一个不问"你是谁"，而是问"你痛吗"的人
      专属事件:
        - 「碎片的哭泣」：主角碎片冲突发作时，星尘隔着白塔的束缚为他唱一首古老的安抚之歌。那些碎片在她的歌声中暂时平静
        - 「共犯的温柔」：星尘说「我和姐姐也是毁灭世界的共犯。但我们还在这里，还在承受。你也可以。」
        - 「泪水的温度」：路线高潮，星尘为主角流下第一滴不是为自己、而是为他人流下的眼泪。这滴泪水成为主角做出选择的关键

    所有旧日威胁:
      角色定位: 镜像对照与可能性的展示
      关系发展:
        - 每一个旧日威胁都代表着一种「被命运摧毁后的存在方式」：
          - 瑟拉菲娜 = 信仰崩溃后的疯狂
          - 艾露恩 = 忠诚扭曲后的偏执
          - 罗兰 = 执念束缚后的循环
          - 凯因斯 = 荣耀消逝后的尊严
          - 星轨/星尘 = 罪孽沉淀后的承担
          - 阿尔法克斯 = 智慧堕落后的混沌
        - 主角与他们的每一次相遇，都是在看自己的「未来可能性」
      专属事件:
        - 「七面镜子」：路线中，主角会依次与七位旧日威胁产生深度交流（不一定是战斗），每一次交流都让主角更清楚地认识自己不想成为什么样的人

    与主角建立羁绊的人:
      角色定位: 选择的砝码
      关系发展:
        - 米莉雅、希尔维娅、李月见、尘、妮菲塔丽、烬——他们每一个人对主角的情感，都会成为主角做出最终选择时的重量
        - 若主角与他们建立了深厚的羁绊，这些羁绊会「锚定」主角的自我意识，使他更容易保持独立
        - 若主角孤独一人，碎片融合可能更容易，但也更危险

  灵魂碎片觉醒:
    主要觉醒碎片: 所有碎片同时冲突
    觉醒过程:
      第一阶段_碎片的低语:
        触发: 灵魂融合度达到80（过高）或降至0（过低），或经历了某个重大情感冲击
        表现: 主角开始同时听到所有碎片的声音——李德的理性、李破晓的激昂、苏云梦的温柔、灾厄之潮的混沌……它们在他脑海中争吵
        后果: 主角无法正常行动，需要在安全的地方进行「内在之旅」
      第二阶段_内在之旅:
        触发: 主动或被动进入冥想/昏迷状态，意识沉入灵魂深处
        表现: 主角的灵魂世界呈现为一片由无数镜子组成的迷宫，每一面镜子都是一个碎片的记忆和意志
        后果: 主角需要在这些镜子中找到「属于自己的那一面」——或者确认根本没有属于自己的镜子
      第三阶段_七面镜子:
        触发: 在灵魂迷宫中前进，依次面对七位旧日威胁的镜像
        表现:
          - 瑟拉菲娜之镜：质问主角「你的信仰是什么？当一切崩塌后，你还剩下什么？」
          - 艾露恩之镜：质问主角「你的忠诚属于谁？当所爱之物被污染，你会同流还是离开？」
          - 罗兰之镜：质问主角「你的执念是什么？当目标永远无法达成，你会放手还是永远航行？」
          - 凯因斯之镜：质问主角「你的尊严是什么？当荣耀成为过去，你会守护还是毁灭？」
          - 星轨之镜：质问主角「你的责任是什么？当你必须为错误付出代价，你会承担还是逃避？」
          - 星尘之镜：质问主角「你的温柔是什么？当世界对你残忍，你会慈悲还是复仇？」
          - 阿尔法克斯之镜：质问主角「你的智慧是什么？当你知道得越多，你会清醒还是疯狂？」
        后果: 每一次回答都会影响灵魂融合度的最终走向
      第四阶段_最终选择:
        触发: 通过七面镜子后，到达灵魂迷宫的中心
        表现: 中心有一面空白的镜子。主角可以选择——
          - 在镜子上刻下自己的面容（独立）
          - 让所有碎片的面孔融合成一个新的形象（融合）
          - 打碎镜子，释放所有碎片（虚无）
          - 将镜子献给灾厄之潮（臣服）

  关键地点:
    灵魂迷宫:
      描述: 主角意识沉入灵魂深处后呈现的内在世界，由无数镜子组成
      秘密: 迷宫的构造反映了主角的心理状态——若他信任他人，迷宫会有出口；若他孤独，迷宫会无限循环
      与灵魂容器关联: 这是主角真正的「出生地」，是他所有碎片交汇的地方

    白塔之巅:
      描述: 星轨和星尘被囚禁的地方，最接近星空的位置
      秘密: 星辰之力可以暂时稳定灵魂碎片的冲突；星轨的计算可以预测主角的「命运分支」
      与灵魂容器关联: 白塔是灾厄之潮到来前最后的防线，也是主角寻找答案的最后希望

    静滞之海的最深处:
      描述: 灾厄之潮离去的位置，线的另一端
      秘密: 在这里，主角可以"看到"线的另一端——灾厄之潮的"眼睛"
      与灵魂容器关联: 最接近造物主的地方，也是最容易失去自我的地方

    所有旧日威胁的领域:
      描述: 七面镜子分别对应七位旧日威胁的领域，主角需要在这些地方的「精神投影」中面对他们
      秘密: 这些领域不仅是考验，也是礼物——每位旧日威胁都会给予主角一部分自己的「核心」
      与灵魂容器关联: 主角从这些领域获得的「核心」，将决定最终融合后的性格

  关键事件:
    碎片的低语（时间不定，通常在灵魂融合度80或0时触发）:
      描述: 所有碎片同时觉醒，主角陷入精神崩溃边缘
      灵魂碎片: 所有碎片同时冲突
      路线影响: 强制开启灵魂之问路线

    星图中的变数（内在之旅第一阶段）:
      描述: 主角在昏迷中"看到"星轨的计算，发现自己是一个「不在星图中的存在」
      灵魂碎片: 李德碎片提供理性分析，李破晓碎片提供反抗意志
      路线影响: 主角理解自己的特殊性——他不是命运的棋子，而是命运的变量

    七面镜子（内在之旅第二阶段）:
      描述: 依次面对七位旧日威胁的镜像，回答他们的质问
      灵魂碎片: 不同镜子会唤醒不同的碎片
      路线影响: 每一次回答都影响最终选择的倾向

    星尘的歌声（内在之旅第三阶段）:
      描述: 在灵魂迷宫最黑暗的时刻，星尘的歌声传来，为主角照亮前路
      灵魂碎片: 所有碎片在歌声中暂时平静
      路线影响: 这是最后一次改变选择倾向的机会

    空白之镜（内在之旅最终阶段）:
      描述: 路线高潮。到达灵魂迷宫中心，面对空白的镜子，做出最终选择
      灵魂碎片: 所有碎片的命运在此决定
      路线影响: 路线锁定。四条分支

  结局方向:
    好结局_独立的灵魂:
      条件: 在空白之镜上刻下自己的面容，且与至少一位关键角色建立了深厚羁绊
      描述: 主角确认了自己的独立性——他不是李德，不是李破晓，不是灾厄之潮的工具。他是一个全新的灵魂，有着自己的选择和羁绊。所有碎片成为他的「记忆」而非「人格」。他睁开眼睛，对等待他的人说「我回来了」——这个「我」，是只属于他的。

    普通结局_完美的完人:
      条件: 选择融合所有碎片，形成一个新的统一人格
      描述: 主角成为了「完人」——既有李德的智慧，又有李破晓的勇气，既有苏云梦的温柔，又有其他碎片的技能。这是一个完美的人格，但也是一个「没有缺陷」的人格。米莉雅看着他，感到一种无法言喻的完美，但也感到一种无法触及的遥远——因为完美的东西，不属于任何人。

    坏结局_虚无的容器:
      条件: 选择打碎镜子，释放所有碎片
      描述: 主角释放了自己体内所有的灵魂碎片。李德的残片回归方舟，李破晓的残片回归大地，苏云梦的残片回归森林……主角成为了一个真正的「空壳」——没有记忆，没有情感，没有自我。他睁开眼睛，看着关心他的人，问出了和苏醒时一样的问题：「我……是谁？」但这一次，没有人能够回答。

    隐藏结局_新的灾厄:
      条件: 选择将镜子献给灾厄之潮，且在之前路线中深度使用了灾厄能量
      描述: 主角没有独立，没有融合，没有虚无——他「进化」了。他将自己的意识与灾厄之潮的链接融合，成为了连接这个世界与邪神的「桥梁」。他不是代行者（那还有自我意识），而是桥梁本身——一个没有自我但也没有束缚的存在。灾厄之潮通过他感知这个世界，而这个世界也通过他感知灾厄之潮。有人说这是最坏的结局，也有人说这是最好的——因为从此以后，两个世界终于开始「理解」彼此。

    真结局_问者的答案:
      条件: 完成所有五条路线的关键节点后，在灵魂之问中做出任何选择
      描述: 无论主角选择了独立、融合、虚无还是臣服，有一个事实是确定的——他「问过」。在这个所有人都被命运推着走的世界里，只有主角停下来，问出了「我是谁」。这个问题本身，就是他的答案。星轨在计算中第一次微笑，星尘第一次停止了哭泣。因为在这个绝望的世界上，还有一个灵魂愿意思考自己的存在——这本身就是希望。
