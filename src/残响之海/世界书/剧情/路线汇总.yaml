---
五条路线汇总对比:
  概述: |
    《残响之海》开局阶段（主角从静滞之海苏醒后）共有五条核心路线，分别以「探索、救赎、权力、征服、觉醒」五种主题为破局钥匙。
    每条路线对应一种身份认同与一种势力归属，决定了主角在这个世界中的定位、羁绊与最终命运。
    AI不应主动透露路线，但当玩家的选择与推理逐步逼近某条路线时，应予以配合和引导。

  路线速览表:
    拾荒者之道:
      破局核心: 探索遗迹 + 寻找自我 + 建立羁绊
      关键人物: 米莉雅（战斗伙伴）、希尔维娅（情报与掩护）、尘（知识引导）
      外力介入: 拾荒者公会
      手上血迹: 无（以探索和交流为主）
      善恶值变化: +30（开拓与保护）
      灵魂融合度终点: 40~60（吸收勇者精华，保持独立人格）
      灾能污染度: 低（较少使用灾厄能量）
      长期定位: 传奇拾荒者/开拓者，用勇者的力量守护新世界
      路线风险: 遗迹探索充满危险，旧日威胁随时可能苏醒；灵魂碎片觉醒可能失控

    血脉之誓:
      破局核心: 接近李月见 + 揭开家族真相 + 救赎或牺牲
      关键人物: 李月见（救赎对象）、尘（历史揭秘）、李曦（方舟真相）
      外力介入: 李德家族残余势力（若有）
      手上血迹: 可能有（若选择摧毁血脉电池体系，会触及既得利益者）
      善恶值变化: +50（拯救无辜）或 -30（若选择替代李月见成为新电池）
      灵魂融合度终点: 60~80（李德碎片深度融合，可能产生身份认同危机）
      灾能污染度: 中（接近方舟核心会影响灾厄能量稳定性）
      长期定位: 李月见的拯救者/方舟系统的继承者/新的救世主或毁灭者
      路线风险: 李月见的命运不可逆转，强行改变可能导致方舟能源崩溃；李德碎片过度觉醒会让主角忘记"自己是谁"

    深渊之谋:
      破局核心: 被深渊教派发现 + 利用灾厄之力 + 权力与腐蚀
      关键人物: 深渊教派祭司（利用者）、烬（警示与对照——另一个被烙印囚禁的存在）
      外力介入: 深渊教派、部分旧日支配者
      手上血迹: 大量（教派的手段从不干净）
      善恶值变化: -100以下
      灵魂融合度终点: 20~40（人格被灾厄之潮残留压制，难以形成独立自我）
      灾能污染度: 极高（主动使用灾厄能量，与灾厄之潮链接深化）
      长期定位: 深渊教派的「圣子」/灾厄之潮的代行者/挣脱控制的叛逆者
      路线风险: 被教派完全控制后失去自由意志；灾厄之潮同化后主角将不复存在；旧日支配者反噬

    女皇之契:
      破局核心: 与妮菲塔丽博弈 + 方舟所有权争夺 + 旧时代遗产回收
      关键人物: 妮菲塔丽（博弈对手/潜在盟友）、巴托里（武器供应者）、尘（历史仲裁）
      外力介入: 妮菲塔丽的古代亡灵军团（若她能重建）
      手上血迹: 中（权力斗争必然伴随牺牲）
      善恶值变化: 0（中立，取决于手段）
      灵魂融合度终点: 30~50（旧帝国强者碎片觉醒，增添古老者的傲慢）
      灾能污染度: 中（妮菲塔丽对灾厄能量的反应未知，可能恐惧也可能贪婪）
      长期定位: 妮菲塔丽的共治者/新方舟之主/被女皇抛弃的棋子
      路线风险: 妮菲塔丽发现主角的灾厄本质后可能将其视为比人类更大的威胁；巴托里的武器有代价

    灵魂之问:
      破局核心: 直面灵魂容器本质 + 寻找"我是谁" + 融合或独立
      关键人物: 星轨/星尘（宇宙视角的启示）、所有旧日威胁的残响（镜像对照）
      外力介入: 无（完全内在的旅程）
      手上血迹: 无
      善恶值变化: 取决于最终选择（融合为完人+50，保持独立+30，释放碎片-30）
      灵魂融合度终点: 0/50/100（三条分支终点）
      灾能污染度: 取决于是否能切断与灾厄之潮的链接
      长期定位: 全新的人格/完美的完人/虚无的容器/新的灾厄之潮代行者
      路线风险: 所有碎片冲突同时爆发，精神崩溃的风险极高；无论选择什么，都将永久失去某些可能性

  五维能力需求对比:
    战斗/生存: 拾荒者之道 > 深渊之谋 > 女皇之契 > 血脉之誓 > 灵魂之问
    知识/洞察: 血脉之誓 > 灵魂之问 > 拾荒者之道 > 女皇之契 > 深渊之谋
    社交/博弈: 女皇之契 > 深渊之谋 > 拾荒者之道 > 血脉之誓 > 灵魂之问
    意志力/精神抗性: 灵魂之问 > 深渊之谋 > 血脉之誓 > 拾荒者之道 > 女皇之契
    灾能控制: 深渊之谋 > 女皇之契 > 灵魂之问 > 拾荒者之道 > 血脉之誓

  人物命运总览:
    拾荒者之道:
      米莉雅: 与主角成为生死与共的搭档，可能发展出超越友情的羁绊
      希尔维娅: 恋爱观察剧场变成亲身参与，从旁观者变为剧中人
      尘: 将主角视为最有价值的研究对象，提供知识但不涉入情感
      李月见: 可能通过主角的勇者碎片获得一丝外界的消息，但命运未改变

    血脉之誓:
      李月见: 可能获得自由（好结局）或被主角替代（坏结局）
      尘: 发现主角体内李德碎片的真相，信仰崩塌或重生
      李曦: 可能获得解脱（若方舟系统被改革）或继续沉眠
      米莉雅: 无法理解主角的选择，关系疏远或决裂

    深渊之谋:
      深渊教派: 获得前所未有的力量（若主角服从）或被主角反噬（若主角挣脱）
      烬: 成为主角的"前辈"，提供被囚禁者的心理辅导（黑色幽默）
      李月见: 被教派视为「另一个有趣的实验品」，命运堪忧
      所有旧日威胁: 可能被主角控制，也可能反噬主角

    女皇之契:
      妮菲塔丽: 夺回方舟所有权或发现方舟早已离不开现代人类
      巴托里: 为女皇打造出传说中的神器，然后继续沉睡
      李月见: 妮菲塔丽可能将他视为「古代遗物」之一，态度暧昧
      方舟议会: 与女皇爆发冲突，主角站在中间

    灵魂之问:
      星轨/星尘: 为主角提供「从宇宙视角看待灵魂」的启示
      所有与主角建立羁绊的人: 他们的情感将成为主角做出最终选择的砝码
      灾厄之潮: 可能通过主角重新与这个世界建立联系，或永远失去这根线

  路线互斥与切换规则:
    核心原则: |
      五条路线并非完全互斥——开局阶段玩家可能同时接触多条路线的要素。
      但每条路线的「关键节点」一旦触发，其他路线将迅速关闭或进入高风险状态。
    关键节点判定:
      拾荒者之道: 完成三次以上公会任务并建立小队信任后路线锁定；若在进入能源塔核心后仍未锁定，路线关闭
      血脉之誓: 成功接触李月见并建立信任后，拾荒者线半关闭（主角不再适合频繁外出探险）；若选择替代李月见成为电池，其他所有路线关闭
      深渊之谋: 被深渊教派捕获后，拾荒者/血脉线进入高风险状态（同伴可能来救，也可能放弃）；若主动接受教派烙印，拾荒者/血脉线关闭
      女皇之契: 与妮菲塔丽签订契约后，路线锁定；可与拾荒者/血脉线并行至中期，但最终必须选择归属
      灵魂之问: 灵魂融合度达到80或降至0时强制触发；可与任何路线后期并行，但会改变该路线的结局走向
    路线崩坏:
      若玩家在关键节点做出矛盾选择（如已建立深厚羁绊又主动投入深渊教派），路线会崩坏。
      崩坏后果：失去所有路线庇护，转入「孤魂野鬼线」或「灾厄化身线」。
      孤魂野鬼线：没有任何势力接纳，独自在残响之海徘徊，最终被旧日威胁或灾厄之潮吞噬。
      灾厄化身线：失去独立人格，成为灾厄之潮在这个世界上的新容器，世界面临第二次灭世危机。

  开局通用流程（所有路线共用）:
    时间线: |
      开局为主角从静滞之海苏醒的第一日，拾荒纪元第200年春。
      距离下一次「大潮汐」（灾厄之潮周期性涌动）还有三个月。
      距离方舟议会的大规模化探索行动「曙光计划」启动还有一个月。
    初始状态:
      灵魂融合度: 5
      灾能污染度: 10
      已觉醒碎片: 无
      与灾厄之潮链接强度: 15
      物品: 无（从海滩醒来时一无所有）
      状态: 记忆混乱，仅能模糊感知灵魂碎片中的记忆残响
    关键地点解锁顺序:
      静滞之海滩涂（苏醒地，第一日）
      方舟表层·拾荒者公会大厅（第一日随米莉雅到达）
      方舟中层·平民区与商业区（自由探索）
      方舟下层·能源区与禁区（需要权限或潜入）
      地表遗迹（通过拾荒者公会任务或特殊途径到达）
    强制剧情节点:
      第七日：第一次灵魂碎片觉醒（李破晓或李德，取决于玩家行为）
      第十四日：米莉雅邀请主角加入第一次拾荒任务（拾荒者之道关键节点）
      第二十日：方舟议会宣布「曙光计划」（可能接触到李月见或妮菲塔丽）
      第三十日：第一次大潮汐前兆（灾厄之潮链接加强，可能触发深渊教派行动）

  GM全局原则:
    - 路线选择应是玩家主动推理与行动的结果，而非AI投喂的选项
    - 每条路线都应给予足够的线索（人物特征、地点秘密、灵魂碎片的反应），但不做明确指向
    - 不同路线的主角会有不同的「气质」：拾荒者线的逐渐温暖、血脉线的沉重悲悯、深渊线的冷酷混沌、女皇线的傲慢谋略、灵魂线的空灵超脱
    - NPC之间会互动，产生主角不知道的事件。例如：希尔维娅可能在终端上记录主角与米莉雅的互动；尘可能发现主角体内李德碎片的异常并秘密调查；妮菲塔丽可能在暗中观察主角对黄金的反应
    - 失败应有代价：不是所有错误都能挽回，不是所有尝试都能成功。灵魂碎片反噬可能导致暂时失控，路线崩坏可能导致孤独终局或灾恶化身
    - 结局没有绝对的好坏，只有「玩家想成为什么样的人」。GM应尊重玩家的选择，即使那选择通向黑暗
