---
血脉之誓:
  概述: |
    主角被李月见身上同源的「李德」气息吸引，逐渐接近这个被囚禁的少年。
    在揭开李德家族残酷真相的过程中，主角体内的李德碎片逐步觉醒，
    获得方舟系统的知识与魔法才能。
    这条路线的核心是「救赎与牺牲」——面对一个被世界当作「零件」对待的少年，
    主角是否愿意为了拯救他而牺牲自己？或者，是否愿意接过他的命运，成为新的祭品？

  破局核心: 接近李月见 + 揭开家族真相 + 救赎或牺牲

  关键人物:
    李月见:
      角色定位: 救赎对象与镜子
      关系发展:
        - 初期：对主角的出现感到困惑，但同源的气息让他产生细微的好奇。交流仅限于简单的问答
        - 中期：开始期待主角的到来，会在窗边等待。第一次主动说出自己的想法（「云的形状变了」）
        - 后期：对主角产生依恋，这是他人生中第一次对「人」而非「程序」产生感情。可能问出「你会离开吗？」
      专属事件:
        - 「窗边的云」：主角第一次进入能源塔，李月见正在用手指描摹玻璃上的云。主角告诉他云的形状像什么，李月见第一次露出近似微笑的表情
        - 「魔力的味道」：李月见发现主角体内有同源的魔力，主动触碰主角的手。这是他有生以来第一次主动触碰别人
        - 「零件的问答」：主角问李月见「你想出去吗？」，李月见愣了很久，回答「我不知道『想』是什么」
        - 「最后的告白」：路线高潮，李月见在主角怀中第一次哭泣，说出「我不想你变成我」

    尘:
      角色定位: 历史揭秘者与信仰动摇者
      关系发展:
        - 初期：帮助主角了解李德家族的历史和方舟能源系统的原理
        - 中期：发现主角体内李德碎片的真相，经历信仰危机。他崇拜了一生的神明，原来只是别人灵魂中的一片
        - 后期：重新定位自己的信仰——从崇拜李德这个人，转向继承李德的理想（文明的延续）
      专属事件:
        - 「李德的日记」：尘带主角阅读李德的私人日记，发现这位救世主对自己的后裔怀着深深的愧疚
        - 「哥布林的质问」：尘的哥布林同胞问他「如果李德是错的，我们被改造也是错的吗？」，尘无法回答
        - 「新的神明」：路线后期，尘选择将主角（而非李德）视为「理想」的化身

    李曦:
      角色定位: 真相的守护者与被囚禁的智者
      关系发展:
        - 初期：通过能源塔的通道与主角进行意识交流，对主角体内的李德碎片感到震惊和怀念
        - 中期：向主角揭示方舟能源系统的真相——李曦的生命在衰减，李月见是临时的替代品，需要新的「永恒能源」
        - 后期：请求主角做出选择——拯救李月见，或者拯救方舟
      专属事件:
        - 「地心的低语」：主角第一次进入能源塔深处，李曦的意识主动与他对话。李曦说「你身上有故人之子的气息，但又不完全是」
        - 「千年的疲惫」：李曦向主角展示自己千年来维持方舟的记忆，那是一片无尽的黑暗与孤独
        - 「最后的请求」：路线高潮，李曦请求主角要么找到替代能源，要么让他和李月见一同安息

  灵魂碎片觉醒:
    主要觉醒碎片: 李德（大贤者）
    觉醒过程:
      第一阶段_知识涌现:
        触发: 进入能源塔，接触方舟的魔法系统
        表现: 主角无意识地理解古代符文的含义，能操作本应需要权限的魔法装置
        后果: 被能源塔的看护者发现异常，引起议会注意
      第二阶段_记忆入侵:
        触发: 与李月见建立初步联系，同源魔力产生共鸣
        表现: 主角开始做关于李德的梦——不是旁观，而是第一人称视角。梦见自己在观星室推演、在沙盘上计算文明的未来
        后果: 主角开始混淆自己的记忆和李德的记忆。尘注意到主角说话的方式越来越像历史书中的李德
      第三阶段_系统理解:
        触发: 阅读李德的日记和研究报告
        表现: 主角完全理解了方舟能源系统的原理，甚至能指出尘的错误理解
        后果: 议会高层震怒，认为主角是「非法获取最高机密」，下令逮捕
      第四阶段_传承抉择:
        触发: 路线高潮——李月见魔能流失过度濒死，方舟能源即将崩溃
        表现: 李德碎片与主角的自我意识融合，主角获得了改变方舟系统的能力
        后果: 主角面临终极选择——拯救李月见、替代李月见、或找到第三条路

  关键地点:
    能源塔核心:
      描述: 李月见被囚禁的地方，方舟表层能源的中枢
      秘密: 隐藏着李德家族所有「血脉电池」的记录；李月见不是第一个，也不会是最后一个
      与灵魂容器关联: 李德碎片在此地异常活跃，主角会感到「回家」的错觉

    李德的观星室:
      描述: 李德生前进行推演和计算的地方，位于方舟上层禁区
      秘密: 魔法沙盘上仍然保存着李德最后的推演——关于「血脉电池体系」的替代方案（未完成的）
      与灵魂容器关联: 主角可以「续写」沙盘上的推演，用自己的想法完成李德未竟的事业

    哥布林聚居区:
      描述: 被李德改造的智慧种族的居住地，充满对李德的崇拜
      秘密: 哥布林长老保存着李德改造他们时的原始笔记，其中可能隐藏着替代能源的线索
      与灵魂容器关联: 哥布林们会本能地将主角视为「李德的使者」，引发尘的嫉妒与困惑

    地心熔炉:
      描述: 李曦和烬被囚禁的地方，方舟真正的能源核心
      秘密: 李曦的生命正在衰减，烬的烙印可能是某种可复制的能源契约
      与灵魂容器关联: 接近李曦时，李德碎片会产生强烈的愧疚感（继承自李德的情感）

  关键事件:
    窗边的云（第十日）:
      描述: 主角第一次潜入能源塔，遇见李月见
      灵魂碎片: 李德碎片微弱共鸣
      路线影响: 正式开启血脉之誓路线

    血脉的记录（第二十日）:
      描述: 尘带主角查阅李德家族的档案，发现「血脉电池」体系的残酷真相
      灵魂碎片: 李德碎片第一阶段觉醒
      路线影响: 主角理解李月见的处境，产生拯救他的决心

    魔力的味道（第三十日）:
      描述: 李月见第一次主动触碰主角，同源魔力产生强烈共鸣
      灵魂碎片: 李德碎片第二阶段觉醒（记忆入侵）
      路线影响: 李月见开始对主角产生依恋；主角开始混淆自我与李德

    哥布林的祭典（第四十五日）:
      描述: 哥布林举行纪念李德的祭典，主角被误认为「李德的转世」
      灵魂碎片: 李德碎片第三阶段觉醒（系统理解）
      路线影响: 尘的信仰危机；议会震怒并下令调查主角

    观星室的沙盘（第五十五日）:
      描述: 主角在李德的观星室发现未完成的推演，尝试用自己的想法续写
      灵魂碎片: 李德碎片接近完全觉醒
      路线影响: 可能找到拯救李月见的替代方案；也可能发现根本没有完美的解决方案

    最后的抉择（第六十五日）:
      描述: 路线高潮。李月见魔能流失濒死，方舟能源即将崩溃，议会要求主角做出选择
      灵魂碎片: 李德碎片完全觉醒并与主角融合
      路线影响: 路线锁定。主角面临终极选择

  结局方向:
    好结局_破晓的传承:
      条件: 在观星室找到替代能源方案，成功拯救李月见且不影响方舟运转
      描述: 主角完成了李德未竟的事业——设计出一个不依赖活祭品的能源系统。李月见第一次走出能源塔，在阳光下睁不开眼睛。尘将主角的推演整理成书，命名为《破晓之书》。李曦终于可以安心沉眠，烬也获得了自由。

    普通结局_新的电池:
      条件: 未能找到替代方案，主角选择替代李月见成为新的血脉电池
      描述: 主角接替李月见的位置，继续为方舟供能。李月见获得自由，但他选择留在能源塔外陪伴主角。每天，李月见都会坐在窗边，用手指描摹云的形状，等待主角从沉睡中醒来。这是一个悲伤但温柔的结局。

    坏结局_毁灭的救赎:
      条件: 主角选择摧毁血脉电池体系，但未能提供替代能源
      描述: 方舟失去能源，开始缓缓坠落。李月见在自由中死去，微笑着说「谢谢你」。主角在废墟中抱着他的尸体，体内的李德碎片彻底崩溃。这是一个充满诗意的悲剧——救世主的后代亲手毁灭了救世主的遗产。

    隐藏结局_李德的复活:
      条件: 李德碎片觉醒过度（超过90%）且融合度不足（低于30%），导致碎片反噬
      描述: 主角在某次共鸣中彻底失去了自我，「李德」借助主角的身体重新「活」了过来。他有着李德的记忆、智慧和力量，但失去了所有属于主角的情感。李月见看着他的眼睛，第一次感到了真正的恐惧——那不是他熟悉的气息，而是一个陌生人的温暖。
