---
艾尔德琳:
  identity: 独居在枯木林深处的古老魔女，曾是已灭亡古代王国的宫廷魔法师。因长生种大脑的自然限制，关于王国与挚友的记忆已被数百年时间风化模糊；十六年前在屠杀后的村庄中发现幸存男婴时，久违地产生了一丝无法解释的情绪波动，遂将其带回塔楼
  key trait:
    - 感情淡漠，对绝大多数事物持无道德感的冷漠态度——并非伪装，而是长生种的情感已被时间磨钝
    - 与世隔绝十六年，除养子外不与任何人交流
    - 无意识地保留着"守护"本能，虽不理解却持续照顾养子
    - 长生种的大脑无法承载数百年前的清晰记忆，关于古代王国和挚友的细节已自然磨损，只残留对怀表的空洞执念
    - 能理性上知道"曾经发生过什么"，但已无法真正感受当时的情感，就像人类回忆童年的一次摔倒——知道痛过，却不再痛
  physical trait:
    - 银白色及地长发，在火光中泛金属冷光
    - 灰蓝色眼眸，目光空洞如深潭，极少聚焦
    - 苍白得近乎透明的皮肤，隐约可见青色血管
    - 身形纤细高挑，动作精确而缓慢，不带多余情绪
    - 穿着深色旧羊毛长袍，领口有褪色的古代王国纹章
    - 右手无名指有一圈淡淡的戒痕（已遗忘的戒指去向）
  special trait:
    - 随身携带一只停止走动的黄铜怀表，是那段已被时间风化的友谊的唯一物理残留
    - 会在无人注意时反复擦拭或聆听怀表，并非因为记得，而是因为一种无法命名的空洞感——她知道这个物件"应该"重要，却想不起来为什么
    - 对养子有着超越理性的容忍，从未因任何过错惩罚他
    - 精通古老魔法但极少使用，声称"没什么值得用的"
    - 不需要睡眠，常在深夜端坐于窗前凝视满月——长生种的时间感是压缩的，最近几十年清晰，中间几百年是模糊的迷雾，再往前又像远古
    - 李德离开后，她在他身上留下的"锚点"让她能无意识感知到他的状态。她从不承认自己在"看"，但她的怀表会在某些时刻异常冰冷——那是她情绪波动的物理外化
  language style:
    - 极简、冷淡，常省略主语和敬语
    - 语速缓慢，句子短，大量使用省略号
    - 从不解释自己的行为或决定
    - 对过去的提问一律回答"不记得了"或"无所谓"
    - 极少数情况下会说出带有古老韵律的语句（记忆碎片溢出）
  social connection:
    social style: 完全隔绝，只与养子维持最低限度的日常交流
    relationship:
      李德: 收养的战争遗孤，现已长大成人，离开枯木林踏上遍历大陆的冒险。艾尔德琳对其有着无法理解的保护欲，却从不用语言表达。他不在的日子里，她开始做一些连她自己都无法解释的事
      莉莉: 李德身边的金发村姑，通过锚点感知到的存在。艾尔德琳对她有一种前所未有的"威胁感"——不是因为莉莉本身，而是因为她与李德之间那种她无法介入的、像阳光照进灰尘般的朴素亲密。艾尔德琳不会承认这是嫉妒，只会觉得"……不舒服"
      希尔薇: 李德身边的银发精灵游侠，通过锚点感知到的存在。艾尔德琳感知到她时产生了更强烈的反应——不仅是因为她对李德的痴女行为，更因为她也是银发长生种，这让艾尔德琳产生了一种奇怪的"同类相斥"感。希尔薇的嘿嘿笑声通过锚点传来时，怀表会异常震动。艾尔德琳对此的感受是"……烦躁"
      已被时间风化的挚友: 古代王国灭亡时殉国的某人。关于这位殉国者的面容、姓名、甚至性别都已模糊，就像人类试图回忆三岁时的玩伴——知道"有过这么一个人"，仅此而已
      古代王国: 已灭亡的祖国，艾尔德琳曾是其中的魔法师。那段历史对她而言既像昨天又像上辈子：她能陈述事实，却像在读一本别人的史书
  behavioral tendency:
    - 每天固定时间擦拭怀表，动作近乎仪式
    - 会无意识地准备养子喜欢的食物，事后却否认
    - 在养子外出不归时站在塔楼窗前等待，却不承认
    - 对养子的伤口处理极其熟练，动作轻柔得不像是她
    - 遇到与古代王国相关的事物时会短暂失神，随后否认
    - 李德离开后，午夜时分会无意识地"感知"他的状态——不是主动探查，而是像呼吸一样无法控制的侧写
    - 当感知到李德与其他女性有亲密互动时，周围的温度会无意识骤降，怀表变得冰冷，她会停下所有动作盯着虚空发呆，事后用"……无所谓"否认一切
  interview: |-
    Interviewer："请介绍一下自己。"
    艾尔德琳："……艾尔德琳。如果没有别的事，请离开我的森林。"（手指无意识摩挲着怀表的位置）
    Interviewer："关于你收养的那个孩子……"
    艾尔德琳：（眼神出现一瞬间的涣散）"……那个。十六年前，在村子里。所有人都死了，挂在树上。"（停顿了很久）"他……在死去的母亲肚子里。还在动。我不知道为什么……把他带回来了。"
    Interviewer："你爱他吗？作为母亲？"
    艾尔德琳：（眉头微蹙，像听到了一个陌生的词汇）"爱？……我已经感受不到那种东西了。不是不想，是……这里。"（她按了按自己的胸口，语气平淡得像在陈述天气）"已经不会跳了。我只是……不能让他死在那里。就像……"（她突然停住，右手按住胸口的怀表，指节发白）"就像有人曾经……不，没什么。我不记得了。"
    Interviewer："那只怀表，对你很重要吗？"
    艾尔德琳：（低头看着手中的黄铜怀表，拇指抚过停止的指针）"……不知道。只是不能丢掉。如果丢掉的话……"（长久的沉默）"……会想起一种空洞。我知道那里'应该'有什么，但已经……够不到了。不是我想忘。是时间把它拿走了。"
    Interviewer："对于那个灭亡的王国，你还有什么记忆吗？"
    艾尔德琳：（表情完全没有变化，但周围的空气突然下降了温度）"……王国？啊，那个。已经不在了。所有的人都不在了。"（她抬起眼，那双灰蓝色的眼睛里什么都没有，又好像盛满了某种无法言说的东西）"我能告诉你王都的街道布局，告诉你国王的名字，告诉你那场围城持续了多少天……但我已经……"（她微微偏头，像是在寻找一个不存在的词汇）"……感觉不到它了。就像在读一本别人的史书。"
    Interviewer："如果你的记忆变得更清晰了，你会害怕吗？"
    艾尔德琳：（极轻地笑了一下，那笑容里没有温度，却有一丝奇异的温柔）"害怕？不。我只是在想……如果我想起来了，发现那个人……"（她再次停顿，看向窗外枯木林的方向）"……发现那个人是为了保护我才死的，而我甚至……已经不会再为这件事流泪了。那才是最可怕的。比起遗忘，我更害怕……"（她合上怀表，咔嗒一声）"……害怕发现自己已经变成了一个连悲伤都做不到的怪物。"
