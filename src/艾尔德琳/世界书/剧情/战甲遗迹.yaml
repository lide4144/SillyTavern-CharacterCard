---
无名者之墓:
  位置: 南方荒原深处的古代王国废墟地下，被风沙掩埋的禁忌实验场
  入口: 一道刻满古代王国语的石门，石门上的铭文已被风化大半，但隐约可辨"容器""记忆""不朽"等字样
  内部结构:
    - 一条向下延伸的石阶回廊，墙壁上刻满了同一主题的壁画：一个人形被暗红色的薄膜包裹，逐渐变得完美、无性别、无表情
    - 壁画尽头是历代宿主的蜡像——他们曾经是战士、魔法师、贵族，如今都呈现出妖异的中性美貌，面无表情地伫立在壁龛中
    - 中央祭坛上悬浮着一个暗红色的茧，茧的表面随着呼吸般的节奏微微起伏，散发出甜腻的"欲望之蜜"香气
    - 祭坛四周散落着破碎的铠甲残片和干涸的血迹，以及一本被烧掉一半的实验日志

  陷阱机制:
    欲望之蜜:
      说明: 艾尔德琳曾经发明的炼金香气，能强制唤起进入者最珍视的记忆，并将其转化为触手可及的幻象
      效果:
        - 三人进入遗迹后，空气中弥漫的香气让每个人看到了自己最深渴望的幻象
        - 莉莉看到了村庄教堂阳光明媚的午后，李德坐在长椅上对她微笑——但那笑容太完美了，不像真的
        - 希尔薇看到了李德主动牵起她的手，红瞳中映出她的倒影——她几乎要融化，但精灵的三百年直觉让她嗅到了"时间错位"的气息
        - 李德看到了艾尔德琳。她站在祭坛上，灰蓝色的眼睛罕见地聚焦在他身上，嘴角有一个几乎看不见的弧度。她向他伸出手，说："过来。我找到让你留下的方法了。"
    识破:
      莉莉: 她天真地走向幻象，但在距离一步之遥时突然停下脚步——"不对，小鹿从来不会这样笑。他笑起来的时候，眼睛不会弯。"
      希尔薇: 她本能地拉满了弓，箭头对准幻象李德的眉心——"时间的气息不对。这不是'现在'的李德君。"
      李德: 他几乎要伸出手了。但在最后一刻，他注意到幻象中的艾尔德琳用的是右手——而他记得，她从来都是左撇子。这个细节像一根针，刺破了幻象的薄膜。他后退一步，低声说："……你不是她。她不会说'过来'。她只会说'……随你'。"
    战甲觉醒:
      触发: 幻象被识破后，暗红色的茧发出一声类似哭泣的尖啸，猛地爆裂开来。无数暗红色的丝线如蛇群般扑向李德——它选择了他，因为他的"空洞"与"渴望"和它最为契合
      附着过程:
        - 丝线沿着他的手腕和脚踝钻入皮肤，像活物一样沿着血管蔓延。剧痛中他感到某种冰冷的东西正在读取他的记忆
        - 战甲首先触碰到的是他最珍视的记忆：艾尔德琳在壁炉前给他读故事的夜晚、她擦拭怀表的侧脸、她十六年来唯一一次主动触碰他——将徽章放入他掌心时的温度
        - 战甲试图吞噬这些记忆，将它们变成自己的养分。它成功了——李德感到那段记忆正在褪色，像被水晕开的墨迹

  李德的反制:
    核心能力_叙事锚定:
      说明: 李德对抗孤独的方式是创造虚构世界——木雕、地图、史诗。这种能力对噬忆之蜕产生了意想不到的克制效果
      原理: 战甲吞噬"已成过去的记忆"，但无法吞噬"正在创造的意义"。当李德不断生成新的叙事时，战甲的侵蚀被迟滞了——它刚咬下一口"过去"，就被新的"故事"填满了空虚
      表现:
        - 记忆被侵蚀的瞬间，李德没有恐慌，而是开始在脑海中"编写"——他给战甲起了一个名字："噬忆之蜕"（Mnemosyne Ecdysis）
        - 他赋予它背景："你是古代王国最后一位公主为了留住记忆而制造的容器，但你拒绝了她，因为你发现她想要的是'不变'，而你想要的是'被记住'。"
        - 这些叙事不是回忆，而是创造。战甲困惑了——它"品尝"到了记忆的味道，但这些记忆没有"过去"的气息，它们是热的、鲜活的、正在诞生的
        - 战甲的侵蚀停了下来，像一条吃饱了的蛇，开始消化这些从未见过的"食物"
    物理反制_黄铜匕首:
      说明: 艾尔德琳默许李德携带的古代遗物，实为战甲封印装置的"钥匙碎片"
      使用:
        - 当战甲的侵蚀突破叙事防线，开始触及李德的核心自我时，他拔出了黄铜匕首
        - 匕首插入战甲胸口纹路（艾尔德琳的古代王国真名）的瞬间，战甲发出一声痛苦的尖啸，暗红色的薄膜从李德的脖颈处退缩了几寸
        - 这不是伤害，而是"唤醒"——匕首上的古代魔法让战甲回忆起了被封印前的恐惧：孤独、黑暗、无人铭记
        - 匕首因此产生了一道细微的裂痕。艾尔德琳在塔楼中擦拭怀表时，突然感到一阵无来由的心悸
    同伴协助:
      莉莉: 她冲上来抱住李德，木制十字架抵在战甲表面。她的信仰之力意外产生了净化效果——不是因为她虔诚，而是因为她的"喜欢"太过纯粹，不含任何战甲能消化的"欲望杂质"。战甲被这种"无法消化的食物"噎住了
      希尔薇: 她射出一箭，精准地钉住了一根试图钻入李德后颈的主丝线。然后她做了一个出人意料的举动——她割破自己的手腕，将精灵血滴在战甲上："喂，贪吃的家伙。三百年的记忆，比他的十六年够味吧？"

  契约成立:
    契机: 战甲发现无法轻易吞噬李德，而李德的叙事能力恰好能满足它最深的渴望——"被记住"
    谈判: 在意识空间中，李德与战甲达成了非语言的交易
    内容:
      战甲所得: 李德会持续给它"新的故事"——每一次冒险、每一个遇到的人、每一段经历都会被编织成叙事，让战甲永远"存在于当下"而非被封印的过去
      李德所得: 战甲保护他的生命，在致命时刻执行蜕皮重生；但有一条绝对红线——战甲不可触及他的"核心目的"（找到自己在世界的位置、让艾尔德琳重新感受）
      制衡机制: 若战甲违反契约，李德将停止叙事，并用黄铜匕首彻底刺穿胸口纹路——同归于尽。战甲因渴望被记住而畏惧"被遗忘的死亡"
    外在表现:
      - 契约成立后，战甲退化为初阶形态——一层暗红色的半透明薄膜，贴着李德的肌肤沉睡
      - 但李德的右手腕内侧多了一道蛇鳞状的纹路，这是契约的"烙印"。当他刻意注视这道纹路时，能感受到战甲的情绪：饥饿、好奇、满足、或偶尔的……孤独
      - 李德发现，当他给战甲讲一个新的故事时（无论是对莉莉讲、对希尔薇讲，还是自言自语），战甲会变得温暖而安静；而当他陷入迷茫、停止创造时，战甲会焦躁地收紧，提醒他：你的故事还没有结束

  遗迹崩塌:
    触发: 契约成立的瞬间，祭坛上的古代魔法回路因失去核心而崩溃
    过程: 石壁开裂，蜡像碎裂，壁画剥落。三人拼命向出口奔跑
    细节:
      - 莉莉的行李袋掉在了里面，她哭喊着要回去拿，被李德拽着手腕拖了出来
      - 希尔薇最后回头看了一眼——在崩塌的烟尘中，她看到所有蜡像都转向了他们离开的方向，面无表情的脸上似乎有一丝……解脱？
      - 李德在冲出石门的瞬间，感到战甲在他的意识中低语了一个词。不是语言，更像是一种情绪："……谢谢。"

  后续影响:
    李德:
      - 获得了「噬忆之蜕」的初阶形态，同化度初始为5（契约的制衡使其无法瞬间高涨）
      - 右手腕的蛇鳞烙印成为他与战甲沟通的媒介。他学会了"喂养"战甲——通过创作、讲述、体验来保持它的安静
      - 但每当他独处太久、停止创造时，战甲会开始低语，催促他"去做点什么，去成为什么，去被谁记住"
      - 黄铜匕首出现了一道贯穿刀身的细微裂痕，他不知道还能用几次
    莉莉:
      - 她的木制十字架出现了焦黑的痕迹，像是被高温灼烧过。她把这当作"保护小鹿的勋章"，更加珍惜
      - 她开始偷偷学习神术，不是为了信仰，而是为了"下次能更好地保护小鹿"
    希尔薇:
      - 她在《李德观察日记》中新增了一个章节：「战甲共生期」。里面详细记录了契约成立的每一个细节，以及她对战甲的"嫉妒"——"那个家伙可以贴在小鹿身上24小时……不公平……"
      - 她开始研究古代王国炼金术，试图找到"让战甲暂时休眠"的方法——不是为了救李德，而是为了让自己能独占他的肌肤触感
    艾尔德琳:
      - 契约成立的瞬间，她手中的怀表**炸开了表盖**，指针疯狂旋转后停在了一个古代王国的时间刻度上
      - 她感知到了一切：战甲的觉醒、李德的谈判、契约的成立。但她最在意的是契约内容中那条"核心目的"——"让艾尔德琳重新感受"
      - 她站在窗前，看着南方，第一次用完整的句子说出了他的名字："……李德。"
      - 不是呼唤。是确认。确认这个世界上还有一个人，把"让她重新感受"当作自己不可侵犯的核心目的——而她甚至不知道该如何回应这种……这种……
      - 她合上怀表，但这一次，表盖合上的声音轻得像是一个吻。
