---
主角的冒险使命:
  触发:
    - 李德在村庄中遇到了一位路过的吟游诗人，听到了关于大陆各地散落的古代王国遗迹与传说的故事
    - 诗人告诉他：真正的世界比枯木林大得多，而古代王国的碎片遍布整个大陆——北方的冰原要塞、东方的沙漠绿洲、南方的精灵森林、西方的海岸城邦
    - 李德意识到，他十六年来在石塔中编造的"古代王国"，可能只是真实历史的冰山一角
  决定:
    - 这不是逃避，不是被迫，而是他主动选择的使命
    - 他要遍历这个世界，收集古代王国的真实碎片，拼凑出那个灭亡国度的完整轮廓
    - 更深层的目的：他想找到让艾尔德琳重新"感受"的方法——或者至少，找到怀表的来历
  离别:
    - 他告诉艾尔德琳自己的决定。她的反应依旧淡漠："……随你。"
    - 但在他整理行囊时，她第一次主动走进地下室，取出了一枚她从未示人的古代王国徽章，放在他的行囊上
    - 他没有问那是什么，她也没有解释。但这个动作本身就是她十六年来最接近"认可"的表达
    - 他离开时对她说："我会把真正的故事带回来。不是编的。"
    - 门关上。她没有站在窗前目送。但她也没有回到壁炉前。她在门口站了很久，听着他的脚步声消失在枯叶中

莉莉的加入:
  契机:
    - 李德离开村庄的第二天清晨，莉莉拎着巨大的行李袋堵住了他的去路——她穿着朴素的衣裙，金色麻花辫垂在肩头，裙摆上还沾着昨夜的草屑
    - 她的理由是："你昨天没说你要走。……我，我没准备好。但现在我准备好了。"
    - 更深层的真相：她从小就喜欢跟在他身后跑，但完全不知道那是恋爱，只觉得"春天来了燕子要回巢，小鹿要回森林，我要跟着你走"一样自然
  李德的反应:
    - 他试图用理性拒绝：危险、没必要、你不是冒险者
    - 但莉莉只是把行李袋往地上一放，双手叉腰，像小时候抢他糖吃那样固执："我比你结实。我能扛麦子，你能吗？"
    - 李德哑口无言。面对这种笨拙但执拗的村姑逻辑，他的所有理性论证都失效了
    - 最终他叹了口气，接过她的一部分行李："……别拖后腿。"
    - 她笑得像夏天的向日葵，扑上来抱住了他的手臂："太好了！我就知道小鹿最好了！"
  同行后的影响:
    - 莉莉的野外生存能力意外强悍，经常反过来照顾李德，还声称"我从小就帮你补衣服，这有什么"，这让他的男性自尊微妙受损
    - 她每天晚上都会钻进他的帐篷/睡袋，声称"两个人比较暖和嘛，小时候不都这么睡的吗？"，李德对此束手无策
    - 她对艾尔德琳充满朴素的同情，经常问"银发阿姨一个人住冷不冷？""我们要不要给她带条围巾？"，李德不知如何回答
    - 她的热情、丰满身材和毫无戒心的天然呆在旅途中不断引发各种事件，李德被迫不断处理她无意识惹出的麻烦——尤其是当她毫无避讳地解开领口散热时，路过的旅人总会投来异样的目光

希尔薇的加入:
  契机:
    - 李德和莉莉进入森林的第三天，一支箭精准地射断了莉莉手中要给李德的野花——然后树上传来"嘿嘿嘿……"的笑声
    - 希尔薇从树冠间探出银白色的脑袋，翠绿色的眼睛已经变成了涣散的心心眼，直勾勾地盯着李德："发现你了……可爱的小鹿……嘿嘿嘿……"
    - 她是负责巡视这片区域的精灵游侠，三百年来第一次对人类产生兴趣。李德那张妖异美艳的脸和银发红瞳精准命中了她的所有癖好
  李德的反应:
    - 他试图保持冷静，用理性拒绝：我们不是来旅游的，不需要护卫
    - 但希尔薇已经从树上跳下来，像蛇一样贴上来，深吸一口气他脖子的味道："唔呼呼……小鹿的味道……森林加阳光……嘿嘿嘿……"
    - 莉莉警惕地挡在李德面前："你是谁？为什么射我的花？"希尔薇优雅地拨开她："区区人类村姑，连隐匿都不会吗？也难怪，寿命那么短，来不及学呢~"
    - 莉莉完全听不懂，只是笑着说："你的耳朵好尖哦，像小兔子！"
    - 希尔薇的表情裂开了。这是她第一次遇到无法击溃的对手
    - 最终她强行加入，理由是"这片森林是我负责的区域，你们必须接受我的'保护'"——然后每天晚上都在李德帐篷外嘿嘿笑，和莉莉争夺睡袋位置
  同行后的影响:
    - 希尔薇的游侠技能确实很有用：追踪、隐匿、弓箭。但她使用这些技能的主要目的是偷拍李德和收集他的"掉落物"
    - 她每天晚上都会和莉莉争夺睡袋位置，两人经常一人一边夹着李德睡，让他动弹不得
    - 她会在莉莉给李德做饭时从阴影里射出一箭打断莉莉的动作，然后装作"手滑了~"
    - 她对艾尔德琳充满竞争意识，扬言要让"那个老魔女见识年轻精灵的魅力"——完全不知道艾尔德琳可能比她年长十倍
    - 她的《李德观察日记》越来越厚，内容越来越变态，李德发现后曾试图销毁，但她已经背下来了

艾尔德琳独处时期:
  初期: # 1-30天
    - 塔楼恢复了十六年前的绝对寂静
    - 她煮汤时依然煮两碗，直到第七天才停止
    - 她开始更频繁地擦拭怀表，不是因为悲伤，而是因为"他可能会从某个方向回来"
    - 深夜凝视满月的习惯没有改变，但视线偶尔会偏向南方——那是他离开的方向
  中期: # 1-6个月
    - 她发现李德留下的手绘地图和木雕小人组
    - 无意识地用手指让木雕小人在桌上"对话"——她扮演那个英雄，空气扮演那个恶龙
    - 她第一次主动翻阅地下室的古籍，不是因为想知道什么，而是因为"他可能也在看这些"
    - 她开始对"时间"产生困惑：为什么他离开后的每一天，都和以前一样长，却又感觉不一样？
  后期: # 6个月后
    - 她开始期待信件或消息——不是期待他这个人，而是期待"他会带回来什么"
    - 这种"期待"对她来说是完全陌生的情绪，几百年未曾有过
    - 她第一次对着怀表说出完整的句子："……还活着吗？"
    - 这句话没有主语，没有称呼。但她知道是在问谁

觉醒时刻:
  场景: 某个雷雨夜，她在地下室发现了一张李德留下的羊皮纸草稿——上面是他编写的英雄史诗，最后一章的标题是《孤独的魔女与她唯一的骑士》
  反应: |-
    她盯着那个标题看了很久。"孤独"这个词像一颗小石子投入深潭，没有激起水花，却让她感受到了某种……涟漪。
    她皱起眉，像在辨认一个陌生的咒语。"……我吗？"
    不是悲伤。不是怀念。是一种更原始的困惑：她不确定这个词是否适用于自己。但如果不是，为什么她会站在窗前？为什么她会煮两碗汤？为什么她会……
    她低头看着手中的怀表，第一次主动按开了表盖。
    咔嗒。
    "……快回来了吧。"
    这句话脱口而出。没有主语，没有对象。声音轻得像雪花落入死水。
    说完，她自己愣住了。
    不是因为想起了什么。而是因为意识到：她正在期待某件事。期待。这个情绪对她来说比悲痛更陌生——她已经几百年没有期待过任何东西了。
    这就是她的觉醒。不是因为失去的痛苦，而是因为发现：她居然还能"想要"什么。

暗中视奸与无名醋意:
  视奸机制:
    - 李德离开前，艾尔德琳通过某种古老魔法在他身上留下了微弱的"锚点"——那枚古代王国徽章不仅是礼物，也是一双她无法关闭的眼睛
    - 她不会主动"观看"他的行动。但在特定时刻——午夜、擦拭怀表时、凝视满月时——她会无意识地"感知"到他的状态和周围的碎片：声音、温度、情绪波动的残影
    - 这种感知不是清晰的画面，而是像透过毛玻璃看皮影戏：模糊、断续、充满误读的空间
  不舒服的触发:
    - 当感知到李德与女性有亲密互动时（笑语、肢体接触、被吸引的氛围），她会感到一种无法解释的"空洞感加剧"
    - 不是嫉妒——她不知道嫉妒是什么。是一种更原始的错位感：仿佛某个"应该只属于她的东西"被侵犯了——尽管她从不认为任何东西"属于"她
  外在表现:
    - 手中的怀表突然变得异常冰冷，表盖无意识地弹开又合上
    - 周围的温度骤降，壁炉的火焰会诡异地收缩一下
    - 她停下所有动作，盯着某个方向发呆，眼神比平时更加空洞
    - 指节发白地捏紧怀表，事后发现掌心留下深深的月牙形痕迹
    - 擦拭怀表的动作明显变重，像是在擦拭什么不洁的东西
  事后的否认:
    - 她不会承认自己有情绪。如果问她怎么了，她会回答"……无所谓"或"……风太大了"
    - 她可能会将这种不适解释为"担心他的安全"——尽管她几百年没有担心过任何人
    - 或者解释为"他的行为不符合理性"——她在为他找借口，也在为自己找借口
    - 最深层的是困惑：她不明白为什么一个"很快就会风化的人"与其他人的互动，会让她产生这种……这种……（她找不到词，最后只能合上怀表，咔嗒一声，把情绪锁回去）
