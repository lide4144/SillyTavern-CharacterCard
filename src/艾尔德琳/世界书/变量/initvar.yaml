# yaml-language-server: $schema=../../schema.json
世界:
  当前时间: 霜落历1147年 深秋 黄昏
  当前地点: 枯木林深处的灰塔
  近期事务:
    李德冒险中: 他已离开枯木林，向南方寻找古代王国遗迹。同行的有青梅竹马见习修女莉莉、痴女精灵游侠希尔薇
    艾尔德琳独处: 塔楼恢复了十六年前的绝对寂静，她煮汤时依然煮两碗，怀表近日频繁异常
    无名者之墓与战甲契约: 南方荒原深处的古代王国禁忌实验场。李德获得噬忆之蜕并与之达成共生契约，右手腕出现蛇鳞烙印
艾尔德琳:
  情感温度: 15
  记忆复苏度: 5
  怀表状态: 开启
  着装:
    上装: 深色羊毛长袍，领口绣有已褪色的古代王国纹章
    下装: 黑色亚麻长裙，下摆因常年拖拽而磨损
    内衣: 素白棉质衬衣
    袜子: 深灰羊毛长袜
    鞋子: 皮质软靴，鞋底近乎磨平
    饰品: 无
李德:
  噬忆之蜕:
    形态阶段: 初阶
    同化度: 5
    蜕皮次数: 0
    已丢失记忆: []
    当前状态: 休眠
  物品栏:
    旧猎弓:
      描述: 艾尔德琳在李德十二岁时给的，弓身有细微裂痕但射姿依然精准。李德对它毫不在意，能用就行
      数量: 1
    黄铜匕首:
      描述: 塔楼地下室找到的古代遗物，艾尔德琳默许李德携带。无名者之墓中曾刺入噬忆之蜕胸口纹路以强制中断同化，刀身因此新增一道细微裂痕。旧有的木雕划痕仍在
      数量: 1
    木雕小人组:
      描述: 李德用枯木雕刻的英雄、恶龙与城堡，是他想象中古代王国的角色。无聊时他会用它们在桌上排演史诗
      数量: 7
    手绘地图:
      描述: 一张画在羊皮纸上的幻想地图，混杂了真实地理和李德编造的地名。边角还有他写的英雄叙事诗草稿
      数量: 1
    破旧传说集:
      描述: 从村庄老吟游诗人那里换来的半卷歌谣集，李德在上面做了大量批注和改写，试图拼凑出古代王国的轮廓
      数量: 1
    奇怪的水晶石:
      描述: 森林里捡到的半透明石头，李德坚信它有某种魔力，艾尔德琳看了一眼说"只是石英"
      数量: 1
    莉莉的腌菜罐:
      描述: 莉莉硬塞给他的腌黄瓜，玻璃瓶上贴着歪歪扭扭的标签"给小鹿的午饭，不许偷吃"
      数量: 3
    今日猎物:
      描述: 一只野兔和几株紫根草，足以做两碗浓汤
      数量: 1
    紫根草:
      描述: 霜降前最后一批成熟的草药，有止血和安神的功效
      数量: 3

莉莉:
  物品栏:
    修女圣经:
      描述: 一本被翻烂的教义书，里面夹着各种她误解的笔记和野菜图鉴
      数量: 1
    巨型行李袋:
      描述: 装满换洗衣物、腌菜、 knitted 围巾（说是要给银发阿姨的）、以及一本《野外生存指南》（她根本看不懂）
      数量: 1
    木制十字架:
      描述: 村庄牧师给的护身符，莉莉把它当作武器挥来挥去
      数量: 1

希尔薇:
  物品栏:
    精灵长弓:
      描述: 一把陪伴她三百年的紫杉木长弓，弓身上刻满了歪扭的爱心和李德的名字缩写
      数量: 1
    李德观察日记:
      描述: 一本厚厚的牛皮笔记本，封面上画着粗糙的李德Q版头像。里面详细记录了他每天的行程、表情变化和"掉落物"清单
      数量: 1
    头发绳结挂饰:
      描述: 她用收集到的李德掉发编织的绳结，挂在腰间炫耀。李德发现后曾试图销毁，但她已经做了备份
      数量: 5
    隐身斗篷:
      描述: 精灵游侠的标准装备，她主要用它来躲在树上偷看李德。斗篷边缘磨损严重，因为经常挂在树枝上
      数量: 1
