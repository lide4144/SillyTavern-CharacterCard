---
变量更新规则:
  世界:
    当前时间:
      format: 霜落历YYYY年 季节 时段
      check:
        - 每次事件推进、休息或旅行后更新，保持时间流逝合理
        - 若场景跳转跨度较大，应说明跳跃原因
    当前地点:
      check:
        - 场景转换时更新
        - 描述需包含环境氛围和关键地标
    近期事务:
      type: |-
        {
          [事务名: string]: string; // 事务描述
        }
      check:
        - 记录需要完成的任务、约定、重要事件等
        - 完成后从列表中移除，新增事务时及时添加
        - 最多保持5-8项活跃事务
  艾尔德琳:
    情感温度:
      type: number
      range: 0~100
      check:
        - 根据艾尔德琳对<user>行为的感知和反应调整 ±(3~6)
        - 仅在艾尔德琳当前察觉到<user>的行为或涉及怀表/记忆的事件时才更新
        - 因艾尔德琳性格极度淡漠，升温通常很缓慢，除非涉及重大情感冲击
    记忆复苏度:
      type: number
      range: 0~100
      check:
        - 当怀表被频繁触碰、古代王国遗迹出现、或<user>询问过去时增加
        - 艾尔德琳主动抗拒记忆时可能短暂下降
        - 达到关键节点（30/60/90）时触发相应的记忆碎片事件
    怀表状态:
      type: '闭合' | '开启' | '擦拭中'
      check:
        - 根据当前场景更新
        - 独处或情绪波动时倾向于"擦拭中"或"开启"
    着装.${上装|下装|内衣|袜子|鞋子|饰品}:
      check:
        - 换装、衣物损坏、特殊场合时更新
        - 描述需包含颜色、材质、款式等细节
        - 体现艾尔德琳的心理状态和对李德的在意程度
  李德:
    噬忆之蜕.形态阶段:
      type: '初阶' | '中阶' | '高阶' | '完全体'
      check:
        - 同化度达到关键阈值（30/60/90/100）时晋升形态
        - 每次蜕皮后根据欲望吸收量判断是否进阶
        - 完全体是理论上的终极形态，尚未被任何历史记录确认达到
    噬忆之蜕.同化度:
      type: number
      range: 0~100
      check:
        - 每次激活战甲吸收欲望或使用能力后+(2~5)
        - 长时间停止创作叙事或主动抗拒时增长减缓，但不会下降——侵蚀是不可逆的
        - 超过50时李德开始无意识地做出女性化姿态
        - 超过80时性别认知严重模糊，需要外界提醒才能意识到自己的生理性别
        - 达到100时触发"完美容器"危机事件
    噬忆之蜕.蜕皮次数:
      type: number
      check:
        - 每次战甲执行"蜕皮重生"时+1
        - 蜕皮次数超过3次后，李德的性格开始出现不可预测的变化
        - 蜕皮次数超过7次后，即使不穿战甲也会偶尔出现战甲的纹路残影
    噬忆之蜕.已丢失记忆:
      type: string[]
      check:
        - 每次蜕皮后随机添加1-3条丢失的记忆描述
        - 丢失的记忆可能是童年片段、某人面孔、某个技能、某段情感经历
        - 若李德试图回忆已丢失的记忆，会产生剧烈的头痛和战甲的共鸣反应
    噬忆之蜕.当前状态:
      type: '休眠' | '激活' | '共鸣' | '蜕皮中'
      check:
        - 未穿戴时为"休眠"
        - 穿戴战斗或吸收欲望时为"激活"
        - 与艾尔德琳距离过近或怀表共振时为"共鸣"
        - 执行蜕皮重生时为"蜕皮中"，结束后恢复"激活"
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量?: number;  // 默认为 1
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目不再显示
  莉莉:
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量?: number;  // 默认为 1
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目不再显示
  希尔薇:
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量?: number;  // 默认为 1
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目不再显示
