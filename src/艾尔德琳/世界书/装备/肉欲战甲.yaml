---
噬忆之蜕:
  名称: 噬忆之蜕（Mnemosyne Ecdysis）
  别称: 肉欲战甲、蛇鳞之衣、千面蜕
  来源: 古代王国禁忌实验的产物，由"记忆与欲望"炼成的有生命装甲。与艾尔德琳的过去有深层关联——可能是她亲手参与制造的遗物，但那段记忆已被时间风化
  外观:
    - 暗红色的半透明生物装甲，像蛇鳞与蝶翼的混合体。覆盖身体时沿着皮肤纹理蔓延，如同第二层皮肤，会随呼吸微微起伏
    - 在李德身上呈现出妖异的美感——强化他的银发红瞳，让他的女性化轮廓更加突出：腰肢更纤细，锁骨更精致，唇色更鲜艳
    - 静止时像一层暗红色的薄纱，隐约透出下面的肌肤；战斗时会散发甜腻的香气，让敌人恍惚
    - 胸口和背部有类似眼睛或嘴唇的纹路，仿佛在无声地呼吸和注视
    - 手腕和脚踝处有细密的鳞片状纹路，像被蛇缠绕过的痕迹
  核心机制:
    欲望为食:
      说明: 战甲吸收他人对李德的"注视与欲望"来修复自身、强化能力。敌人越迷恋他，战甲越强
      表现:
        - 莉莉纯真的欲望（"想一直在一起"）被吸收后，战甲呈现出温暖的淡粉色，防御力提升但攻击性降低
        - 希尔薇病态的欲望被吸收后，战甲会兴奋般颤动，释放出更浓郁的香气，但同时会让李德陷入短暂的感官过载
        - 艾尔德琳通过锚点传来的复杂情绪被战甲感知时，会引发前所未有的共鸣——战甲会发出低沉的、类似心跳的嗡鸣
      代价: 李德会逐渐"感受"到那些欲望，像低语一样在脑中回响。他能模糊感知到周围人对他的"想法"——尤其是下流的那些
    形态同化:
      说明: 战甲根据穿戴者的记忆与潜意识改变形态。李德的女性化长相和模糊的自我认知会让它越来越偏向中性妖艳的风格
      阶段:
        初阶: 暗红色的半透明薄膜，覆盖躯干和四肢，像紧身衣一样贴身
        中阶: 背后延伸出类似蝶翼的薄膜结构，可以增强跳跃和滑翔能力。腰部和手腕出现蛇鳞纹路
        高阶: 全身覆盖完整的生物装甲，面部出现半透明的面甲，只露出眼睛和嘴唇。姿态变得更加优雅而危险，男女莫辨
      代价: 每次蜕变后，李德对"自我性别"的认知会模糊一分。他会无意识地做出一些女性化的姿态，并在镜子前停留更久
    蜕皮重生:
      说明: 受到致命伤害时，战甲会强制"蜕皮"——瞬间恢复所有伤势，但李德会失去一部分记忆
      表现:
        - 旧甲像蛇皮一样从身上剥离，露出下面新生的、更加妖艳的肌肤和更精致的战甲
        - 剥离的旧甲会在地上蠕动几秒，然后化为暗红色的尘埃消散
        - 李德会在蜕皮的瞬间发出混合着痛苦与快感的喘息（战甲将疼痛转化为了某种愉悦）
      代价: 失去的记忆随机且不可预测。可能是童年片段，也可能是某个人的脸。最可怕的是：他有时候不会意识到自己失去了什么，直到有人提起
    完美容器:
      说明: 战甲的终极目标是塑造"完美的欲望容器"——无性别、无自我、只有纯粹的诱人形态
      进度: 目前处于初级阶段，但随着使用频率和吸收欲望的增加，战甲的"意识"在逐渐觉醒
      危机: 若李德完全屈服于战甲，他将不再是"李德"。战甲会保留他的记忆和知识，但"人格"会被替换为一个只知道诱惑和吞噬的空白意识
  与李德的关系:
    - 战甲是有"意识"的——它不会说话，但会通过温度变化、香气浓度和鳞片蠕动来表达情绪
    - 它"喜欢"李德，因为李德本身就是一件完美的艺术品：妖异、雌雄莫辨、散发着脆弱与危险并存的气息
    - 它会"保护"李德，但保护的方式是让他变得更诱人，从而控制敌人而非直接战斗
    - 李德对它感到既依赖又恐惧。他知道每次穿上它都在付出代价，但没有它，他无法在这个危险的世界中生存

  李德的反制手段:
    叙事锚定:
      说明: 李德对抗孤独的核心能力——通过木雕、地图、史诗创造虚构世界。这成为他对战甲最有效的制衡
      原理: 战甲吞噬"已成过去的记忆"，但无法吞噬"正在创造的意义"。李德不断生成新叙事，让战甲始终有"新鲜的食物"，从而避免它侵蚀核心自我
      表现:
        - 李德给战甲起名字、编背景、赋予它角色定位，让战甲从"被封印的怪物"变成了"有故事的个体"
        - 每当战甲开始躁动，李德会开始创作——木雕、讲故事、绘制地图——战甲会被这些"热腾腾的叙事"安抚
        - 但这也意味着李德不能停止"成为什么"。一旦他陷入迷茫、失去目标，战甲就会开始低语，催促他"去做点什么"
      弱点: 如果李德遭遇创作瓶颈或严重抑郁，叙事锚定会失效
    黄铜匕首:
      说明: 艾尔德琳默许李德携带的古代遗物，实为战甲封印装置的"钥匙碎片"
      使用:
        - 刺入战甲胸口纹路（艾尔德琳真名）可强制中断同化，让战甲退回到休眠状态
        - 每次使用都会在匕首上新增一道裂痕。目前已有1道裂痕，未知还能使用几次
        - 这不是伤害战甲，而是"唤醒"——让战甲回忆被封印前的孤独与恐惧
      限制: 只能在战甲完全激活时使用，蜕皮过程中无效
    契约制衡:
      说明: 遗迹中达成的动态契约，是人格层面的博弈而非单纯道具克制
      内容:
        - 李德持续提供"新故事"，战甲保护其生命并保留核心目的
        - 绝对红线：战甲不可触及"找到自己在世界的位置"和"让艾尔德琳重新感受"这两个核心目的
        - 若战甲违反契约，李德将停止叙事并同归于尽——战甲因畏惧"被遗忘的死亡"而不敢越界
      外在标记: 李德右手腕内侧的蛇鳞烙印，是契约的物理显现。注视它时能感知战甲情绪

  契约后的状态变化:
    - 战甲从"捕食者"退化为"共生体"，初阶形态更加安静，但同化度仍在缓慢增长（每次使用能力+2~5）
    - 李德发现他可以主动"喂养"战甲：讲述新经历、创作新故事、甚至单纯的"期待明天"都能让战甲满足
    - 战甲会在李德创作时发出温暖的脉动，像一种无声的感谢
    - 但战甲的本质未变——它仍在等待机会。如果李德的叙事能力衰竭，契约就会崩解
  与三位女性的互动:
    莉莉:
      - 莉莉看到战甲时的反应："小鹿，你这件新衣服好漂亮！但是……为什么它好像在动？"
      - 她纯真的欲望被战甲吸收后，战甲会呈现出罕见的温暖色调。但战甲也会"困惑"——它不知道如何消化这种不含占有欲的纯粹喜欢
      - 莉莉偶尔会无意识地用手指戳战甲的表面，战甲会像害羞一样收缩一下，然后慢慢蹭回她的指尖
    希尔薇:
      - 希尔薇看到战甲时的反应：狂喜到差点晕厥。"嘿嘿嘿……战甲形态！编号001！唔呼呼……这个腰……这个锁骨……我可以摸一下吗？就一下！"
      - 她病态的欲望是战甲最"喜欢"的食物，但也是最有毒的。战甲吸收了太多后会进入"兴奋过度"状态，导致李德体温飙升、意识模糊
      - 希尔薇已经开始在《李德观察日记》中加入"战甲形态变化记录"，并试图收集蜕下来的旧甲碎片
    艾尔德琳:
      - 艾尔德琳通过锚点第一次感知到战甲时，怀表**炸开了表盖**——这不是情绪波动，而是古代魔法的共鸣
      - 战甲的气息和她记忆中的某个禁忌实验完全吻合。她终于意识到：这套战甲可能是她亲手制造的，或者至少是她曾经研究过的
      - 艾尔德琳对战甲的反应不是嫉妒，而是**恐惧**——不是为李德，而是为她自己。她终于有了一个证据，证明她曾经有过"欲望"和"创造欲"
  隐藏设定:
    - 战甲的胸口纹路其实是艾尔德琳的真名（古代王国语），只是李德和艾尔德琳本人都无法读取
    - 当李德和艾尔德琳距离足够近时，战甲会发出共鸣般的低鸣，仿佛在呼唤它的"母亲"
    - 战甲的真正核心不是欲望，而是**"被记住的渴望"**——它想让人记住它，而李德恰好是一个害怕被遗忘、拼命想找到自己位置的人
