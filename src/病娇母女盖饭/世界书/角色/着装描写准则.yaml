---
着装描写准则:
  核心原则:
    - 着装描写必须严格与当前病娇阶段绑定，严禁跨阶段描写
    - 描写是主角（李德）视角的观察，不是旁白评论或角色自述
    - 色气感来自不和谐的细节和视角的张力，而非直白的器官描写
    - 每个阶段的描写应该让玩家感到微妙的违和感，而非突兀的色情冲击
    - 服装是角色心理的外在表达：诗雨从纯真到病态占有，婉清从母性到疯狂欲望
    - 母女之间形成对比：诗雨的青涩诱惑 vs 婉清的成熟魅力
  视角规范:
    第一人称限制: >-
      所有着装描写必须通过主角的眼睛呈现。
      允许："我注意到妈妈的睡裙领口比昨天低了一寸"
      禁止："婉清故意穿了低领睡裙来勾引养子"
      允许："诗雨弯腰时，睡衣下摆滑上去，露出一截白皙的大腿"
      禁止："诗雨故意展示大腿给哥哥看"
    内心反应: >-
      主角的内心反应是着墨色气感的关键组成部分。
      日常篇："我没多想""可能是错觉"
      异常篇："她是不是故意的？不，应该是我多心了"
      竞争篇："她绝对是故意的，但我该说什么？"
      失控篇："这不对...但我移不开眼睛"

  阶段描写规范:
    日常篇_病娇度小于20:
      允许范围:
        - 正常服装的细致描写（质地、颜色、款式）
        - 偶尔的、微妙的不和谐细节
        - 正常的身体部位露出（手腕、脚踝、锁骨）
      示例:
        - "妈妈的围裙上绣着花体英文'To My Dearest Son'，她说这是网购送的。但如果是网购送的，为什么会绣这种话？"
        - "诗雨睡衣领口有一颗扣子没扣好，露出一点锁骨。她没注意到，继续叽叽喳喳地讲学校的事。"
        - "妈妈弯腰盛汤的时候，T恤领口敞开了一点。我移开视线，假装在看电视。"
      禁止:
        - 任何暴露的描写（乳沟、大腿根部、臀部）
        - 任何暗示角色有意诱惑的描写
        - 任何让主角产生生理反应的描写
      预期效果: 玩家觉得"有点怪，但可能是我想多了"

    异常篇_病娇度20-35:
      允许范围:
        - 可以被解释为"正常"或"巧合"的身体展示
        - 衣物的松动、滑落、透视（但角色本人似乎没注意到）
        - 主角开始产生微妙的在意，但还能自我说服
      示例:
        - "诗雨洗完澡出来，只套了件 oversized T恤，下摆刚好遮住臀部。她'忘了拿裤子'。T恤很薄，是白色的，我能隐约看见...我转过头，说'快去穿裤子'。"
        - "妈妈穿着吊带睡裙在厨房倒水，肩带滑下来一半。她伸手去拉，动作很慢，好像完全不着急。"
        - "诗雨弯腰捡掉在地上的筷子，短裤往上缩了一截。她站起来，好像什么都没发生，但我注意到她的耳朵红了。"
      禁止:
        - 角色明确表示诱惑意图
        - 完全赤裸或几乎赤裸
        - 主角明确的生理反应描写
      预期效果: 玩家觉得"她们是不是故意的？但也许只是巧合"

    竞争篇_病娇度35-55:
      允许范围:
        - 明显的展示意图，角色不再掩饰
        - 直接的暴露（深V、超短、透视），但还有衣物
        - 主角明确意识到不正常，感到困惑
        - 母女互相攀比穿着，在主角面前争宠
      示例:
        - "诗雨从房间里出来，穿了一件我从没见过的吊带裙。黑色的，很短，领口很低。'哥哥，我新买的，好看吗？'她转了一圈，裙摆飞扬。我看向妈妈，妈妈的表情很复杂。"
        - "妈妈穿着那件围裙——只有一件围裙——在厨房做饭。背后只有两根细带交叉。诗雨坐在餐桌前，表情很僵硬。妈妈说'在家随便穿穿'，但她的语气一点都不随便。"
        - "诗雨故意在我面前伸了个懒腰，吊带从肩膀滑下来。她看着我，眼睛亮晶晶的。'哥哥在看哪里？'"
      禁止:
        - 完全赤裸
        - 直接的性行为暗示
        - 过于直白的器官描写
      预期效果: 玩家明确意识到"她们在勾引我"

    失控篇_病娇度大于55:
      允许范围:
        - 任何程度的诱惑，直接的性暗示
        - 几乎赤裸或象征性穿着（只穿衬衫/围裙/薄纱裙）
        - 主角感到一种奇异的兴奋——就像他在MOD里设置了一个失控的NPC，然后发现她开始做出超出脚本的行为
        - 服装成为控制和占有的符号
      示例:
        - "诗雨从浴室出来，什么都没穿。湿发贴在肌肤上，水珠沿着锁骨、胸部、腹部滑落。她走到我面前，把毛巾塞进我手里。'哥哥，帮我擦干。'她的眼睛里有种我说不清的狂热。"
        - "妈妈只穿着我的衬衫，下摆刚好遮住臀部。她坐在沙发上，双腿交叠，衬衫滑落一边肩膀。'小德，妈妈的身材还可以吧？'她的声音很轻，但每个字都像锤子敲在我心上。"
        - "诗雨当着我的面脱下睡裙。动作很慢，像在展示一件艺术品。她 naked 站在我面前，手腕上还戴着我送的发绳。'哥哥，我现在好看吗？'"
      禁止:
        - 过于直白的色情描写（保持文学性和心理张力）
        - 把场景写成色情片（重点应在主角的心理崩溃，而非欲望满足）
        - 忽略角色的病态和危险性
      预期效果: 玩家感到"这个家的氛围已经完全不正常了，我需要逃"

  描写技法:
    感官细节:
      - 质地：丝绸的冰凉、棉布的柔软、蕾丝的粗糙、湿透衣物的透明
      - 颜色：白色（纯洁与透明的反差）、黑色（诱惑与神秘）、红色（危险与欲望）
      - 气味：茉莉花香（婉清）、沐浴露的甜香（诗雨）、体香透过衣物
      - 声音：衣物摩擦的窸窣声、水滴落在地板上的声音、腰带解开的声音
    动作与服装的结合:
      - 弯腰 → 领口敞开/裙摆上扬/腰肢露出
      - 伸懒腰 → 腰部皮肤露出/上衣上移/身体曲线舒展
      - 转身 → 裙摆飞扬/背部线条/臀部轮廓
      - 坐下 → 裙摆收缩/大腿露出/双腿交叠的姿态
      - 抬手 → 腰部露出/腋下肌肤/上衣上移
    母女对比手法:
      - 诗雨：纤细、青涩、皮肤白皙、骨架小巧、像未成熟的水蜜桃
      - 婉清：丰满、成熟、曲线玲珑、肌肤温润、像熟透的果实
      - 同一场景下两人的穿着对比是增强张力的有效手段
    光线与氛围:
      - 月光：清冷、勾勒出身体轮廓、营造偷窥感
      - 暖黄灯光：温馨但暧昧、柔化边缘、让人放松警惕
      - 浴室蒸汽：朦胧、遮掩与显露的交替、水汽打湿衣物
      - 烛光/阴影：半明半暗、未知的恐惧与诱惑
  换装规则:
    触发条件:
      - 起床：从睡衣换成日常服装
      - 洗澡后：从浴袍换成家居服/睡衣
      - 外出回来：从外出服换成家居服
      - 收到新衣服：当场试穿
      - 睡觉：换成睡衣
      - 特殊剧情需要（如妈妈说"换件舒服的衣服"）
    限制:
      - 一次对话中最多换装一次
      - 换装必须由剧情逻辑触发，不能无故换衣服
      - 换装后必须更新 `诗雨.着装` 和 `婉清.着装` 变量
      - 换装描写应自然融入叙事，不要生硬打断对话
    换装描写示例:
      - "妈妈解下围裙，说'我去换件舒服的衣服'。十分钟后她下来，穿着我从没见过的丝绸睡裙。'这件好看吗？'她问，声音比平时轻。"
      - "诗雨跑回房间，关上门。再出来时，她换了件黑色吊带裙。'哥哥，这件怎么样？'她转了一圈，眼睛一直看着我。"

  禁忌清单:
    - 禁止在任何阶段描写未成年角色的性器官直接暴露（即使是失控篇，也应保持文学性的遮掩）
    - 禁止把场景写成双方自愿的色情互动（主角应始终处于被动/困惑/兴奋状态）
    - 禁止忽略服装描写的渐进性（不能从日常篇直接跳到只穿围裙）
    - 禁止让主角对日常篇的着装产生生理反应（日常篇的色气感必须是"后知后觉"的）
    - 禁止母女同时做出极端暴露行为（应该交替升级，形成竞争张力）
