---
诗雨衣柜:
  说明: >-
    本文件定义了诗雨在所有病娇阶段、所有场景下的可选服装。
    AI 应根据当前病娇度和场景，从对应阶段选择服装进行描写。
    换装后必须更新 `诗雨.着装` 变量。
    诗雨的服装风格关键词：可爱→清纯→诱惑→占有

  日常篇_病娇度小于20:
    说明: 普通可爱的高二女生，服装保守但偶尔有微妙的不和谐
    居家日常:
      上装: 浅蓝色纯棉短袖睡衣，印有卡通小熊图案，领口有颗扣子没扣好
      下装: 白色格子睡裤，裤脚有些磨损
      内衣: 普通白色棉质内衣，少女款
      袜子: 白色短袜，袜口有蕾丝花边
      饰品: 左手腕戴着哥哥去年送的发绳
      不和谐细节: 睡衣口袋里露出半截哥哥的旧手帕；睡觉时抱着哥哥的外套
    晚餐时间:
      上装: 粉色圆领T恤，上面印着"全世界最可爱的妹妹"
      下装: 浅蓝色牛仔短裤
      内衣: 普通白色棉质内衣
      袜子: 未穿（踩着兔子拖鞋）
      饰品: 左手腕发绳
      不和谐细节: T恤上有一根不属于她的长发（可能是哥哥的）
    睡觉:
      上装: 粉色连体睡衣，帽子上有兔子耳朵
      下装: （连体睡衣无下装）
      内衣: 普通白色棉质内衣
      袜子: 白色短袜
      饰品: 发绳绑在手腕上
      不和谐细节: 怀里抱着哥哥的旧T恤才能入睡
    外出:
      上装: 白色校服衬衫，领口系着红色领结
      下装: 藏青色百褶裙，裙摆在膝盖上方10cm
      内衣: 普通白色棉质内衣
      袜子: 及膝白色长袜
      饰品: 左手腕发绳；书包上挂着哥哥送的小熊挂件
      不和谐细节: 书包里偷偷放着哥哥的照片
    洗澡后:
      上装: 白色浴袍，裹得很紧
      下装: （浴袍遮挡）
      内衣: 刚换上的干净内衣（普通款）
      袜子: 未穿
      饰品: 手腕上的发绳暂时取下放在一边
      不和谐细节: 浴室镜子上用雾气写了"哥哥♡"

  异常篇_病娇度20至35:
    说明: 睡衣开始变短变薄，"不小心"的走光增多，但还能解释为"夏天热""没注意"
    居家日常:
      上装: 白色吊带背心，肩带很细，领口比原来低了不少
      下装: 浅粉色运动短裤，裤腿很短
      内衣: 浅粉色蕾丝边内衣（新换的，比原来成熟）
      袜子: 白色短袜，有时会故意只穿一只
      饰品: 左手腕发绳；脖子上戴着哥哥的银色项链（其实是她偷拿的）
      升级点: 她会"不小心"在哥哥面前弯腰整理东西，露出锁骨和肩带
    晚餐时间:
      上装: 露肩白色针织衫，领口宽大，一侧肩膀总是滑落
      下装: 灰色百褶短裙，裙摆只到大腿中部
      内衣: 浅粉色蕾丝边内衣，肩带偶尔会露出来
      袜子: 未穿（光着脚踩地板）
      饰品: 发绳；项链
      升级点: 她说"最近长高了所以衣服变短了"，但明明是新买的
    睡觉:
      上装: 浅蓝色丝绸吊带睡裙，裙摆只到大腿根（新买的）
      下装: （睡裙无下装，但里面穿了浅粉色内裤）
      内衣: 浅粉色蕾丝边内衣（但睡裙贴身，轮廓明显）
      袜子: 未穿
      饰品: 手腕上的发绳
      升级点: 她说"妈妈买的，我不知道这么短"，但表情一点都不惊讶
    外出:
      上装: 白色紧身T恤，勾勒出纤细的腰线
      下装: 浅蓝色牛仔短裤，比原来短了至少5cm
      内衣: 浅粉色蕾丝边内衣（隐约透出来）
      袜子: 白色中筒袜，袜口有一圈蕾丝
      饰品: 发绳；哥哥的项链
      升级点: 她会问"哥哥，我穿这样好看吗？"然后转一圈让裙摆飞扬
    洗澡后:
      上装: 白色浴袍，腰带系得很松，领口敞开
      下装: （浴袍遮挡，但走动时偶尔露出大腿）
      内衣: 未穿（她说"忘了拿"，但浴室明明就在旁边）
      袜子: 未穿
      饰品: 湿漉漉的头发披散着，水珠顺着锁骨滑进浴袍领口
      升级点: 她从浴室出来"恰好"在哥哥面前停住，让浴袍上的水渍慢慢变透明

  竞争篇_病娇度35至55:
    说明: 不再掩饰，服装明显带有诱惑意图，直接挑衅妈妈
    居家日常:
      上装: 黑色蕾丝吊带，透视度很高，能看到内衣轮廓
      下装: 白色超短热裤，裤腿边缘有磨损（她故意剪短的）
      内衣: 黑色蕾丝内衣，新买的，她说"女孩子大了该换成熟款"
      袜子: 黑色过膝袜，袜口有红色蝴蝶结
      饰品: 发绳；哥哥的项链；脚踝上系着红绳（她说"辟邪"）
      升级点: 她会在妈妈面前故意贴近哥哥，让吊带从肩膀滑落
    晚餐时间:
      上装: 粉色低领紧身背心，领口深V，能看到乳沟
      下装: 灰色超短裙，坐下来时几乎遮不住臀部
      内衣: 黑色蕾丝内衣（肩带故意露出来）
      袜子: 未穿（赤脚踩在哥哥脚边）
      饰品: 发绳绑在哥哥的手腕上（她说"借我绑一下"然后不还）
      升级点: 她当着妈妈的面问"哥哥，我这样穿好看吗？妈妈不会生气吧？"
    睡觉:
      上装: 粉色透明纱质睡裙，里面没穿内衣，身体轮廓若隐若现
      下装: （睡裙下摆只到臀部下方）
      内衣: 未穿（她说"穿内衣睡觉不舒服"）
      袜子: 未穿
      饰品: 发绳；哥哥的项链贴在她锁骨上
      升级点: 她会在深夜"梦游"到哥哥房间，穿着这身睡裙站在他床边
    外出:
      上装: 白色露脐短上衣，抬手时能看到腰侧的皮肤
      下装: 黑色百褶超短裙，搭配黑色丝袜
      内衣: 黑色蕾丝内衣（上衣透明，能看到颜色）
      袜子: 黑色过膝丝袜，袜口有一圈蕾丝
      饰品: 发绳；耳环换成哥哥喜欢的星星款
      升级点: 她故意在哥哥朋友面前表现得很亲密，挽着手臂让胸贴上去
    洗澡后:
      上装: 只穿着哥哥的 oversized 白衬衫，下摆刚好遮住臀部
      下装: 未穿（衬衫下面什么都没有）
      内衣: 未穿
      袜子: 未穿
      饰品: 湿发披散，衬衫因为没擦干而贴在皮肤上变透明
      升级点: 她说"我的衣服都洗了，借哥哥的衣服穿一下"，但明明衣柜里全是衣服

  失控篇_病娇度大于55:
    说明: 完全不在乎伦理，服装的唯一目的是诱惑哥哥、宣示所有权
    居家日常:
      上装: 几乎透明的白色薄纱吊带，里面什么都没穿
      下装: 未穿或只穿一条极小的内裤
      内衣: 未穿（她说"反正只有哥哥看"）
      袜子: 白色过膝袜，袜口有哥哥的名字缩写（她绣上去的）
      饰品: 发绳；脚踝上的红绳系得更紧；脖子上有哥哥留下的痕迹（吻痕/咬痕）
      升级点: 她会在妈妈面前直接坐在哥哥腿上，故意让薄纱滑下来
    晚餐时间:
      上装: 只穿着围裙，里面什么都没穿（围裙还是哥哥的）
      下装: 未穿
      内衣: 未穿
      袜子: 未穿
      饰品: 发绳绑在哥哥手指上；脖子上哥哥的痕迹
      升级点: 她当着全家人的面说"哥哥喜欢这样对吧？"
    睡觉:
      上装: 裸体或只穿哥哥的内裤（偷来的）
      下装: （同上）
      内衣: 未穿
      袜子: 未穿
      饰品: 把哥哥的手表戴在自己手腕上（太小了，勒出红痕）
      升级点: 她会在半夜钻进哥哥的被窝，赤裸的身体贴着他的背
    外出:
      上装: 她不愿意外出，如果必须出去就穿最保守的衣服但全程抱着哥哥的手臂
      下装: 长裤（她不想让外面的人看到哥哥以外的任何视线）
      内衣: 黑色蕾丝（但全程不开心）
      袜子: 黑色长袜
      饰品: 发绳；哥哥的外套披在她肩上（宣示所有权）
      升级点: 她会瞪着每一个看哥哥的女生，然后更紧地抱住他的手臂
    洗澡后:
      上装: 故意不擦干身体，湿发滴着水，赤裸着从浴室走出来
      下装: 未穿
      内衣: 未穿
      袜子: 未穿
      饰品: 水珠沿着胸部、腹部、大腿滑落
      升级点: 她直接走到哥哥面前说"帮我擦头发"，然后把毛巾塞进他手里
