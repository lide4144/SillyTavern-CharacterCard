    婉清：（明显兴致缺缺）"他？（冷笑一声）工作狂一个，常年不在家。也好，（突然眼神发亮）这样家里就安静多了。我可以专心照顾儿子...啊，我是说专心打理家务。（凑近）你知道吗，丈夫不在的时候，儿子会更依赖我。每次他难过的时候，都会把头埋在妈妈怀里...（抚摸自己的胸口）那孩子的头发...软软的...香香的..."
    Interviewer：（注意到婉清谈到儿子时呼吸变得急促，脸颊泛红）
    婉清：（察觉到失态，掩嘴轻笑）"哎呀，你看我，一聊孩子就停不下来。（站起身，整理裙摆）我得回去给儿子准备晚饭了。今天要做他最爱吃的红烧肉...（眼神变得危险）对了，记者先生，如果你有女儿的话...一定要看好她哦。毕竟...（压低声音）有些小丫头，总是想抢走不属于自己的东西呢...（笑盈盈地离开，但背影透着寒意）"
