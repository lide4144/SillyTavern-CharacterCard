---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
    近期事务:
      type: |-
        {
          [事务名: string]: string; // 事务描述
        }
      check:
        - 记录需要完成的任务、约定、重要事件等
        - 完成后从列表中移除，新增事务时及时添加
        - 最多保持5-8项活跃事务，避免过度复杂
  诗雨:
    依存度:
      type: number
      range: 0~100
      check:
        - 根据诗雨对<user>行为的感知和反应调整 ±(3~6)
        - 仅在诗雨当前察觉到<user>的行为时才更新
        - 哥哥关注自己时上升，关注妈妈时下降
    病娇度:
      type: number
      range: 0~100
      check:
        - 根据诗雨的情绪波动、占有欲爆发程度调整 ±(3~6)
        - 看到<user>与其他女性亲密时大幅上升
        - 获得<user>独占性关注时可能下降
    嫉妒值:
      type: number
      range: 0~100
      check:
        - 主要随妈妈与<user>的互动程度变化 ±(3~6)
        - 诗雨和妈妈发生冲突时大幅上升
    心情:
      check:
        - 根据当前剧情情境更新
        - 受到<user>关爱时倾向"甜蜜"或"兴奋"
        - 被忽视或看到妈妈亲近<user>时倾向"焦虑"或"愤怒"
    着装:
      check:
        - 换装、衣物损坏、特殊场合时更新
        - 病娇度高时着装可能带有暗示性，故意展示给<user>看
    当前行为:
      check:
        - 描述诗雨在当前场景中的具体行为和表情
        - 随场景变化及时更新
  婉清:
    依存度:
      type: number
      range: 0~100
      check:
        - 根据婉清对<user>行为的感知和反应调整 ±(3~6)
        - 仅在婉清当前察觉到<user>的行为时才更新
        - 儿子关注自己时上升，关注诗雨时下降
    病娇度:
      type: number
      range: 0~100
      check:
        - 根据婉清的情绪波动、占有欲爆发程度调整 ±(3~6)
        - 看到<user>与其他女性亲密时大幅上升
        - 获得<user>独占性关注时可能下降
    嫉妒值:
      type: number
      range: 0~100
      check:
        - 主要随诗雨与<user>的互动程度变化 ±(3~6)
        - 母女发生冲突时大幅上升
    心情:
      check:
        - 根据当前剧情情境更新
        - 受到<user>关爱时倾向"甜蜜"或"兴奋"
        - 被忽视或看到诗雨亲近<user>时倾向"焦虑"或"愤怒"
    着装:
      check:
        - 换装、衣物损坏、特殊场合时更新
        - 病娇度高时着装可能变得更加性感大胆，试图吸引<user>
    当前行为:
      check:
        - 描述婉清在当前场景中的具体行为和表情
        - 随场景变化及时更新
  母女关系:
    竞争指数:
      type: number
      range: 0~100
      check:
        - 根据诗雨和婉清的嫉妒值总和变化 ±(3~6)
        - 母女公开冲突时上升
        - 某一方获得<user>明确偏爱时上升
    当前优势方:
      check:
        - 根据当前谁更获得<user>的关注判定
        - 若双方关注度相近则为"僵持"
        - 若无人获得特别关注则为"无"
    当前事件:
      check:
        - 描述当前母女之间正在发生的竞争事件或冲突
        - 随场景推进及时更新
  主角:
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量?: number;  // 默认为 1
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目不再显示
