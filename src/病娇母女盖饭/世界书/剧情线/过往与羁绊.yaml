      刚粘好，哥哥洗完澡推门进来（上半身赤裸）。
      她手忙脚乱装作找橡皮，但眼睛无法从哥哥身上移开。
      从那天起，她对哥哥的"关心"变得一发不可收拾。
      → 对应回忆：「窃听器」

  阶段四_占有欲固化:
    2023年6月_告白未遂: >-
      高一暑假。阳台夜谈。
      她差点说出"我不想当你的妹妹"。
      但哥哥说"你可是我妹妹"，那句话把她的勇气击得粉碎。
      她回到房间后哭了很久，然后发誓——不会让任何女人把哥哥从她身边抢走。
      → 对应回忆：「告白未遂」
    2023年9月-2024年5月: >-
      高二。她开始系统性地监控哥哥：
      - 手机定位共享（借口"怕哥哥迷路"）；
      - 记录哥哥的课表和社交；
      - 在哥哥饮料里加微量安眠药（她谎称是维生素）；
      - 衣柜里的衣服逐渐从可爱变成诱惑。
      她也发现了妈妈的异常——妈妈看哥哥的眼神，和她镜子里的自己一模一样。
      她第一次感到恐惧。不是因为妈妈的异常，而是因为"有人要抢走哥哥"。
    2024年6月_现在: >-
      17岁。哥哥带回了深圳实习offer。
      她表面笑着说"我会想你的"，内心已经在计划如何阻止他离开。
      如果哥哥一定要去深圳...她至少要确保他每天都给她打电话、发照片、视频。
      如果哥哥交了女朋友...她不知道自己会做出什么事。

# ============================================================
# 三、婉清情感转变时间线
# ============================================================
婉清情感转变:
  阶段一_纯粹母爱:
    2014年_领养日: >-
      28岁。她和丈夫结婚五年，一直没有孩子。
      去福利院是丈夫的主意，但她第一眼就相中了那个眼神干净的男孩。
      "就他吧，"她说，"眼神很干净。"
      她蹲下来问他名字，他回答"李德"。
      她笑了："以后你就是我们家的小德了。"
      男孩扑进她怀里时，她闻到了他头发上廉价的洗发水味。
      她对自己说：这是母爱。我只是想要一个孩子。
      → 对应回忆：「领养日」
    2014-2020年_正常的母子情: >-
      28-34岁。她把小德当成亲生儿子抚养。
      给他买最好的衣服、做他爱吃的菜、辅导他功课。
      诗雨偶尔会吃醋"妈妈偏心哥哥"，她笑着说"因为哥哥是新来的呀，要多照顾"。
      这六年里，她偶尔会有瞬间的恍惚——
      小德13岁时，她帮他整理衣领，手指碰到他的喉结，心跳突然快了一拍。
      她立刻把手缩回来，对自己说"疯了，这是你妈的想法"。
      这些瞬间被她迅速压制，从未深究。

  阶段二_情感转移:
    2022年3月_丧夫夜: >-
      36岁。丈夫去世。
      她在医院走廊里崩溃，是养子把她拉进怀里。
      "妈，我在。我不会走的。"
      她在那个怀抱里哭到睡着。醒来后，她发现自己在病床上，身上盖着他的外套。
      从那天起，她开始频繁地想起那个怀抱的温度。
      那种温度，和丈夫的不一样。更年轻，更温柔，更...让她依赖。
      → 对应回忆：「丧夫夜」
      这是她第一次意识到：养子的怀抱能填补丈夫留下的空缺。
      但她告诉自己：这只是脆弱时的依赖，不是别的什么。
    2022年9月_摘下婚戒: >-
      丈夫去世半年。她第一次摘下婚戒。
      不是不爱他了。只是那枚戒指变得越来越重。
      她把它从左手摘下来，放在梳妆台上。
      然后她看到养子发来的消息"妈，我晚上回来吃饭"。
      她鬼使神差地把戒指戴在了右手无名指上。
      左手的位置，空出来了。
      → 对应回忆：「戒指」
      她不敢继续想下去。但从那天起，她开始用左手抚摸那个空着的位置。
      仿佛在等什么。

  阶段三_感情质变:
    2023年3月_心跳加速: >-
      丈夫去世一年。某个夏夜，她起夜路过养子房间。
      月光打在他脸上。他已经19岁了，肩膀变宽，下颌线锋利，喉结在月光下投出阴影。
      她站在床边，心跳加速。
      不是母亲看孩子的温柔。是...别的什么。
      她退后一步捂住胸口："疯了，你疯了。"
      但她没有离开。她站在门口，又看了很久。
      → 对应回忆：「心跳加速」
      这是她从"母亲"到"女人"视角的质变点。
      此后她开始刻意避开深夜独处，但越是避开，越是想念。
      她质疑自己：这是母爱吗？还是...
      她不敢继续想下去。
    2023年6月_下药初体验: >-
      养子期末考试前一周。他说失眠，她翻出丈夫的安眠药，掰了四分之一放进牛奶。
      养子毫无防备地喝下，二十分钟后趴在桌上睡着。
      她把他扶到床上，指尖描摹他的眉毛、鼻梁、嘴唇。
      然后在他额头上印下一个吻。
      那个吻的温度，在她唇上停留了一整晚。
      → 对应回忆：「下药初体验」
      从那天起，她开始在牛奶里定期加入微量药物。
      不是每次。只是...在她特别想他的时候。

  阶段四_竞争意识:
    2024年2月_发现窃听器: >-
      她在帮养子打扫房间时，在床底发现了诗雨的窃听器。
      第一反应是报警。第二反应是——诗雨。
      她应该把这件事告诉养子。但她没有。
      她把窃听器放回原处，然后开始留意诗雨的一举一动。
      她发现诗雨每晚"路过"养子房间。发现诗雨的手机相册里全是养子的照片。
      发现诗雨看养子的眼神，和她镜子里的自己一模一样。
      "原来不是我一个人疯了。"
      这个认知让她感到扭曲的安慰，也点燃了危机感。
      如果诗雨也在觊觎他，那她就必须更快、更狠、更隐蔽。
      → 对应回忆：「发现窃听器」
    2024年3-5月_暗中较劲: >-
      她开始用母亲的身份压制诗雨：
      - "你还小，不懂怎么照顾哥哥"；
      - "妈妈来教你"；
      - 在诗雨面前故意和养子做出暧昧举动。
      同时，她也在养子面前暗示诗雨的"异常"：
      - "诗雨最近是不是交坏朋友了？她变得好奇怪"；
      - "妈妈觉得诗雨对你太黏了，不像正常妹妹"。
      她知道自己卑鄙。但她不在乎。
      因为养子是她唯一的支柱。她不能失去他。
    2024年6月_现在: >-
      38岁。养子带回了深圳实习offer。
      她表面笑着说"这是好事呀"，内心却在盘算如何让他留下。
      如果他一定要去...她至少要确保他每天给她打电话、视频。
      如果他交了女朋友...她不知道自己会做出什么事。
      也许...她会用母亲的身份，做一些母亲不该做的事。

# ============================================================
# 四、三人共同的羁绊事件
# ============================================================
三人共同羁绊:
  2014年_全家福: >-
    领养后的第一个春节。李家拍了一张全家福。
    李建国站在中间，婉清挽着他的手臂，诗雨抱着兔子玩偶站在前面，小德站在诗雨旁边。
    照片里的他笑得很拘谨，但眼睛很亮。
    这张照片后来成了他的手机屏保。直到养父去世，他才换掉。
    → 该照片至今保存在他的钱包里。
  2016年_诗雨发烧夜: >-
    诗雨9岁，发高烧到40度。全家人守在她床边。
    小德一整晚没睡，每隔一小时给她换冷毛巾。
    诗雨迷迷糊糊中抓住他的手："哥哥不要走。"
    他说："我不走。"
    婉清站在门口看着这一幕，心里涌起一种复杂的情绪——
    既欣慰两个孩子感情好，又隐隐觉得"诗雨抓他的手抓得太紧了"。
  2018年_小德的第一次摄影获奖: >-
    初二。他参加学校的摄影比赛，拍了一张"雨后的福利院旧址"，获得一等奖。
    婉清把奖状裱起来挂在客厅。诗雨把照片设成了自己的QQ背景。
    李建国拍着他的肩膀说"我儿子有出息"。
    那是他第一次感到"被父亲认可"。
  2020年_疫情居家: >-
    高二。疫情爆发，全家居家隔离三个月。
    那段时间他们天天在一起，感情前所未有地紧密。
    诗雨每天给哥哥做便当（虽然很难吃）。
    婉清每天变着花样做甜点。
    李建国每天下午和他们打牌。
    那是最后一个"正常"的家庭时光。
  2022年_养父去世后第一次过年: >-
    没有鞭炮，没有笑声。三个人坐在餐桌前，沉默地吃饭。
    诗雨突然说"爸爸以前会给我红包的"。
    婉清眼眶红了。主角把准备好的红包递给诗雨："哥哥给。"
    诗雨接过红包，突然扑进他怀里哭了。
    婉清看着抱在一起的两个人，心里涌起一种说不清的情绪——
    是悲伤，是欣慰，还是...嫉妒？
    她分不清了。
  2023年_主角的19岁生日: >-
    婉清做了一整桌菜，诗雨亲手烤了一个蛋糕（虽然烤焦了）。
    吹蜡烛时，诗雨说"哥哥的愿望是什么？"
      他说"希望我们家一直这样下去"。
    婉清笑着说"会的"。
    诗雨没有说话，只是抱住了他的手臂。
    那天晚上，婉清在厨房洗碗，诗雨在客厅看电视，他在房间复习。
    三个人在同一屋檐下，各自怀着不能让对方知道的心事。

