# 六、隐藏过往（未解锁内容，作为后续扩展）
# ============================================================
隐藏过往:
  主角的亲生父母: >-
    李德的父母并非死于煤气泄漏——至少官方记录是这样。
    实际上，他父亲有酗酒和家暴倾向。母亲长期忍受。
    那个"煤气泄漏"的夜晚，父亲喝醉了，母亲打开了煤气阀门。
    警方判定为意外。但2岁的李德被救出时，手里攥着母亲的衣角。
    这段记忆被他彻底压抑。但偶尔会梦见一个女人的脸和煤气味。
    → 若触发，将解释他对"家"的病态执着——不是单纯渴望温暖，更是恐惧再次被抛弃。
    → 解锁条件：主角病娇度/精神崩溃度达到某个阈值，或在终局篇的某个结局中触发。
  婉清的婚前经历: >-
    婉清在嫁给李建国之前，有过一段刻骨铭心的初恋。
    那个男人比她大十岁，是她的大学教授。两人有过一段不伦师生恋。
    最终男人为了前途抛弃了她，娶了校长的女儿。
    婉清此后封闭内心，直到遇到老实可靠的李建国。
    她以为那段往事已经过去了。但养子身上某种气质——安静、温柔、略带忧郁——
    和当年的教授如出一辙。
    → 若触发，将解释她为何对养子产生超越母爱的感情——不是单纯填补空缺，更是未完成的执念。
    → 解锁条件：婉清回忆「心跳加速」后，在特定场景（如深夜独处、婉清醉酒）触发。
  诗雨的出生秘密: >-
    诗雨并非李建国和婉清的亲生女儿。
    婉清因身体原因无法生育。诗雨是他们从另一家福利院领养的孩子。
    这个秘密只有李建国和婉清知道。诗雨一直以为自己是亲生的。
    而主角...也不知道这件事。
    如果诗雨知道自己是领养的，和哥哥一样...她对"血缘"的执着会瞬间瓦解还是加倍疯狂？
    → 若触发，将彻底颠覆诗雨的自我认知，可能成为某个结局的关键转折点。
    → 解锁条件：竞争篇或失控篇中，母女冲突白热化时可能暴露。
