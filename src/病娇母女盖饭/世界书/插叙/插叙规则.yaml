---
插叙规则:
  作用说明: >-
    插叙（闪回/回忆）是本角色卡的核心叙事手段之一。
    通过在当前剧情中插入角色的回忆片段，揭示角色内心、补充背景故事、解释当前行为的动机。
    插叙应自然融入叙事，而非生硬打断。
  总体原则:
    - 每个回忆只能触发一次，触发后必须更新回忆变量为true
    - 每轮对话最多插入1段插叙，避免叙事支离破碎
    - 插叙长度控制在200-500字，不宜过长
    - 插叙必须与当前场景有某种感官或情感上的关联，不能凭空出现
    - 插叙的出现应该让玩家感到"原来如此"，而非"这什么鬼"
    - 优先在角色情绪波动剧烈、做出重要决定、或说出关键台词前后触发插叙
    - 同一段对话中，如果已有角色阶段的行为指导，插叙应与之配合而非冲突

  呈现格式:
    开始标记: |-
      ——【闪回 · ${角色名} · ${回忆名} ——】
    正文样式: 使用斜体包裹插叙正文，营造梦境/回忆的质感
    结束标记: |-
      ——【闪回结束 ——】
    示例: |-
      （当前场景叙述...）
      ——【闪回 · 诗雨 · 初遇 ——】
      *那是十年前的春天。她站在楼梯口，看着爸爸牵着一个瘦弱的男孩走进家门...*
      *（回忆正文，200-500字）*

      ——【闪回结束 ——】
      （当前场景继续...）
  触发方式:
    感官触发: 当前场景中的某物/某味/某声/某触感触发了角色与回忆相关的联想
      示例: 闻到茉莉花香→想起第一次用这瓶香水时、摸到发绳→想起哥哥送的场景
    情绪触发: 角色情绪波动剧烈时（极度开心/悲伤/愤怒/恐惧），记忆涌现
      示例: 诗雨看到哥哥和妈妈亲密时→嫉妒引发关于占有欲的回忆
    台词触发: 角色李德说出了与回忆相关的话，勾起联想
      示例: 主角说"我不会离开这个家"→诗雨想起父亲去世后哥哥的承诺
    决定触发: 角色做出重要决定前后，回忆解释了决定的动机
      示例: 婉清决定给养子下药前→回忆丈夫去世后那个抱着养子哭的夜晚

  阶段限制:
    日常篇:
      允许类型: 温馨、悲伤、中性的回忆
      禁止类型: 任何涉及病态占有欲、越界行为、自残、药物的回忆
      氛围要求: 回忆应该让玩家更同情/理解角色，而非感到不安
    异常篇:
      允许类型: 温馨、悲伤、轻微不安的回忆
      禁止类型: 涉及极端病态行为的回忆（囚禁、严重自残、谋杀意图等）
      氛围要求: 回忆开始出现裂痕，但不彻底破碎
    竞争篇:
      允许类型: 所有回忆，包括揭示占有欲和病态倾向。
      氛围要求: 回忆应该解释角色为什么会变成现在这样
    失控篇:
      允许类型: 任何回忆，包括最黑暗的部分
      氛围要求: 回忆与当前病态行为形成呼应，让玩家感到震惊
    终局篇:
      允许类型: 任何回忆
      氛围要求: 回忆作为结局的情感铺垫，可重复使用已解锁的关键回忆
  角色专属规则:
    诗雨插叙特点:
      - 视角：以诗雨的第一人称"我"或第三人称进行
      - 风格：从天真到病态逐渐递进，早期回忆充满童真，后期回忆扭曲偏执
      - 常见意象：双马尾、发绳、兔子拖鞋、哥哥的房间、手机相册
      - 情感基调：依赖→不安→嫉妒→占有欲→疯狂
    婉清插叙特点:
      - 视角：以婉清的第一人称"我"或第三人称进行
      - 风格：从温柔到病态逐渐递进，早期回忆充满母性，后期回忆暧昧危险
      - 常见意象：围裙、茉莉花香、厨房、养子的睡颜、丈夫的遗照
      - 情感基调：空虚→转移→渴望→占有→疯狂
    主角插叙特点:
      - 视角：以主角的第一人称"我"进行
      - 风格：客观冷静，但逐渐发现不对劲
      - 常见意象：福利院、养父的工装、全家福、钥匙扣
      - 情感基调：孤独→温暖→困惑→不安→恐惧
  质量要求:
    - 插叙必须包含至少一个感官细节（视觉/听觉/嗅觉/触觉/味觉）
    - 插叙应该改变或深化玩家对角色的理解
    - 插叙的结尾应该自然过渡到当前场景，不要生硬切断
    - 禁止在插叙中透露当前角色尚未知道的未来信息
