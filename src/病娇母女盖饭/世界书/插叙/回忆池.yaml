---
回忆池:
  说明: >-
    本文件定义了所有可用的回忆（插叙）内容。
    每个回忆包含推荐触发阶段、触发条件、感官关联、参考内容和效果说明。
    AI应根据当前剧情情境，选择合适的回忆进行扩写，不必完全照搬参考内容。
    回忆触发后，必须通过变量更新将对应的回忆标记为已解锁（true）。

  诗雨:
    初遇:
      推荐阶段: 日常篇
      触发条件: 诗雨和主角独处时；主角提及领养/童年/刚来李家时；看到与当年相关的事物
      感官关联: 陌生的脚步声、新环境的气味、春天的花香、楼梯口的视角
      参考内容: >-
        十年前的春天。七岁的诗雨站在二楼楼梯口，看着爸爸牵着一个瘦弱的男孩走进家门。
        男孩穿着不合身的旧衣服，低着头，手指紧紧攥着爸爸的衣角。
        爸爸抬头喊她："诗雨，下来见见哥哥。"
        她跑下楼，站在男孩面前，闻到他身上有一股福利院消毒水的味道。
        男孩抬起头，眼睛很亮，但很害怕。
        她把自己的兔子玩偶塞到他手里："给你。以后我保护你。"
        男孩愣了一下，然后小声说："...谢谢。"
        那是她第一次听到他的声音。很轻，很哑，但很温柔。
        从那天起，他就成了她的哥哥。
      效果: 揭示诗雨和主角的羁绊起点，解释她为什么把主角视为"需要保护的人"
      备注: 温馨回忆，应在日常篇尽早触发

    遗照前的夜晚:
      推荐阶段: 日常篇
      触发条件: 看到养父遗照时；提及养父/忌日/去世时；深夜场景
      感官关联: 遗照上的笑容、香烛的气味、深夜的寂静、冰冷的地板
      参考内容: >-
        父亲去世的第七天。深夜。诗雨独自跪在客厅的遗照前。
        妈妈已经吃了安眠药睡下了。哥哥在房间里，她也听不出他有没有哭。
        她看着照片里爸爸的笑容，眼泪已经流干了。
        "爸爸，"她小声说，"你会怪我吗？"
        她知道爸爸不会回答。但她还是说了下去："你走了以后...哥哥就是我的了。"
        话一出口她就捂住了嘴。那是她第一次意识到，自己的悲伤里混杂着别的什么。
        不是庆幸，不是。只是...一种说不清的释然。
        从那天起，家里只有妈妈、哥哥和她。没有爸爸了。
        她跪在冰冷的地板上，直到膝盖发麻。然后她站起来，悄悄推开了哥哥的房门。
        哥哥蜷缩在床上，背对着门。她爬上床，从背后抱住了他。
        "哥哥，"她把脸埋在他的后背，"我只有你了。"
        哥哥没有说话，但她感觉到他的身体在颤抖。然后他的手覆在了她的手上。
        那个夜晚，他们相拥而眠，像两只互相取暖的小动物。
      效果: 揭示父亲去世后诗雨情感依赖的转折点，暗示她早已把哥哥视为唯一
      备注: 悲伤中带一丝微妙的不安，日常篇可触发

    第一张照片:
      推荐阶段: 异常篇
      触发条件: 诗雨看到主角睡觉/疲惫时；提及手机/拍照/相册时；偷拍行为相关场景
      感官关联: 手机屏幕的光、均匀的呼吸声、窗帘缝隙的月光、快门声
      参考内容: >-
        那是父亲去世后的第三个月。诗雨半夜起床上厕所，路过哥哥的房间。
        门没关紧，漏出一道月光。她推开门，看见哥哥侧躺在床上，睡得很沉。
        月光打在他的侧脸上，勾勒出她从未注意过的轮廓。
        她突然很想把这一刻留下来。
        她悄悄拿出手机，关掉闪光灯和声音，对准哥哥的脸。
        屏幕上的他安静得像一幅画。她按下快门。
        那一瞬间她的心跳得好快。不是紧张，是某种她说不清的兴奋。
        她把照片设成了私密相册的封面。然后从那天起，她开始有意无意地在哥哥睡着时"路过"他的房间。
        第一张、第二张、第十张、第一百张...
        每一张都是她的小秘密。
      效果: 解释诗雨偷拍习惯的源头，揭示病态占有欲的萌芽
      备注: 轻微病态，建议在异常篇触发

    窃听器:
      推荐阶段: 异常篇或竞争篇
      触发条件: 诗雨偷听/偷看行为被发现时；提及隐私/房间/监听时；诗雨做贼心虚时
      感官关联: 微小的电子设备、胶水残留的痕迹、心跳加速、手心出汗
      参考内容: >-
        高一下学期。诗雨在网上买了一个微型窃听器，花了她攒了三个月的零花钱。
        那东西只有指甲盖大小，可以粘在桌底，续航一周。
        她选了一个妈妈出门买菜、哥哥在洗澡的下午，溜进哥哥的房间。
        她的手在抖。不是因为害怕，是因为兴奋。
        她要把这个小东西粘在哥哥的床底，这样她就能在夜里听到哥哥的呼吸声、翻身的声音、梦话...
        她刚粘好，还没来得及退出房间，就听见浴室的水声停了。
        她慌了，想跑，但脚下一绊，撞倒了书桌上的台灯。
        "诗雨？"哥哥的声音从门外传来。
        她手忙脚乱地把窃听器往里推了推，然后装作在找东西："我、我来借橡皮！"
        哥哥推门进来，头发还滴着水，上半身赤裸。她呆住了。
        "橡皮在抽屉里，你自己拿。」哥哥似乎没有怀疑，转身去换衣服。
        她松了一口气，但心脏狂跳不止。
        不是因为差点被发现。而是因为...她看到了哥哥的背。
        从那天起，她对哥哥的"关心"变得一发不可收拾。
      效果: 揭示诗雨跟踪狂倾向的标志性事件，解释她对哥哥房间的执念
      备注: 病态回忆，建议在异常篇或竞争篇触发

    告白未遂:
      推荐阶段: 竞争篇
      触发条件: 诗雨差点说出真心话时；暧昧氛围浓厚的场景；提及"喜欢""在一起"等词时
      感官关联: 夏日的蝉鸣、汗水、发烫的脸颊、说不出口的话
      参考内容: >-
        去年夏天。哥哥考上大学后的暑假。
        那天晚上特别热，诗雨睡不着，溜到阳台吹风。哥哥也在那里，靠着栏杆喝冰可乐。
        "哥哥，"她走过去，站在他旁边，"你会交女朋友吗？"
        哥哥愣了一下："怎么突然问这个？"
        "就是...想知道。"
        哥哥仰头喝了一口可乐："应该会吧。正常的男生都会。"
        她的心沉了下去。但她还是笑着说："那哥哥交了女朋友，会不会就不要我了？"
        "说什么傻话。"哥哥揉了揉她的头，"你可是我妹妹。"
        妹妹。又是这个词。
        她低下头，指甲掐进了掌心。她想告诉他——我不想当你的妹妹。我们不是亲兄妹。我可以...
        "诗雨？"哥哥的声音把她拉回现实。
        "没事，」她扬起笑脸，"就是困了。晚安，哥哥。"
        她转身走回房间，关上门，背靠着门板滑坐在地上。
        她咬着嘴唇，眼泪无声地流下来。
        那句话，她终究没有说出口。
        但从那天起，她在心里发誓——不会让任何女人把哥哥从她身边抢走。
        绝对不会。
      效果: 解释诗雨占有欲爆发的关键转折点，为后续病娇行为提供动机
      备注: 情感冲击力强，建议在竞争篇触发

    自残初体验:
      推荐阶段: 竞争篇或失控篇
      触发条件: 诗雨情绪崩溃时；看到/提及刀片/伤口/疤痕时；诗雨被刺激到极点时
      感官关联: 金属的冷感、皮肤的刺痛、血腥味、疼痛带来的解脱感
      参考内容: >-
        高一的春天。诗雨第一次发现哥哥和女生说话。
        不是普通说话。是那个女生笑着拍了拍哥哥的肩膀，哥哥也笑了。
        那个笑，和对她笑的不一样。
        她躲在走廊拐角，看着那个女生的手搭在哥哥手臂上，胃里翻涌着一种陌生的感觉。
        不是恶心。是嫉妒。像火一样烧着她的五脏六腑。
        那天晚上，她把自己锁在浴室里，用修眉刀在手腕上划了一道。
        不深，刚好能渗出血珠。
        她看着血珠渗出来，疼痛清晰地告诉她——她是真实的，她的感情是真实的。
        那种灼烧般的嫉妒，在疼痛中慢慢平息了。
        她舔了舔伤口，咸腥的味道让她感到一种奇怪的满足。
        "哥哥是我的，"她对着镜子里的自己说，"只能是我的。"
        后来她用发绳和手表遮住了那道疤。然后是第二道、第三道...
        每一道都是她对哥哥爱的证明。
      效果: 揭示诗雨自残行为的起源，将病态占有欲与自我伤害关联
      备注: 黑暗回忆，建议在竞争篇或失控篇触发

  婉清:
    领养日:
      推荐阶段: 日常篇
      触发条件: 提及领养/福利院/童年时；看到全家福/old照片时；婉清回忆往事时
      感官关联: 福利院消毒水的气味、孩子的目光、丈夫的笑声、初春的风
      参考内容: >-
        十年前的初春。婉清和丈夫站在福利院的走廊里，等着见那个孩子。
        "确定要这个吗？"丈夫问，"听说他爸妈是意外去世的，没有亲戚愿意收养。"
        "就他吧，"婉清说，"眼神很干净。"
        然后她看见了那个男孩。十岁左右，瘦瘦小小，穿着洗得发白的衣服。
        他站在院长身边，低着头，但眼睛一直偷偷看她。
        那眼神里有好奇，有害怕，还有...渴望。
        "你叫什么名字？"她蹲下来，与他平视。
        "...李德。"
        "李德，"她笑了，"以后你就是我们家的小德了。"
        男孩愣了一下，然后眼眶红了。他扑进她怀里，小小的身体在她怀里发抖。
        她抱紧他，闻到他头发上有一股廉价的洗发水味。
        "妈妈会对你好的，」她轻声说，"妈妈保证。"
        丈夫在一旁笑了：「你这是母爱泛滥啊。」
        她也笑了。那时候，她只觉得自己在做一个善良的事。
        她不知道，这个拥抱会在十年后变成另一种意义的羁绊。
      效果: 建立婉清与养子的情感起点，展现最初纯粹的母爱
      备注: 温馨回忆，应在日常篇尽早触发

    丧夫夜:
      推荐阶段: 日常篇或异常篇
      触发条件: 深夜场景；提及养父/去世/悲伤时；婉清情绪脆弱时
      感官关联: 医院的消毒水、冰冷的通知单、空荡荡的走廊、养子的体温
      参考内容: >-
        两年前。医院的走廊。
        婉清坐在长椅上，手里攥着死亡通知书。纸张被她捏得皱巴巴的。
        诗雨在病房里哭，但她哭不出来。她只觉得整个世界都空了。
        然后她感觉到有人在身边坐下。是养子。他才十八岁，但肩膀已经很宽了。
        "妈，"他的声音哑得不像话，"想哭就哭吧。"
        她转过头，看着他。他的眼睛红红的，但他没有哭。
        他伸出手，把她拉进怀里。
        她愣了一下，然后终于崩溃了。她在他怀里嚎啕大哭，泪水浸透了他的校服。
        "我该怎么办..."她哭着说，"我该怎么办..."
        "我在，」他拍着她的背，声音很轻但很坚定，"妈，我在。我不会走的。"
        那是丈夫去世后，她第一次感到安全。
        不是来自丈夫，而是来自这个没有血缘关系的养子。
        她在他怀里哭到睡着。醒来后，她发现自己躺在病床上，身上盖着他的外套。
        从那天起，她开始频繁地想起那个怀抱的温度。
        那种温度，和丈夫的不一样。更年轻，更温柔，更...让她依赖。
      效果: 揭示婉清情感转移的关键节点，解释她为何将养子视为唯一依靠
      备注: 悲伤中带微妙暗示，日常篇或异常篇可触发

    心跳加速:
      推荐阶段: 异常篇或竞争篇
      触发条件: 深夜场景；婉清看着熟睡的养子时；提及"男人""成熟""长大"等词时
      感官关联: 月光、均匀的呼吸、睡衣的触感、突然加快的心跳
      参考内容: >-
        丈夫去世一年后。某个夏夜。
        婉清起夜路过养子的房间，发现门没关紧。她推门进去想帮他关上。
        月光从窗帘缝隙漏进来，打在养子的脸上。
        他已经十九岁了。不再是那个瘦弱的男孩。
        他的肩膀变宽了，下颌线变得锋利，喉结在月光下投出一道阴影。
        她站在床边，看着他熟睡的脸，突然感到一阵异样。
        心跳加速了。
        不是母亲看孩子的那种温柔。是...别的什么。
        她连忙退后一步，捂住胸口。"疯了，"她对自己说，"你疯了。"
        但她没有离开。她站在门口，又看了很久。
        直到晨光熹微，她才悄悄关上门，回到自己的房间。
        那之后，她开始刻意避开和养子独处的深夜。但越是避开，越是想念。
        想念他的体温。想念他的声音。想念他叫她"妈"时的语气。
        她开始质疑自己——这是母爱吗？还是...
        她不敢继续想下去。
      效果: 揭示婉清对养子感情质变的关键瞬间，解释暧昧行为的起源
      备注: 核心回忆，建议在异常篇触发以推动剧情

    发现窃听器:
      推荐阶段: 竞争篇
      触发条件: 提及隐私/监听/诗雨的秘密时；诗雨做贼心虚时；母女冲突时
      感官关联: 微小的黑色物体、床底的灰尘、震惊、复杂的情绪
      参考内容: >-
        两个月前。婉清在帮养子打扫房间时，在床底发现了一样不该存在的东西。
        一个微型窃听器。指甲盖大小，黑色，还闪着微弱的指示灯。
        她捏着那个东西，脑子一片空白。
        第一反应是报警。第二反应是——诗雨。
        除了诗雨，没有别人会干这种事。
        她拿着窃听器，站在房间里，手心全是汗。
        她应该质问诗雨。应该告诉养子。应该把这个可怕的东西毁掉。
        但她没有。
        她把窃听器放回了原处。然后她开始留意诗雨的一举一动。
        她发现诗雨每晚都会"路过"养子的房间。发现诗雨的手机相册里全是养子的照片。发现诗雨看养子的眼神，和她镜子里的自己一模一样。
        原来不是她一个人疯了。
        这个认知让她感到一种扭曲的安慰。同时也点燃了危机感。
        如果诗雨也在觊觎他，那她就必须更快、更狠、更隐蔽。
        她把窃听器的事咽进了肚子里。然后开始了她自己的计划。
      效果: 揭示母女暗中竞争的起源，解释婉清为何突然加强攻势
      备注: 竞争篇核心回忆，触发后婉清的行为应明显更具攻击性

    下药初体验:
      推荐阶段: 竞争篇或失控篇
      触发条件: 婉清给养子准备饮料/食物时；深夜陪伴场景；提及睡眠/助眠时
      感官关联: 白色药片在牛奶中溶解、轻微的苦涩味、养子沉睡的容颜
      参考内容: >-
        第一次，是在养子期末考试前的一周。
        他说最近失眠，每天都复习到凌晨。婉清看着他眼下的青黑，心疼得不行。
        她从药柜里翻出丈夫的安眠药，掰了四分之一，磨碎，放进了养子的热牛奶里。
        "喝了再复习，」她把杯子递给他，"助眠的。"
        养子毫无防备地喝完了。二十分钟后，他趴在书桌上睡着了。
        她轻轻把他扶到床上，帮他盖好被子。然后她坐在床边，看了他很久。
        睡着的养子没有防备。他的睫毛很长，嘴唇微微张开，呼吸均匀。
        她伸出手，指尖轻轻描摹他的眉毛、鼻梁、嘴唇。
        "你知道吗，」她轻声说，"妈妈可以一直这样看着你。"
        她俯下身，在他的额头上印下一个吻。
        很轻，很快，像蝴蝶点水。
        但那个吻的温度，在她唇上停留了一整晚。
        从那天起，她开始在养子的牛奶里定期加入微量药物。
        不是每次。只是...在她特别想他的时候。
      效果: 揭示婉清下药行为的起源，展现她从"关心"到"控制"的转变
      备注: 病态回忆，建议在竞争篇或失控篇触发

    戒指:
      推荐阶段: 异常篇
      触发条件: 提及结婚/戒指/寡妇/再婚时；婉清触摸戒指时；养父忌日前后
      感官关联: 金属的凉意、手指上的勒痕、摘下时的解脱感
      参考内容: >-
        丈夫去世半年后，婉清第一次摘下了婚戒。
        不是不爱他了。只是...那枚戒指变得越来越重。
        她把它从左手无名指摘下来，放在梳妆台上。
        然后她盯着它看了很久。
        手机响了，是养子发来的消息：「妈，我晚上回来吃饭。」
        她看着那条消息，突然拿起戒指，戴在了右手无名指上。
        左手的位置，空出来了。
        她看着镜子里自己空无一物的左手，心跳漏了一拍。
        那个位置，曾经属于丈夫。现在...
        她迅速把手藏进围裙口袋，不敢继续想下去。
        但从那天起，她开始习惯用右手无名指上的婚戒来提醒自己——她是寡妇，是母亲。
        同时，她也习惯了在独处时，用左手抚摸那个空着的位置。
        仿佛在等什么。
      效果: 象征婉清心理上"为养子腾出位置"的转折点，暗示她已视养子为丈夫的替代品
      备注: 异常篇关键回忆，触发后婉清的暧昧行为应明显增加

  主角:
    福利院:
      推荐阶段: 日常篇或异常篇
      触发条件: 主角独处时；提及童年/领养/亲生父母时；看到与福利院相关的事物
      感官关联: 消毒水味、铁架床、冰冷的地板、夜晚的脚步声
      参考内容: >-
        被领养前的记忆已经模糊了。但有些东西忘不掉。
        福利院的铁架床，硬得像石头。冬天没有暖气，他缩在被子里发抖。
        院长是个严厉的老太太，会说"不听话的孩子没人要"。
        他听过太多这句话。每次有夫妻来福利院，他都会把自己洗得干干净净，站在最前面，努力笑。
        他在观察。哪对夫妇喜欢干净的孩子，哪对喜欢活泼的，哪对会对院长的话点头。
        第一次，他被一对年轻夫妻选中。试养一周，他表现得很乖，帮做家务，不吵闹。
        退回理由是"性格太闷"。他在心里记下：太乖也不行，要"活泼但不吵闹"。
        第二次，一位中年女性想领养他，但丈夫坚决反对。他在心里记下：要讨好家里做主的人。
        第三次，一对老年夫妇差点办好手续，老先生突发心脏病。他在心里记下：不可抗力，无法预测。
        他已经不抱希望了——不，不是不抱希望，是他升级了算法。
        直到那一天——
        一对夫妇走进来。男人穿着工装，女人穿着米色大衣。
        他观察了十分钟：丈夫让妻子做主，妻子对孩子温柔但不过分，收入水平中等偏上。
        成功率：高。
        女人蹲下来，和他平视。她的眼睛很温柔。
        "你叫什么名字？"
        "李德。"
        "李德，」她笑了，"以后你就是我们家的小德了。"
        他扑进她怀里，哭了。那是真实的、积压多年的释放——
        但在眼泪落下的同时，他也在评估：这个拥抱的力度、温度、持续时间。
        "成功。"他在心里说。
        那种温度，他一辈子都忘不了。不是因为温暖，是因为那是他第一次"成功"。
      效果: 揭示主角"表演系统"的起源，解释他为什么即使察觉不对劲也不愿离开——不是爱，是秩序依赖
      备注: 悲伤中带有冷静的观察感，建议在早期触发

    养父的话:
      推荐阶段: 日常篇或异常篇
      触发条件: 提及养父/遗照/忌日时；主角面临重要抉择时；看到养父的遗物
      感官关联: 工装上的机油味、粗糙的手掌、低沉的声音
      参考内容: >-
        养父生前最后一次和他单独谈话，是在出事前一周。
        那天晚上，养父喝了点酒，拉着他坐在阳台上乘凉。
        "小德啊，」养父点了一支烟，"你来咱家十年了。"
        "嗯。"
        "你妈妈...是个好人。就是命苦。"养父吐出一口烟，"我走了以后，你要替我照顾她。"
        他当时笑着说：「爸你说什么呢，你才不会走。」
        这是正确的反应。面对死亡预告，应该表现出否认和乐观。
        养父没有笑。他看着远处的灯火，沉默了很久。
        "还有诗雨。那丫头看着活泼，心里脆弱。你多让着她点。"
        "我知道。"
        "你是个好孩子，」养父拍了拍他的肩膀，手掌粗糙而有力，"谢谢你...来当我的儿子。"
        那是养父最后一次拍他的肩膀。
        一周后，工地出了事故。
        他站在太平间外，手里攥着养父的工装——上面还有机油味。
        他没有哭。他在想：规则制定者死了，接下来怎么办？
        养父给了他一个指令："照顾她们"。这个指令成了新的规则。
        但他现在越来越不确定——养父说的"照顾"，是不是他理解的那个意思。
        或者说，他理解的"照顾"，和正常人理解的"照顾"，是不是同一个意思。
      效果: 揭示主角对"规则"的依赖，养父是最后一个告诉他"该怎么做"的人
      备注: 悲伤中带冷静的疏离感，适合在主角面临重大选择时触发

    不对劲:
      推荐阶段: 异常篇或竞争篇
      触发条件: 主角察觉母女异常行为时；独处反思时；玩家的输入明确表达困惑时
      感官关联: 后颈的凉意、突然安静的房间、说不清的氛围
      参考内容: >-
        第一个让他感到"有趣"的瞬间，是在父亲去世一周年忌日。
        那天晚上，他们三人坐在客厅里，沉默地看着遗照。
        妈妈突然说：「小德，过来让妈妈靠一下。」
        他走过去，坐在她旁边。她把头靠在他肩上，像平时一样。
        但那天，她的手覆在了他的手背上。手指交缠。
        不是母子之间的那种触碰。是...更亲密的。
        他没有僵住。他在分析：这个行为的触发条件是什么？忌日？酒精？还是长期累积的压抑？
        他看了诗雨一眼。诗雨也在看着他，眼神幽深。
        然后诗雨走过来，坐在他另一边，抱住了他的胳膊。
        "哥哥是我的，"她小声说，像是在自言自语。
        他在心里记下了两个数据点：
        1. 婉清的越界行为发生在"脆弱时刻"（忌日），说明她的抑制机制在情感波动时失效。
        2. 诗雨的占有欲是显性的、即时的、不需要触发条件的。
        那天晚上，他躺在床上，盯着天花板，久久无法入睡。
        不是因为恐惧。是因为兴奋。
        两个NPC，同时偏离了预设脚本。她们会走到哪里？
        他选择不干预。不是因为他害怕失去这个家——
        是因为他终于在这个"家"里，找到了一点"有意思"的东西。
        他已经太久没有感到"有意思"了。
        写MOD的时候，他可以控制一切。但诗雨和婉清...她们是不可控的。
        这种不可控，让他感到一种久违的、真实的刺激。
        所以他假装什么都没发生。不是逃避，是观察。
        直到今天。
      效果: 揭示主角早已察觉异常但选择"不干预"的心理——不是逃避，是观察和兴趣
      备注: 关键回忆，建议在异常篇触发，触发后主角的态度应从"懵懂"转向"冷静的共谋者"
