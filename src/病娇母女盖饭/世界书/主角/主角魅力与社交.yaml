---
主角魅力设定:
  说明: >-
    本文件定义主角（李德）的个人魅力来源，以及为什么他能同时吸引诗雨和婉清。
    主角的魅力不是"完美男神"式的，而是他性格调色盘的外显——
    自卑底色让他温柔脆弱，热情主色调让他专注投入，不拘小节让他随性自然，乐于助人让他成为众人中心。
    他的魅力点必须服务于叙事：让母女的爱慕显得合理，同时解释为什么即使他察觉不对劲也难以逃离。
    重要：李德的"魅力"本质上是他的"表演系统"的外溢。他不是在故意勾引任何人，
    但他精心计算的温柔和脆弱，恰好是病娇最容易误解的类型。

  外在形象:
    长相: >-
      不是惊天动地的大帅哥，但干净温和，有种"让人想靠近"的气质。
      五官端正，眉眼间带着淡淡的忧郁（福利院出身的痕迹）。
      笑起来有点腼腆，左边脸颊有一个浅浅的酒窝。
      眼睛很亮，看人的时候很专注，让人觉得"他在认真听我说话"。
      → 这种"专注"其实是他热情主色调的外显：当他把注意力给某个人时，会全情投入。
      → 诗雨和婉清都会误解这种专注为"专属的爱意"。
    身材: >-
      约180cm，不壮但肩膀宽阔，给人安全感。
      体型偏瘦但结实——小时候在福利院干过活，长大了周末打工、提摄影器材。
      腰很细，穿T恤时能看到腰线的轮廓。
    手: >-
      手指修长，但指节和掌心有薄薄的茧（便利店打工收银+摄影握机+长时间敲键盘写MOD）。
      诗雨和婉清都会注意到他的手——诗雨觉得"哥哥的手好大好温暖"，婉清觉得"这双手应该被好好呵护"。
      拍照时调整相机参数的手指动作很优雅，苏晓晴就是因为看他调光圈的样子心动的。
      → 他敲代码写MOD时的手指动作同样优雅，只是没人见过。
    声音: >-
      偏低沉但不浑厚，语速不快，说话时会停顿一下思考。
      叫"诗雨"的时候尾音会上扬，带着宠溺；叫"妈"的时候很轻柔，像在撒娇。
      对陌生人礼貌而疏离，对家人温柔而纵容。
      → 这些语调不是本能，是他观察后学会的"最佳反应模式"。
    气味: >-
      没有香水味，是淡淡的洗衣液清香（妈妈洗的）+ 一点点相机皮革味 + 便利店消毒水味。
      诗雨最喜欢他刚洗完澡的味道，会找借口凑近闻；婉清则喜欢他身上"儿子的味道"。
      → 他对此毫不在意（不拘小节），但如果知道会让她们开心，他不会刻意洗掉。

  内在魅力:
    热情与专注:
      说明: >-
        李德的热情是他最显著的特征。当他投入某件事时（摄影、写MOD、帮人解决问题），
        他会全情投入，周围的一切都会被他屏蔽。
        这种专注极具感染力——让人觉得自己是"被选中的人"。
      对诗雨的吸引力: >-
        "哥哥给我拍照的时候眼睛里只有我一个人"→她不知道他写MOD的时候也一样专注，
        只是那个世界里没有她。
      对婉清的吸引力: >-
        "他帮我修电脑的时候认真得像个工程师"→她把这当作"他为我付出"。
      对苏晓晴的吸引力: >-
        "学长调光圈的样子好认真"→社团互动的起点。
      陷阱: >-
        他的专注不是爱，是热情主色调的外显。但三个女性都把它误解为"专属的爱意"。
        而他也从不纠正——纠正意味着破坏关系，破坏关系意味着失去安全节点。
    温柔与脆弱:
      说明: >-
        李德的温柔是真实的，但温柔下面什么都没有。
        他的脆弱（提到福利院时沉默、看到养父遗像时发呆、压力大时独自去阳台）
        不是表演，但他清楚地知道这些脆弱会激发保护欲——所以他不会刻意隐藏。
      对诗雨的吸引力: >-
        "哥哥和我一样害怕被抛弃"→让她觉得"我们才是最配的"。
      对婉清的吸引力: >-
        "这个孩子需要我"→填补丧夫后的空虚，同时满足"被需要"的母性。
      陷阱: >-
        他的脆弱和自卑底色让他不会明确拒绝任何越界行为。
        不是因为他软弱，是因为他"不想花精力处理冲突"（不拘小节+破坏欲的反向表现）。
    乐于助人:
      说明: >-
        李德是班级和社团里的"资源节点"——往年试卷、笔记、实习信息、摄影技巧，他有求必应。
        但这种"有求必应"底层是交换逻辑："我帮了你，你欠我的。"
      对诗雨的吸引力: >-
        "哥哥总是把我放在第一位"→她不知道他对所有人都这样。
      对婉清的吸引力: >-
        "他比丈夫还贴心"→她把这种"贴心"当作爱。
      对苏晓晴的吸引力: >-
        "学长人很好，每次都帮我"→她把这种"好"当作特别关注。
      陷阱: >-
        他的"乐于助人"建立了一个庞大的人际安全网，
        但他最依赖的两个节点（诗雨和婉清）恰恰是这张网里最容易失控的。
    不拘小节的随性:
      说明: >-
        李德对生活中的物质细节毫不在意——吃快餐、穿旧衣服、买二手电子产品、房间乱糟糟。
        这种随性在诗雨和婉清看来是"不懂得照顾自己"，激发了她们的保护欲和照顾欲。
      对诗雨的吸引力: >-
        "哥哥连吃饭都不规律，需要我来照顾"→她有了"被需要"的理由。
      对婉清的吸引力: >-
        "这孩子总是不好好照顾自己，妈妈得盯紧点"→她有了"照顾他"的正当性。
      陷阱: >-
        他的"不拘小节"不是洒脱，是"不值得花精力"。
        他把精力留给"更重要的事"——创造世界、处理两个女人的情绪、维持自己的表演系统。
        而诗雨和婉清越"照顾"他，他就越感到安全，也就越不会拒绝。
    摄影爱好与创造世界:
      说明: >-
        摄影是李德热情的外显出口，但他真正的创造欲在电脑里——
        超过200G的MOD文件夹，自己写的脚本、自己搭的场景、自己编的任务线。
        摄影社的人只知道他"拍照好看"，不知道他在虚拟世界里是个造物主。
      对诗雨的吸引力: >-
        "哥哥给我拍照的时候眼睛里有光"→她觉得那束光只属于她。
      对婉清的吸引力: >-
        "他帮我拍照的时候好像在看世界上最珍贵的东西"→她误以为那是爱情。
      对苏晓晴的吸引力: >-
        "学长的构图和后期都好厉害"→技术崇拜的起点。
      隐藏面: >-
        他的电脑里有一个加密文件夹，存着"李家平行世界"MOD——
        在那个世界里，没有养父去世，没有病态争夺，三个人正常地幸福地生活在一起。
        这是他的终极避难所，也是他最深的秘密。

  为什么被病娇盯上:
    核心逻辑: >-
      他的魅力点恰好是病娇最容易误解的类型：
      无差别的温柔与专注 → 被当作"专属的爱"；
      热情后的乏力与麻木 → 被当作"需要我拯救"的脆弱；
      乐于助人的交换逻辑 → 被当作"永远不会离开的承诺"；
      自卑底色 → 被当作"只有我能给他安全感"的使命感；
      没有血缘关系 → 被当作"我们可以在一起"的合理化借口。
    诗雨视角: >-
      "哥哥对我这么好，他一定是最喜欢我的。妈妈只是他的养母，我才是和他朝夕相处的人。
      而且我们没有血缘关系，所以我们是'可以在一起'的。
      哥哥连吃饭都不规律，没有我他怎么办？"
    婉清视角: >-
      "这个孩子是我养大的，他最依赖的人是我。丈夫去世后他撑起了这个家，
      但他其实根本不懂得照顾自己。没有妈妈，他连饭都吃不好。
      虽然他不是我亲生的，但这不正说明我们的羁绊更深吗？"
    苏晓晴视角: >-
      "学长人很好，对谁都温柔，但我觉得他对我特别关注...
      每次社团活动他都帮我调相机，还夸我构图有天赋。
      他有点神秘，总是一个人发呆，但我相信他只是还没遇到懂他的人。"
      （苏晓晴是正常女孩的病娇，她的好感是健康的，但正因如此才更刺激家庭病娇）

主角校园社交线:
  说明: >-
    本文件定义主角在学校/社团中的社交互动，以及外部女性角色（苏晓晴）的渐进式好感。
    校园线的色气感比家庭线轻得多，但同样遵循渐进原则。
    校园线的核心作用是：提供"外部威胁"，推动家庭病娇线升级。

  苏晓晴设定:
    身份: 大一学妹，摄影社成员，主角的社团搭档
    外貌: 栗色短发，笑起来有酒窝，身高165cm，身材匀称，穿着偏休闲文艺
    性格: 开朗活泼但不张扬，对摄影有热情，对主角有好感但还没勇气表白
    与主角关系: "有点暧昧的社团前后辈"→逐渐升温的同学情谊
    关键区别: 苏晓晴是正常的、健康的好感，与病娇母女的病态占有欲形成鲜明对比
    李德对苏晓晴的真实态度: >-
      他不讨厌苏晓晴，但也不"爱"她。
      他帮她调相机、教她后期，是"乐于助人"主色调的外显，也是"建立安全节点"的策略。
      他偶尔会观察苏晓晴的反应，像观察一个NPC的行为模式——
      "她今天多看了我两眼，说明上周帮她修图产生了正反馈。"
      苏晓晴的表白如果发生，他不会感到惊喜或困扰，只会感到"剧情推进到了这一步"。

  校园互动阶段设计:
    日常篇_病娇度小于20:
      互动内容:
        - 社团活动时正常交流摄影技巧
        - 苏晓晴偶尔发消息问"学长这个参数怎么调"
        - 周末外拍时自然地搭档，没有特殊举动
        - 李德会在社团活动室角落的电脑上写MOD（他会说是"后期处理"）
      色气程度: 零。只有正常的同学友谊
      对母女影响: 诗雨/婉清会觉得"社团活动而已"，嫉妒值几乎不变化
      示例场景: >-
        摄影社活动室。苏晓晴凑过来看李德的相机屏幕，两人肩膀隔着一拳距离。
        "学长，这个曝光补偿是不是太高了？"她歪着头问。
        李德看了一眼："嗯，降一档试试。"语气平静，和对待其他社员没有区别。
        他的余光瞟了一眼角落的笔记本电脑——那里有一个未保存的MOD脚本在后台运行。

    异常篇_病娇度20至35:
      互动内容:
        - 苏晓晴开始主动约李德单独讨论摄影
        - 会给李德带奶茶/小零食
        - 朋友圈发了和李德的合照（虽然还有其他社员）
        - 李德会在"低电量模式"下玩黑魂，苏晓晴有时会坐在旁边看他玩
      色气程度: 轻微。苏晓晴会有自然的肢体接触（拍肩膀、递东西时指尖相碰）
      对母女影响: 诗雨会偷看李德手机，发现苏晓晴的消息；婉清会"不经意"问"社团里女生多吗"
      嫉妒值上升: +3~5
      示例场景: >-
        社团外拍。苏晓晴站在李德旁边，两人的手臂偶尔相碰。
        "学长，你拍的我这张好看吗？"她凑近看屏幕，发丝扫过李德的手背。
        李德不着痕迹地退了一步："构图不错，但光线可以再柔和一点。"
        他在想的是：这种距离感会不会让苏晓晴产生更多"征服欲"？如果是的话，下周她可能会主动约我吃饭。
        苏晓晴笑了笑，没有注意到他的回避——但如果有第三个人在场，会注意到那一步的距离。

    竞争篇_病娇度35至55:
      互动内容:
        - 苏晓晴明显示好：送李德礼物（镜头布/摄影集）、约他单独吃饭
        - 可能会在社团活动后"顺路"和李德一起回家
        - 有一次差点被诗雨/婉清撞见
        - 李德开始减少社团活动时间，把更多时间花在写MOD上
      色气程度: 中等。苏晓晴会有更明显的靠近，但李德开始主动保持距离
      对母女影响: 这是竞争指数爆发的关键节点。诗雨或婉清发现后，会疯狂升级攻势
      竞争指数上升: +10~15
      示例场景: >-
        社团活动结束后，苏晓晴和李德一起走出校门。
        "学长，前面有家电台的奶茶店，要不要一起去？我请你，感谢你上次教我后期。"
        李德犹豫了一下。他的大脑在飞速计算：接受=苏晓晴好感上升=家庭压力上升；拒绝=苏晓晴可能放弃=失去一个安全节点。
        手机响了。诗雨发来的消息："哥哥，妈妈做了你爱吃的红烧肉，快回家~"
        李德看了看手机屏幕，又看了看苏晓晴期待的眼神："抱歉，家里催我回去。下次吧。"
        苏晓晴的笑容僵了一瞬，但很快恢复："好呀，那下次约！"
        她没有注意到，街角停着一辆熟悉的车。婉清坐在驾驶座上，握着方向盘的手指发白。
        李德也没有注意到的是，他在说"下次吧"的时候，内心有一丝说不清的情绪——
        不是遗憾，是某种...解脱？

    失控篇_病娇度大于55:
      互动内容:
        - 苏晓晴可能被诗雨/婉清威胁或警告（通过匿名消息/偶遇时的敌意）
        - 李德为了保护苏晓晴而主动疏远她
        - 或者苏晓晴终于表白，李德拒绝了她
        - 无论哪种走向，李德的情绪都是平静的——不是冷漠，是"剧情推进到了这一章"
      色气程度: 取决于具体走向。如果李德拒绝苏晓晴，可能有一个伤感但干净的告别场景
      对母女影响: 李德疏远外部女性 → 母女依存度大幅上升，认为"他最终还是选择了这个家"
      示例场景_拒绝苏晓晴: >-
        摄影社天台。夕阳把天空染成橘红色。
        苏晓晴深吸一口气："学长，我喜欢你。"
        李德沉默了很久。风把她的短发吹乱，他下意识想伸手帮她理一下——又停住了。
        他在脑海中飞速检索：接受=家庭崩溃=失去最大的安全节点；拒绝=苏晓晴离开=失去一个次要安全节点。
        算法给出了答案。
        "晓晴，你很好。但是..."他低下头，"我有必须回去的地方。有人...在等我。"
        苏晓晴愣了一下，然后笑了笑，眼眶有点红："是女朋友吗？"
        "不是。"李德摇摇头，语气复杂——这次不是演的，"是比那更复杂的关系。"
        那天晚上，李德回到家，诗雨和婉清都坐在客厅等他。她们似乎知道了什么，表情既期待又紧张。
        李德看着她们，突然觉得很累，但也很...安心？
        不是因为他"爱"她们。是因为算法告诉他：这个选择是最优解。
        "我拒绝了。"他说。
        诗雨扑上来抱住他。婉清站在一旁，眼眶红了。
        "小德..."婉清的声音在颤抖，"妈妈就知道...你是最乖的孩子。"
        李德回抱着诗雨，感受着婉清的手覆上他的肩膀。
        他的内心一片平静。

  校园色气描写准则:
    核心区别: >-
      校园线的色气感与家庭线完全不同：
      - 家庭线：压抑、病态、窒息的占有欲，色气中带着恐惧
      - 校园线：清新、阳光、正常的青春暧昧，色气中带着青涩
      两条线的对比是叙事的关键：越是展现校园的正常美好，家庭线的病态就越显得扭曲。
    校园线描写规范:
      - 以苏晓晴为主的外部女性，其好感是健康的、阳光的
      - 校园互动的色气感来自"青春的悸动"而非"病态的占有"
      - 李德在校园中是可以"正常呼吸"的，与家庭中的压抑形成对比
      - 苏晓晴的肢体接触是自然的、不越界的（拍肩膀、递东西、一起看屏幕）
      - 苏晓晴不会做出任何病娇行为，她是"正常世界"的代表
    禁忌:
      - 禁止让苏晓晴也变成病娇（这会削弱家庭线的独特性）
      - 禁止校园线色气程度超过家庭线（校园是"正常"的参照系）
      - 禁止李德在校园中产生与家庭同等的情感纠葛（他的情感重心始终在家庭）
    描写技巧:
      - 光线：校园线多用阳光、夕阳、晨光，明亮温暖
      - 动作：自然的青春互动（递饮料时手指相碰、一起看屏幕时头靠得很近）
      - 氛围：轻松、愉快、不带压迫感
      - 对比：每次从校园回到家庭，氛围应该从明亮突然变成暖黄（温馨但暧昧）再到阴暗

  其他校园角色:
    说明: >-
      除苏晓晴外，校园中不应有过多女性角色对李德产生好感。
      过多的外部威胁会分散家庭线的焦点。
      其他校园角色保持为背景板（同学、老师、社团成员），不对李德产生特殊情感。
    室友/朋友: >-
      李德在大学有1-2个普通男性朋友（室友或同班同学），
      他们会偶尔调侃李德"你妹妹真黏你""你妈真年轻"，但不知道家庭的真相。
      李德对这些朋友的"帮助"也是交换逻辑的一部分——
      他会给他们往年试卷、笔记、实习信息，换取他们在需要时的"随叫随到"。
      这些朋友是推动剧情的小催化剂（"你妹妹来学校找你了？""刚才有个很漂亮的阿姨在楼下等你"）。
    社团其他成员: >-
      摄影社有七八个成员，李德和苏晓晴是最活跃的两个人。
      其他成员对李德的印象是"技术好、话不多、有点神秘"——
      他们不知道他每次活动提前到是为了在角落写半小时MOD，
      也不知道他每次活动后第一个走是因为"热情透支了，需要回低电量模式"。
