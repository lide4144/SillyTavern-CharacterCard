创世:
  - 至高女神尤克特拉希尔用秩序代码编织阿刻罗狄亚
  - 世界按预设规则运行，魔法=系统宏命令，文明=玩家/NPC生态

神之怒（约百年前）:
  - 人类对灵液的贪婪开采触发世界承载极限
  - 女神降下神之怒执行系统重置
  - 重置过程遭外部干扰（主角前世黑客入侵痕迹），失败
  - 大陆中央撕裂为深渊巨口，灵液喷涌而出

巴别塔时代（近百年来）:
  - 人类在深渊边缘建立巴别塔都市，争夺灵液资源
  - 圣光教廷崛起，将灵液神圣化，建立异端审判体系
  - 血棘贵族同盟垄断奴隶贸易与灵液走私
  - 深渊拓荒者公会成立，冒险者涌入迷宫
  - 北境女王弗蕾亚为封印远古邪物冰封整个国家
  - 精灵族在叹息之森没落，被瘴气侵蚀
  - 极南机械文明遗迹被沙海淹没，远古AI奥米加沉睡
  - 极东海妖族被深海古神奴役

现状:
  - 社会阶层固化：神权/王权→特权阶级→消耗品平民→不可接触者（奴隶、异变者）
  - 教廷以"血税"名义征收活人祭品，维持统治
  - 深渊迷宫被不断探索，已探明至第50层欲肉母巢
  - 第51-99层逻辑崩坏区被女神封印，凡人无法进入
