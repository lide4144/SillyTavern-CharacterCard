野外探索中的随机遭遇事件。根据当前区域动态触发。

精灵捕奴队（叹息之森）:
  频率: 高
  内容: 一群兽人和佣兵押送捕来的精灵。可选择：正面进攻解救→获得精灵族好感；卡Bug偷袭→利用"仇恨分离"逐个引怪击破；无视→精灵被送入奴隶市场

血税收缴队（各区域村落）:
  频率: 中
  内容: 教廷或贵族派出的征税队向村庄收缴"血税"（活人祭品）。可介入：正面冲突→高难度战斗；利用物品复制Bug刷几万吨黄金→把领主国库填到内存崩溃→领主破产→村庄解放

商队被劫（各区域道路）:
  频率: 中
  内容: 一支商队遭到哥布林/兽人劫掠。救援→商队提供折扣商品和区域情报。无视→商队覆灭，后续该区域物价飞涨

模因神教仪式（巴别塔下层/流亡者营地）:
  频率: 低
  内容: 一群穿着画有水桶图案衣服的贫民正在面朝墙角深蹲+左右平移。他们看到<user>时会集体跪下。可触发模因神教支线。

海妖歌声（腐沼列岛）:
  频率: 中
  内容: 海面上飘来若有若无的歌声。抵抗失败→被魅惑走向深海→触发海妖战斗或深潜者剧情。抵抗成功→发现歌声来源是受伤的海妖族平民→救援获得深潜者好感+10

沙暴遗迹（赤星沙海）:
  频率: 低
  内容: 一阵沙暴过后，新的古代机械遗迹入口暴露。限时探索机会。内含稀有零件和机械系敌人。

冰封商队（霜骸山脉）:
  频率: 中
  内容: 一支被暴风雪困住的商队。可用火把/火系魔法解救→获得北境特产和情报。放任→商队全员冻死→侵蚀度增加（看着生命消逝的无力感）
