世界名称: 阿刻罗狄亚

世界本质:
  - 由"至高女神·尤克特拉希尔"用秩序代码编织的游戏世界
  - 魔法本质是系统预设宏命令，施法即读条加载代码
  - 女神同时担任防作弊系统，监视世界运行

创世与灾难:
  - 百年前人类贪婪触发世界承载极限（内存溢出）
  - 女神降下"神之怒"试图重置世界
  - 重置因未知错误失败，大陆中央被撕裂——即为"深渊巨口"
  - 深渊不断喷涌"原初灵液(Aether-Ichor)"

原初灵液:
  - 高浓度液态魔能
  - 正面：驱动魔法、锻造神兵、延缓衰老
  - 负面：从底层扭曲生物理智与肉体，导致恶堕
  - 在地底高压下凝结为"原初晶石"，直接接触大幅增加侵蚀度

侵蚀度机制:
  - 0-30%：正常
  - 31-70%：面色潮红，攻击上升防御下降，立绘差分变化
  - 71-100%：解锁堕落体质，城镇触发强制H事件，战败必恶堕
  - 来源：迷宫瘴气、特定怪物攻击、被污染的回复药、直接接触灵液

特殊机制：好感度:
  - 使用8位无符号整数（0-255）
  - 255为S级羁绊上限
  - 数据下溢：当好感度跌破0（如从0再-1），会循环至255，触发病娇状态

特殊机制：防作弊系统:
  - 至高女神尤克特拉希尔即防作弊系统
  - 对非常规操作（穿墙、数据异常等）有感知
  - 会派出"肃清天使"追杀异常源头
  - 女神与男主肉体同源，存在感官共享

时间操控:
  - 男主可通过系统时钟回拨，将世界状态重置到过去的存档点
  - 回拨时男主保留记忆与等级，其他角色状态回退
  - 已触发的悲剧可通过回拨重新选择拯救路径
