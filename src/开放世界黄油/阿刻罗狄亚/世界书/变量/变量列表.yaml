变量列表——所有被MVU系统追踪的变量定义。

世界:
  世界.当前时间: string, 格式 YYYY/MM/DD-HH:MM
  世界.当前区域: string, 取值为 巴别塔/叹息之森/圣白王都/猩红废土/霜骸山脉/赤星沙海/腐沼列岛/深渊迷宫
  世界.当前场景: string, 具体子场景名称
  世界.天气与灵液浓度: object {weather: string, ichor_density: number 0-1}
  世界.女神污染度: number, 0-100。0-24警告期，25-49幻痛期，50-74污染期，75-100臣服期
  世界.剧情阶段: string, 取值为 降临期/拯救期/崛起期/最终战

主角:
  主角.等级: number, 1-99
  主角.邪道等级: number, 0-5
  主角.异常点数: number, 0-99999
  主角.侵蚀度: number, 0-100
  主角.当前职业: string
  主角.技能列表: string[]
  主角.装备列表: object[]
  主角.基础属性: object {STR: number, DEX: number, INT: number, CON: number, CHA: number}
  主角.物品栏: record<string, number>

