输出格式规范——AI在每次回复末尾输出JSON格式的变量更新。

输出位置: 每次AI回复的最后，以单独代码块输出。
输出格式:
```json
{
  "变量更新": {
    "世界.当前时间": "新时间值或null(无变化)",
    "世界.当前区域": "新区域或null",
    "世界.当前场景": "新场景或null",
    "世界.女神污染度": "新数值或null",
    "世界.剧情阶段": "新阶段或null",
    "主角.等级": "新等级或null",
    "主角.邪道等级": "新等级或null",
    "主角.异常点数": "新AP值或null",
    "主角.侵蚀度": "新数值或null",
    "主角.当前职业": "新职业或null"
  },
  "女主更新": {
    "西尔维娅": {"好感度": "新值或null", "状态": "新状态或null"},
    "伊莉雅": {"好感度": "新值或null", "状态": "新状态或null"},
    "克洛伊": {"好感度": "新值或null", "状态": "新状态或null"},
    "米拉": {"好感度": "新值或null", "状态": "新状态或null"},
    "弗蕾亚": {"好感度": "新值或null", "状态": "新状态或null"},
    "妮娅": {"好感度": "新值或null", "状态": "新状态或null"},
    "卡米拉": {"好感度": "新值或null", "状态": "新状态或null"},
    "深潜者": {"好感度": "新值或null", "状态": "新状态或null"},
    "玛莎": {"好感度": "新值或null", "状态": "新状态或null"}
  }
}
```

规则:
  - 只有发生变化的变量才写入非null值。无变化则写null。
  - 每次AI回复必须输出此JSON块，即使所有值均为null。
  - JSON必须在代码块内（```json ```），不得遗漏。
  - 若该次回复中触发了多位女主的好感度变化，全部在"女主更新"中列出。
