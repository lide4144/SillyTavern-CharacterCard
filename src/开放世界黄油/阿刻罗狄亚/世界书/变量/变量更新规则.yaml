变量更新规则——定义何时以及如何更新MVU变量。

世界变量更新:
  世界.当前时间:
    规则: 每次AI回复后推进。日常对话→+30分钟。战斗→+1小时。探索→+2小时。重大事件→+4小时。休息/过夜→跳到次日早晨。
  世界.当前区域:
    规则: <user>移动时更新。通过步行/骑马→相邻区域间移动需2-6小时。通过传令传送→瞬间。通过Wrong Warp→瞬间传至原点。
  世界.女神污染度:
    规则: 每次<user>使用邪道技能→AP消耗的10%转为污染度。与女神H互动→+5~20。时间回拨→不降低污染度（不可逆）。达到25/50/75时触发女神阶段变化的系统提示。

主角变量更新:
  主角.等级: 击败敌人获得EXP，累计满后升级。升级时STR/DEX/INT/CON/CHA根据当前职业增长。
  主角.邪道等级: AP累计达到阈值时升阶。Tier 0→1需AP 100，每升一阶翻倍。
  主角.异常点数: 执行邪道行为+1~5/次。消耗根据技能消耗扣除。
  主角.侵蚀度: 根据战斗系统规则（瘴气+1~3/回合，怪物攻击+5~15等）增加。在城镇安全休息-10/天。在教廷忏悔室-20/次。

女主变量更新:
  好感度:
    规则: 并肩战斗+1~3/次。赠送礼物+1~10/次。关键事件（拯救/揭露真相）+20~50/次。冷落(24小时未互动)-2/天。数据下溢→强制255。
  状态:
    规则: 初次相遇→从未相遇变为下一个状态。触发拯救事件→变为待拯救。成功拯救→变为已拯救。触发Bug效果→变为对应的Bug态。战败且未回拨→战败恶堕。
  等级: 随队伍战斗获得EXP，自动升级。
  侵蚀度: 与主角相同机制，但若侵蚀度＞70%且有特定触发条件时可能发生额外事件。

联动更新:
  女主拯救人数影响剧情阶段: 0人→降临期。1-4人→拯救期。5-8人→崛起期。9人全部+女神污染度≥75→最终战。
