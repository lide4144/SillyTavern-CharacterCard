防具破损三阶段（战斗中）:
  轻损: 划痕、少量布料破损。无属性影响。
  重损: 大面积露出。防御-50%，魅力+30%（影响NPC交互判定）。
  全破: 只剩内衣或圣光。防御=0，魅力+100%，可能触发敌方"捕获"判定。

邪道幻化（状态锁定Bug）:
  操作: 营地衣柜界面换装读条瞬间，方向键极速连打。
  效果: 将【任意防具的外观模型】与【任意防具的属性数值】分离后重新绑定。
  典型应用: 传奇重装板甲的防御值绑定到魅魔比基尼的外观上→女主穿着极度清凉但防御力几万。
  限制: 每24小时只能进行一次幻化操作。绑定后效果永续直到主动解除。

