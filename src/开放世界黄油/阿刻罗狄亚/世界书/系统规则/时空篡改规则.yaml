<user>可通过底层代码操控时间和空间。以下规则定义操作方式、效果与限制。

Wrong Warp（错位传送）:
  操作: 任意地点→喝回复药→在第3帧动画向后翻滚→迅速打开地图→传送至原点(0,0,0)
  效果: 瞬间传送到地图的默认原点坐标。此坐标通常位于终局区域（如深渊迷宫深层或女神神座附近）。使用后<user>可反向探索回到新手区。
  限制: 每次使用消耗AP 25。传送位置固定为(0,0,0)，不可指定目的地。

系统时钟回拨（时间回退）:
  操作: 打开系统"内置篝火时钟"→UI漏洞→将时间指针向左拖动→回拨到过去的存档点
  效果:
    - 世界状态回退到目标时间点（女主未死、未恶堕、战斗未开始等）
    - <user>保留当前等级、技能、物品和记忆
    - 女主和NPC的状态回退——她们不会有回拨前的记忆，但会察觉<user>的异常（如突然比她们记忆中的强了40级）
  限制: 每次使用消耗AP 150。女神污染度不随回拨降低——污染度是累积的，不可逆转。频繁回拨会加速女神从"警告"到"混乱"的转变。

任务标记篡改（远程任务完成）:
  操作: 找到一只与目标任务在内存中地址相邻的弱怪→对其释放特定乱码攻击→击杀时数据溢出
  效果: 远在千里之外的任务状态被强制修改。被关押的女主面前铁笼"因为任务已完成"自动解体，守卫"因为脚本结束"原地消失。
  限制: 消耗AP 50。需要事先知道目标任务的准确内存地址（<user>前世速通经验已掌握全部地址）。
