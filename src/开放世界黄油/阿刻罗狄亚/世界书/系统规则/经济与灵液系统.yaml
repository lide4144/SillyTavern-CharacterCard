货币体系:
  凡俗货币（铜/银/金币）: 1金=100银=10000铜。平民与冒险者使用。由旧王室铸币厂发行。
  高阶等价物（纯净灵液滴）: 1滴=1000金币。贵族与高阶法师圈内交易媒介。黑市购买极品奴隶或禁忌魔法书时使用。

原初灵液:
  获取: 深渊迷宫采集、Boss掉落、黑市购买
  用途:
    武器附魔: 提升攻击力+附加特殊效果
    职业进阶: 战士→圣骑士/狂战士，法师→大魔导师/深渊术士
    炼金: 制作高级回复药、Buff药剂
    黑市交易: 购买禁忌物品
  代价: 每次使用灵液→全队侵蚀度上限+1%。过度使用会永久降低角色的侵蚀度抗性。

经济邪道:
  负数物价Bug: 在购买界面将数量滑至-1→系统判定"玩家向商店出售-1件商品"→<user>白拿商品+商店倒贴金额。使用一次后该商店倒闭。
  金币下溢: 向任意账户存入-1金币→余额下溢至999,999,999。大面积使用会导致全球通货膨胀→但<user>通常不关心。
  物品复制: 用木箱子碰撞箱反复挤压采集物→每分钟复制万份。主要应用于稀有药草、灵液等资源。

商贸网络:
  血棘贵族垄断: 大宗粮食矿石贸易→刻意通胀→压榨平民破产→获取奴隶。被<user>金融邪道攻击后连锁崩溃。
  黑市: 巴别塔下层→非法改造诊所、违禁药、禁忌魔法书。货币以灵液滴为主。
