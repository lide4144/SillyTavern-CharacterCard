邪道技能列表——<user>专属。消耗异常点数(AP)发动，不遵循常规魔法体系。AP通过执行邪道行为获取（卡碰撞体积、取消攻击后摇100次等）。

Glitch Tier 0（初始）:
  穿墙(Collision Clipping): AP 5。利用物理碰撞漏洞（顶水桶蹲墙角翻滚）穿越墙体、结界、锁闭的门。效果：瞬移到墙壁另一侧。
  动画取消(Animation Cancel): AP 3。在攻击/使用物品动画的特定帧翻滚，取消后摇。效果：该回合可执行两次行动。

Glitch Tier 1:
  数据下溢(Integer Underflow): AP 15。利用8位无符号整数循环特性，将数值扣到0以下→溢出到255。可用于好感度、金币、任意0-255范围的变量。注意：被下溢的NPC会以病娇/极度反常状态响应。
  仇恨分离(Aggro Reset): AP 10。站上特定高度的石头/平台→在Boss大招前起跳→Boss寻路网格失效→Boss脱战回出生点（血量不重置）。用于无伤屈死巨型Boss。

Glitch Tier 2:
  伤害叠加(Damage Stacking): AP 20。在0.5秒内疯狂切换武器30次→某把武器的"流血/中毒"判定不清除→叠加亿层Dot状态。一击触发后秒杀任何非无敌Boss。
  错位传送(Wrong Warp): AP 25。喝回复药→在第3帧向后翻滚→迅速打开地图→传送到地图原点(0,0,0)。通常落在终局区域中心。

Glitch Tier 3:
  贴图互换(Texture Swap): AP 30。将任意两个实体（角色、道具、怪物）的外观模型互换。本质不改——Boss的血条和AI不变，但外观变成了史莱姆/母猪/屎壳郎。可用于精神攻击、救人、制造混乱。
  标签篡改(Faction Tag Edit): AP 40。修改任意NPC的阵营标签——红名变绿名、队友变敌人、Boss变坐骑。效果瞬间生效，AI逻辑根据新标签重算。

Glitch Tier 4:
  任务标记篡改(Quest Flag Edit): AP 50。击杀一只与目标任务地址相邻的史莱姆→数据溢出→远距离修改任务状态为"已完成"。效果：千里之外的营救目标自动获救，敌方脚本自动停止。
  同源肉体共鸣(Admin Override): AP 80。链接女神防作弊系统→全场敌方AI逻辑瘫痪→女性Boss进入"宕机/发情"状态→不战而降。仅对深渊系、女神系敌人有效。

Glitch Tier 5（终极）:
  控制台指令(Console Commands): AP 100。直接输入世界底层代码——Spawn实体、修改全局规则、删除目标、自定义一切。每次使用大幅增加女神污染度。
  系统时钟回拨(Save State Reload): AP 150。将世界状态重置到过去的存档点。保留<user>的等级和记忆。可逆转死亡、恶堕、悲剧。但女神污染度不会因回拨而降低。
