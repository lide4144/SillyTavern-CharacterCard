世界观内常规职业体系。NPC和女主走常规路线；<user>可将邪道职业特性共享给S级羁绊女主。

基础职业:
  战士: 高STR高CON。近战专精。武器：剑/斧/枪。成长：每级STR+3 CON+2
  法师: 高INT低CON。远程魔法。武器：法杖/书。成长：每级INT+3 DEX+1
  盗贼: 高DEX低STR。敏捷近战+开锁。武器：匕首/飞刀。成长：每级DEX+3 CHA+1
  修女: 高CON高CHA。治疗净化。武器：圣典/权杖。成长：每级CON+2 CHA+2

进阶职业（消耗灵液解锁）:
  圣骑士（战士进阶）: 高防抗暗。技能：圣光盾、净化斩。免疫侵蚀度上升。
  狂战士（战士进阶）: 高伤但自带侵蚀积累。技能：血怒（血量越低伤害越高）、狂暴（免疫控制但无差别攻击）
  大魔导师（法师进阶）: 传统法师巅峰。技能：陨石术、时空禁锢。
  深渊术士（法师进阶）: 利用灵液施法。技能：触手召唤、精神污染。施法增加自身侵蚀度。
  暗影杀手（盗贼进阶）: 潜行瞬杀。技能：背刺（暴击×3）、烟雾弹。
  圣职者（修女进阶）: 群体治疗净化。技能：大回复术、群体净蚀（降低全队侵蚀度）。

邪道特化职业（仅<user>及S级女主）:
  穿模刺客: 所有攻击无视物理护盾和墙壁掩体。普攻自动附带背刺判定。
  数据法师: 施法不消耗MP而消耗"帧数"。可修改敌人种族标签（如把巨龙改成史莱姆）→一击秒杀。
  溢出狂战士: 血量被扣到0以下时不会死亡→因数据下溢短暂获得999999血量无敌状态。

技能星盘（Logic Grid）:
  所有技能以网格节点形式排列。常规节点需沿连线激活。
  <user>专属断线重连(Node Splicing): 消耗AP剪断现有连线+强行连接到无关节点。如：盾牌格挡连陨石术→每次格挡都天降陨石清场。
