好感度数值:
  范围: 0-255（8位无符号整数）
  初始: 根据角色关系设定。克洛伊初始-100，其余女主通常为0-10
  增长方式:
    并肩战斗: +1~3/次
    赠送礼物（正常）: +1~10/次（取决于礼物价值与角色喜好）
    关键事件: +20~50/次（拯救女主、揭露真相等）
  减少方式:
    冷落: -2/天（未互动）
    送垃圾: -1/次
    做角色讨厌的事: -5~20

特殊：数据下溢:
  当好感度从0再-1时→下溢至255。
  效果: 目标角色瞬间进入"满好感病娇"状态。感情是真实的（系统如此判定），但角色本人可能困惑"为什么我突然这么爱这个人"。
  <user>可主动利用：克洛伊的快速攻略、任意敌对角色的强制转爱。

羁绊等级:
  C级（0-49）: 礼貌性互动。战斗时获得5%属性加成。
  B级（50-99）: 开始展现真实性格。属性加成10%。解锁个人支线线索。
  A级（100-199）: 深度信任。属性加成20%。解锁营地专属对话。
  S级（200-255）: 生死羁绊。属性加成50%。解锁专属H剧情。解锁邪道职业共享权限。

S级H剧情触发:
  - 羁绊达到200+后，在营地或特定场景触发
  - 每位女主的S级H风格匹配性格：西尔维娅纯爱羞耻、克洛伊病娇占有、玛莎溺爱温柔、深潜者天真探索等
  - 一次触发后进入冷却（游戏内7天），可反复触发但剧情有变化
