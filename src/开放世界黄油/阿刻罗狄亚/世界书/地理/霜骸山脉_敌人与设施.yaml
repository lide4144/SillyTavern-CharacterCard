霜骸山脉·敌人:
  深渊雪狼（Lv15-22）:
    类型: 野兽·灵液变异
    出现: 雪原开阔地带
    行为: 群居猎食，3-5只结队。速度快，暴风雪中更难察觉。掉落暖和毛皮。
    掉落: 雪狼皮（防寒材料）、狼牙
  冰霜巨魔（Lv20-30）:
    类型: 巨人族·冰系
    出现: 冰川裂缝、冰封要塞入口
    行为: 高HP高攻低速。挥舞冰柱棒。死后尸体冻结成冰雕→可推入裂缝解谜或伤害其他敌人
    掉落: 巨魔冰晶（冰系附魔材料）
  冰封亡灵（Lv25-35）:
    类型: 亡灵·被冰封者
    出现: 冰封王座周边、古代要塞内部
    行为: 数百年前北境帝国被冰封的子民。身穿古代铠甲，攻击附带冰霜减速。被击败时发出叹息——仿佛在感谢解脱
    掉落: 古代北境硬币（收藏品）、冰封结晶
  远古邪物·碎片（Lv40-50）:
    类型: 深渊系·Boss级精英
    出现: 冰封王座附近、冰川深处
    行为: 被弗蕾亚封印的远古邪物分裂出的碎片。不可名状的蠕动黑影。H攻击：触手+冰冻组合→侵蚀度+15并叠加冻伤Debuff
    掉落: 邪物碎片（弗蕾亚剧情关键道具）
  远古邪物·本体（Lv55）:
    类型: 深渊系·区域Boss
    出现: 冰封王座内部（与弗蕾亚一同冰封）
    行为: 多阶段Boss战。解冻后激活。正常打法是消耗战。<user>邪道打法：火把堆叠一万度→直接秒杀

霜骸山脉·设施:
  地热温泉旅馆"融雪":
    类型: 旅馆·温泉
    位置: 炉渣堡内部
    氛围: 火山地热驱动的温泉旅馆。石头浴池冒着热气，与外面的暴风雪形成强烈反差。老板娘是退役的重装佣兵，左臂是铁钩假肢。
    功能: 休息+全队侵蚀度-5（温泉净化效果）、购买防寒装备、打听冰封王座情报。
  矿工营地"深掘":
    类型: 矿区·生产
    位置: 冰川下矿道入口
    氛围: 简陋的木棚和帐篷，矿工大多是逃债者或被流放的罪犯。他们在此挖掘零界虚铁——一种极危险的工作，矿道随时可能坍塌或被冰封亡灵袭击。
    功能: 购买零界虚铁（高价）、解救矿工支线、触发冰封亡灵袭击的防御战
  冰封宝库（弗蕾亚的王室仓库）:
    类型: 遗迹·宝藏
    位置: 冰封王座脚下
    氛围: 被冰冻的仓库大门上刻着北境帝国的霜狼纹章。内部堆满被冰封数百年的古代珍宝——武器、艺术品、书籍，全部完好如初。
    功能: 弗蕾亚的个人剧情触发点、获取古代北境神装
