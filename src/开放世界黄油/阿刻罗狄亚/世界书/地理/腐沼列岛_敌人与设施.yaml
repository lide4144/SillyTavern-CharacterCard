腐沼列岛·敌人:
  变异海兽（Lv15-25）:
    类型: 野兽·灵液污染
    出现: 荧光紫色海域
    行为: 被灵液污染变异的鲨鱼、巨型螃蟹、海蛇。攻击附带侵蚀度+3的灵液毒。群居。
    掉落: 变异海兽肉（烹饪材料）、灵液污染鳞片
  水手亡灵（Lv18-30）:
    类型: 亡灵·海盗
    出现: 沉船区、黑帆港周边海域
    行为: 被海妖歌声迷惑而沉船死去的海盗。手持生锈弯刀，身上还挂着水草。只会重复死前最后一句话（通常是一句脏话或一句祈祷）
    掉落: 海盗金币、航海图碎片
  海妖魅影（Lv20-32）:
    类型: 海妖族·堕落者
    出现: 海妖祭坛周边、深海裂隙附近
    行为: 被古神奴役的海妖族人。她们用歌声诱惑水手→魅惑Debuff→拖入深海。H攻击：魅惑后触发深海溺爱事件（侵蚀度+20，但获得一段梦魇般的深海记忆）
    掉落: 海妖鳞片、深海珍珠
  古神使徒（Lv35-50）:
    类型: 克苏鲁系·精英
    出现: 深海裂隙、海妖祭坛Boss战
    行为: 巨大触手怪——古神本体的延伸。多触手同时攻击，每回合可攻击3-4次。H攻击：触手缠绕+吸入水下→侵蚀度快速上升+触发"古神的怜悯"事件
    掉落: 古神触手（可食用——做成章鱼烧）、深渊珍珠
  深渊古神·碎片（Lv55+）:
    类型: 克苏鲁系·终极海洋Boss
    出现: 深海裂隙最深处
    行为: 不可名状的巨体。正攻几乎不可能——需要利用深潜者0像素碰撞箱Bug+古神触手穿模的判定漏洞来攻克

腐沼列岛·设施:
  海盗酒馆"断锚":
    类型: 酒馆·海盗
    位置: 黑帆港码头
    氛围: 用沉船木料搭建的摇摇欲坠的酒馆。墙上钉着各国旗帜——全是劫来的。朗姆酒、骰子、和偶尔响起的枪声。老板娘是退役女海盗，右眼戴眼罩，左手提霰弹枪。
    功能: 休息、购买航海用品、招募临时水手、黑市情报（海盗掌握所有秘密航线）
  走私洞窟:
    类型: 黑市·海盗
    位置: 黑帆港后方的天然海蚀洞
    氛围: 洞内被荧光灵液照亮。木箱堆成小山——走私的灵液、奴隶、禁忌魔法书。守卫是各色海盗，都带着自己的价码。
    功能: 购买稀有违禁品（价格比巴别塔黑市低30%但风险更高）、触发走私者支线
  海底祭坛:
    类型: 宗教设施·海妖
    位置: 海妖祭坛水下
    氛围: 古老石雕被珊瑚和发光海藻覆盖。海妖们在此举行安抚古神的仪式。深潜者曾是这里的主祭。
    功能: 深潜者剧情核心触发点、解锁海妖族的秘密历史
  渔村"潮落":
    类型: 村落·渔业
    位置: 腐沼列岛最外围岛屿
    氛围: 被海妖和古神支配的可怜渔村。村民每季抽签选出一人"献给海"。他们不敢反抗——上一次反抗的渔村已经彻底沉入海底。
    功能: 触发村民救援支线、对抗古神使徒的保护战、深潜者好感度剧情
