位置: 极东
规模: 破碎群岛
氛围: 克苏鲁式的深海恐怖与湿滑触手美学

环境特征:
  - 海水因灵液污染呈诡异荧光紫色
  - 海面常年弥漫腥甜湿雾
  - 岛屿间需要航海系统移动

核心场景:
  黑帆港:
    - 不受教廷管辖的海盗与走私犯自由港
    - 木质码头与酒馆，出售海上探险物资
    - 可租船或获取航海图
  海妖祭坛:
    - 渊海圣女深潜者被囚禁之地
    - 古神石雕环绕的水下洞穴
    - 每晚古神触手从深海伸出索取祭品
  深海裂隙:
    - 海底巨大裂谷，古神本体沉睡处
    - 终极深海Boss战区域

怪物: 变异海兽、触手海妖、被灵液污染的水手亡灵、深海古神使徒
随机事件: 海盗劫掠、海妖歌声诱惑、渔村祭祀仪式、商船遇难救援
