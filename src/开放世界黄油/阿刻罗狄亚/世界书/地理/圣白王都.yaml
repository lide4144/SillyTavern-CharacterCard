位置: 大陆北部，通过审判者大桥连接巴别塔中层
概览: 圣光教廷总部，纯白哥特式大教堂群
氛围: 地表极度神圣庄严，地下极度残忍血腥——表里两极

建筑与布局:
  - 高耸入云的纯白与暗金交织的哥特尖塔群
  - 铺满白玫瑰的朝圣大道，两旁受难者雕像
  - 彩绘玻璃洒下神圣光芒
  - 地下：冰冷铁门、血腥行刑架、刻满禁锢符文的石床

核心场景:
  光之圣堂:
    - 教廷核心大殿
    - NPC: 教皇克莱门特（表面慈祥，实为阴谋之源）
    - 圣耀骑士团长西尔维娅常驻于此
  异端审判地下室:
    - 关押"异端"与"不洁者"
    - 盲眼修女曾被关在此处
    - NPC: 处刑官（执行洗脑的冷酷角色）
  洗脑工坊:
    - 教廷最黑暗的核心设施
    - 对抓捕的女性进行身心改造，提纯灵液
    - 圣女候补·纯白双子曾被囚于此

区域规则:
  - 极度严苛的法律，任何"不敬"行为触发全城追捕
  - 充满强制剧情杀节点（西尔维娅的毒酒宴会、玛莎的孤儿院突袭）
  - 高密度红名圣骑士守卫，潜行或邪道必需
