全称: 血棘贵族同盟（House of Crimson Petals）
定位: 垄断奴隶贸易与灵液走私的恶役贵族联盟
领袖: 血棘公爵瓦尔蒙（卡米拉生父）

核心业务:
  奴隶贸易: 精灵、兽人、破产女性、战败女冒险者的捕获→拍卖→调教产业链
  灵液走私: 从深渊直接获取未稀释灵液，高价供应贵族圈层
  地下斗兽场: 巴别塔上层贵族娱乐场所，奴隶角斗+赌局

经济手段:
  - 垄断大宗商贸（粮食、矿石）
  - 刻意制造通货膨胀→压榨平民破产→获取源源不断的奴隶货源
  - 通过高利贷网络控制各阶层（米拉的父亲即受害者）

公爵府:
  - 华丽宅邸内举办糜烂的蒙面晚宴
  - 地下调教室与刑房
  - Boss战：二阶段变身巨型深渊吸血蝙蝠飞行攻击

男主介入点:
  - 负数物价Bug：购买数量设-1→白拿神器还倒赚9999万金币→垄断商会当场破产
  - 坐骑强绑Bug：骑在变身蝙蝠的公爵脖子上，当滑板车骑出地图边界触发跌落致死
  - 模型互换Bug：把卡米拉和母猪模型互换躲过暴民清算
