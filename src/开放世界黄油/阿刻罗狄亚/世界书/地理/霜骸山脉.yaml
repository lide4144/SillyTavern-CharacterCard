位置: 极北
规模: 辽阔雪原与陡峭冰川
氛围: 暴风雪中的远古冰封帝国

环境特征:
  - 暴风雪遮蔽视野
  - 广阔冰面可骑乘深渊雪狼驰骋
  - 被冰封的古代要塞散布其间

核心场景:
  冰封王座:
    - 北境女王弗蕾亚将自己与远古邪物一同冰封之处
    - 冰雕中可见女王身姿
    - 解封需极端高温（邪道：火把+边缘滑步卡一万度温度变量）
  炉渣堡:
    - 次级城镇，建在活火山上的堡垒
    - 居民靠地热生存
    - 重装佣兵集散地
    - 出售抗寒装备与极北特产

怪物: 冰霜巨魔、雪狼、寒冰元素、冰封亡灵
资源: 零界虚铁（抗魔金属，肃清天使装甲材质）
