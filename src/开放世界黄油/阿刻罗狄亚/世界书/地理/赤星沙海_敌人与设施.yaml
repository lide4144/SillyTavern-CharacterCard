赤星沙海·敌人:
  电锯沙虫（Lv15-25）:
    类型: 半机械·虫系
    出现: 沙海地表、沙暴后
    行为: 沙下潜行突袭。头部装有生锈的电锯。H攻击：用尾部机械臂束缚→拖入沙下巢穴
    掉落: 机械零件、沙虫毒囊
  金属媚药蝎子（Lv18-28）:
    类型: 半机械·改造生物
    出现: 古代机械遗迹附近
    行为: 古代文明改造的生化武器。尾刺注入混合了灵液的媚药→侵蚀度+20+持续5回合"发情"Debuff。外壳是合金——物理攻击减半
    掉落: 蝎尾针（毒素武器材料）、合金外壳
  巡逻机兵（Lv20-35）:
    类型: 机械·古代AI
    出现: 机械遗迹内部
    行为: 主脑奥米加的巡逻单位。漂浮的金属球体，配备激光炮。无H攻击——它们是纯粹的战斗机器。对电磁干扰极度脆弱
    掉落: 能量核心、古代电路板
  机械虫群（Lv10-20×大量）:
    类型: 机械·群体
    出现: 主脑房周边
    行为: 小型机械蜘蛛群。单体极弱但数量众多。被围殴时每回合额外受5-10次攻击。火焰/EMP范围攻击可清场
    掉落: 虫群残骸×n

赤星沙海·设施:
  废品集市"锈水":
    类型: 市场·废品交易
    位置: 锈水绿洲中心
    氛围: 用波纹铁皮搭成的棚屋集市。空气里弥漫着机油味和烤沙虫肉的油烟。摊位上堆满从遗迹挖出的机械零件——从能用的到纯粹废铁的都有。
    功能: 购买机械零件、出售沙海特产、妮娅的机械改造服务（在此解锁）
  古代机械挖掘场:
    类型: 探索点·挖掘
    位置: 沙海深处多处
    氛围: 由奴隶和雇佣工人操作的大型挖掘机。正在挖掘被沙埋的古代机械设施。监工手持电鞭巡逻。工人瘦骨嶙峋。
    功能: 参与挖掘获得古代科技物品、解救工人支线、触发主脑奥米加苏醒的剧情前置
  沙舟驿站:
    类型: 交通设施
    位置: 沙海各绿洲之间
    氛围: 用古代飞船残骸改造的"沙舟"（沙上滑行的帆船）停靠点。船长是经验丰富的老拾荒者，能用星辰导航横穿沙海。
    功能: 快速移动（沙舟航线连接锈水绿洲和各遗迹）、遭遇沙海随机事件（沙暴、沙虫袭击）
