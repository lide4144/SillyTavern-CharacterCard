位置: 大陆西部，巴别塔西境城门外
概览: 曾经美丽的精灵古林，被深渊瘴气彻底污染
氛围: 粉红迷雾笼罩的变异森林，美丽与恐怖并存

环境特征:
  - 树皮呈现人体肌肉纹理，树枝挂粘液
  - 空气中弥漫粉红色魅魔之瘴
  - 精灵树屋大多烧毁，或布满蜘蛛网与触手
  - 地面偶尔能看到巨大的肉质藤蔓蠕动

环境Debuff:
  - 魅瘴区域持续积攒侵蚀度
  - 邪道规避：反复穿脱防毒面具卡帧→防毒判定永久生效

核心场景:
  捕奴营地:
    - 木栅栏+兽人佣兵把守
    - 铁笼关押精灵法师伊莉雅
    - 限制时间：三天内不救→触发恶堕事件
  淫欲母树:
    - 区域Boss房，巨大的肉质植物
    - 会释放催情孢子与寄生种子
    - 掉落极品灵液与稀有素材

随机事件: 精灵捕奴队巡逻、瘴气突袭、变异精灵怨灵游荡
