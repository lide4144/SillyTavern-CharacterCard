    氛围: 表面是培养圣女的修道院。内部是灵液提纯的活体工厂。被囚禁的女性穿着纯白长袍，每天被灌食灵液然后被"收割"。
    功能: 纯白双子（圣女候补）被囚于此。救出她们需潜入或利用坐标替换Bug
  圣白图书馆:
    类型: 知识设施
