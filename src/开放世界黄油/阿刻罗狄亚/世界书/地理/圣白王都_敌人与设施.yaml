    氛围: 高耸的书架直达穹顶。羊皮卷、古籍、教廷编年史。管理员是一位失声的老修女——嘴唇被缝住以防她"传播知识"。
    功能: 查阅世界历史、获取魔法配方、寻找女神弱点的线索