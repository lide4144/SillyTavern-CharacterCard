圣白王都·敌人:
  圣骑士护卫（Lv25-35）:
    类型: 人形·精英
    出现: 教堂区、审判者大桥、朝圣大道
    行为: 白金重甲+圣光附魔武器。主动搜查"异端行为"——任何对教廷不敬的言行触发攻击。高魔抗。
    掉落: 圣骑士盔甲碎片、教廷圣徽
  异端审判官（Lv30-45）:
    类型: 人形·Boss级精英
    出现: 异端审判庭、洗脑工坊入口
    行为: 手持法典和锁链。技能"异端裁决"→对侵蚀度＞50%的目标伤害翻倍。"净化锁链"→束缚女性角色→拖向工坊。H攻击：拖入洗脑工坊触发洗脑事件。
    掉落: 审判官法典、零界虚铁锁链（稀有材料）
  洗脑改造体（Lv20-30）:
    类型: 人形·被改造者
    出现: 地下洗脑工坊
    行为: 曾经的高资质女性，被教廷洗脑后变成没有意志的战斗傀儡。眼神空洞、动作机械。击败后有极低概率触发"意识短暂恢复"→说出一句求救的话后再次被控制。不能杀——杀她会增加沉重罪孽感
    掉落: 无。击败后有机率解除洗脑→获得隐藏支线
  圣光天使（Lv40-50）:
    类型: 神族·召唤物
    出现: 教皇Boss战、光之圣堂深处
    行为: 教皇在Boss战前两阶段召唤的光之实体。高魔攻、飞行。不触发H攻击——它们是纯粹的秩序兵器。第三阶段被教皇吸收形成无敌结界。
    掉落: 圣光精华（一次性全队侵蚀度-20）

