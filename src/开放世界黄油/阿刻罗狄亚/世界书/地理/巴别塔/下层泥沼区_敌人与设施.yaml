下层泥沼区·敌人:
  扒手与匪徒（Lv1-5）:
    类型: 人形·犯罪者
    出现: 暗巷、贫民窟角落
    行为: 偷窃金币后逃跑，被<user>物品栏锁定Bug反杀→小偷卡死爆金币
    掉落: 少量金币、廉价匕首
  变异乞丐（Lv3-8）:
    类型: 人形·灵液感染者
    出现: 排污管附近、废弃建筑
    行为: 灵液中毒导致的肉体变异——部分肢体长出肉瘤或多余手指。攻击附带低概率侵蚀度+1
    掉落: 低纯度灵液碎片、破烂布料
  黑帮打手（Lv5-12）:
    类型: 人形·帮派成员
    出现: 黑市周围、地下赌场入口
    行为: 3-5人结队巡逻。队长携带"收债棒"。H攻击：对侵蚀度＞70%的目标使用"逼债勒索"→金币-20%并触发羞辱
    掉落: 金币、劣质武器
  地下娼馆保镖（Lv10-15）:
    类型: 人形·精英
    出现: 娼馆门口和内部
    行为: 高攻击欲望，会主动拦截可疑人物。H攻击：将俘虏拖入娼馆→触发"强制接客"事件

下层泥沼区·设施:
  破败酒馆"老鼠洞":
    类型: 酒馆·贫民窟级
    位置: 泥沼区主巷道拐角
    氛围: 廉价酒精味+铁锈味+熏烟味混杂。木桌坑坑洼洼，酒杯缺口。常客是底层冒险者和情报贩子。
    老板: 独眼老婆婆"鼠婆"，沉默寡言只收现钱
    功能: 基础回复（睡觉）、情报购买（老鼠眼常驻）、接取底层任务。二楼有几间破烂客房。
  黑市工坊"铁牙":
    类型: 黑市·武器改造
    位置: 废弃铁匠铺地下
    氛围: 金属摩擦声从早到晚。墙壁挂满来路不明的武器。老板从不在乎顾客是谁，只要付灵液。
    老板: "铁牙"（中年女人，满口钢牙，曾是冒险者被怪物咬碎牙齿后退役）
    功能: AP消耗强化（将互斥属性强行融合，如重甲防御值附魔到丝袜上）、出售违禁武器
  地下娼馆"粉灯":
    类型: 娼馆
    位置: 贫民窟深处，粉色灵液灯管标记入口
    氛围: 廉价香水和体味混杂。从业人员大多是破产女性、被公会除名的冒险者。注：不强制H——嫖客可纯聊天，有些姑娘只卖艺。
    特色: 有隐藏情报线——娼馆老板娘掌握整个下层的犯罪网络信息
  地下赌场"骰子坟":
    类型: 赌场
    位置: 废弃灵液矿道改造
    氛围: 骰子声+咒骂声。赌局从铜币到灵液滴都接。欠债还不起的人"自愿"签约成为灵液矿区的奴隶。
    功能: 赌博（金币/灵液）、高利贷触发米拉剧情线
  非法诊所"汉斯的切割间":
    类型: 诊所（已有NPC疯医汉斯）
    补充功能: 可购买"灵液兴奋剂"（攻击力×2持续3回合，侵蚀度+15）、机械义肢初级改造
  贫民窟集体宿舍:
    类型: 居住区
    位置: 泥沼区边缘的连片木板棚屋
    氛围: 极度拥挤，十几个人合住一间。孕婦、老人、残废冒险者和无家可归的孤儿。玛莎的星光孤儿院就在这片区域。
    功能: 触发玛莎剧情线、模因神教传教点
