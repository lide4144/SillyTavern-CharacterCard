位置: 巴别塔最底层，紧贴深渊入口
风格: 赛博朋克+暗黑中世纪混合
氛围: 昏暗、泥泞、混杂廉价香水与血腥味

建筑与布局:
  - 凌乱叠加的木板房和生锈铁皮棚屋
  - 悬挂在深渊边缘的违建
  - 街边到处是漏水发光的粉色灵液排污管
  - 错综复杂的小巷和上下楼梯
  - 犯罪率极高，小偷横行

核心场景:
  破败酒馆"老鼠洞":
    - 男主的初始安全屋/大本营
    - 散发廉价酒精与铁锈味
    - NPC: 情报商老鼠眼（满嘴黄牙，卖任务和黑市情报）
  非法改造诊所:
    - 阴暗手术室，诡异炼金仪器
    - NPC: 疯医汉斯，卖强力Buff违禁药，副作用增加侵蚀度上限
  贫民窟暗巷:
    - 模因神教乞丐蹲墙角膜拜，对着空气深蹲+左右平移
    - 可触发模因神教支线

邪道入口:
  - 小偷行窃时可利用物品栏锁定Bug，让小偷"偷走系统错误代码"→小偷当场卡死爆金币
  - 电梯井侧面可免费卡位上行
