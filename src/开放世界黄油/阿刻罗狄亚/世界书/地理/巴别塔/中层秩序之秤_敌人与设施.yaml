中层秩序之秤·敌人:
  基本上无野生怪物。威胁来自人祸:
  逃跑奴隶（Lv5-10）:
    类型: 人形·逃亡者
    出现: 奴隶市场附近的暗巷
    行为: 偶尔有奴隶挣脱锁链逃跑。守卫会追捕，<user>可协助逃跑（获得好感度）或协助抓捕（获得金币但良心疼）
  高利贷催收队（Lv8-15）:
    类型: 人形·帮派
    出现: 商铺区、公会附近
    行为: 3人小队，手持账本和棍棒。找欠债者（如米拉）收数。H攻击：对女性欠债者使用"卖身还债"威胁
  暗杀者公会（Lv15-25）:
    类型: 人形·精英暗杀者
    出现: 夜晚的偏僻街道
    行为: 接受委托暗杀商业竞争对手或政治敌人。与克洛伊的暗杀者网络有关联。H攻击：捕获目标后使用"药物麻痹"+私刑

中层秩序之秤·设施:
  深渊拓荒者公会大厅:
    类型: 公会·大型
    位置: 中层中央广场旁
    氛围: 喧闹的木制大厅，墙上挂满悬赏单。白天挤满冒险者，晚上变成酒馆。角落里有老冒险者在吹嘘自己的深渊战绩。
    功能: 看板娘米拉在此。接取主线/支线任务、编队管理、S级羁绊H剧情触发点（二楼私人房间）
  露天奴隶市场:
    类型: 拍卖行·残酷
    位置: 中央广场绞刑架旁
    氛围: 铁笼里关押精灵、兽人、破产女性。拍卖师声嘶力竭地叫价。围观人群有贵族、佣兵、也有一脸麻木的平民。
    功能: 购买奴隶队友、触发救援剧情、金币下溢Bug的绝佳目标（买空市场+买下商人）
  正规铁匠铺"锻火":
    类型: 铁匠铺·正规
    位置: 商铺区主干道
    氛围: 炉火的热浪从敞开的门里扑出。墙上整齐排列着+1到+10的强化武器。三位锻冶学徒轮流打铁。
    功能: 常规强化（+1~+10）、修理装备、购买基础武器
  高利贷所"血金":
    类型: 金融·邪恶
    位置: 商铺区后巷
    氛围: 冷色调的灰石建筑，柜台后面的铁窗像监狱。墙上贴着"逾期一日，利滚利十倍"。
    功能: 米拉的债务剧情触发点。可用金币下溢Bug让它当场倒闭。
  中层酒馆"天平座":
    类型: 酒馆·中档
    位置: 公会大厅对面
    氛围: 干净、明亮、有穿围裙的服务员端盘子。比下层老鼠洞体面得多，但也无趣得多。冒险者在此交换正经情报而非黑市消息。
    功能: 正规休息、购买中等回复品、打听其他区域情报
  商会交易所:
    类型: 商业设施
    位置: 中层主街道
    氛围: 大理石柱+铜制柜台。商人们在此签订大宗贸易合同。物价表每日更新挂在墙上。
    功能: 大宗物品交易、灵液滴兑换金币、负数物价Bug的另一个受害者
