上层黄金环·敌人:
  血棘私兵（Lv20-30）:
    类型: 人形·贵族私兵
    出现: 贵族宅邸周围、结界入口
    行为: 红名高攻高防，3人结队巡逻。被<user>穿墙或滑步潜入时不会触发（因为AI没写"有人能从屋顶过来"的脚本）
  驯养魔物（Lv25-35）:
    类型: 魔物·被圈养
    出现: 贵族地下调教室、私人斗兽场
    行为: 贵族用灵液驯化的触手怪、地狱犬等。项圈刻有控制符文。H攻击：被设定为"娱乐用模式"——倾向于捕获而非杀死
  贵族护卫长（Lv35-45）:
    类型: 人形·Boss级
    出现: 公爵府内部
    行为: 血棘公爵的贴身护卫，装备零界虚铁盔甲（魔免）。需用邪道技能或物理穿甲攻击

上层黄金环·设施:
  血棘公爵府邸:
    类型: 贵族宅邸·Boss据点
    位置: 黄金环中央
    氛围: 极尽奢华——金箔天花板、丝绸窗帘、大理石地板。底层是华丽宴会厅，地下是红天鹅绒刑房。宴会上贵族戴着面具交换"猎物"。
    功能: 卡米拉剧情触发、公爵Boss战、贵族密谋情报收集
  秘密俱乐部"红丝绒":
    类型: 贵族社交场所
    位置: 公爵府东侧
    氛围: 会员制。只接待有贵族凭证的客人。内部灯红酒绿，贵族们戴着半脸面具交换奴隶、谈政治暗杀、共享灵液。女性冒险者不能独自进入——会被当成"食材"。
    功能: 情报收集（需潜入或社交技能）、触发贵族阴谋支线
  地下斗兽场:
    类型: 竞技场·奴隶
    位置: 黄金环边缘地下
    氛围: 观众席坐满赌徒和嗜血贵族。奴隶与驯养魔物死斗，直至一方死亡。败者的尸体被直接扔进深渊。
    功能: 可救出斗兽场中的俘虏、触发西尔维娅的剧情分歧点
  奢侈品店"金枝":
    类型: 商店·贵族专属
    位置: 黄金环主街
    氛围: 展示柜擦得一尘不染。出售灵液提纯饰品、精灵丝绸礼服、附魔珠宝。用灵液滴交易。
    功能: 购买高价礼物（赠送女主+大量好感度）。负数物价Bug在此使用效果最显著
  灵液浴场:
    类型: 奢侈设施
    位置: 黄金环西侧
    氛围: 用稀释灵液灌注的浴池。贵族在此泡澡谈生意。泡灵液浴可临时获得属性Buff——但每次使用侵蚀度上限+2%。
    功能: 临时Buff（攻击+30%持续到下次战斗结束）、触发贵族情报收集
