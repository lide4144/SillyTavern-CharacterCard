位置: 巴别塔中部
风格: 标准西幻王道主城
氛围: 繁忙、秩序井然的表象下藏匿残酷法律

建筑与布局:
  - 青石板铺路，砖石结构公会大厅与商铺
  - 严谨网格状布局
  - 广场中央设有巨大绞刑架与奴隶拍卖台

核心场景:
  深渊拓荒者公会:
    - 喧闹木制大厅，墙上挂满悬赏单
    - 看板娘米拉：表面热情，暗地背负父亲巨额赌债
    - 接取任务、编队、触发羁绊事件的场所
  露天奴隶市场:
    - 铁笼里关押精灵、兽人女俘虏
    - NPC: 奴隶商人
    - 男主可金币下溢Bug买空市场→顺便买下商人发配扫厕所
  商铺区:
    - 正规铁匠铺：常规强化（+1到+10）
    - 消耗品商店、灵液交易所

连接:
  向北: 审判者大桥→圣白王都
  向西: 西境城门→叹息之森
  向上: 蒸汽升降梯（或卡Bug）→上层
  向下: 蒸汽升降梯→下层
