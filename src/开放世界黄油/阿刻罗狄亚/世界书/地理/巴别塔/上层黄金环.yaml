位置: 巴别塔顶层
风格: 极度奢华的巴洛克/哥特式
氛围: 华丽表象下的极度糜烂——浮空喷泉与红天鹅绒地下调教室并存

进入方式:
  常规: 持有贵族凭证使用专属传送阵
  邪道: 坐骑在结界边缘下马的位移判定→强行挤入

建筑与布局:
  - 大理石雕花柱、悬浮喷泉花园
  - 宽敞整洁的街道
  - 建筑间距大，屋顶复杂→存在大量判定漏洞供卡位滑步
  - 防卫严密，全是红名高阶守卫

核心场景:
  血棘公爵府邸:
    - 极其华丽的大宅
    - NPC: 血棘公爵瓦尔蒙（油腻反派）及高阶私兵
    - 地下举办糜烂的蒙面晚宴，贵族的荒淫派对
  贵族宅邸群:
    - 可通过屋檐石像鬼滑步潜入各宅后院
    - 内部暗藏红天鹅绒地下调教室/刑房
  圣光大教堂:
    - 教廷在巴别塔的分部
    - 上层贵族的精神控制中心

区域风险: 高等级红名敌人密集，强制潜行或邪道穿越
