位置: 深渊边缘，大陆中央
规模: 超巨型环形立体都市
整体氛围: 黄金乡表象下的罪恶之城

三层结构:
  上层黄金环:
    - 贵族与神权居住区
    - 浮空建筑、大理石雕花、喷泉花园
    - 暗藏地下调教室与糜烂晚宴
    - 结界保护，需贵族凭证或卡Bug进入
  中层秩序之秤:
    - 商业与公会中心
    - 青石板网格街区
    - 广场中央设有绞刑架与奴隶拍卖台
  下层泥沼区:
    - 贫民窟与黑市
    - 木板铁皮违建、发光灵液排污管
    - 紧贴深渊入口，蒸汽铁梯直通迷宫1层

连接:
  上下层间: 蒸汽升降梯（买票或卡电梯井）
  对外: 中层西门→叹息之森，中层北桥→圣白王都
  深渊: 下层螺旋铁梯直下

关键势力分布:
  圣光教廷: 上层大教堂+中层分部
  血棘贵族: 上层宅邸群
  拓荒者公会: 中层大厅
  模因神教: 下层暗巷
