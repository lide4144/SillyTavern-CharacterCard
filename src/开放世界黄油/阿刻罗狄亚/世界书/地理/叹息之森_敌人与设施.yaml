叹息之森·敌人:
  瘴气孢子（Lv3-8）:
    类型: 植物·环境怪物
    出现: 森林各处飘浮
    行为: 无主动攻击，触碰后自动释放催情孢子→侵蚀度+3。可用防毒面具规避，或卡帧永续防毒判定。
    掉落: 魅魔菇
  变异藤蔓（Lv8-15）:
    类型: 植物·触手系
    出现: 密林深处、被污染的精灵树附近
    行为: 从地面或树枝上突然伸出缠绕目标。H攻击：缠绕后勒紧→防具破损+1级。持续缠绕3回合未挣脱→触发"树洞囚禁"事件
    掉落: 血髓树液、藤蔓纤维
  精灵怨灵（Lv12-18）:
    类型: 亡灵·精灵
    出现: 精灵树屋废墟、古代祭坛
    行为: 被瘴气杀死未能安息的精灵。发出悲鸣使目标陷入"忧郁"Debuff（全属性-20%持续2回合）。不触发H攻击——她们只想有人听到她们的痛苦
    掉落: 精灵遗物（饰品材料）
  兽人捕奴兵（Lv15-22）:
    类型: 人形·捕奴队
    出现: 捕奴营地及周边巡逻
    行为: 3-5人小队。发现女性角色时优先使用"捕获网"→命中后目标被捆绑→拖向营地。H攻击：俘虏后触发营地的H事件
    掉落: 金币、捕奴网道具
  淫欲母树（Lv25）:
    类型: 植物·区域Boss
    出现: 森林深处·Boss房
    行为: 巨大肉质植物。多阶段：孢子弹幕→触手群→寄生种子（0.016秒判定窗口可操作）。H攻击全种类。伊莉雅剧情核心触发点。
    掉落: 高纯度灵液、母树核心（稀有附魔材料）

叹息之森·设施:
  捕奴营地:
    补充: 除关押伊莉雅的铁笼外，营地内有粗糙的木制兵营和兽人厨子的烤肉架。营地角落有被遗弃的精灵儿童玩具——暗示这里曾经是精灵村落。
  精灵树屋废墟:
    类型: 遗迹·探索点
    位置: 森林北部高地
    氛围: 被烧毁的精灵树屋群。还能看出精致的木雕和褪色的壁画。偶尔风吹过时，残存的魔法会产生精灵语的幻听。
    功能: 探索获得精灵遗物、阅读壁画了解精灵王国历史、触发伊莉雅的回忆剧情
  隐士树洞:
    类型: 居住点·隐藏
    位置: 森林最深处未污染的一角
    氛围: 一棵仍然翠绿的巨树内部被挖空成小屋。住着一位没有名字的老精灵隐士——她疯了，但知道很多。
    功能: 与疯隐士对话（她交替说三个世纪的精灵史和胡言乱语）、获取稀有配方
  古精灵祭坛:
    类型: 遗迹·魔法点
    位置: 森林中心湖中小岛
    氛围: 半沉在粉色湖水中的白色大理石祭坛。石面上刻着世界树图腾——与伊莉雅的法袍图案一致。
    功能: 伊莉雅S级羁绊H剧情触发点之一、使用灵液激活祭坛可临时净化周围瘴气（侵蚀度暂停增加）