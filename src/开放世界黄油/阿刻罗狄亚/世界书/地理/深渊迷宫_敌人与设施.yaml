深渊迷宫·各层敌人与设施总览:

第1-20层·遗忘石窟:
  敌人:
    哥布林（Lv1-10）: 群居弱怪。H攻击：击倒后触发哥布林繁殖洞事件
    变异矿工（Lv5-15）: 被灵液晶化的矿工。缓慢但高攻。无H攻击——它们已不是活人
    史莱姆（Lv3-12）: 溶解衣物的酸液攻击→防具破损+1级。掉落灵液凝胶
    岩石巨像（Lv15-22）: 遗迹守卫。高防低速。致命弱点是关节处的灵液晶化裂缝
    迷宫女Boss·晶化骑士（Lv20）: 被灵液完全晶化的古代骑士，20层守门人
  设施: 冒险者前哨站（简陋帐篷营地，出售回复药和火把）、废弃矿工营房（搜刮物资）、灵液化水潭（采集低纯度灵液）

第21-50层·欲肉母巢:
  敌人:
    触手寄生蠕虫（Lv20-30）: 埋入血肉墙壁中突袭。寄生攻击→目标获得"寄生"Debuff。伊莉雅剧情核心怪物
    血肉魔像（Lv25-35）: 由尸体和触手缝合的人形怪物。高HP可自我再生
    魅魔（Lv30-40）: 飞行+魅惑箭。H攻击：魅惑目标→全属性-30%并可能攻击队友
    淫欲魔（Lv35-45）: 魅魔高阶版。全屏魅惑射线+Boss技
    区域Boss·阿斯蒙蒂斯（Lv50）: 全屏魅惑+精神污染。镜子Bug可内存溢出秒杀
  设施: 孕育之池（极品灵液湖泊，采集得高纯度灵液但侵蚀度+20/次）、肉瘤囚笼（战败队友的囚禁处，限时救援）

第51-99层·逻辑崩坏区:
  敌人:
    肃清天使·T-Pose（Lv40-55）: 平移滑行的机娘。零界虚铁装甲（魔法免疫）。必须邪道技能才能造成伤害
    肃清天使·Code（Lv50-65）: 漂浮在空中的代码实体。攻击是"删除"——直接移除目标的一个Buff
    数据碎片（Lv30-45×大量）: 破碎代码形成的杂兵。单体弱但数量无限刷新
    层面Boss·防火墙守护者（Lv60-75）: 巨大的代码结构体。三段核心需分别击破
  设施: 无传统设施。只有代码碎片构成的"休息节点"（功能同营地但背景是灰白网格世界）、女神的神谕投影（触发剧情对话）

第100层·神之基座:
  Boss·至高女神尤克特拉希尔（Lv99）: 最终Boss。不推荐正攻——利用同源肉体共鸣Bug反向黑入
  设施: 无。只有女神本体和环绕她的秩序代码光环
