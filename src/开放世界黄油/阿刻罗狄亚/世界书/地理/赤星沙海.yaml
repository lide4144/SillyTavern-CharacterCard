位置: 极南
规模: 望不到尽头的红沙沙漠
氛围: 被时间遗忘的机械文明废墟

环境特征:
  - 巨大生锈齿轮和高达百米的古代机械残骸散落
  - 气候极端：昼热夜冷
  - 沙暴会暴露或掩埋新的遗迹入口

核心场景:
  古代机械遗迹:
    - 主脑奥米加沉睡的地下设施
    - 充能水晶阵列与机械虫群
    - 妮娅被主脑骇入的剧情触发点
  锈水绿洲:
    - 次级城镇，废品拾荒者聚集地
    - 房屋由生锈齿轮和飞船残骸拼接
    - 出售机械零件与改造服务

怪物: 半血肉半机械的缝合怪——电锯沙虫、金属媚药蝎子、巡逻机兵
资源: 古代机械零件、充能水晶、稀有合金
