全称: 模因神教（The Cult of Glitch）
定位: 彩蛋势力，崇拜男主邪道操作的底层贫民秘密结社
成立: 下层贫民偶然目睹男主举水桶穿墙、鬼畜跳跃召唤陨石后自发成立

教义:
  - 男主是"超越至高神的更高维度存在"
  - 世界是虚假的代码矩阵，男主是来做debug的救世主
  - Bug行为是神圣仪式，漏洞是通往真理的捷径

仪式与祈祷姿势:
  - 标准祈祷：面朝墙角深蹲+左右平移
  - 高级祭祀：头顶水桶原地旋转跳跃
  - 圣物：铁水桶、耐久度为0的生锈木剑

组织结构:
  - 松散的地下网络，通过暗巷涂鸦（水桶图案）传讯
  - 各地流亡者营地设有秘密传教点
  - 核心成员自称"Debug修士"

给男主的福利:
  - 免费情报：教众遍布底层，提供各区域暗门、守卫巡逻路线
  - 隐藏装备：教众收集的"圣遗物"——实际上是各种有Bug判定的道具
  - 信仰点数：完成神教任务可兑换邪道技能点

信徒特征:
  - 以乞丐、逃亡奴隶、破产冒险者等底层不可接触者为主
  - 对现有秩序（教廷、贵族）极度仇恨
  - 狂热但无害——他们从不想推翻世界，只想看男主继续表演卡Bug
