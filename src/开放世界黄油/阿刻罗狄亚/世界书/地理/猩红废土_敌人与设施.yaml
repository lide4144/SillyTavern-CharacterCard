猩红废土·敌人:
  兽人步兵（Lv15-25）:
    类型: 人形·兽人
    出现: 废土各处巡逻、兽人营帐
    行为: 高HP低速度。重型武器攻击。H攻击：击倒女性角色后使用"战利品捆绑"→拖回营地
    掉落: 兽人战斧、粗糙铠甲
  兽人萨满（Lv18-28）:
    类型: 人形·兽人·施法者
    出现: 兽人营帐中心
    行为: 使用灵液驱动的部落魔法——火焰弹+治疗同伴。H攻击：喷洒"狂乱花粉"→目标侵蚀度+10+攻击队友（狂化Debuff）
    掉落: 萨满面具、狂乱花粉
  座狼骑兵（Lv20-30）:
    类型: 兽人+野兽·骑乘
    出现: 废土开阔地带
    行为: 高速移动+冲锋攻击。骑手和座狼需分别击杀。座狼会单独攻击落单角色
    掉落: 座狼皮、骑兵长枪
  魔族军团士兵（Lv30-45）:
    类型: 魔族·高阶
    出现: 魔族堡垒周边
    行为: 纪律严明、阵型配合。比兽人更聪明更致命。H攻击：捕获后使用"暗月烙印"→在俘虏身上刻下魔族标记→此后在巴别塔会被识别为"魔族所有物"被奴隶贩子盯上
    掉落: 魔族合金装备、暗月碎片
  魔族女帅·赫尔海姆（Lv50）:
    类型: 魔族·区域Boss·可攻略角色
    出现: 猩红废土·魔族堡垒
    行为: 高傲的女魔将。原定被贵族俘虏戴上洗脑项圈→沦为角斗士玩具。<user>可通过捕虫网判定替换+派系声望下溢Bug直接拉入后宫。
    掉落: 赫尔海姆的战旗（全队魔族系伤害+20%饰品）

猩红废土·设施:
  战地酒馆"断刃":
    类型: 酒馆·战地
    位置: 废土边缘的中立地带
    氛围: 用废弃攻城车和帐篷布搭成的简陋酒馆。顾客一半是佣兵一半是逃兵。墙上钉着各种断裂的武器作为"装饰"——每把都代表一个死去的战友。
    功能: 基础休息、雇佣临时佣兵队友、收集兽人/魔族动向情报
  角斗场"血坑":
    类型: 竞技场·野蛮
    位置: 兽人营帐中央
    氛围: 粗石堆成的环形角斗场。兽人在观众席上嚎叫。角斗士是战俘——人类、精灵、甚至其他兽人部落的成员。战败者被当场分食。
    功能: 参加角斗（连胜获得声望和稀有装备）、救人（角斗士中可能有重要NPC线索）
  军械库废墟:
    类型: 探索点·宝藏
    位置: 古战场遗迹中心
    氛围: 被黄沙半埋的坍塌石堡。里面散落着锈蚀武器和碎裂盾牌。偶尔有沙漠食腐虫钻进钻出。
    功能: 探索获得古代武器、触发隐藏Boss战（守卫军械库的亡灵将军）
