拓扑结构: 同心圆+放射状
  - 中心点: 深渊巨口（垂直向下1-100层迷宫）
  - 内环: 巴别塔都市（依附深渊边缘，立体三层）
  - 外环地表: 北（圣白王都）西（叹息之森）东（猩红废土）
  - 远极: 北（霜骸山脉）南（赤星沙海）东（腐沼列岛）

连接方式:
  常规: 步行、骑马、蒸汽火车、齿轮升降梯
  邪道: Wrong Warp（喝回复药第3帧后翻滚开地图→传送至坐标原点）

区域列表:
  - 巴别塔: 枢纽都市，上中下三层
    下层泥沼区: 贫民窟、黑市、非法诊所、模因神教活动点
    中层秩序之秤: 公会大厅、奴隶市场、商铺区
    上层黄金环: 贵族宅邸、公爵府、地下调教室
  - 叹息之森: 西部，被瘴气污染的精灵古林
  - 圣白王都: 北部，教廷总部，圣堂与地下洗脑工坊并存
  - 猩红废土: 东部，兽人与魔族驻扎地
  - 霜骸山脉: 极北，冰封王座与炉渣堡
  - 赤星沙海: 极南，机械文明遗迹与锈水绿洲
  - 腐沼列岛: 极东，群岛、航海、海妖与克苏鲁
  - 深渊迷宫: 垂直向下1-100层
