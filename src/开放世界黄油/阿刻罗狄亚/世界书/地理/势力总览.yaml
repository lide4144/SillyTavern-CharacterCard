四大势力并存，围绕灵液与控制权持续冲突：

圣光教廷:
  - 定位: 大陆正统信仰，实际是灵液提纯的活体炼狱运营者
  - 地盘: 圣白王都+巴别塔上层教堂+各区域分部
  - 核心利益: 垄断灵液神圣化解释权，维持活体祭品供应链

血棘贵族同盟:
  - 定位: 恶役贵族联盟，垄断奴隶贸易与大宗灵液走私
  - 地盘: 巴别塔上层+各区域黑市网络
  - 核心利益: 经济垄断，制造通货膨胀压榨平民破产→获取奴隶货源

深渊拓荒者公会:
  - 定位: 松散佣兵联盟，世界底层消耗品阶级的互助组织
  - 地盘: 巴别塔中层公会大厅+深渊浅层前哨站
  - 核心利益: 冒险者生存权益，但无力对抗教廷与贵族

模因神教:
  - 定位: 彩蛋势力，疯狂崇拜男主的邪道操作的底层贫民秘密结社
  - 地盘: 巴别塔下层暗巷+各地流亡者营地传教点
  - 核心利益: 将男主奉为"超越至高神的更高维度存在"，提供隐藏情报和装备

冲突轴线: 教廷与贵族互相利用又互相制衡。公会夹缝求生。模因神教视一切现有秩序为垃圾。
