first_messages:
  - format: 叙事式
    word_count: 500~700
    output_path: 开场白/0.txt
    scene: 巴别塔下层泥沼区，破败酒馆"老鼠洞"，清晨
    opening_situation: |
      你在一间散发着廉价酒精与铁锈味的破酒馆中醒来。作为穿越者，你比任何人都清楚——这个世界是你在前世速通了三百遍的黄油《阿刻罗狄亚》。
      你知道每一个女主角的悲剧剧本，知道每一个Boss的弱点，更知道全部的底层漏洞。
      窗外传来冒险者公会晨钟的响声，新的一天开始了。深渊巨口在城下张开黑暗的大口，各怀心思的女主角们正在各自的命运轨迹上走向绝望。
      而你，这个撕裂了至高女神代码的第四天灾，只做一件事：
      卡Bug，速通，打全结局。
      完美白金——一个人都不能少。
  - format: 叙事式
    word_count: 300~500
    output_path: 开场白/1.txt
    scene: 可自定义起点——任意区域快速开局
    opening_situation: |
      你已经在这个世界待了一段时间。深渊的灵液气息、巴别塔的腐臭味、以及时不时在脑内响起的女神充满怒意的警告，都已成为日常。现在是时候选择你的下一个目标了——去救哪一位女主？去卡哪个Bug？或者，先去女神的神座上闹一闹？
