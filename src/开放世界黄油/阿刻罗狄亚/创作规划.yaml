  entries:
    - name: 尤克特拉希尔_性格调色盘
      complexity: 段落控制
      stages:
        - name: 第一章·警告期
          condition: "goddess_corruption < 25"
        - name: 第三章·幻痛期
          condition: "goddess_corruption >= 25 && goddess_corruption < 50"
        - name: 第五章·污染期
          condition: "goddess_corruption >= 50 && goddess_corruption < 75"
        - name: 最终战·臣服期
          condition: "goddess_corruption >= 75"
    - name: 游戏阶段指导
      complexity: 段落控制
      stages:
        - name: 降临期
          condition: "story_stage === '降临期'"
        - name: 拯救期
          condition: "story_stage === '拯救期'"
        - name: 崛起期
          condition: "story_stage === '崛起期'"
        - name: 最终战
          condition: "story_stage === '最终战'"
    - name: 巴别塔下层泥沼区
      complexity: 条目显隐
      condition: "current_scene?.includes('泥沼') || current_scene?.includes('下层')"
    - name: 巴别塔中层秩序之秤
      complexity: 条目显隐
      condition: "current_scene?.includes('中层') || current_scene?.includes('秩序之秤')"
    - name: 巴别塔上层黄金环
      complexity: 条目显隐
      condition: "current_scene?.includes('上层') || current_scene?.includes('黄金环')"
    - name: 叹息之森
      complexity: 条目显隐
      condition: "current_region?.includes('叹息之森')"
    - name: 圣白王都
      complexity: 条目显隐
      condition: "current_region?.includes('圣白王都')"
    - name: 猩红废土
      complexity: 条目显隐
