mvu:
  structure: |
    顶层结构：
    ├── 世界
    │   ├── 当前时间：YYYY/MM/DD-HH:MM 格式
    │   ├── 当前区域：角色当前所在的地理区域名称
    │   ├── 当前场景：具体的场景/子区域名称
    │   ├── 天气与灵液浓度：object {weather, ichor_density}
    │   ├── 女神污染度：0-100%，反映尤克特拉希尔的代码污染阶段
    │   └── 剧情阶段：降临期｜拯救期｜崛起期｜最终战
    ├── 主角
    │   ├── 等级：1-99 表层等级
    │   ├── 邪道等级：0-5 Glitch Tier
    │   ├── 异常点数AP：当前可用异常点数
    │   ├── 侵蚀度：0-100%
    │   ├── 当前职业：基础/进阶/邪道特化职业名称
    │   ├── 技能列表：string[] 已解锁的技能名称
    │   ├── 装备列表：object[] 当前穿戴的装备名称和属性
    │   ├── 基础属性：{STR, DEX, INT, CON, CHA}
    │   └── 物品栏：z.record 动态物品
    ├── 西尔维娅
    │   ├── 好感度：0-255
    │   ├── 当前状态：正常｜被救（邪道穿搭态）｜战败恶堕
    │   ├── 等级/职业
    │   └── 是否已拯救：boolean
    ├── 伊莉雅
    │   └── （同上结构）
    ├── 克洛伊
    │   └── （同上结构）
    ├── 米拉
    │   └── （同上结构）
    ├── 弗蕾亚
    │   └── （同上结构）
    ├── 妮娅
    │   └── （同上结构）
    ├── 卡米拉
    │   └── （同上结构）
    ├── 深潜者
    │   └── （同上结构）
    └── 玛莎
        └── （同上结构）

  variables:
    # ── 世界 ──
    - path: 世界.当前时间
      format: YYYY/MM/DD-HH:MM
      description: 游戏内时间，随行动推进
    - path: 世界.当前区域
      description: 当前所在的地理区域（巴别塔/叹息之森/圣白王都/猩红废土/霜骸山脉/赤星沙海/腐沼列岛/深渊迷宫）
    - path: 世界.当前场景
      description: 当前具体场景/子区域名称
    - path: 世界.天气与灵液浓度
      type: object
      fields:
        weather: string
        ichor_density: number  # 0-1，高浓度区域侵蚀度积累加速
    - path: 世界.女神污染度
      type: number
      range: 0~100
      description: 尤克特拉希尔的代码被污染程度，影响女神反应和肃清天使出现频率
    - path: 世界.剧情阶段
      enum: [降临期, 拯救期, 崛起期, 最终战]
      description: 当前故事阶段
    # ── 主角 ──
    - path: 主角.等级
      type: number
      range: 1~99
      description: 表层等级
    - path: 主角.邪道等级
      type: number
      range: 0~5
      description: Glitch Tier，每阶解锁更强邪道技能
    - path: 主角.异常点数
      type: number
      range: 0~99999
      description: Anomaly Points，用于发动邪道技能
    - path: 主角.侵蚀度
      type: number
      range: 0~100
      description: 超过70%触发魅惑/发情修正
    - path: 主角.当前职业
      description: 当前职业名称
    - path: 主角.技能列表
      type: z.array
      description: 已解锁技能名称数组
    - path: 主角.装备列表
      type: z.array
      description: 当前穿戴的装备对象数组
    - path: 主角.基础属性
      type: object
      fields:
        STR: number
        DEX: number
        INT: number
        CON: number
        CHA: number
    - path: 主角.物品栏
      type: z.record
      description: 动态物品及其数量
    # ── 各女主（以好感度和状态为核心）──
    # 以下为每个女主的最小追踪结构，其余女主同理
    - path: 西尔维娅.好感度
      type: number
      range: 0~255
      description: 8位无符号整数，255=S级羁绊，可触发数据下溢（-1→255病娇）
    - path: 西尔维娅.状态
      enum: [未相遇, 待拯救, 已拯救正常, 已拯救邪道, 战败恶堕]
    - path: 西尔维娅.等级
      type: number
      range: 1~99
    - path: 西尔维娅.职业
      description: 当前职业
    - path: 西尔维娅.侵蚀度
      type: number
      range: 0~100
    - path: 伊莉雅.好感度
      type: number
      range: 0~255
    - path: 伊莉雅.状态
      enum: [未相遇, 待拯救, 已拯救正常, 发情增益态, 战败恶堕]
    - path: 伊莉雅.等级
