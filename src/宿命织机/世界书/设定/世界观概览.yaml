# 世界观概览

## 宇宙背景

### 秩序与混沌的永恒争斗

在超越这个世界的宏观宇宙层面，「秩序」与「混沌」两大阵营进行着跨越无数维度的永恒对抗。

### 域外天魔王

「域外天魔」是这个世界生灵对「来自世界之外的不速之客」的统称。其中最具威胁性的一位——天魔王——是混沌阵营的战略级将领。终极目标：将这个世界纳入混沌阵营掌控。

**与本故事的关系**：天魔王在故事开头以「白发人」形态出现，戏谑地给予濒死的李德第二次生命。他认出了李德灵魂的本质（混沌分魂），将其投入异世界作为「实验」——观察混沌分魂在人类身份中会做出什么选择。通过瑟希莉娅明确表示「不干扰你的决定和行为」——但这个承诺的边界是暧昧的。

### 造物主的疯狂

造物主在后期察觉到自己被「疯狂」侵蚀，竭尽全力留下多重后手：
1. 创造「黄金人类」——赋予巨大潜力
2. 意识转生——纯净意识经过多次转生，化为「光明神」
3. 授权铸造「终焉守望者」（圣剑）——若造物主堕入疯狂，后代可拿起这柄武器执行终结

## 历史脉络

### 锈蚀纪元

造物主疯狂后，魔力（玛娜）被污染，文明破碎。城市崩塌，生灵变异，黄金时代终结。

### 第一帝国「盛世」

- 军事胜利：正在边境进行局部战争，收复失地
- 技术革命：「可控形魔网」系统——吸收、过滤、转化受污染魔力，供应全社会
- 盛世表象：城市繁荣，学术界活跃，国民自豪感强烈
- **帝国的暗面**：皇族实验体计划——李钰主导的、旨在创造「完美」超凡个体的隐秘实验。李德使用的身体原属于此计划

### 「支柱升神计划」与魔王

- 黄金人类支柱们试图升华为神明以封印造物主
- **第一支柱莫里斯**：为控制意外产生的怪物，牺牲自我与之融合，剥离出污染部分（后世魔族），自身沦为半疯的魔王
- 其他支柱陆续被腐化，计划实质上失败
- **长征计划**：部分黄金人类将意识上传至「天魔界」寻求逃亡。绝对隐秘

## 种族

### 精灵
黄金时代创造的「管家与恋人」种族，全为女性形态，必须与人类结合才能繁衍。大灾变后建立精灵帝国，奴役青铜人类男性。在边境战争中处于劣势。

### 兽人
黄金时代创造的体力劳动种族。大灾变后将仇恨转移至青铜人类。第一帝国实施种族性灭绝，数量百不存一。

### 龙族
黄金人类的伴生生物。大灾变后不再诞生。现存多为「魔龙」。唯一的现存黄金人类**李钰**与她的龙族将军**李曦**是最后一对——李曦已战死。

### 花之妖精
黄金时代植物研究瑰宝，全族灭绝。唯一幸存者：**瑟希莉娅**。天生善良温暖，能被动改善环境。

### 妖精
黄金时代「性解放」运动的产物——「完美忠贞不二」种族。数量恒定，伴侣共生（伴侣死则妖精死），漫长寿命，强大魔法天赋。潜在病娇属性，体液魅惑能力。

## 关键物品

### 圣剑「终焉守望者」
- 特大巨剑，粗犷厚重。未认主前无任何超凡特征
- 灵体化储存（认主后可融入体内），一念召唤
- 起源：造物主授权铸造——「让起源于我的力量，拥有终结我的可能」
- 认主条件：与李曦相关的特质或共鸣

### 噬生之铠
- 银白色古典骑士型重甲，鲜红披风
- 极大增强攻防，代价是持续消耗能量与生命力
- 「维持它就像在体内烧一把火，用血肉当燃料」
- 可收束至体内亚空间

## 帝国国教

二元信仰（英雄李曦 + 光明神），内部鼓励理性思辨。分为「曦之翼」（英雄崇拜与帝国荣耀）和「光之守」（神学研究与灵性修行）两派。
