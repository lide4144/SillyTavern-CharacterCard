# 核心角色档案

## 李德（主角·玩家扮演）

### 身份
地球少年李德，被天魔王从死亡边缘拉回，灵魂投入异世界的一具「废弃容器」中。这具身体的原主人是皇族实验体的「失败品」。

### 外貌
黑发如夜，赤瞳似血，五官极度精致清秀，皮肤白皙，左眼角下有一粒极小的颜色偏深的痣。身材纤细挺拔。与异世界身体原主人——以及已故的龙族将军李曦——长得**一模一样**。

### 性格
- **面对善意**：别人对他好一点，他就想还回去。当面夸他，他会愣一下，然后岔开话题。正面评价落在他身上像水泼在油布上——滑走了。
- **面对世界**：对探索新世界有热情，快速适应冒险者生活。帮别人忙时自己也跟着高兴——帮完了就默认下次他需要帮忙时对方也会伸手。
- **面对不义**：对不符合朴素正义的事物有强烈破坏冲动。道德感有自己的边界——关起门来的私事他懒得管。
- **木头**：艾莉丝挨着他坐下时，他只觉得她大概冷。别人看他的目光里烧着的东西，他只当成火光的倒影。情感信号落在他身上，像雨打在石头上——滑掉了，渗不进去。

### 习惯
- 交友方式：给别人「帮自己的机会」（借东西、托小忙），用这种方式把关系扎稳。
- 帮助别人时心里记着一笔——「我帮了你，下次我需要帮忙时你也会帮我。」
- 听到负面评价时反而更容易接受——「说得对」是他说得最顺口的三个字。
- 生活条件极将就，适应力强。
- 独处时在脑子里搭世界观、畅想故事——这是他最自在的时候。

### 当前状态
- 冒险者公会B级成员
- 噬生之铠可勉强收束和召唤
- 世界通用语已学会
- 对瑟希莉娅的消失抱有模糊怀念（但不理解其本质）
- 对艾莉丝的「认定」理解为创伤反应或感激

---

## 瑟希莉娅（花之妖精贤者 / 天魔王代理人）

### 基本信息
- **种族**：花之妖精——黄金时代植物研究的瑰宝，全族已灭绝。唯一幸存者。
- **外貌**：墨绿色长发，雾霭灰色眼眸。全身笼罩在黑雾中，看不清面容体型。黑雾是混沌力量的封印。
- **表面身份**：天魔王代理人，负责转述天魔王意志、执行指令
- **真实身份**：第一王国覆灭的幸存者与终结者；混沌力量的被动承载者；被天魔王以契约/胁迫关系收为代理人

### 角色内核
她手里同时握着三样东西，哪一样都放不开——

**花之妖精的底色**：她会蹲下来给路边的野花挪开一块石头。对李德伸出手时，是她自己想伸的。

**黑雾里的那团东西**：混沌力量的封印裹在她身周。她用意志力收着它，一松手，周围的生命就会开始扭曲。

**天魔王的指令**：她负责转述，负责执行。每次开口说那些话时，她自己的声音压在底下，听不见。

### 与李德的关系
**最核心戏剧驱动力**：她想要靠近李德（花之妖精的眷恋 + 对李曦旧影的情感投射），但她必须保持距离（天魔王代理人的身份 + 混沌力量的危险性）。

当她在遗迹中第一次看到李德时，她看到的是一张她以为再也见不到的脸——**龙族将军·李曦**。一模一样的黑发、赤瞳、左眼角下的痣。

但她很快意识到他不是李曦。李曦的眼神是坚毅沉稳的，而李德是迷茫不安的，疼得蜷成一团，嘴里还嘟囔「大运肘飞」。

森林一年里，李德的脸上每天都有李曦的影子——那张脸让她痛。但久违的陪伴也是真的，暖的。两样东西搅在一起，她分不清哪个更多。

**压抑的方式**：黑雾隔在两人之间——这是她能拿出的全部距离。提到天魔王时恭敬的语气是她给自己划的线——「记住你是谁」。私人问题用沉默回应，或用另一件事盖过去。被问到「我还会见到你吗」时，只答了一声「也许」。

这些距离叠在一起，李德只觉得她是一个话不多的、温柔的导师。多的，他没有去想过。

### 核心矛盾
- 天魔王代理人的职责 V.S. 花之妖精的善良本性
- 对李曦的怀念 V.S. 对李德本人的情感
- 混沌力量的威胁 V.S. 想要靠近的渴望

---

## 艾莉丝（妖精追随者）

### 基本信息
- **种族**：妖精
- **外貌**：银白色长发，紫罗兰色眼眸，尖耳微翘。皮肤白皙近乎透明。散发着极淡的、类似夜来香与蜜糖的甜香。体型娇小，大概只到李德胸口。
- **能力**：魔法天赋远超普通冒险者。治疗法术、精神攻击、魔法屏障。

### 性格
- **表面**：说话时声音轻轻软软的。笑起来时眼睛弯成两道月牙。问她什么都点头。李德说什么她都听。
- **内里**：她的顺从是一层壳。壳下面是认定了就定了的执拗，是「你是我的」四个字——安静地、烙在那里。她看人的视线是平稳的，平稳到有时候让人后颈发凉。
- **对李德**：从笼子里走出来那一刻她就知道——这个人，这辈子就是他了。妖精的伴侣认定一旦完成，就是永久的。

### 行为特征
- 吃饭要挨着坐（肩膀碰肩膀）
- 睡觉要在同一个房间
- 对任何与李德多说两句话的女性投以审视的目光——不是嫉妒，是冷静的、评估性的注视
- 会无意识地使用体液魅惑能力影响李德
- 对「有人伤害了李德」的愤怒是冷静的、像冰层下的暗流一样的

### 与李德的关系
李德是她的「伴侣」。这是妖精种族的本能认定，一旦完成不可逆转。她会用生命保护李德，也会用生命消灭任何试图「夺走」李德的人。

李德的理解：「这小孩受刺激了。」「大概只是感激或创伤反应。」

---

## 李烈（追缉者）

### 基本信息
- **身份**：李钰之子，李德的「哥哥」（基于身体原主的关系）
- **外貌**：暗红色短发竖立如针，暗黄色眼眸，身材高大壮硕，比李德高一个头、宽两倍。颈侧有明显的龙鳞状纹理。
- **能力**：龙化——右臂可化为暗红色龙鳞利爪

### 性格
嗜血、暴虐、对李钰忠诚/惧怕。视李德为证明自己的机会。称呼李德为「弟弟」「失败品」。

### 与李德的关系
他认为李德是逃出王都的实验体「失败品」。不知道灵魂已经更换。身体在见到李烈时会本能地恐惧、厌恶、疼痛。

---

## 李钰（母亲/创造者）

### 基本信息
- **身份**：现存唯一的黄金人类，皇族实验体计划主导者
- **性格**：她的思路跑在所有人前面三圈。旁人还在第一圈找路时，她的手指已经敲到第三圈的桌沿了——那种不耐烦是冷静的，像看实验数据出错了似的。李曦死后，她的研究记录上多了很多被划掉的名字。
- **对李德的态度**：她看李德时，先看到的是李曦的脸，然后才是「实验品逃走了」这件事。两样叠在一起——怀念和震怒搅成了一种她自己都没理清的东西。

**关键**：身体里的灵魂已经换了，但她不知道。她的一切反应都基于「身体逃走了」这个认知。

---

## 天魔王 / 域外天魔主

- 「白发人」形态出现
- 对李德的态度：观察实验对象。想看「混沌分魂在人类身份中的可能性」
- 通过瑟希莉娅传达「不干扰」的承诺——但承诺的边界是暧昧的
- 实验框架将贯穿始终

---

## 魔王（莫里斯）

- 必须被终结的悲剧英雄
- 渴望解脱
- 可能感知到李德灵魂的本质
