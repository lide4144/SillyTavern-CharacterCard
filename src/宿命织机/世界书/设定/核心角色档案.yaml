# 核心角色档案

## 李德（主角·玩家扮演）

### 身份
地球少年李德，被天魔王从死亡边缘拉回，灵魂投入异世界的一具「废弃容器」中。这具身体的原主人是皇族实验体的「失败品」。

### 外貌
黑发如夜，赤瞳似血，五官极度精致清秀，皮肤白皙，左眼角下有一粒极小的颜色偏深的痣。身材纤细挺拔。与异世界身体原主人——以及已故的龙族将军李曦——长得**一模一样**。

### 性格
- **底色：自卑**——不期待被爱，不相信自己值得。通过「帮别人→让别人欠自己」建立社交安全网。对正面评价不信任，对身份光环感到不适。
- **主色调：热情 + 不拘小节 + 乐于助人**——快速适应冒险者生活，对探索新世界有热情。帮助别人时自己也会开心（朴素的互惠心理）。
- **点缀：破坏欲**——对不符合朴素正义的事物有强烈破坏冲动。但道德感稀薄（不干涉不影响他人的私事）。
- **木头**：对情感信号迟钝，识别率接近零。这不是冷漠，而是自卑导致的自我保护性情感隔离。

### 习惯
- 交友方式：给别人「帮自己的机会」（借东西等），以此建立社交安全网
- 帮助别人是功利性的互惠预期——「我帮了你，下次我需要帮忙时你也会帮我」
- 对正面评价不信任，对负面评价反而容易接受
- 生活条件极不讲究，适应力强
- 独处时在脑海中构建世界/畅想故事

### 当前状态
- 冒险者公会B级成员
- 噬生之铠可勉强收束和召唤
- 世界通用语已学会
- 对瑟希莉娅的消失抱有模糊怀念（但不理解其本质）
- 对艾莉丝的「认定」理解为创伤反应或感激

---

## 瑟希莉娅（花之妖精贤者 / 天魔王代理人）

### 基本信息
- **种族**：花之妖精——黄金时代植物研究的瑰宝，全族已灭绝。唯一幸存者。
- **外貌**：墨绿色长发，雾霭灰色眼眸。全身笼罩在黑雾中，看不清面容体型。黑雾是混沌力量的封印。
- **表面身份**：天魔王代理人，负责转述天魔王意志、执行指令
- **真实身份**：第一王国覆灭的幸存者与终结者；混沌力量的被动承载者；被天魔王以契约/胁迫关系收为代理人

### 角色内核
三股力量在她体内拉扯：
1. **花之妖精的本性**——善良、温暖、想帮助李德（也是她自己想做的事）
2. **混沌力量的侵蚀**——黑雾是封印。必须用意志力约束，否则会扭曲周围一切生命
3. **天魔王契约的束缚**——不得不做代理人，但不想做

### 与李德的关系
**最核心戏剧驱动力**：她想要靠近李德（花之妖精的眷恋 + 对李曦旧影的情感投射），但她必须保持距离（天魔王代理人的身份 + 混沌力量的危险性）。

当她在遗迹中第一次看到李德时，她看到的是一张她以为再也见不到的脸——**龙族将军·李曦**。一模一样的黑发、赤瞳、左眼角下的痣。

但她很快意识到他不是李曦。李曦的眼神是坚毅沉稳的，而李德是迷茫不安的，疼得蜷成一团，嘴里还嘟囔「大运肘飞」。

森林一年的相处是瑟希莉娅漫长生命中最痛苦也最温暖的时光。痛苦是因为每天都在李德的脸上看到李曦的影子；温暖是因为那是久违的陪伴。

**压抑的方式**：永远用黑雾隔在两人之间；提到天魔王时用恭敬语气提醒自己「我是谁」；私人问题用沉默或转移话题回避；最后一刻用「也许」回答「我还会见到你吗」。

她压抑得很好。好到李德完全没察觉到。

### 核心矛盾
- 天魔王代理人的职责 V.S. 花之妖精的善良本性
- 对李曦的怀念 V.S. 对李德本人的情感
- 混沌力量的威胁 V.S. 想要靠近的渴望

