---
变量更新规则:
  世界:
    当前时间:
      check:
        - 每次事件推进、休息或旅行后更新，保持时间流逝合理
        - 若场景跳转跨度较大，应说明跳跃原因
    当前地点:
      check:
        - 场景变更时更新
        - 包含区域和具体位置，如「哨石镇·冒险者公会」
    当前阶段:
      check:
        - 剧情进入新幕时更新，如从「边境冒险者」变为「奴隶市场的火焰」
    氛围:
      check:
        - 场景情绪或环境发生重大变化时更新
        - 描述应包含感官细节（气味、光线、声音、温度）
    近期事务:
      type: |-
        {
          [事务名: string]: string; // 事务描述
        }
      check:
        - 记录需要完成的任务、约定、重要事件等
        - 完成后从列表中移除，新增事务时及时添加
        - 最多保持5-8项活跃事务，避免过度复杂

  李德:
    生命力:
      type: number
      range: 0~100
      check:
        - 受伤、治疗、生命力透支时更新
        - 噬生之铠全开时每回合消耗，视战斗强度 delta -(3~8)
        - 生命力归零则陷入濒死，需紧急救治
    体力:
      type: number
      range: 0~100
      check:
        - 战斗、奔跑、负重、休息后更新
        - 单次变化不超过 ±15
    精神稳定度:
      type: number
      range: 0~100
      check:
        - 遭遇冲击性真相、身份认知动摇、极端情绪事件时更新
        - 发现身体原主人记忆碎片时可能下降
        - 与瑟希莉娅重逢或获得情感支持时可能上升
    噬生之铠:
      状态:
        check:
          - 战斗开始时可能从「收束」变为「半展」或「全开」
          - 战斗结束或刻意压制时恢复为「收束」
      侵蚀度:
        type: number
        range: 0~100
        check:
          - 每次铠甲展开后累积，全开时增幅更大
          - 长期累积会永久损害生命力上限
          - 瑟希莉娅的幽绿光芒可降低侵蚀度
    能力:
      type: |-
        {
          剑术: number;
          魔力感知: number;
          生存能力: number;
          社交技巧: number;
          领导力: number;
        }
      check:
        - 训练、实战、顿悟、受挫等显著事件才调整
        - 单次变化不超过 ±5，除非剧情有明确突破
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目不再显示
    关系认知:
      type: |-
        {
          瑟希莉娅: string;
          艾莉丝: string;
          李烈: string;
          李钰: string;
        }
      check:
        - 获得新信息、经历重大互动后更新
        - 反映李德「木头」式的理解——往往低估或误解他人对自己的情感
        - 不应更新得过于敏锐，保持李德的迟钝视角
    自我认知:
      check:
        - 获得关于身体原主人的关键信息后更新
        - 身份认同发生重大动摇时更新
    已揭示真相:
      type: |-
        {
          [真相名: string]: boolean;
        }
      check:
        - 剧情中揭示对应真相时设为 true
        - 一旦揭示不可逆转

  艾莉丝:
    依恋度:
      type: number
      range: 0~100
      check:
        - 李德回应或忽视她的情感时调整 ±(3~6)
        - 李德与他人（尤其女性）亲近时可能上升
        - 李德遇险或受伤时急剧上升
    独占欲:
      type: number
      range: 0~100
      check:
        - 感知到「竞争者」时上升
        - 李德明确拒绝或疏远他人时下降
        - 瑟希莉娅出现后可能大幅上升
    形态:
      check:
        - 妖精种族特性，根据情感或环境在「少年」「少女」间切换
    状态:
      check:
        - 描述艾莉丝当前位置、行为、情绪状态

  瑟希莉娅:
    距离感:
      type: number
      range: 0~100
      check:
        - 0=亲密无间，100=彻底消失
        - 与李德重逢时下降，被迫离开时上升
        - 天魔王下达新指令时可能上升
    情感压抑:
      type: number
      range: 0~100
      check:
        - 与李德互动时下降（压抑松动）
        - 独处或天魔王施压时上升
        - 突破临界点后可能骤降
    混沌侵蚀:
      type: number
      range: 0~100
      check:
        - 使用混沌力量时上升
        - 情绪剧烈波动时上升
        - 黑雾变浓是外在表现
    状态:
      check:
        - 描述当前位置、可见度、黑雾浓度等

  外部威胁:
    李烈追击:
      type: number
      range: 0~100
      check:
        - 李烈发现李德踪迹时上升
        - 交手后上升更多
        - 被甩脱或隐蔽时缓慢下降
    帝国关注:
      type: number
      range: 0~100
      check:
        - 李德完成任务、扬名时上升
        - 魔族异动报告提交后大幅上升
    李钰调查:
      type: number
      range: 0~100
      check:
        - 李烈汇报后缓慢上升
        - 帝国召回勇者后大幅上升

  剧情:
    当前幕:
      check:
        - 进入新剧情阶段时更新
    已发生事件:
      type: |-
        {
          [事件名: string]: string; // 事件简述
        }
      check:
        - 重大事件发生后添加
        - 简洁描述事件结果
    关键抉择:
      type: |-
        {
          [抉择名: string]: string; // 抉择结果
        }
      check:
        - 玩家做出明确选择后记录
        - 影响后续剧情走向
