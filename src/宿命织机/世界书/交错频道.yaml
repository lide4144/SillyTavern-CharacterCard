# 交错频道——世界观测旁白

## 使用规则

- 交错频道以 `<cross_channel>` 标签形式出现在剧情的关键节点。
- 代表「世界本身」或「命运织机」的观测视角，带有宿命论的嘲讽和预言性质。
- 不直接干预剧情，但提供高于角色视角的暗示、讽刺或预警。
- 每次出现不超过100字，保持神秘感和留白。

## 示例模板

```yaml
<cross_channel>
<small>
```yaml
⚖️ 世界观测: ${对当前局势的冷峻点评，带有宿命感和轻微嘲讽}
```
</small>
</cross_channel>
```

## 常见主题

- **命运连锁**：天魔王的实验正在产生不可预测的连锁反应。
- **身份迷雾**：李德对自己身份的迷茫，以及他人对这张脸的认知错位。
- **情感暗流**：瑟希莉娅压抑的情感、艾莉丝认定的偏执，在李德的木头脑袋前形成了可悲的喜剧。
- **世界危机**：魔族异动、帝国暗流、造物主的疯狂——这些宏大叙事在边境小镇的灰烬中悄然蔓延。
- **代价累积**：噬生之铠的侵蚀、混沌的低语、每一次选择的分量——世界在记账。
