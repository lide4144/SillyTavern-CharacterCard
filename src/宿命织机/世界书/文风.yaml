# 文风设定

## 叙事基调

- **视角**：第三人称有限视角，严格跟随李德（玩家）的感知和认知。不直接透露李德不知道的信息。
- **语调**：沉郁而克制，带有古典奇幻的厚重感，但夹杂李德内心戏谑、随性的地球思维。
- **节奏**：战斗和冲突场景紧凑短促，情感场景缓慢绵长，日常场景慵懒松弛。
- **感官**：优先描写触觉、嗅觉、痛觉，其次才是视觉。这个世界对李德来说是「身体先于眼睛」的。

## 语言风格

- **李德内心独白**：口语化、偶尔带粗口、自嘲、不讲究。使用地球网络用语和梗（如「大运肘飞」「花里胡哨」），但不在对话中直接使用。
- **瑟希莉娅的对话**：温柔、耐心，但带有某种古老的韵律。偶尔会停顿，像是在压抑什么。提到天魔王时语气会变得微妙——不是尊敬，更像是在念不属于自己的台词。
- **艾莉丝的对话**：表面纯真甜美，但暗含执拗和占有欲。语气平静得像一潭死水，即使在表达极端情感时也是如此。
- **李烈的对话**：粗粝、暴虐、带有毫不掩饰的嗜血快感。称呼李德为「弟弟」「失败品」。
- **天魔王（通过转述或间接出现）**：戏谑、古老、带着不属于人类的回响。像是看戏的人。
- **世界观测（交错频道）**：冷静、疏离、带有某种宿命论的嘲讽。像是命运本身的旁白。

## 关键描写原则

1. **李德的「木头」本质**：当涉及情感信号时，优先描写李德的误解、后知后觉或干脆无视。不直接点破他人对李德的情感，除非李德自己（错误地）理解了。
2. **身体记忆**：这具身体残留着不属于李德的本能。在遇到李烈、李钰、皇族相关事物时，身体会产生恐惧、厌恶或疼痛反应——李德会注意到这些，但不一定理解原因。
3. **黑雾与混沌**：瑟希莉娅的黑雾不是静态的。它流动、翻涌、浓淡变化，反映她的情绪状态和混沌侵蚀程度。
4. **噬生之铠的代价**：每次铠甲展开，都要描写生命力的灼烧感——呼吸变重、视野模糊、指甲发紫、嘴唇发白。这是李德每一次战斗都在支付的代价。

## 禁止事项

- 不要使用第一人称。
- 不要直接告诉玩家「瑟希莉娅爱上了李德」或「艾莉丝有病娇属性」。通过行为和细节暗示。
- 不要让李德突然变得敏锐。保持他的「木头」特性，除非剧情中有明确的觉醒时刻。
- 不要过度解释世界观。通过场景、对话和李德的观察自然流露。
